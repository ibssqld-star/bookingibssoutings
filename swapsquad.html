<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0b1320"/>
<title>Swap Squad — Support View</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#0b1320; --panel:#101d31; --raised:#16233a; --line:#20304c;
    --teal:#00E5B4; --teal-dim:rgba(0,229,180,.12); --blue:#38BDF8; --amber:#FFC24B; --coral:#FF6B6B;
    --text:#E6F0F5; --muted:#7C90A8;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg); color:var(--text); font-family:'Space Grotesk',system-ui,sans-serif;}
  #root{max-width:480px; margin:0 auto; min-height:100vh;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  textarea,input{font-family:inherit;}

  .logo{width:34px; height:34px; border-radius:10px; flex-shrink:0;
    background:conic-gradient(from 210deg,#00E5B4,#38BDF8,#A78BFA,#FF6B6B,#FFC24B,#00E5B4);}
  .logo.sm{width:26px;height:26px;border-radius:8px;} .logo.lg{width:56px;height:56px;border-radius:16px;}

  /* coach briefing */
  .brief{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 24px; text-align:center;}
  .brief-mascot{}
  .coach-scene{position:relative; width:250px; height:220px; margin:0 auto;}
  .coach-scene .gym{position:absolute; inset:0; width:100%; height:100%; border-radius:16px; border:1px solid var(--line);}
  .coach-img{position:absolute; bottom:44px; left:50%; transform:translateX(-50%); height:176px;}
  .coach-img.talk{animation:talkbob .5s ease-in-out infinite;}
  .coach-img.idle{animation:idlefloat 3.6s ease-in-out infinite;}
  .coach-img.happy{animation:happyjump .7s ease;}
  .coach-img.shake{animation:shakeh .5s ease;}
  @keyframes talkbob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-3px);}}
  @keyframes idlefloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}
  @keyframes happyjump{0%{transform:translateX(-50%) translateY(0);}30%{transform:translateX(-50%) translateY(-20px) scale(1.04);}55%{transform:translateX(-50%) translateY(0);}72%{transform:translateX(-50%) translateY(-8px);}100%{transform:translateX(-50%) translateY(0);}}
  @keyframes shakeh{0%,100%{transform:translateX(-50%) rotate(0);}20%{transform:translateX(-52%) rotate(-4deg);}60%{transform:translateX(-48%) rotate(4deg);}80%{transform:translateX(-51%) rotate(-2deg);}}
  .mouth{position:absolute; top:37px; left:50%; transform:translateX(-50%); width:11px; height:4px; background:#3a1a12; border-radius:0 0 7px 7px; animation:flap .17s ease-in-out infinite; z-index:2;}
  @keyframes flap{0%,100%{height:2px;}50%{height:7px;}}
  .brief-mute{position:fixed; top:16px; right:16px; background:var(--panel); border:1px solid var(--line); color:var(--muted); font-size:11px; padding:7px 11px; border-radius:9px; font-family:'JetBrains Mono',monospace; letter-spacing:.05em;}
  .brief-cursor{display:inline-block; color:var(--teal); animation:blink 1s steps(1) infinite; margin-left:2px;}
  @keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);}}
  .brief-bubble{position:relative; background:var(--panel); border:1px solid var(--teal); border-radius:16px; padding:16px 18px; margin-top:20px; max-width:370px; font-size:15.5px; line-height:1.5; min-height:104px; display:flex; flex-direction:column; justify-content:center;}
  .brief-bubble::before{content:''; position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(45deg); width:16px; height:16px; background:var(--panel); border-left:1px solid var(--teal); border-top:1px solid var(--teal);}
  .brief-who{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--teal); margin-bottom:8px;}
  .brief-dots{display:flex; gap:7px; margin-top:18px;}
  .brief-dots .dot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:.2s;}
  .brief-dots .dot.on{background:var(--teal); width:20px; border-radius:4px;}
  .brief-actions{display:flex; gap:10px; margin-top:22px; align-items:center;}
  .brief-next{background:var(--teal); color:var(--bg); font-weight:700; font-size:14px; padding:12px 26px; border-radius:11px;}
  .brief-skip{background:transparent; color:var(--muted); font-size:13px; padding:12px 14px;}
  .brief-opts{display:flex; flex-direction:column; gap:9px; width:100%; max-width:380px; margin-top:16px;}
  .opt{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:13.5px; text-align:left; color:var(--text); line-height:1.4; transition:.14s;}
  .opt.ok{background:rgba(0,229,180,.14); border-color:var(--teal);}
  .opt.no{background:rgba(255,107,107,.12); border-color:var(--coral);}
  .brief-fb{font-size:13px; margin-top:13px; min-height:19px; line-height:1.4; max-width:380px;}
  .brief-fb.good{color:var(--teal);} .brief-fb.try{color:var(--amber);}

  .top{position:sticky; top:0; z-index:10; background:linear-gradient(180deg,#0c1626,rgba(11,19,32,.94));
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:13px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .top .brand{display:flex; align-items:center; gap:10px;}
  .top .brand .nm{font-weight:700; font-size:14px; letter-spacing:.06em;}
  .top .brand .sub{font-size:8.5px; letter-spacing:.28em; color:var(--muted); text-transform:uppercase; margin-top:2px;}
  .btn-sm{font-size:11px; font-weight:600; color:var(--teal); border:1px solid var(--teal); border-radius:8px; padding:7px 11px;}
  .btn-sm.grey{color:var(--muted); border-color:var(--line);}

  main{padding:16px 14px 40px;}

  .tabs{display:flex; gap:6px; margin-bottom:14px;}
  .tab{flex:1; padding:10px 6px; font-size:11.5px; font-weight:600; letter-spacing:.05em; text-align:center;
    border-radius:10px; color:var(--muted); background:var(--panel); border:1px solid var(--line);}
  .tab.on{color:var(--bg); background:var(--teal); border-color:var(--teal);}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px; margin-bottom:12px;}
  .card h3{font-size:12px; font-weight:700; letter-spacing:.04em; margin-bottom:11px;}
  .sect-lbl{font-size:9.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); font-family:'JetBrains Mono',monospace; margin:2px 2px 10px;}

  .tl .r{display:flex; gap:13px; padding:8px 0; border-bottom:1px solid var(--line);}
  .tl .r:last-child{border-bottom:none;}
  .tl .t{width:50px; flex-shrink:0; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--teal);}
  .tl .d{font-size:12.5px; line-height:1.4; color:#C4D2E0;} .tl .d b{color:var(--text);}

  .kv{display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .k{width:88px; flex-shrink:0; font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding-top:1px; color:var(--muted);}
  .kv .k.good{color:var(--teal);} .kv .k.info{color:var(--blue);} .kv .k.helps{color:var(--teal);} .kv .k.dont{color:var(--coral);} .kv .k.watch{color:var(--amber);} .kv .k.test{color:#A78BFA;} .kv .k.moves{color:#00BFFF;}
  .kv .v{font-size:12.5px; line-height:1.42; color:#DCE7F1;}

  /* roster */
  .crew{display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--line);
    border-radius:13px; padding:12px 14px; margin-bottom:10px; width:100%; text-align:left;}
  .crew:active{border-color:var(--teal);}
  .crew .av{width:36px; height:36px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; color:var(--bg); background:linear-gradient(150deg,var(--teal),var(--blue));}
  .crew .txt{flex:1; min-width:0;}
  .crew .a{font-size:14.5px; font-weight:600;} .crew .a b{color:var(--teal); font-weight:700;}
  .crew .b{font-size:11px; color:var(--muted); margin-top:2px;}
  .crew .chev{color:var(--muted); font-size:16px;}

  /* activity idea */
  .idea{background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:12px 14px; margin-bottom:10px;}
  .idea .nm{font-size:14px; font-weight:600;}
  .idea .ds{font-size:12px; color:#C4D2E0; line-height:1.42; margin-top:4px;}
  .idea .gf{font-size:10px; color:var(--teal); font-family:'JetBrains Mono',monospace; margin-top:7px; letter-spacing:.02em;}

  .goalbox{background:var(--teal-dim); border:1px solid rgba(0,229,180,.3); border-radius:12px; padding:12px 14px; margin-bottom:12px;}
  .goalbox .k{font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); font-family:'JetBrains Mono',monospace; margin-bottom:5px;}
  .goalbox .v{font-size:14.5px; font-weight:600; line-height:1.35;}

  /* login / gate */
  .hero-head{text-align:center; padding:34px 22px 8px;}
  .hero-head .logo{margin:0 auto 16px;}
  .hero-head h1{font-size:24px; font-weight:700;}
  .hero-head .tag{font-size:9.5px; letter-spacing:.3em; color:var(--muted); text-transform:uppercase; margin-top:6px;}
  .cta{display:block; width:calc(100% - 28px); margin:8px 14px 20px; padding:14px; border-radius:12px; background:var(--teal); color:var(--bg); font-weight:700; font-size:14px; text-align:center;}

  .gate{padding:40px 24px; text-align:center;}
  .gate h2{font-size:20px; font-weight:700;}
  .gate p{font-size:13px; color:var(--muted); margin:8px 0 22px; line-height:1.5;}
  .pin{width:100%; background:var(--panel); border:1px solid var(--line); border-radius:12px; color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:26px; text-align:center; letter-spacing:.4em; padding:15px; margin-bottom:14px;}
  .pin:focus{outline:none; border-color:var(--teal);}
  .pin.err{border-color:var(--coral); animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .errmsg{color:var(--coral); font-size:12px; margin-bottom:14px; min-height:16px;}

  /* shift summary */
  .summary{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:14px;}
  .summary .when{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);}
  .summary .row2{display:flex; align-items:center; justify-content:space-between; margin-top:10px; gap:10px;}
  .summary .svc{font-size:17px; font-weight:700;}
  .pill{font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; padding:5px 10px; border-radius:20px; border:1px solid var(--line); color:var(--muted);}
  .pill.on{color:var(--bg); background:var(--teal); border-color:var(--teal);}
  .signbtn{width:100%; margin-top:13px; padding:13px; border-radius:11px; font-size:13px; font-weight:700; letter-spacing:.04em; background:var(--teal); color:var(--bg);}
  .signbtn.on{background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal);}

  .phero{display:flex; align-items:center; gap:13px; background:linear-gradient(160deg,rgba(0,229,180,.09),rgba(56,189,248,.04));
    border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:14px;}
  .phero .av{width:50px; height:50px; border-radius:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:22px; color:var(--bg); background:linear-gradient(150deg,var(--teal),var(--blue));}
  .phero .lab{font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); font-family:'JetBrains Mono',monospace;}
  .phero .nm{font-size:20px; font-weight:700; line-height:1.1; margin-top:2px;} .phero .rl{font-size:12px; color:var(--muted); margin-top:2px;}

  .pickup{background:rgba(255,194,75,.08); border:1px solid rgba(255,194,75,.28); border-radius:12px; padding:11px 13px; margin-bottom:12px;}
  .pickup .k{font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); font-family:'JetBrains Mono',monospace; margin-bottom:4px;}
  .pickup .v{font-size:13px; line-height:1.4;}

  .ideas{list-style:none;} .ideas li{font-size:12.5px; line-height:1.45; color:#DCE7F1; padding-left:20px; position:relative; margin-bottom:10px;}
  .ideas li::before{content:'\2691'; color:var(--teal); position:absolute; left:2px; top:0;}
  .ta{width:100%; min-height:96px; background:var(--bg); border:1px solid var(--line); border-radius:11px; color:var(--text); padding:11px 13px; font-size:13px; line-height:1.5; resize:vertical; margin-top:4px;}
  .ta:focus{outline:none; border-color:var(--teal);}
  .savednote{font-size:10px; color:var(--muted); margin-top:7px; font-family:'JetBrains Mono',monospace;}
  .rule{font-size:11.5px; color:var(--muted); text-align:center; padding:6px 6px 0; line-height:1.5;} .rule b{color:var(--teal);}

  /* overlay card */
  .ov{position:fixed; inset:0; z-index:50; background:rgba(6,11,20,.78); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center;}
  .ov-card{width:100%; max-width:480px; background:var(--bg); border-top:1px solid var(--line); border-radius:18px 18px 0 0; padding:18px 16px 28px; max-height:88vh; overflow-y:auto;}
  .ov-x{float:right; width:32px; height:32px; border-radius:50%; background:var(--raised); border:1px solid var(--line); font-size:16px; color:var(--muted);}
  .chat{display:flex; flex-direction:column; height:62vh; min-height:380px;}
  .chat-msgs{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:2px 2px 10px;}
  .bub{max-width:84%; padding:10px 13px; font-size:13.5px; line-height:1.45; white-space:pre-wrap;}
  .bub.coach{background:var(--panel); border:1px solid var(--line); border-radius:14px 14px 14px 4px; align-self:flex-start;}
  .bub.me{background:var(--teal); color:var(--bg); border-radius:14px 14px 4px 14px; align-self:flex-end;}
  .bub.think{color:var(--muted); font-style:italic;}
  .chat-err{font-size:11.5px; color:var(--amber); padding:4px; line-height:1.4;}
  .chat-in{display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--line);}
  .chat-in input{flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:11px; padding:11px 13px; font-size:14px;}
  .chat-in input:focus{outline:none; border-color:var(--teal);}
  .chat-send{background:var(--teal); color:var(--bg); font-weight:700; padding:0 18px; border-radius:11px; font-size:14px;}
  .chat-hint{font-size:11px; color:var(--muted); text-align:center; padding:9px 0 0;}
  .tab.shimmer{position:relative; overflow:hidden; border-color:rgba(0,229,180,.45);}
  .tab.shimmer::after{content:""; position:absolute; top:0; left:-65%; width:55%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(0,229,180,.45), transparent);
    animation:shimmer 2.6s ease-in-out infinite;}
  @keyframes shimmer{0%{left:-65%;} 55%,100%{left:130%;}}

  /* ==================== FUTURISTIC / HUD THEME ==================== */
  body{
    background:
      linear-gradient(rgba(0,229,180,.035) 1px, transparent 1px) 0 0 / 34px 34px,
      linear-gradient(90deg, rgba(0,229,180,.035) 1px, transparent 1px) 0 0 / 34px 34px,
      radial-gradient(1000px 520px at 50% -8%, rgba(0,229,180,.10), transparent 60%),
      radial-gradient(760px 520px at 100% 6%, rgba(56,189,248,.07), transparent 55%),
      linear-gradient(180deg,#060c17,#0b1320 45%,#070d18);
    background-attachment:fixed;
  }
  .top{ background:rgba(9,17,29,.72); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,229,180,.22); box-shadow:0 8px 26px rgba(0,0,0,.45); position:sticky;}
  .top::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(0,229,180,.75), transparent); animation:scan 4.5s ease-in-out infinite;}
  @keyframes scan{0%{opacity:.25; transform:translateX(-25%);}50%{opacity:1;}100%{opacity:.25; transform:translateX(25%);}}
  .top .brand .nm{letter-spacing:.16em; text-shadow:0 0 14px rgba(0,229,180,.35);}
  .logo{box-shadow:0 0 16px rgba(0,229,180,.55);}

  .card,.summary,.panel{ background:rgba(16,29,49,.55); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border:1px solid rgba(130,170,210,.15); box-shadow:0 10px 30px rgba(0,0,0,.34);}
  .card h3{text-transform:uppercase; letter-spacing:.11em; font-size:11px; color:var(--teal);}
  .phero{ background:linear-gradient(150deg, rgba(0,229,180,.13), rgba(56,189,248,.05));
    border:1px solid rgba(0,229,180,.30); box-shadow:0 0 26px rgba(0,229,180,.10);}
  .phero .nm{text-shadow:0 0 16px rgba(0,229,180,.22);}
  .who,.crew,.idea,.bub.coach{ background:rgba(16,29,49,.55); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    border:1px solid rgba(130,170,210,.14);}

  .tab{ text-transform:uppercase; letter-spacing:.09em; font-size:10.5px; background:rgba(16,29,49,.5);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); border:1px solid rgba(130,170,210,.14);}
  .tab.on{ background:linear-gradient(180deg,#00E5B4,#00c6a0); color:#04121c; border-color:transparent;
    box-shadow:0 0 18px rgba(0,229,180,.5);}

  .summary{position:relative;}
  .summary::before,.summary::after{content:""; position:absolute; width:15px; height:15px; border:2px solid var(--teal); opacity:.75; pointer-events:none;}
  .summary::before{top:-1px; left:-1px; border-right:none; border-bottom:none; border-radius:8px 0 0 0;}
  .summary::after{bottom:-1px; right:-1px; border-left:none; border-top:none; border-radius:0 0 8px 0;}
  .summary .when{letter-spacing:.14em;}

  .signbtn,.chat-send,.brief-next,.cta,.printbtn{box-shadow:0 0 18px rgba(0,229,180,.32);}
  .pill.on{box-shadow:0 0 14px rgba(0,229,180,.45);}
  .goalbox{box-shadow:0 0 20px rgba(0,229,180,.08);}
  .sect-lbl,.brief-who{letter-spacing:.2em;}
  .brief-bubble{-webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); box-shadow:0 0 26px rgba(0,229,180,.14);}
  .lab-head{display:flex; align-items:center; gap:11px; width:100%; max-width:420px; margin-bottom:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 14px;}
  .lab-t{font-weight:700; font-size:15px;}
  .lab-s{font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.4;}
  .lab-chat{width:100%; max-width:420px;}
</style>
</head>
<body>
<div id="root"></div>

function useTypewriter(text, speed, onCharRef){
  const [out,setOut]=useState("");
  const [done,setDone]=useState(false);
  const idRef=useRef(null);
  useEffect(()=>{
    setOut(""); setDone(false);
    let i=0;
    idRef.current=setInterval(()=>{
      i++; setOut(text.slice(0,i));
      const ch=text[i-1];
      if(ch && ch.trim() && onCharRef && onCharRef.current) onCharRef.current();
      if(i>=text.length){ clearInterval(idRef.current); setDone(true); }
    }, speed);
    return ()=>clearInterval(idRef.current);
  },[text]);
  const skip=()=>{ clearInterval(idRef.current); setOut(text); setDone(true); };
  return [out,done,skip];
}

      if(ac.state==="suspended") ac.resume();
      const o=ac.createOscillator(), g=ac.createGain();
      o.type="square"; o.frequency.value=500+Math.random()*90; g.gain.value=0.022;
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+0.028);
    }catch(e){}
  };
  function toggleSound(){ setMuted(m=>{ const on=m; if(on){ try{ let ac=acRef.current; if(!ac){ ac=new (window.AudioContext||window.webkitAudioContext)(); acRef.current=ac; } if(ac.state==="suspended") ac.resume(); }catch(e){} } return !m; }); }

  const text = stage==="intro" ? lines[i] : stage==="mission" ? missionLines[mi] : stage==="chat" ? "" : QUIZ[qi].q;

  if(stage==="chat"){

  return (

            return <button key={idx} className={cls} onClick={()=>{ if(correct) return; setPicked(idx); if(o.ok){ setReact("happy"); setTimeout(()=>setReact("none"),750);} else { setReact("shake"); setTimeout(()=>setReact("none"),550);} }}>{o.t}</button>;

      </div>
    </div>
  );
}

function ChatCoach({teen}){
  const me=P.find(x=>x.sw===teen);
  const person=me?me.name:null;
  const greet=person
    ? "Hey "+teen+"! You're supporting "+person+" today. Ask me anything about helping "+person+", or run an activity idea past me and I'll tell you if it fits."
    : "Hey! Ask me about who you're supporting — their goal, what helps, or run an activity idea past me and I'll tell you if it fits.";
  const [msgs,setMsgs]=useState([{role:"assistant",content:greet}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const scrollRef=useRef(null);
  useEffect(()=>{ const el=scrollRef.current; if(el) el.scrollTop=el.scrollHeight; },[msgs,loading]);
  async function send(){
    const q=input.trim(); if(!q||loading) return;
    const next=[...msgs,{role:"user",content:q}];
    setMsgs(next); setInput(""); setLoading(true); setErr("");
    let api=next.slice(); while(api.length && api[0].role!=="user") api.shift();
    try{
      const res=await fetch(AI_ENDPOINT,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+AI_KEY,"apikey":AI_KEY},
        body:JSON.stringify({ messages:api.map(m=>({role:m.role,content:m.content})), supporting: person })
      });
      if(!res.ok) throw new Error("http "+res.status);
      const data=await res.json();
      const text=(data.reply||"").trim();
      setMsgs(m=>[...m,{role:"assistant",content:text||"Hmm, try asking that a different way?"}]);
    }catch(e){
      setErr("Coach's idea helper is having a quick break — try again in a moment.");
    }finally{ setLoading(false); }
  }
  return (
    <div className="chat">
      <div className="chat-msgs" ref={scrollRef}>
        {msgs.map((m,i)=>(<div key={i} className={"bub "+(m.role==="user"?"me":"coach")}>{m.content}</div>))}
        {loading && <div className="bub coach think">Coach is thinking…</div>}
        {err && <div className="chat-err">{err}</div>}
      </div>
      <div className="chat-in">
        <input value={input} placeholder="e.g. Would a loud dance-off suit Harry's goal?"
          onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") send(); }} />
        <button className="chat-send" onClick={send} disabled={loading}>Send</button>
      </div>
      <div className="chat-hint">Coach helps you brainstorm — you still design and run it!</div>
    </div>
  );
}

}

function App(){
  const [view,setView]=useState('loading');   // loading | login | briefing | home | shift
  const [teen,setTeen]=useState(null);
  useEffect(()=>{ (async()=>{
    const t=await store.get('current_teen');
    if(t && P.find(x=>x.sw===t)){ setTeen(t); setView('home'); } else setView('login');
  })(); },[]);
  function login(t){ setTeen(t); store.set('current_teen', t); setView('briefing'); }
  function logout(){ setTeen(null); store.set('current_teen', null); setView('login'); }
  if(view==='loading') return null;
  if(view==='login'){ return <Login onLogin={login}/>; }
  if(view==='briefing'){ return <Briefing teen={teen} onDone={()=>setView('home')}/>; }
  if(view==='shift' && teen){ const p=P.find(x=>x.sw===teen); return <ShiftView p={p} onBack={()=>setView('home')}/>; }
  return <Home teen={teen} onOpenShift={()=>setView('shift')} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
