<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IBSS Bookings — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#05060a;--card:#0b0d14;--card2:#11141f;--teal:#00E5B4;--blue:#00BFFF;--amber:#FFB020;--pink:#ff5da2;--green:#3ddc84;--line:rgba(255,255,255,.16);--mut:#7a8295}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:#fff;padding:28px 18px 60px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.logo{height:46px;width:auto;display:block;margin-bottom:10px}
.eyebrow{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:.24em;text-transform:uppercase;font-size:.72rem;color:var(--teal)}
h1{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:clamp(1.8rem,5vw,2.8rem);line-height:1;margin:6px 0}
.sub{color:var(--mut);font-size:.95rem;margin-bottom:24px}

/* login */
.login{max-width:380px;margin:8vh auto 0;background:var(--card);border:1px solid var(--line);border-radius:0;padding:28px}
.login h2{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:1.5rem;margin-bottom:4px}
.login p{color:var(--mut);font-size:.9rem;margin-bottom:16px}
label{display:block;font-size:.8rem;font-weight:600;color:var(--mut);margin:12px 0 5px}
input{width:100%;background:var(--navy);border:1px solid var(--line);border-radius:0;padding:12px;color:#fff;font-family:'DM Sans';font-size:1rem}
input:focus{outline:none;border-color:var(--teal)}
.btn{font-family:'DM Sans';font-weight:700;font-size:.95rem;border:none;border-radius:0;padding:11px 18px;cursor:pointer;transition:.14s}
.btn-primary{background:var(--teal);color:var(--navy)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;color:#fff;border:1px solid var(--line)}
.btn-sm{padding:7px 12px;font-size:.82rem;border-radius:8px}
.btn-confirm{background:var(--green);color:var(--navy)}
.btn-cancel{background:transparent;color:var(--pink);border:1px solid var(--pink)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.err{color:var(--pink);font-size:.85rem;margin-top:10px;min-height:1em}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:0;padding:16px}
.stat .n{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:1.9rem;line-height:1}
.stat .l{color:var(--mut);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.stat.tealv .n{color:var(--teal)}.stat.amberv .n{color:var(--amber)}.stat.greenv .n{color:var(--green)}.stat.bluev .n{color:var(--blue)}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{background:var(--card);border:1px solid var(--line);color:var(--mut);border-radius:0;padding:7px 15px;font-size:.85rem;font-weight:600;cursor:pointer}
.chip.active{background:var(--teal);color:var(--navy);border-color:var(--teal)}

/* booking cards */
.list{display:flex;flex-direction:column;gap:12px}
.bk{background:var(--card);border:1px solid var(--line);border-radius:0;padding:16px 18px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.bk-main{flex:1;min-width:220px}
.bk-name{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:1.2rem}
.bk-parent{color:var(--mut);font-size:.9rem;margin-top:2px}
.bk-contact{font-size:.86rem;margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
.bk-contact a{color:var(--blue);text-decoration:none}
.bk-days{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:.78rem}
.bk-side{display:flex;flex-direction:column;align-items:flex-end;gap:10px;justify-content:space-between}
.badge{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:0}
.b-pending{background:rgba(255,176,32,.16);color:var(--amber)}
.b-confirmed{background:rgba(61,220,132,.16);color:var(--green)}
.b-cancelled{background:rgba(255,93,162,.16);color:var(--pink)}
.when{color:var(--mut);font-size:.76rem}
.empty{text-align:center;color:var(--mut);padding:50px 20px}
.hidden{display:none}
.bar{display:flex;gap:10px;align-items:center}
@media(max-width:620px){.stats{grid-template-columns:repeat(2,1fr)}.bk-side{align-items:flex-start}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login">
  <h2>IBSS Admin</h2>
  <p>Sign in to view and manage holiday bookings.</p>
  <label for="email">Email</label>
  <input id="email" type="email" autocomplete="username">
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password">
  <div class="err" id="loginErr"></div>
  <div style="margin-top:16px"><button class="btn btn-primary" id="loginBtn" style="width:100%">Sign in</button></div>
</div>

      <div class="eyebrow">IBSS Winter Holidays 2026</div>
      <h1>Bookings</h1>
    </div>
    <div class="bar">
      <button class="btn btn-ghost btn-sm" id="refresh">Refresh</button>
      <button class="btn btn-ghost btn-sm" id="logout">Sign out</button>
    </div>
  </div>
  <p class="sub" id="subline">Loading…</p>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <select id="programSel" style="background:var(--card);border:1px solid var(--line);color:#fff;border-radius:0;padding:10px 13px;font-family:'DM Sans';font-size:.9rem;font-weight:600">
      <option value="all">All programs</option>
    </select>
    <input id="search" type="text" placeholder="Search name, email or phone…" style="flex:1;min-width:200px;background:var(--card);border:1px solid var(--line);color:#fff;border-radius:0;padding:10px 13px;font-family:'DM Sans';font-size:.9rem">
  </div>

  <div class="stats">
    <div class="stat bluev"><div class="n" id="sTotal">0</div><div class="l">Total bookings</div></div>
    <div class="stat amberv"><div class="n" id="sPending">0</div><div class="l">Pending</div></div>
    <div class="stat greenv"><div class="n" id="sConfirmed">0</div><div class="l">Confirmed</div></div>
    <div class="stat tealv"><div class="n" id="sSpots">0</div><div class="l">Total day spots</div></div>
  </div>

  <div class="filters">
    <div class="chip active" data-f="all">All</div>
    <div class="chip" data-f="pending">Pending</div>
    <div class="chip" data-f="confirmed">Confirmed</div>
    <div class="chip" data-f="cancelled">Cancelled</div>
  </div>

  <div class="list" id="list"></div>
  <div class="empty hidden" id="empty">No bookings yet.</div>
</div>

<script>
// ===== CONFIG: same values as index.html =====
const SUPABASE_URL = "https://weyzaukcbaayxrvtergy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_raLOpdCwlwOePnPrUtqZ9g_5zO1zeRy";
// =============================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = s => document.querySelector(s);
let allBookings = [];
let filter = "all";
let programFilter = "all";
let searchTerm = "";

const PROGRAM_LABELS = {
  "2026-winter":"Winter 2026",
  "2026-spring":"Spring 2026",
  "2026-summer":"Summer 2026",
  "2026-autumn":"Autumn 2026"
};
function progLabel(p){ return PROGRAM_LABELS[p] || p; }

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'});
}

async function checkSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showDash(); load(); } else { showLogin(); }
}
function showLogin(){ $('#loginView').classList.remove('hidden'); $('#dashView').classList.add('hidden'); }
function showDash(){ $('#loginView').classList.add('hidden'); $('#dashView').classList.remove('hidden'); }

$('#loginBtn').addEventListener('click', async ()=>{
  const email=$('#email').value.trim(), password=$('#pw').value;
  $('#loginErr').textContent='';
  const btn=$('#loginBtn'); btn.disabled=true; btn.textContent='Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled=false; btn.textContent='Sign in';
  if(error){ $('#loginErr').textContent = error.message; return; }
  showDash(); load();
});
$('#pw').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#loginBtn').click(); });

$('#logout').addEventListener('click', async ()=>{ await sb.auth.signOut(); showLogin(); });
$('#refresh').addEventListener('click', load);

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); filter=c.dataset.f; render();
  });
});
$('#programSel').addEventListener('change', e=>{ programFilter=e.target.value; render(); });
$('#search').addEventListener('input', e=>{ searchTerm=e.target.value.trim().toLowerCase(); render(); });

async function load(){
  const { data, error } = await sb.from('bookings').select('*').order('created_at',{ascending:false});
  if(error){ $('#subline').textContent='Error: '+error.message; return; }
  allBookings = data||[];
  // populate program dropdown from data
  const progs=[...new Set(allBookings.map(b=>b.program).filter(Boolean))];
  const sel=$('#programSel'); const cur=sel.value;
  sel.innerHTML='<option value="all">All programs</option>'+progs.map(p=>`<option value="${p}">${progLabel(p)}</option>`).join('');
  sel.value=progs.includes(cur)||cur==='all'?cur:'all';
  programFilter=sel.value;
  render();
}

function scopedByProgram(){
  return programFilter==='all' ? allBookings : allBookings.filter(b=>b.program===programFilter);
}

function updateStats(rows){
  const spots = rows.filter(b=>b.status!=='cancelled').reduce((n,b)=>n+(b.days?.length||0),0);
  $('#sTotal').textContent = rows.length;
  $('#sPending').textContent = rows.filter(b=>b.status==='pending').length;
  $('#sConfirmed').textContent = rows.filter(b=>b.status==='confirmed').length;
  $('#sSpots').textContent = spots;
  $('#subline').textContent = rows.length+' booking'+(rows.length===1?'':'s')+
    (programFilter==='all'?' (all programs)':' · '+progLabel(programFilter))+
    ' · updated '+new Date().toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'});
}

function render(){
  let rows = scopedByProgram();
  updateStats(rows);
  if(filter!=='all') rows = rows.filter(b=> b.status===filter);
  if(searchTerm){
    rows = rows.filter(b=>{
      const hay=[b.child_name,b.parent_name,b.email,b.phone].join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  const list=$('#list'); list.innerHTML='';
  $('#empty').classList.toggle('hidden', rows.length>0);
  rows.forEach(b=>{
    const titles=(b.day_titles||b.days||[]);
    const det=b.day_details||{};
    const days=b.days||[];
    const dayTags=days.map((id,i)=>{
      const t=titles[i]||id; const d=det[id];
      let extra='';
      if(d&&(d.pickup||d.dropoff||d.note)){
        const bits=[];
        if(d.pickup)bits.push('P '+d.pickup);
        if(d.dropoff)bits.push('D '+d.dropoff);
        if(d.note)bits.push('📝');
        extra=` <span style="color:var(--amber);font-size:.72rem">(${bits.join(' · ')})</span>`;
      }
      return `<span class="tag">${t}${extra}</span>`;
    }).join('');
    // collect notes to show fully
    const notes=days.map((id,i)=>{
      const d=det[id]; if(d&&d.note) return `<div style="font-size:.82rem;color:var(--mut);margin-top:4px">📝 <b style="color:#fff">${titles[i]||id}:</b> ${d.note}</div>`; return '';
    }).join('');
    const el=document.createElement('div');
    el.className='bk';
    el.innerHTML=`
      <div class="bk-main">
        <div class="bk-name">${b.child_name} <span style="font-size:.7rem;color:var(--mut);font-weight:500">· ${progLabel(b.program)}</span></div>
        <div class="bk-parent">Parent: ${b.parent_name}</div>
        <div class="bk-contact">
          <a href="tel:${b.phone}">📞 ${b.phone}</a>
          <a href="mailto:${b.email}">✉️ ${b.email}</a>
        </div>
        <div class="bk-days">${dayTags}</div>
        ${notes}
      </div>
      <div class="bk-side">
        <div>
          <span class="badge b-${b.status}">${b.status}</span>
          <div class="when">${fmtDate(b.created_at)}</div>
        </div>
        <div class="btn-row">
          ${b.status!=='confirmed'?`<button class="btn btn-sm btn-confirm" data-act="confirmed" data-id="${b.id}">Confirm</button>`:''}
          ${b.status!=='cancelled'?`<button class="btn btn-sm btn-cancel" data-act="cancelled" data-id="${b.id}">Cancel</button>`:''}
          ${b.status==='cancelled'?`<button class="btn btn-sm btn-ghost" data-act="pending" data-id="${b.id}">Reopen</button>`:''}
        </div>
      </div>`;
    list.appendChild(el);
  });
  list.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id=btn.dataset.id, status=btn.dataset.act;
      btn.disabled=true;
      const { error } = await sb.from('bookings').update({status}).eq('id',id);
      if(error){ alert('Could not update: '+error.message); btn.disabled=false; return; }
      const b=allBookings.find(x=>x.id===id); if(b) b.status=status;
      // On confirm, offer to text the parent
      if(status==='confirmed'){
        const bk=allBookings.find(x=>x.id===id);
        const who=bk?(bk.child_name+' ('+bk.parent_name+')'):'this booking';
        if(confirm('Text the parent now to confirm '+who+'?')){
          try{
            const res=await fetch(SUPABASE_URL+'/functions/v1/confirm-booking',{
              method:'POST',
              headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},
              body:JSON.stringify({booking_id:id})
            });
            if(!res.ok) throw new Error('status '+res.status);
            alert('Confirmation text sent to the parent.');
          }catch(e){ alert('Booking confirmed, but the text failed to send: '+e.message); }
        }
      }
      render();
    });
  });
}

checkSession();
</script>
</body>
</html>
