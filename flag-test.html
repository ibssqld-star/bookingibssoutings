// TIMESHEET EXPORT — Excel (.xlsx) by date range + worker
// ══════════════════════════════════════════════════════════════
// ── TIMESHEET (review/adjust shifts by period: times, speedo, funding, confirm) ──
function TimesheetReview({ shifts, workers, clients, company, onClose, onEditShift, onAddShift, onUpdateShift, onExport }) {
  const ph = t=>{ const [h,m]=String(t||"0:0").split(":").map(Number); return (h||0)+((m||0)/60); };
  const hrsOf = s=>{ let d=ph(s.end)-ph(s.start); if(d<0) d+=24; return Math.max(0,+d.toFixed(2)); };
  const kmOf = s=>{ const k=s&&s.kms; if(k==null) return 0; if(typeof k==="number") return k; return Number(k.perClient)||Number(k.total)||0; };
  const wOf = s=> workers.find(x=>String(x.id)===String(s.workerId));
  const rateOf = s=> Number(swShiftRate(s, wOf(s)||{})) || 0;
  const fundOf = s=> (s.lineItems||[]).reduce((a,li)=> a+(Number(li.qty)||0)*(Number(li.rate)||0), 0);
  const wName = id=>{ const w=workers.find(x=>String(x.id)===String(id)); return w?w.name:"Unassigned"; };
  const clientOf = s=> clients.find(c=>String(c.id)===String(s.participantId)) || clients.find(c=>c.name===s.participant) || null;
  const iso = d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const fmt$ = n=> "$"+(Number(n)||0).toFixed(2);
  const dayName = ds=>{ try{ return new Date(ds+"T00:00:00").toLocaleDateString("en-AU",{weekday:"short", day:"numeric", month:"short"}); }catch(e){ return ds; } };
  const shortD = ds=>{ try{ return new Date(ds+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric", month:"short"}); }catch(e){ return ds; } };

  const _sched = tsPeriodFor(company && company.settings);
  const [from,setFrom]=useState(()=> _sched ? _sched.from : (()=>{ const d=new Date(); d.setDate(d.getDate()-13); return iso(d); })());
  const [to,setTo]=useState(()=> _sched ? _sched.to : iso(new Date()));
  const [remindOpen,setRemindOpen]=useState(false);
  const [remindStatus,setRemindStatus]=useState("idle"); // idle | sending | done
  const [remindResult,setRemindResult]=useState(null);
  const [payDay,setPayDay]=useState(()=> _sched ? _sched.payDay : (()=>{ const d=new Date(); const add=(5 - d.getDay()+7)%7; const f=new Date(d); f.setDate(d.getDate()+add); return iso(f); })()); // schedule pay day, else next Friday
  const [q,setQ]=useState("");
  const TS_DRAFT_KEY = "kora_timesheet_draft_v1";
  const [draft,setDraft]=useState(()=>{ try{ const r=localStorage.getItem(TS_DRAFT_KEY); return r?JSON.parse(r):{}; }catch(e){ return {}; } });
  const [restoredNote,setRestoredNote]=useState(()=>{ try{ const r=localStorage.getItem(TS_DRAFT_KEY); const o=r?JSON.parse(r):null; return !!(o && Object.keys(o).length); }catch(e){ return false; } });
  const draftRef = useRef(draft); draftRef.current = draft;
  useEffect(()=>{ try{ if(draft && Object.keys(draft).length) localStorage.setItem(TS_DRAFT_KEY, JSON.stringify(draft)); else localStorage.removeItem(TS_DRAFT_KEY); }catch(e){} }, [draft]);
  useEffect(()=>{ const flush=()=>{ try{ const d=draftRef.current; if(d && Object.keys(d).length) localStorage.setItem(TS_DRAFT_KEY, JSON.stringify(d)); }catch(e){} }; window.addEventListener("pagehide", flush); document.addEventListener("visibilitychange", flush); return ()=>{ window.removeEventListener("pagehide", flush); document.removeEventListener("visibilitychange", flush); }; }, []);

  const edit = (s,k,v)=> setDraft(d=> ({ ...d, [s.id]: { ...(d[s.id]||{}), [k]: v } }));
  const val = (s,k)=> (draft[s.id] && (k in draft[s.id])) ? draft[s.id][k] : s[k];
  const merged = s=> ({ ...s, ...(draft[s.id]||{}) });
  const dirty = s=> !!draft[s.id] && Object.keys(draft[s.id]).length>0;
  const save = s=>{ const patch=draft[s.id]; if(!patch) return; onUpdateShift({ ...s, ...patch }); setDraft(d=>{ const n={...d}; delete n[s.id]; return n; }); };
  const discard = s=> setDraft(d=>{ const n={...d}; delete n[s.id]; return n; });

  const toggleConf = s=>{ const on=val(s,"confirmStatus")==="confirmed"; edit(s,"confirmStatus", on?"pending":"confirmed"); edit(s,"confirmed", !on); if(!on){ const cur=String(val(s,"notes")||""); if(cur.includes("[worker-added]")) edit(s,"notes", cur.replace(/\[worker-added\][^\n]*/,"").trim()); } };
  const setOdo = (s,which,v)=>{ const cur=val(s,"kms"); const next=(cur&&typeof cur==="object")?{...cur}:{}; const num=(v===""||v==null)?null:Number(v); if(which==="start") next.startOdo=num; else next.endOdo=num; const a=Number(next.startOdo),b=Number(next.endOdo); if(next.startOdo!=null&&next.endOdo!=null&&isFinite(a)&&isFinite(b)&&b>=a){ next.total=+(b-a).toFixed(1); next.perClient=next.total; next.partial=false; } else { next.total=null; next.perClient=null; next.partial=(next.startOdo!=null||next.endOdo!=null); } const empty=(next.startOdo==null&&next.endOdo==null&&next.total==null); edit(s,"kms", empty?null:next); };
  const setFunding = (s,code)=>{ if(code==="__more__"){ save(s); onEditShift(s); return; } if(code==="__keep__") return; if(code===""){ edit(s,"lineItems",[]); return; } const cat=(clientOf(s)?.lineItems||[]).find(li=>String(li.code)===String(code)); if(!cat) return; const ms=merged(s); const isKm=cat.unit==="km"; const qty=isKm?kmOf(ms):hrsOf(ms); const line={ id:(cat.code||"line")+"-"+Date.now(), desc:cat.desc, code:cat.code, unit:cat.unit||"hrs", qty, rate:Number(cat.rate)||0, ratio:"1:1" }; const keep=(val(s,"lineItems")||[]).filter(li=> isKm ? li.unit!=="km" : li.unit==="km"); edit(s,"lineItems",[line,...keep]); };

  const rows = shifts
    .filter(s=> s.date && s.date>=from && s.date<=to && s.status!=="unavailable")
    .filter(s=>{ if(!q.trim()) return true; const t=q.toLowerCase(); return (wName(s.workerId)||"").toLowerCase().includes(t) || (s.participant||"").toLowerCase().includes(t) || (s.title||"").toLowerCase().includes(t); })
    .slice()
    .sort((a,b)=> (String(a.date)+(a.start||"")).localeCompare(String(b.date)+(b.start||"")));

  const totHrs = rows.reduce((a,s)=>a+hrsOf(merged(s)),0);
  const totPay = rows.reduce((a,s)=>a+rateOf(merged(s))*hrsOf(merged(s)),0);
  const totFund = rows.reduce((a,s)=>a+fundOf(merged(s)),0);
  const totKm = rows.reduce((a,s)=>a+kmOf(merged(s)),0);
  const confN = rows.filter(s=>val(s,"confirmStatus")==="confirmed").length;
  const dirtyN = rows.filter(s=>dirty(s)).length;

  const shiftPeriod = days=>{ const f=new Date(from+"T12:00:00"); const t=new Date(to+"T12:00:00"); f.setDate(f.getDate()+days); t.setDate(t.getDate()+days); setFrom(iso(f)); setTo(iso(t)); };
  const confirmAll = ()=>{ rows.forEach(s=>{ const cur=String(((draft[s.id]&&("notes" in draft[s.id]))?draft[s.id].notes:s.notes)||""); const notes = cur.includes("[worker-added]") ? cur.replace(/\[worker-added\][^\n]*/,"").trim() : undefined; onUpdateShift({ ...s, ...(draft[s.id]||{}), confirmStatus:"confirmed", confirmed:true, ...(notes!==undefined?{notes}:{}) }); }); setDraft({}); };
  const saveAll = ()=>{ rows.forEach(s=>{ if(draft[s.id]) onUpdateShift({ ...s, ...draft[s.id] }); }); setDraft({}); };

  // Workers with at least one shift in the selected period (deduped, with shift count)
  const periodWorkers = (()=>{
    const map = {};
    rows.forEach(s=>{
      const ids = [];
      if (s.workerId!=null && s.workerId!=="") ids.push(String(s.workerId));
      if (Array.isArray(s.workerIds)) s.workerIds.forEach(id=>{ if(id!=null&&id!=="") ids.push(String(id)); });
      [...new Set(ids)].forEach(id=>{
        const w = workers.find(x=>String(x.id)===id);
        if(!w) return;
        if(!map[id]) map[id] = { worker:w, count:0 };
        map[id].count++;
      });
    });
    return Object.values(map).sort((a,b)=>(a.worker.name||"").localeCompare(b.worker.name||""));
  })();
  const remindable = periodWorkers.filter(p=>p.worker.phone).length;

  const sendRemindersNow = async ()=>{
    setRemindStatus("sending");
    const periodLabel = `${shortD(from)}–${shortD(to)}`;
    const payLabel = (()=>{ try{ return new Date(payDay+"T00:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}); }catch(e){ return payDay; } })();
    let sent=0, failed=0, skipped=0;
    for (const {worker} of periodWorkers){
      if(!worker.phone){ skipped++; continue; }
      const msg = `KORA: Hi ${firstName(worker.name)||"there"}, pay day is ${payLabel}. Please open your timesheet and check your shifts & kms for ${periodLabel} are right, then submit: ${COMPANY.appUrl}/?do=timesheet&from=${from}&to=${to}&pay=${payDay} — ${COMPANY.shortName}`;
      try { await sendClickSendSMS("", "", worker.phone, msg); sent++; }
      catch(e){ failed++; }
    }
    setRemindResult({ sent, failed, skipped });
    setRemindStatus("done");
  };

  const TI = { background:"rgba(255,255,255,0.06)", border:`1px solid ${T.border}`, borderRadius:8, padding:"6px 8px", color:"#fff", fontSize:13, fontFamily:"DM Sans,sans-serif", boxSizing:"border-box" };

  return (
    <div style={{position:"fixed",inset:0,zIndex:150,background:"#0b1320",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"calc(14px + env(safe-area-inset-top)) 16px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1,fontSize:17,fontWeight:600,fontFamily:"Syne,sans-serif",color:"#fff"}}>🧾 Timesheet</div>
        {dirtyN>0 && <button onClick={saveAll} style={{background:T.teal,border:"none",borderRadius:9,padding:"7px 12px",color:T.bg,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Save all ({dirtyN})</button>}
        <button onClick={()=>{ setRemindResult(null); setRemindStatus("idle"); setRemindOpen(true); }} style={{background:`${T.amber}14`,border:`1px solid ${T.amber}44`,borderRadius:9,padding:"7px 10px",color:T.amber,fontSize:11.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>📲 Remind SWs</button>
        <button onClick={onExport} style={{background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:9,padding:"7px 10px",color:T.blue,fontSize:11.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>⬇ Excel</button>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${T.border}`,borderRadius:9,width:34,height:34,color:"#fff",fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
        <button onClick={()=>shiftPeriod(-14)} title="Previous fortnight" style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:13,cursor:"pointer"}}>‹</button>
        <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{...TI,width:90}}/>
        <span style={{color:T.subtle,fontSize:12}}>to</span>
        <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{...TI,width:90}}/>
        <button onClick={()=>shiftPeriod(14)} title="Next fortnight" style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:13,cursor:"pointer"}}>›</button>
        <div style={{flex:1}}/>
        <button onClick={()=>onAddShift(from)} style={{background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:8,padding:"7px 11px",color:T.bg,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>＋ Shift</button>
      </div>
      <div style={{padding:"8px 16px",borderBottom:`1px solid ${T.border}`,flexShrink:0,position:"relative"}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search worker or client…" style={{...TI,width:"100%",padding:"8px 30px"}}/>
        <span style={{position:"absolute",left:24,top:"50%",transform:"translateY(-50%)",fontSize:13}}>🔍</span>
        {q && <button onClick={()=>setQ("")} style={{position:"absolute",right:24,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.subtle,fontSize:16,cursor:"pointer"}}>×</button>}
      </div>
      <div style={{padding:"8px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center",fontSize:12,color:T.subtle,flexShrink:0}}>
        <span><b style={{color:"#fff"}}>{rows.length}</b> shifts</span>
        <span><b style={{color:"#fff"}}>{totHrs.toFixed(2)}</b> hrs</span>
        <span>Pay <b style={{color:T.teal}}>{fmt$(totPay)}</b></span>
        <span>Funding <b style={{color:T.amber}}>{fmt$(totFund)}</b></span>
        <span>🚗 <b style={{color:"#fff"}}>{totKm.toFixed(0)}</b> km</span>
        <div style={{flex:1}}/>
        <span style={{color: confN===rows.length&&rows.length>0?T.teal:T.subtle}}>{confN}/{rows.length} confirmed</span>
        {rows.length>0 && confN<rows.length && <button onClick={confirmAll} style={{background:`${T.teal}1a`,border:`1px solid ${T.teal}55`,borderRadius:8,padding:"4px 10px",color:T.teal,fontSize:11.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>✓ Confirm all</button>}
      </div>
      {restoredNote && <div style={{margin:"10px 14px 0",padding:"9px 12px",background:`${T.amber}14`,border:`1px solid ${T.amber}55`,borderRadius:10,display:"flex",alignItems:"center",gap:8,fontSize:12,color:T.amber}}><span>↩ Restored your unsaved edits from last time — Save when you're ready.</span><div style={{flex:1}}/><button onClick={()=>setRestoredNote(false)} style={{background:"none",border:"none",color:T.amber,cursor:"pointer",fontSize:15}}>×</button></div>}
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px 60px"}}>
        {rows.length===0 && <div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:40}}>No shifts match.</div>}
        {rows.map(s=>{
          const m = merged(s);
          const conf = val(s,"confirmStatus")==="confirmed";
          const hrs = hrsOf(m);
          const rate = rateOf(m);
          const fund = fundOf(m);
          const cat = clientOf(s)?.lineItems || [];
          const curCode = ((val(s,"lineItems")||[]).find(li=>li.unit!=="km")||{}).code || "";
          const inCat = cat.some(li=>String(li.code)===String(curCode));
          const isDirty = dirty(s);
          const workerAdded = !!(s.notes && String(s.notes).includes("[worker-added]"));
          return (
            <div key={s.id} style={{background:T.card,border:`1px solid ${isDirty?T.amber+"99":(conf?T.teal+"55":(workerAdded?T.blue+"cc":T.border))}`,borderRadius:12,padding:"11px 12px",marginBottom:8}}>
              {workerAdded && !conf && <div style={{display:"inline-flex",alignItems:"center",gap:6,background:`${T.blue}1f`,border:`1px solid ${T.blue}66`,borderRadius:8,padding:"4px 9px",marginBottom:8,fontSize:11,fontWeight:600,color:T.blue,fontFamily:"DM Sans,sans-serif"}}>🆕 Added by SW — needs confirmation</div>}
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:T.subtle}}>{dayName(s.date)}{s.isOuting&&s.title?` · ${s.title}`:""}</div>
                  <div style={{fontSize:14,fontWeight:500,fontFamily:"Syne,sans-serif",color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{wName(s.workerId)} <span style={{color:T.subtle}}>→</span> {s.participant||s.title||"—"}</div>
                </div>
                {isDirty && <button onClick={()=>discard(s)} title="Discard changes" style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,width:30,height:30,color:T.subtle,fontSize:13,cursor:"pointer",flexShrink:0}}>↩</button>}
                {isDirty && <button onClick={()=>save(s)} style={{background:T.teal,border:"none",borderRadius:8,padding:"7px 14px",color:T.bg,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif",flexShrink:0}}>Save</button>}
                <button onClick={()=>toggleConf(s)} style={{display:"flex",alignItems:"center",gap:6,background:conf?`${T.teal}1a`:"rgba(255,255,255,0.04)",border:`1px solid ${conf?T.teal:T.border}`,borderRadius:8,padding:"6px 9px",cursor:"pointer",fontFamily:"DM Sans,sans-serif",flexShrink:0}}>
                  <span style={{width:15,height:15,borderRadius:4,border:`1px solid ${conf?T.teal:T.subtle}`,background:conf?T.teal:"transparent",color:T.bg,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{conf?"✓":""}</span>
                  <span style={{fontSize:11,color:conf?T.teal:T.subtle}}>{conf?"OK":"Confirm"}</span>
                </button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <input type="time" value={val(s,"start")||""} onChange={e=>edit(s,"start",e.target.value)} style={{...TI,width:90}}/>
                <span style={{color:T.subtle}}>–</span>
                <input type="time" value={val(s,"end")||""} onChange={e=>edit(s,"end",e.target.value)} style={{...TI,width:90}}/>
                <span style={{fontSize:12,color:T.body}}>{hrs.toFixed(2)}h</span>
                <div style={{flex:1}}/>
                <span style={{fontSize:12,color:rate>0?T.teal:T.amber}}>{rate>0?fmt$(rate*hrs):"no pay rate"}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:T.subtle}}>🚗 Speedo</span>
                <input type="number" inputMode="decimal" value={(m.kms&&m.kms.startOdo!=null)?m.kms.startOdo:""} placeholder="start" onChange={e=>setOdo(s,"start",e.target.value)} style={{...TI,width:80}}/>
                <span style={{color:T.subtle}}>→</span>
                <input type="number" inputMode="decimal" value={(m.kms&&m.kms.endOdo!=null)?m.kms.endOdo:""} placeholder="end" onChange={e=>setOdo(s,"end",e.target.value)} style={{...TI,width:80}}/>
                <span style={{fontSize:12,fontWeight:600,color: kmOf(m)>0?T.teal:T.subtle}}>{kmOf(m)>0?`= ${kmOf(m)} km`:((m.kms&&(m.kms.startOdo!=null||m.kms.endOdo!=null))?"need both":"")}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,paddingTop:8,borderTop:`1px solid ${T.border}`,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:T.subtle}}>💰</span>
                <select value={inCat?curCode:(curCode?"__keep__":"")} onChange={e=>setFunding(s,e.target.value)} style={{...TI,flex:1,minWidth:150,cursor:"pointer",background:T.card}}>
                  <option value="" style={{background:T.card}}>— No funding —</option>
                  {curCode && !inCat && <option value="__keep__" style={{background:T.card}}>{curCode} (current)</option>}
                  {cat.map((li,i)=><option key={i} value={li.code} style={{background:T.card}}>{li.desc} · {fmt$(li.rate)}{li.unit==="km"?"/km":"/hr"}</option>)}
                  <option value="__more__" style={{background:T.card}}>✎ Full editor / more lines…</option>
                </select>
                <span style={{fontSize:12,color: fund>0?T.amber:T.subtle,whiteSpace:"nowrap"}}>{fund>0?fmt$(fund):"—"}</span>
              </div>
            </div>
          );
        })}
      </div>
      {remindOpen && (
        <Modal title="Remind support workers" onClose={()=>setRemindOpen(false)}>
          {remindStatus!=="done" ? (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{fontSize:12.5,color:T.body,lineHeight:1.5}}>
                Texts every SW with shifts in <b style={{color:"#fff"}}>{shortD(from)}–{shortD(to)}</b>, asking them to check their hours &amp; kms are right before pay day.
              </div>
              <div>
                <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Pay day</div>
                <input type="date" value={payDay} onChange={e=>setPayDay(e.target.value)} style={{...TI,width:150}}/>
              </div>
              <div style={{maxHeight:"36vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                {periodWorkers.length===0 && <div style={{fontSize:12.5,color:T.subtle}}>No workers have shifts in this period.</div>}
                {periodWorkers.map(({worker,count})=>(
                  <div key={worker.id} style={{display:"flex",alignItems:"center",gap:8,background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 10px"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:"#fff",fontWeight:500}}>{worker.name}</div>
                      <div style={{fontSize:11,color: worker.phone?T.subtle:T.amber}}>{worker.phone || "no phone — will skip"}</div>
                    </div>
                    <div style={{fontSize:11,color:T.subtle,whiteSpace:"nowrap"}}>{count} shift{count>1?"s":""}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setRemindOpen(false)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px",color:T.body,fontSize:13,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Cancel</button>
                <button disabled={remindStatus==="sending"||remindable===0} onClick={sendRemindersNow} style={{flex:2,background: (remindStatus==="sending"||remindable===0)?"rgba(255,255,255,0.1)":`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,padding:"10px",color:(remindStatus==="sending"||remindable===0)?T.subtle:T.bg,fontWeight:600,fontSize:13,cursor:(remindStatus==="sending"||remindable===0)?"default":"pointer",fontFamily:"DM Sans,sans-serif"}}>
                  {remindStatus==="sending" ? "Sending…" : `Send reminders (${remindable})`}
                </button>
              </div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:12,textAlign:"center",padding:"6px 0"}}>
              <div style={{fontSize:30}}>✅</div>
              <div style={{fontSize:14,color:"#fff",fontWeight:600,fontFamily:"Syne,sans-serif"}}>Reminders sent</div>
              <div style={{fontSize:12.5,color:T.body}}>
                {remindResult.sent} sent{remindResult.failed?` · ${remindResult.failed} failed`:""}{remindResult.skipped?` · ${remindResult.skipped} skipped (no phone)`:""}
              </div>
              <button onClick={()=>setRemindOpen(false)} style={{background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,padding:"10px",color:T.bg,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Done</button>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

function TimesheetExport({ shifts, workers, clients=[], onClose }) {
  const [workerId, setWorkerId] = useState("all");
  const [clientId, setClientId] = useState("all");
  const today = new Date();
  const monthAgo = new Date(); monthAgo.setDate(today.getDate()-30);
  const [from, setFrom] = useState(monthAgo.toISOString().split("T")[0]);
  const [to, setTo] = useState(today.toISOString().split("T")[0]);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);

  // Build the filtered rows for preview + export
  function buildRows() {
    const rows = [];
    shifts.forEach(s => {
      // a shift may have multiple workers (outing) — expand each
      const ids = s.workerIds && s.workerIds.length ? s.workerIds : [s.workerId];
      ids.forEach(wid => {
        const w = workers.find(x => x.id === wid);
        if (!w) return;
        if (workerId !== "all" && String(wid) !== String(workerId)) return;
        if (clientId !== "all") {
          const sel = clients.find(c => String(c.id) === String(clientId));
          const selName = sel ? (sel.name||"").toLowerCase() : "";
          const partStr = `${s.participant||""} ${s.title||""}`.toLowerCase();
          const idMatch = String(s.participantId) === String(clientId) || (s.participantIds||[]).map(String).includes(String(clientId));
          if (!(idMatch || (selName && partStr.includes(selName)))) return;
        }
        const d = s.date ? new Date(s.date) : new Date();
        if (s.date) {
          if (from && new Date(s.date) < new Date(from)) return;
          if (to && new Date(s.date) > new Date(to + "T23:59:59")) return;
        }
        const phh = t=>{const [h,m]=String(t||"0").split(":").map(Number); return (h||0)+((m||0)/60);};
        const hours = Math.max(0, +(phh(s.end)-phh(s.start)).toFixed(2));
        const rate = swShiftRate(s, w); // SW hourly pay rate — null if unset, never guessed
        const client = clients.find(c => String(c.id) === String(s.participantId));
        const fundingRate = client ? (Number(client.rate)||0) : 0;
        const funding = (s.lineItems && s.lineItems.length)
          ? s.lineItems.reduce((sum,li)=> sum + (Number(li.total) || (Number(li.qty)||0)*(Number(li.rate)||0)), 0)
          : (fundingRate ? hours*fundingRate : 0);
        const km = s.kms;
        let odoStart="", odoEnd="", kmTotal=0;
        if (km && !Array.isArray(km)) { odoStart = km.startOdo!=null?km.startOdo:""; odoEnd = km.endOdo!=null?km.endOdo:""; kmTotal = Number(km.total)||0; }
        else if (Array.isArray(km)) { kmTotal = km.reduce((a,x)=>a+(Number(x.total)||0),0); }
        rows.push({
          Date: s.date || "—",
          Day: s.date ? d.toLocaleDateString("en-AU",{weekday:"short"}) : "—",
          Worker: w.name,
          "QuickBooks Code": w.staffId || "",
          "Worker ID": w.id,
          Participant: s.isOuting ? s.title : s.participant,
          Service: s.type || "",
          "Pay Category": (s.payRateUsed && (s.payRateUsed.category || s.payRateUsed.label)) || "",
          Start: s.start, End: s.end,
          Hours: hours,
          "Pay Rate": rate!=null ? rate : "(not set)",
          "Pay Total": rate!=null ? +(hours * rate).toFixed(2) : 0,
          "Funding Rate": fundingRate || "",
          "Funding Total": +Number(funding).toFixed(2),
          "Odo Start": odoStart,
          "Odo End": odoEnd,
          "KM": +Number(kmTotal).toFixed(1),
          Location: s.location || "",
          Status: s.status || "",
        });
      });
    });
    return rows.sort((a,b)=> (a.Date>b.Date?1:-1));
  }

  const rows = buildRows();
  const totalHours = rows.reduce((s,r)=>s+r.Hours,0);
  const totalPay = rows.reduce((s,r)=>s+(Number(r["Pay Total"])||0),0);
  const totalFunding = rows.reduce((s,r)=>s+(Number(r["Funding Total"])||0),0);
  const totalKm = rows.reduce((s,r)=>s+(Number(r["KM"])||0),0);

  async function loadScript(src){return new Promise((res,rej)=>{if([...document.scripts].some(s=>s.src===src))return res();const e=document.createElement("script");e.src=src;e.onload=res;e.onerror=rej;document.head.appendChild(e);});}

  async function exportXlsx() {
    setBusy(true);
    try {
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
      const XLSX = window.XLSX;
      const wsData = [...rows];
      // append totals row
      wsData.push({});
      wsData.push({ Worker:"TOTALS", Hours: totalHours, "Pay Total": +totalPay.toFixed(2), "Funding Total": +totalFunding.toFixed(2), "KM": +totalKm.toFixed(1) });
      const ws = XLSX.utils.json_to_sheet(wsData);
      ws["!cols"] = [{wch:11},{wch:5},{wch:14},{wch:15},{wch:12},{wch:16},{wch:24},{wch:14},{wch:7},{wch:7},{wch:7},{wch:9},{wch:10},{wch:12},{wch:13},{wch:10},{wch:10},{wch:7},{wch:18},{wch:10}];
      const wb = XLSX.utils.book_new();
      const wkName = workerId==="all" ? "All Workers" : workers.find(w=>String(w.id)===String(workerId))?.name || "Worker";
      const clName = clientId==="all" ? "" : "-" + ((clients.find(c=>String(c.id)===String(clientId))?.name)||"Client").replace(/[^\w.-]/g,"");
      XLSX.utils.book_append_sheet(wb, ws, "Timesheet");
      XLSX.writeFile(wb, `IBSS-Timesheet-${wkName}${clName}-${from}-to-${to}.xlsx`);
      setDone(true); setTimeout(()=>setDone(false), 2500);
    } catch(e) { alert("Export failed: "+(e?.message||"")); }
    setBusy(false);
  }

  return (
    <Modal title="Export Timesheet" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Support Worker</div>
          <select value={workerId} onChange={e=>setWorkerId(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",appearance:"none"}}>
            <option value="all" style={{background:T.navy}}>All Workers</option>
            {workers.map(w=><option key={w.id} value={w.id} style={{background:T.navy}}>{w.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Client</div>
          <select value={clientId} onChange={e=>setClientId(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",appearance:"none"}}>
            <option value="all" style={{background:T.navy}}>All Clients</option>
            {clients.map(c=><option key={c.id} value={c.id} style={{background:T.navy}}>{c.name}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>From</div>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>To</div>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
        </div>

        {/* Preview summary */}
        <div style={{background:T.navyDeep,borderRadius:12,padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-around"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.teal}}>{rows.length}</div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"1px"}}>Shifts</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.blue}}>{totalHours}h</div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"1px"}}>Total Hours</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.orange}}>{fmt$(totalPay)}</div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"1px"}}>Total Pay</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.teal}}>{fmt$(totalFunding)}</div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"1px"}}>Total Funding</div></div>
          </div>
        </div>

        {rows.length===0 && <div style={{fontSize:12,color:T.amber,textAlign:"center"}}>No shifts match — adjust the date range or worker.</div>}

        <div style={{fontSize:12,color:T.muted,lineHeight:1.5}}>
          Exports a .xlsx with date, worker (+ QuickBooks code &amp; worker ID), participant, service, pay category, times, hours, SW pay rate &amp; pay total, client funding rate &amp; full funding charged, plus odometer start/end &amp; total KM — with a totals row. Opens in Excel, Google Sheets, or imports into QuickBooks.
        </div>

        <BtnPrimary disabled={busy||rows.length===0} onClick={exportXlsx}>
          {busy?"Building spreadsheet…":done?"✓ Downloaded!":"⬇ Download Excel (.xlsx)"}
        </BtnPrimary>
      </div>
    </Modal>
  );
}

// ── Donut chart (self-contained SVG) ──────────────────────────
function Donut({ segments, size=158, thickness=24, centerTop, centerMain }) {
  const total = segments.reduce((s,x)=>s+Math.max(0,x.value),0) || 1;
  const r = (size-thickness)/2;
  const c = 2*Math.PI*r;
  let offset = 0;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={thickness}/>
        <g transform={`rotate(-90 ${size/2} ${size/2})`}>
          {segments.map((seg,i)=>{
            const val = Math.max(0,seg.value);
            const len = (val/total)*c;
            const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={thickness} strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-offset} strokeLinecap="butt"/>;
            offset += len;
            return el;
          })}
        </g>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        {centerTop && <div style={{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:T.subtle}}>{centerTop}</div>}
        {centerMain && <div style={{fontSize:22,fontWeight:600,fontFamily:"Syne,sans-serif",color:T.white,letterSpacing:"-0.5px"}}>{centerMain}</div>}
      </div>
    </div>
  );
}

function BusinessView({ shifts, workers, allShifts, expenses, setExpenses }) {
  const fmt$ = n => `$${Number(n||0).toLocaleString("en-AU",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
  const parseH = (t)=>{ const [h,m]=String(t||"0").split(":").map(Number); return (h||0)+((m||0)/60); };
  const shiftHours = (s)=> Math.max(0, parseH(s.end)-parseH(s.start));

  // ── Date range filter ──────────────────────────────────────
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const inRange = (d)=>{
    if(!d) return true;
    if(from && d < from) return false;
    if(to && d > to) return false;
    return true;
  };
  const filteredShifts = shifts.filter(s=>inRange(s.date));
  const filteredExpenses = expenses.filter(e=>inRange(e.date));

  const fmtDay = (iso)=>{
    if(!iso) return "";
    const [y,m,d] = iso.split("-");
    return `${d}/${m}/${y.slice(2)}`;
  };
  const setPreset = (key)=>{
    const now = new Date();
    const iso = (dt)=>dt.toISOString().split("T")[0];
    if(key==="all"){ setFrom(""); setTo(""); return; }
    if(key==="month"){
      setFrom(iso(new Date(now.getFullYear(), now.getMonth(), 1)));
      setTo(iso(new Date(now.getFullYear(), now.getMonth()+1, 0)));
      return;
    }
    if(key==="30"){
      const past = new Date(now); past.setDate(past.getDate()-30);
      setFrom(iso(past)); setTo(iso(now));
      return;
    }
    if(key==="fy"){ // Australian FY: 1 Jul – 30 Jun
      const y = now.getMonth()>=6 ? now.getFullYear() : now.getFullYear()-1;
      setFrom(iso(new Date(y,6,1))); setTo(iso(new Date(y+1,5,30)));
      return;
    }
  };
  const rangeActive = !!(from || to);

  // ── Add-expense composer ───────────────────────────────────
  const EXP_CATEGORIES = ["Fuel","Vehicle","Insurance","Phone & internet","Software & subscriptions","Equipment","Training & PD","Office & admin","Staff amenities","Other"];
  const [addingExp, setAddingExp] = useState(false);
  const [expDraft, setExpDraft] = useState({ cat:"", amt:"", date:TODAY_ISO });
  const resetDraft = ()=> setExpDraft({ cat:"", amt:"", date:TODAY_ISO });
  const saveExpense = ()=>{
    const amt = Number(expDraft.amt)||0;
    if(!expDraft.cat.trim() && !amt){ setAddingExp(false); resetDraft(); return; }
    setExpenses(p=>[...p,{ id:Date.now(), cat:expDraft.cat.trim()||"Expense", amt, date:expDraft.date||TODAY_ISO }]);
    resetDraft();
    setAddingExp(false);
  };

  // ── Pay & super constants ──────────────────────────────────
  const DEFAULT_PAY_RATE = 28.5;   // SW hourly pay when no rate is set anywhere
  const SUPER_RATE = 0.12;         // Super guarantee, FY2025-26 (12% of ordinary earnings)
  // Pay rate priority: the rate chosen on the shift → the worker's set rate → default.
  // Editing a shift updates its rate/hours/lines, and every figure below recomputes.
  const payRateForShift = (s, w)=>
    Number(s?.payRateUsed?.rate) || Number(w?.payRates?.[0]?.rate) || DEFAULT_PAY_RATE;
  const shiftIncome = (s)=> (s.lineItems||[]).reduce(
    (sum,li)=> sum + (Number(li.total) || (Number(li.qty)||0)*(Number(li.rate)||0)), 0);

  // Wages, super, hours and income all come from the SAME roster shifts, so a single
  // shift edit moves everything together, and they all respect the date range.
  const hoursByWorker = {};
  let wages = 0, superTotal = 0;
  filteredShifts.forEach(s=>{
    const hrs = shiftHours(s);
    const ids = (s.workerIds&&s.workerIds.length) ? s.workerIds : (s.workerId ? [s.workerId] : []);
    ids.forEach(wid=>{
      const w = workers.find(x=>x.id===wid);
      const wage = hrs * payRateForShift(s, w);
      wages += wage;
      superTotal += wage * SUPER_RATE;
      hoursByWorker[wid] = (hoursByWorker[wid]||0) + hrs;
    });
  });

  const income     = filteredShifts.reduce((sum,s)=> sum + shiftIncome(s), 0);
  const invoiced   = filteredShifts.filter(s=>s.invoiced).reduce((sum,s)=> sum + shiftIncome(s), 0);
  const uninvoiced = income - invoiced;
  const expTotal   = filteredExpenses.reduce((s,e)=>s+Number(e.amt||0),0);
  const net = income - wages - superTotal - expTotal;

  const segments = [
    { label:"Wages",    value:wages,           color:T.amber },
    { label:"Super",    value:superTotal,      color:T.pink  },
    { label:"Expenses", value:expTotal,        color:T.blue  },
    { label:"Profit",   value:Math.max(0,net), color:T.teal  },
  ];

  const workerHours = Object.entries(hoursByWorker)
    .map(([wid,hrs])=>({ w:workers.find(x=>x.id===Number(wid)), hrs }))
    .filter(x=>x.w)
    .sort((a,b)=>b.hrs-a.hrs);
  const maxH = Math.max(...workerHours.map(x=>x.hrs), 1);

  const stat = (label,val,color,sub)=>(
    <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:14,padding:"13px 14px"}}>
      <div style={{fontSize:11,letterSpacing:"1.2px",textTransform:"uppercase",color:T.subtle,marginBottom:5}}>{label}</div>
      <div style={{fontSize:22,fontWeight:600,fontFamily:"Syne,sans-serif",color,letterSpacing:"-0.5px"}}>{fmt$(val)}</div>
      {sub && <div style={{fontSize:11,color:T.subtle,marginTop:3}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div>
        <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:T.subtle,marginBottom:5}}>Snapshot · current roster &amp; invoices</div>
        <div style={{fontSize:22,fontWeight:600,fontFamily:"Syne,sans-serif",letterSpacing:"-0.4px"}}>Business</div>
      </div>

      <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${rangeActive?T.borderAccent:T.border}`,borderRadius:16,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <SLabel>Date range</SLabel>
          <span style={{fontSize:12,color:rangeActive?T.teal:T.subtle}}>
            {rangeActive ? `${from?fmtDay(from):"start"} → ${to?fmtDay(to):"now"}` : "All time"}
          </span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {[["This month","month"],["Last 30 days","30"],["This FY","fy"],["All","all"]].map(([label,key])=>(
            <button key={key} onClick={()=>setPreset(key)}
              style={{flex:"1 1 auto",background:`${T.teal}12`,border:`1px solid ${T.teal}33`,borderRadius:9,padding:"7px 10px",color:T.teal,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:T.subtle,marginBottom:3,letterSpacing:"0.5px"}}>FROM</div>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)}
              style={{width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:T.subtle,marginBottom:3,letterSpacing:"0.5px"}}>TO</div>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)}
              style={{width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          {rangeActive && (
            <button onClick={()=>{setFrom("");setTo("");}} title="Clear"
              style={{alignSelf:"flex-end",background:"none",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:T.subtle,fontSize:14,cursor:"pointer",lineHeight:1}}>×</button>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {stat("Income", income, T.teal)}
        {stat("Invoiced", invoiced, T.blue, uninvoiced>0?`${fmt$(uninvoiced)} not yet invoiced`:"All invoiced")}
        {stat("Wages", wages, T.amber)}
        {stat("Super", superTotal, T.pink, "12% of wages")}
        {stat("Expenses", expTotal, T.blue)}
        {stat("Net profit", net, net>=0?T.teal:T.red)}
      </div>

      <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:16,padding:16}}>
        <SLabel>Where the money goes</SLabel>
        <div style={{display:"flex",alignItems:"center",gap:18,marginTop:6,flexWrap:"wrap",justifyContent:"center"}}>
          <Donut segments={segments} centerTop="Income" centerMain={fmt$(income)}/>
          <div style={{display:"flex",flexDirection:"column",gap:10,minWidth:130,flex:1}}>
            {segments.map(seg=>{
              const pct = income>0 ? Math.round((seg.value/income)*100) : 0;
              return (
                <div key={seg.label} style={{display:"flex",alignItems:"center",gap:9}}>
                  <span style={{width:11,height:11,borderRadius:3,background:seg.color,flexShrink:0}}/>
                  <span style={{fontSize:12,color:T.body,flex:1}}>{seg.label}</span>
                  <span style={{fontSize:12,fontWeight:600,color:T.white}}>{fmt$(seg.value)}</span>
                  <span style={{fontSize:12,color:T.subtle,width:34,textAlign:"right"}}>{pct}%</span>
                </div>
              );
            })}
            {net<0 && <div style={{fontSize:12,color:T.red,marginTop:2}}>Running at a loss of {fmt$(Math.abs(net))} — wages + expenses exceed income.</div>}
          </div>
        </div>
      </div>

      <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:16,padding:16}}>
        <SLabel>Hours worked · by support worker</SLabel>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:6}}>
          {workerHours.length===0 && <div style={{fontSize:12,color:T.subtle}}>No shift hours yet.</div>}
          {workerHours.map(({w,hrs})=>(
            <div key={w.id}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,color:T.body}}>{w.name}</span>
                <span style={{fontSize:12,fontWeight:600,fontFamily:"Syne,sans-serif",color:T.white}}>{hrs.toFixed(1)}h</span>
              </div>
              <div style={{height:7,background:"rgba(255,255,255,0.05)",borderRadius:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(hrs/maxH)*100}%`,background:`linear-gradient(90deg,${T.teal},${T.blue})`,borderRadius:6}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:16,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <SLabel>Expenses{rangeActive?" · in range":""}</SLabel>
          <span style={{fontSize:13,fontWeight:600,color:T.blue}}>{fmt$(expTotal)}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
          {filteredExpenses.length===0 && !addingExp && (
            <div style={{fontSize:12,color:T.subtle}}>No expenses{rangeActive?" in this range":" yet"}.</div>
          )}
          {filteredExpenses.map((e)=>{
            const idx = expenses.findIndex(x=>x.id===e.id);
            return (
            <div key={e.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:11,padding:10}}>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>
                <input value={e.cat} onChange={ev=>setExpenses(p=>p.map((x,j)=>j===idx?{...x,cat:ev.target.value}:x))} placeholder="What was it for"
                  style={{flex:1,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                <button onClick={()=>setExpenses(p=>p.filter((_,j)=>j!==idx))} title="Remove" style={{background:"none",border:"none",color:T.red,fontSize:17,cursor:"pointer",lineHeight:1}}>×</button>
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center",marginTop:7}}>
                <input type="date" value={e.date||""} onChange={ev=>setExpenses(p=>p.map((x,j)=>j===idx?{...x,date:ev.target.value}:x))}
                  style={{flex:1,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
                <span style={{fontSize:12,color:T.subtle}}>$</span>
                <input type="number" value={e.amt} onChange={ev=>setExpenses(p=>p.map((x,j)=>j===idx?{...x,amt:ev.target.value}:x))} placeholder="0"
                  style={{width:90,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",textAlign:"right"}}/>
              </div>
            </div>
            );
          })}

          {addingExp ? (
            <div style={{background:`${T.blue}0d`,border:`1px solid ${T.blue}44`,borderRadius:11,padding:11}}>
              <div style={{fontSize:12,letterSpacing:"1px",textTransform:"uppercase",color:T.blue,marginBottom:8}}>New expense</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {EXP_CATEGORIES.map(c=>(
                  <button key={c} onClick={()=>setExpDraft(d=>({...d,cat:c}))}
                    style={{background:expDraft.cat===c?T.blue:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:8,padding:"5px 9px",color:expDraft.cat===c?"#06121f":T.blue,fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                    {c}
                  </button>
                ))}
              </div>
              <input value={expDraft.cat} onChange={ev=>setExpDraft(d=>({...d,cat:ev.target.value}))} placeholder="Description (e.g. Fuel — Caltex Redland Bay)"
                style={{width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:7}}/>
              <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:9}}>
                <input type="date" value={expDraft.date} onChange={ev=>setExpDraft(d=>({...d,date:ev.target.value}))}
                  style={{flex:1,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
                <span style={{fontSize:12,color:T.subtle}}>$</span>
                <input type="number" value={expDraft.amt} onChange={ev=>setExpDraft(d=>({...d,amt:ev.target.value}))} placeholder="0" autoFocus
                  style={{width:90,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",textAlign:"right"}}/>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{setAddingExp(false);resetDraft();}} style={{flex:1,background:"none",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px",color:T.subtle,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Cancel</button>
                <button onClick={saveExpense} style={{flex:2,background:GRAD.tealBlue,border:"none",borderRadius:9,padding:"9px",color:"#06121f",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Add expense</button>
              </div>
            </div>
          ) : (
            <button onClick={()=>{resetDraft();setAddingExp(true);}} style={{background:`${T.blue}14`,border:`1px dashed ${T.blue}44`,borderRadius:10,padding:"10px",color:T.blue,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add business expense</button>
          )}
        </div>
      </div>

      <div style={{fontSize:12,color:T.muted,lineHeight:1.5,textAlign:"center",padding:"0 8px"}}>
        Income is the sum of each shift's billing line items; Invoiced is the portion on shifts already marked invoiced. Wages are each shift's hours × the rate chosen on the shift (falling back to the worker's set rate, or ${DEFAULT_PAY_RATE}/hr), and Super is {Math.round(SUPER_RATE*100)}% of wages. Net profit = income − wages − super − expenses. Editing a shift updates every figure, and all of them respect the date range above.
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SHIFT VIEW  —  tap a roster shift to view it first (not edit).
// Capture receipts, kilometres and incidents against the shift here.
// ══════════════════════════════════════════════════════════════
function ShiftView({ shift, workers, clients, shifts, onClose, onEdit, onSave, onDelete, onViewRunSheet }) {
  const hasRunSheet = !!(shift.isOuting || shift.title || (shift.stops&&shift.stops.length) || shift.meetPoint || shift.whatToBring);
  const w = (workers||[]).find(x=>x.id===shift.workerId);
  const p = (clients||[]).find(x=>x.id===shift.participantId);
  const statusColor = shiftStateColor(shift);

  // Other clients who also have a shift that day — surface as likely ride-along passengers.
  const sameDayClients = [...new Set(
    (shifts||[])
      .filter(s => (s.date||"")===(shift.date||""))
      .flatMap(s => s.participantIds || [s.participantId])
      .filter(id => id && id !== shift.participantId)
  )].map(id => (clients||[]).find(c=>c.id===id)).filter(Boolean);
  const otherClients = (clients||[]).filter(c => c.id !== shift.participantId);

  // Per-shift money: funding charged (billing lines, or client rate × hours if none) vs SW wage.
  const _phSV = t=>{const[h,m]=String(t||"0").split(":").map(Number);return (h||0)+((m||0)/60);};
  const svHrs = Math.max(0, _phSV(shift.end)-_phSV(shift.start));
  const svFunding = (shift.lineItems&&shift.lineItems.length)
    ? shift.lineItems.reduce((sum,li)=> sum + (Number(li.total) || (Number(li.qty)||0)*(Number(li.rate)||0)), 0)
    : svHrs * (Number(p?.rate)||0);
  const svWageRate = swShiftRate(shift, w);
  const svWage = svWageRate!=null ? svHrs*svWageRate : null;
  const svMargin = svWageRate!=null ? (svFunding - svWage) : null;

  const [receipts,setReceipts]=useState(shift.receipts||[]);
  const normKms = (k)=> Array.isArray(k) ? k : (k && typeof k==="object" ? [{id:"signoff",...k}] : []);
  const [kms,setKms]=useState(normKms(shift.kms));
  const normInc = (arr)=> (arr||[]).map((x,i)=> (x&&x.id!=null) ? x : {...x, id:`inc-${i}-${(x&&x.time)||""}`});
  const [incidents,setIncidents]=useState(normInc(shift.incidents));

  const [rDraft,setRDraft]=useState({desc:"",amt:"",images:[]});
  const rFileRef = useRef(null);
  const [kDraft,setKDraft]=useState({startOdo:"",endOdo:"",passengers:[]});
  const [iDraft,setIDraft]=useState({antecedent:"",behaviour:"",duration:"",recovery:"",strategies:"",time:shift.start||""});
  const [adding,setAdding]=useState(null); // 'receipt' | 'km' | 'incident' | null
  const [editId,setEditId]=useState(null); // id of the entry being edited (null = adding new)

  const fmtMoney = n => `$${Number(n||0).toFixed(2)}`;

  // Persist any change straight back onto the shift so it survives closing.
  const commit = (next)=>{
    const r = next.receipts ?? receipts, k = next.kms ?? kms, i = next.incidents ?? incidents;
    if(next.receipts) setReceipts(next.receipts);
    if(next.kms) setKms(normKms(next.kms));
    if(next.incidents) setIncidents(next.incidents);
    onSave && onSave({ ...shift, receipts:r, kms:k, incidents:i });
  };

  const addReceipt = ()=>{
    const amt = Number(rDraft.amt)||0;
    if(!rDraft.desc.trim() && !amt && !(rDraft.images&&rDraft.images.length)) return setAdding(null);
    const entry = { id: editId ?? Date.now(), desc:rDraft.desc.trim()||"Receipt", amt, images:rDraft.images||[] };
    commit({ receipts: editId ? receipts.map(x=>x.id===editId?entry:x) : [...receipts,entry] });
    setRDraft({desc:"",amt:"",images:[]}); setAdding(null); setEditId(null);
  };
  const togglePax = (id)=> setKDraft(d=>({...d, passengers: d.passengers.includes(id)?d.passengers.filter(x=>x!==id):[...d.passengers,id]}));
  const draftTotal = (kDraft.startOdo!==""&&kDraft.endOdo!=="") ? Math.max(0, Number(kDraft.endOdo)-Number(kDraft.startOdo)) : 0;
  const draftCount = kDraft.passengers.length + 1;                  // main client + passengers
  const draftPerClient = draftTotal ? +(draftTotal/draftCount).toFixed(2) : 0;
  const addKm = ()=>{
    if(kDraft.startOdo==="") return setAdding(null);
    const hasEnd = kDraft.endOdo!=="";
    const total = hasEnd ? draftTotal : null;
    const clientIds = [shift.participantId, ...kDraft.passengers].filter(Boolean);
    const entry = {
      id: editId ?? Date.now(),
      startOdo:kDraft.startOdo, endOdo:kDraft.endOdo, total,
      partial: !hasEnd,                       // start logged, end to be added later
      passengers:[...kDraft.passengers],     // other clients in the car
      clientIds,                              // everyone the km is split across (incl. main)
      clientCount:draftCount,
      perClient: hasEnd ? draftPerClient : null, // even split — one claim each
    };
    commit({ kms: editId ? kms.map(x=>x.id===editId?entry:x) : [...kms,entry] });
    setKDraft({startOdo:"",endOdo:"",passengers:[]}); setAdding(null); setEditId(null);
  };
  const addIncident = ()=>{
    if(!iDraft.behaviour.trim()) return setAdding(null);
    const entry = { id: editId ?? Date.now(), antecedent:iDraft.antecedent.trim(), behaviour:iDraft.behaviour.trim(), duration:iDraft.duration.trim(), recovery:iDraft.recovery.trim(), strategies:iDraft.strategies.trim(), time:iDraft.time||"" };
    commit({ incidents: editId ? incidents.map(x=>x.id===editId?entry:x) : [...incidents,entry] });
    setIDraft({antecedent:"",behaviour:"",duration:"",recovery:"",strategies:"",time:shift.start||""}); setAdding(null); setEditId(null);
  };
  const clientName = id => ((clients||[]).find(c=>c.id===id)||{}).name || "?";

  const receiptTotal = receipts.reduce((s,r)=>s+Number(r.amt||0),0);
  const kmTotal = kms.reduce((s,k)=>s+Number(k.total||0),0);
  const sevColor = sv => sv==="High"?T.red:sv==="Medium"?T.amber:T.teal;

  const sectionHead = (label, right, accent)=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <SLabel color={accent}>{label}</SLabel>
      {right}
    </div>
  );
  const addBtn = (kind, color)=>(
    <button onClick={()=>{ if(adding===kind){ setAdding(null); setEditId(null); } else { setEditId(null); if(kind==="receipt")setRDraft({desc:"",amt:"",images:[]}); else if(kind==="km")setKDraft({startOdo:"",endOdo:"",passengers:[]}); else if(kind==="incident")setIDraft({antecedent:"",behaviour:"",duration:"",recovery:"",strategies:"",time:shift.start||""}); setAdding(kind); } }} style={{background:`${color}14`,border:`1px solid ${color}44`,borderRadius:8,padding:"5px 10px",color,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
      {adding===kind?"Close":"＋ Add"}
    </button>
  );
  const fieldStyle = {flex:1,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"};
  const taStyle = {width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box",lineHeight:1.4};
  const iLab = (t)=> <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>{t}</div>;

  return (
    <Modal title="Shift details" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Avatar initials={p?.initials||(shift.participant||"?").slice(0,2).toUpperCase()} color={T.teal} size={44}/>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:600,fontFamily:"Syne,sans-serif"}}>{shift.participant||p?.name||"Shift"}</div>
            <div style={{fontSize:12,color:T.subtle}}>with {shift.worker||w?.name||"—"}</div>
          </div>
          <Chip label={shiftStateLabel(shift)} color={statusColor}/>
        </div>

        {/* Key info */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <InfoCell label="Date" val={shift.date ? new Date(shift.date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}) : "—"}/>
          <InfoCell label="Time" val={`${shift.start||"—"}–${shift.end||"—"}`}/>
          <InfoCell label="Service" val={shift.type||"—"}/>
          <InfoCell label="NDIS code" val={shift.code||"—"}/>
          <InfoCell label="Total hours" val={`${Math.round(svHrs*100)/100}h`} color={T.blue}/>
        </div>
        {shift.location && <InfoCell label="Pick-up" val={shift.location}/>}
        {shift.dropoffLocation && shift.dropoffLocation!==shift.location && <InfoCell label="Drop-off" val={shift.dropoffLocation}/>}
        {(p?.companionCard||p?.companionCardImage) && (
          <div style={{background:"rgba(0,229,180,0.04)",border:`1px solid ${T.teal}2e`,borderRadius:14,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",fontWeight:600,marginBottom:8}}><IIcon name="id" size={12} mr={4}/>Companion Card{p.companionCard?` · ${p.companionCard}`:""}</div>
            {p.companionCardImage && <img src={p.companionCardImage} alt="Companion card" style={{maxWidth:"100%",borderRadius:8,border:`1px solid ${T.border}`}}/>}
          </div>
        )}
        {!shift.isOuting && (
          <div style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.teal}2e`,borderRadius:14,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",fontWeight:600,marginBottom:9}}><IIcon name="money" color={T.teal}/>This shift</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"0.5px"}}>Funding charged</div><div style={{fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif",color:T.teal}}>{fmtMoney(svFunding)}</div></div>
              <div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"0.5px"}}>SW wage</div><div style={{fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif",color:T.amber}}>{svWage!=null?fmtMoney(svWage):"—"}</div></div>
              <div><div style={{fontSize:10,color:T.subtle,textTransform:"uppercase",letterSpacing:"0.5px"}}>Margin</div><div style={{fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif",color:svMargin==null?T.subtle:svMargin>=0?T.blue:T.red}}>{svMargin!=null?fmtMoney(svMargin):"—"}</div></div>
            </div>
            <div style={{fontSize:11,color:T.muted,marginTop:8}}>{String(Math.round(svHrs*100)/100)}h{svWageRate!=null?` · wage @ $${svWageRate.toFixed(2)}/hr${shift?.payRateUsed?.category?` (${shift.payRateUsed.category})`:""}`:" · SW pay rate not set"}{svFunding===0?" · set a rate or billing line to charge funding":(shift.lineItems&&shift.lineItems.length?"":" · funding from client rate")}</div>
          </div>
        )}
        {hasRunSheet && onViewRunSheet && (
          <button onClick={()=>onViewRunSheet(shift)} className={"outing-bar"+(isShiftPast(shift)?" is-past":"")}>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:14,fontWeight:700,color:"#fff"}}><IIcon name="van"/>Group outing details</div>
              <div style={{fontSize:12,color:T.subtle,marginTop:2}}>{(shift.stops||[]).length} stops{shift.meetPoint?" · meet point set":""} · what staff see</div>
            </div>
            <span style={{fontSize:18,color:"#fff"}}>›</span>
          </button>
        )}
        {shift.notes && shift.notes!==shift.outingNotes && (
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:11,padding:"11px 13px"}}>
            <div style={{fontSize:10,color:T.subtle,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Notes</div>
            <div style={{fontSize:12.5,color:T.body,lineHeight:1.5}}>{shift.notes}</div>
          </div>
        )}

        {/* ── Progress Note ── */}
        <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:14,padding:14}}>
          {sectionHead("Progress Note", null, T.teal)}
          {(()=>{
            const pn = shift.progressNote;
            if (!pn || ((!pn.observations||!pn.observations.length) && !pn.obs && !(pn.goals||[]).length && !pn.quote)) return <div style={{fontSize:12,color:T.subtle}}>No progress note recorded for this shift.</div>;
            const chip = (txt,c)=>(<span style={{fontSize:12,fontWeight:600,color:c,background:`${c}1c`,border:`1px solid ${c}40`,borderRadius:20,padding:"2px 9px"}}>{txt}</span>);
            const INDEP_C=[null,T.red,T.orange,T.amber,T.blue,T.teal];
            if (pn.observations && pn.observations.length) {
              return (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {pn.observations.map((o,i)=>{
                    const il=INDEPENDENCE.find(l=>l.level===o.indep);
                    return (
                      <div key={i} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:11,padding:"10px 12px"}}>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginBottom:6}}>
                          {o.goal && chip(o.goal,T.teal)}
                          {il && chip(`${o.indep}/5 · ${il.label}`, INDEP_C[o.indep]||T.blue)}
                          {(o.count!==""&&o.count!=null) && chip(`×${o.count}`,T.subtle)}
                        </div>
                        {o.skill && <div style={{fontSize:11.5,color:T.subtle,marginBottom:3}}>{o.skill}</div>}
                        {o.what && <div style={{fontSize:12.5,color:T.body,lineHeight:1.55,whiteSpace:"pre-wrap"}}>{o.what}</div>}
                        {(o.support||[]).length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>{o.support.map((s,j)=><span key={j}>{chip(s,T.amber)}</span>)}</div>}
                      </div>
                    );
                  })}
                  {pn.quote && <div style={{fontSize:12,color:T.body,fontStyle:"italic",borderLeft:`2px solid ${T.teal}66`,paddingLeft:10,lineHeight:1.5}}>“{pn.quote}”</div>}
                  {pn.incident && <div style={{fontSize:12,color:T.red}}>⚠ Worker flagged an incident — check the Incidents section below.</div>}
                </div>
              );
            }
            const indep = INDEPENDENCE.find(l=>l.level===pn.indep);
            return (
              <div style={{display:"flex",flexDirection:"column",gap:11}}>
                {(pn.goals||[]).length>0 && (
                  <div>
                    <div style={{fontSize:11,color:T.subtle,letterSpacing:"1px",textTransform:"uppercase",marginBottom:5}}>Goals worked on</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{pn.goals.map((g,i)=><span key={i}>{chip(g,T.teal)}</span>)}</div>
                  </div>
                )}
                {pn.skill && <div style={{fontSize:12,color:T.body}}><span style={{color:T.subtle}}>Skill / activity: </span>{pn.skill}</div>}
                {pn.obs && (
                  <div>
                    <div style={{fontSize:11,color:T.subtle,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Observations</div>
                    <div style={{fontSize:12.5,color:T.body,lineHeight:1.55,whiteSpace:"pre-wrap"}}>{pn.obs}</div>
                  </div>
                )}
                {pn.quote && <div style={{fontSize:12,color:T.body,fontStyle:"italic",borderLeft:`2px solid ${T.teal}66`,paddingLeft:10,lineHeight:1.5}}>“{pn.quote}”</div>}
                {(indep || (pn.support||[]).length>0) && (
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                    {indep && chip(`Independence ${indep.level}/5 · ${indep.label}`, T.blue)}
                    {(pn.support||[]).map((s,i)=><span key={i}>{chip(s,T.amber)}</span>)}
                  </div>
                )}
                {(pn.planned||pn.actual) && <div style={{fontSize:12,color:T.subtle,lineHeight:1.5}}>{pn.planned?`Planned: ${pn.planned}`:""}{pn.planned&&pn.actual?" · ":""}{pn.actual?`Actual: ${pn.actual}`:""}</div>}
              </div>
            );
          })()}
        </div>

        {/* ── Kilometres ── */}
        <div style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:14,padding:14}}>
          {sectionHead(`Kilometres${kmTotal?` · ${kmTotal} km`:""}`, addBtn("km",T.blue), T.blue)}
          {kms.length===0 && adding!=="km" && <div style={{fontSize:12,color:T.subtle}}>No kilometres logged.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {kms.map(k=>(
              <div key={k.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 11px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{flex:1,fontSize:12,color:T.body}}>{(k.endOdo!==""&&k.endOdo!=null)?`${k.startOdo} → ${k.endOdo}`:`Start ${k.startOdo} · end pending`}</span>
                  <span style={{fontSize:12,fontWeight:600,color:(k.total!=null)?T.blue:T.amber}}>{(k.total!=null)?`${k.total} km`:"⏳"}</span>
                  <button onClick={()=>{ setKDraft({startOdo:k.startOdo||"",endOdo:k.endOdo||"",passengers:[...(k.passengers||[])]}); setEditId(k.id); setAdding("km"); }} style={{background:"none",border:"none",color:T.blue,fontSize:14,cursor:"pointer",lineHeight:1}}><Icon name="edit" size={14} color={T.amber}/></button>
                  <button onClick={()=>commit({kms:kms.filter(x=>x.id!==k.id)})} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
                </div>
                {k.clientCount>1 && k.total!=null && (
                  <div style={{fontSize:12,color:T.subtle,marginTop:4}}>
                    Split {k.clientCount} ways · <b style={{color:T.blue}}>{k.perClient} km each</b> — {[shift.participantId,...(k.passengers||[])].map(clientName).join(", ")}
                  </div>
                )}
              </div>
            ))}
          </div>
          {adding==="km" && (
            <div style={{marginTop:8}}>
              <div style={{display:"flex",gap:7,marginBottom:8}}>
                <input type="number" value={kDraft.startOdo} onChange={e=>setKDraft(d=>({...d,startOdo:e.target.value}))} placeholder="Start odometer" style={fieldStyle}/>
                <input type="number" value={kDraft.endOdo} onChange={e=>setKDraft(d=>({...d,endOdo:e.target.value}))} placeholder="End odometer" style={fieldStyle}/>
              </div>

                <div style={{flex:"0 0 110px"}}>{iLab("Time")}<input type="time" value={iDraft.time} onChange={e=>setIDraft(d=>({...d,time:e.target.value}))} style={taStyle}/></div>

// ══════════════════════════════════════════════════════════════
//  TAX & SUPER — compliance obligations (AU · Pty Ltd employer · QLD)
//  General information only, NOT financial advice. Dates are standard
//  self-lodged dates; confirm your own due dates with your accountant /
//  registered BAS or tax agent. Director-only.
// ══════════════════════════════════════════════════════════════
function cAddBusinessDays(date, n){ const d=new Date(date); let added=0; while(added<n){ d.setDate(d.getDate()+1); const wd=d.getDay(); if(wd!==0&&wd!==6) added++; } return d; }
function cNextCycle(month, day, now, graceDays=45){
  // month 1-12. Returns the current active instance: this year's date unless it's
  // more than graceDays in the past (then next year's), so a just-passed deadline
  // still shows as overdue until it's marked done.
  const y = now.getFullYear();
  let cand = new Date(y, month-1, day);
  const cutoff = new Date(now); cutoff.setDate(cutoff.getDate()-graceDays);
  if (cand < cutoff) cand = new Date(y+1, month-1, day);
  return cand;
}
function cDaysUntil(due, now){ const a=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const b=new Date(due.getFullYear(),due.getMonth(),due.getDate()); return Math.round((b-a)/86400000); }
function cFmt(d){ return d ? d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric"}) : ""; }

function computeObligations(company, now){
  now = now || new Date();
  const comp = (company && company.compliance) || {};
  const settings = comp.settings || {};
  const doneMap = comp.done || {};
  const list = [];
  const push = (o)=>{
    const key = `${o.id}__${o.due.getFullYear()}-${o.due.getMonth()+1}-${o.due.getDate()}`;
    list.push({ ...o, key, dueIn: cDaysUntil(o.due, now), done: !!doneMap[key] });
  };

  // BAS — quarterly (GST + PAYG withholding). Self-lodged dates; agent lodgers get extensions.
  const basQuarters = [
    {q:"Q1 (Jul–Sep)", m:10, d:28},
    {q:"Q2 (Oct–Dec)", m:2,  d:28},
    {q:"Q3 (Jan–Mar)", m:4,  d:28},
    {q:"Q4 (Apr–Jun)", m:7,  d:28},
  ];
  let basBest=null;
  basQuarters.forEach(bq=>{ const due=cNextCycle(bq.m,bq.d,now); if(!basBest||due<basBest.due) basBest={due,q:bq.q}; });
  push({ id:"bas", group:"ATO", icon:"🧾", color:T.blue, title:"BAS — GST + PAYG withholding", sub:`${basBest.q} · self-lodged date. Lodging through a BAS/tax agent usually gives you about 4 extra weeks.`, due:basBest.due });

  // SUPER — transition. Final quarterly (earnings paid to 30 Jun 2026) due 28 Jul 2026.
  const finalQ = new Date(2026,6,28);
  if (cDaysUntil(finalQ, now) >= -45) {
    push({ id:"super_final_q", group:"Super", icon:"🪙", color:T.teal, title:"Final quarterly super (Apr–Jun)", sub:"Last-ever quarterly payment — must be received by the funds by 28 Jul 2026. After this it's Payday Super.", due:finalQ });
  }
  // PAYDAY SUPER (from 1 Jul 2026) — recurring: must reach the fund within 7 business days of each payday.
  const cycle = settings.payCycle;
  const anchor = settings.lastPayday ? new Date(settings.lastPayday+"T00:00:00") : null;
  if (cycle && anchor && !isNaN(anchor)) {
    let payday;
    if (cycle==="monthly"){
      payday = new Date(now.getFullYear(), now.getMonth(), anchor.getDate());
      if (cDaysUntil(payday, now) < 0) payday = new Date(now.getFullYear(), now.getMonth()+1, anchor.getDate());
    } else {
      const step = cycle==="weekly"?7:14;
      payday = new Date(anchor);
      // walk forward to the next payday that is today or later
      let guard=0;
      while (cDaysUntil(payday, now) < 0 && guard<500){ payday.setDate(payday.getDate()+step); guard++; }
    }
    const due = cAddBusinessDays(payday, 7);
    push({ id:"super_payday", group:"Super", icon:"💸", color:T.teal, title:"Pay super (Payday Super)", sub:`Next payday ${cFmt(payday)} → super due within 7 business days. Public holidays can push the date later.`, due });
  } else {
    list.push({ id:"super_payday_setup", key:"super_payday_setup", group:"Super", icon:"💸", color:T.teal, title:"Set up Payday Super tracking", sub:"From 1 Jul 2026, super must reach each fund within 7 business days of payday. Add your pay cycle below to track the next due date.", due:null, dueIn:null, done:false, setup:true });
  }

  // FY these annual obligations report on ends the 30 Jun before their due date.
  const fyLabel = (due)=>{ const endYr = due.getFullYear()-1; return `FY${endYr-1}-${String(endYr).slice(2)}`; };

  // STP finalisation — 14 Jul each year.
  const stpDue = cNextCycle(7,14,now);
  push({ id:"stp_final", group:"Payroll", icon:"📑", color:T.amber, title:`STP finalisation (${fyLabel(stpDue)})`, sub:`Finalise Single Touch Payroll for ${fyLabel(stpDue)} so staff income statements are 'tax ready'.`, due:stpDue });

  // Company income tax return — 15 May (most small companies via tax agent). Varies.
  const coTaxDue = cNextCycle(5,15,now);
  push({ id:"company_tax", group:"ATO", icon:"🏢", color:T.pink, title:`Company tax return (${fyLabel(coTaxDue)})`, sub:`${fyLabel(coTaxDue)} return · common agent-lodged due date. Yours may differ (e.g. 28 Feb or 31 Oct) — confirm with your tax agent.`, due:coTaxDue });

  // WorkCover QLD wages declaration — 31 Aug.
  push({ id:"workcover_qld", group:"QLD", icon:"🦺", color:T.orange, title:"WorkCover QLD wages declaration", sub:"Declare actual + estimated wages to WorkCover Queensland to keep your accident insurance current.", due:cNextCycle(8,31,now) });

  list.sort((a,b)=> (a.due&&b.due)? a.due-b.due : (a.due?-1:1));
  return list;
}

function cStatus(o){
  if (o.setup) return {label:"Set up", color:T.subtle, level:"info"};
  if (o.done)  return {label:"Done ✓", color:T.teal, level:"done"};
  const n=o.dueIn;
  if (n<0)   return {label:`Overdue ${-n}d`, color:T.red, level:"overdue"};
  if (n===0) return {label:"Due today", color:T.red, level:"urgent"};
  if (n===1) return {label:"Due tomorrow", color:T.red, level:"urgent"};
  if (n<=3)  return {label:`Due in ${n} days`, color:T.orange, level:"soon"};
  if (n<=7)  return {label:`Due in ${n} days`, color:T.amber, level:"week"};
  if (n<=30) return {label:`In ${n} days`, color:T.blue, level:"upcoming"};
  return {label:cFmt(o.due).replace(/^[A-Za-z]+, /,""), color:T.subtle, level:"far"};
}
