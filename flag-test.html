    const prefix = (company && company.invoice_prefix) || "";
    setInvoiceNoInput(`${prefix}${next}`);
  }, [participant && participant.id, savedInvoices.length, company && company.invoice_prefix]);


  // Edit helpers
  function startEdit(s) {
    setEditingId(s.id);
    const buf = {date:s.date, desc:s.desc, code:s.code, unit:s.unit, qty:s.qty, rate:s.rate, total:s.total, start:s.start||"", end:s.end||""};
    // If this line has both times, make sure the hours shown actually match them —
    // otherwise the form opens already inconsistent (correct times, stale qty) and
    // only fixes itself once you happen to touch a time field.
    if (buf.start && buf.end && (buf.unit||"hrs")==="hrs") {
      const ph = t => { const [h,m]=String(t||"").split(":").map(Number); return (h||0)+((m||0)/60); };
      const hrs = Math.max(0, +(ph(buf.end)-ph(buf.start)).toFixed(2));
      if (hrs > 0 && hrs !== Number(buf.qty)) {
        buf.qty = hrs;
        buf.total = +(hrs*Number(buf.rate||0)).toFixed(2);
      }
    }
    setEditBuf(buf);
  }
  function setEditTime(k, v) {
    setEditBuf(b => {
      const nb = {...b, [k]: v};
      const ph = t => { const [h,m]=String(t||"").split(":").map(Number); return (h||0)+((m||0)/60); };
      if (nb.start && nb.end && (nb.unit||"hrs")==="hrs") {
        const hrs = Math.max(0, +(ph(nb.end)-ph(nb.start)).toFixed(2));
        nb.qty = hrs;
        nb.total = +(hrs*Number(nb.rate||0)).toFixed(2);
      }
      return nb;
    });
  }
  function saveEdit(id) {
    setAllShifts(prev => prev.map(s => s.id===id ? {
      ...s,
      date: editBuf.date, desc: editBuf.desc, code: editBuf.code,
      unit: editBuf.unit, start: editBuf.start, end: editBuf.end,
      qty: Number(editBuf.qty), rate: Number(editBuf.rate),
      total: Number(editBuf.total) || +(Number(editBuf.qty)*Number(editBuf.rate)).toFixed(2),
    } : s));
    setEditingId(null);
  }
  function deleteShift(id) { setAllShifts(prev => prev.filter(s => s.id !== id)); }
  function recalcTotal() {
    setEditBuf(b => ({...b, total: +(Number(b.qty)*Number(b.rate)).toFixed(2)}));
  }
  function pickCode(idx) {
    const c = NDIS_CODES[idx];
    setEditBuf(b => ({...b, desc:c.label, code:c.code, rate:c.rate, unit:c.unit,
      total: +(Number(b.qty||0)*c.rate).toFixed(2)}));
  }
  function pickCodeNew(idx) {
    const c = NDIS_CODES[idx];
    setNewLine(b => ({...b, desc:c.label, code:c.code, rate:c.rate, unit:c.unit,
      total: +(Number(b.qty||0)*c.rate).toFixed(2)}));
  }
  // Resolve a client's billable catalogue (their lineItems, else legacy rate/transport)
  function clientCatalogue(client) {
    if (!client) return [];
    if (client.lineItems && client.lineItems.length) return client.lineItems;
    return [
      { code: client.code, desc: client.serviceName || "Service (hourly)", unit: "hrs", rate: client.rate },
      { code: client.code, desc: "Activity Based Transport", unit: "km", rate: client.transport },
    ].filter(x => x.rate);
  }
  // Pick a client line item into the edit buffer / new line
  function pickClientLine(cat) {
    setEditBuf(b => ({...b, desc:cat.desc, code:cat.code, rate:Number(cat.rate)||0, unit:cat.unit,
      total: +(Number(b.qty||0)*(Number(cat.rate)||0)).toFixed(2)}));
  }
  function pickClientLineNew(cat) {
    setNewLine(b => ({...b, desc:cat.desc, code:cat.code, rate:Number(cat.rate)||0, unit:cat.unit,
      total: +(Number(b.qty||0)*(Number(cat.rate)||0)).toFixed(2)}));
  }
  function saveNewLine() {
    if (!newLine.date || !newLine.desc || !newLine.qty || !newLine.rate) return;
    const line = {
      id: Date.now(), participantId: participant?.id || 0,
      workerId: 0, date: newLine.date, desc: newLine.desc, code: newLine.code,
      unit: newLine.unit, qty: Number(newLine.qty), rate: Number(newLine.rate),
      total: Number(newLine.total) || +(Number(newLine.qty)*Number(newLine.rate)).toFixed(2),
      km:0, kmRate:0, invoiced:false,
    };
    setAllShifts(prev => [...prev, line].sort((a,b) => a.date.localeCompare(b.date)));
    setNewLine({date:"",desc:"",code:"",unit:"hrs",qty:"",rate:"",total:""});
    setAddingLine(false);
  }

  // Add a transport (km) line tied to a shift, then open it so the km can be set.
  function addKmToShift(s) {
    const client = PARTICIPANTS.find(x=>String(x.id)===String(s.participantId));
    const rate = (client && Number(client.transport)) || 0.95;
    const km = (s.kms && (Number(s.kms.perClient)||Number(s.kms.total))) || 0;
    const line = {
      id: Date.now()+Math.random(), participantId: s.participantId||0, workerId: s.workerId||0,
      date: s.date, desc: "Activity Based Transport", code: "04_590_0125_6_1",
      unit: "km", qty: km, rate, total: +(km*rate).toFixed(2), km:0, kmRate:0, invoiced:false,
    };
    setAllShifts(prev => [...prev, line].sort((a,b)=>String(a.date).localeCompare(String(b.date))));
    startEdit(line);
  }
  // Build audit prompt from filtered lines
  async function handleAudit() {
    setShowAudit(true);
    const summary = allLines.map((l,i) => {
      const d = new Date(l.date); const day = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d.getDay()];
      const p = PARTICIPANTS.find(x=>String(x.id)===String(l.participantId));
      return `${i+1}. ${l.date} (${day}) | ${l.desc} | ${l.code} | ${l.qty} ${l.unit} @ $${l.rate} = reported $${l.total}, calc $${(l.qty*l.rate).toFixed(2)} | Client: ${p?.name||"unknown"}`;
    }).join("\n");
    await runAudit(summary, invoiceTotal);
  }

  const inputStyle = {background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:8,padding:"6px 8px",color:"#ffffff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",width:"100%",boxSizing:"border-box"};
  const dateStyle  = {...inputStyle, colorScheme:"dark"};

  if (printData) return <PrintInvoice invoice={printData.invoice} lines={printData.lines} participant={printData.participant} fromDate={printData.filterFrom} toDate={printData.filterTo} total={printData.invoiceTotal} onUpdateInvoice={updateInvoiceFields} fromName={fromName} replyTo={replyTo} company={company} onInvoiced={(shiftIds,invId)=>{ if(shiftIds&&shiftIds.length){ if(markShiftsInvoiced) markShiftsInvoiced(shiftIds, invId); else setAllShifts(prev=>prev.map(s=>shiftIds.includes(s.id)?{...s,invoiced:true,invoiceId:invId}:s)); } }} onMarkSent={(inv)=>{ if(inv && changeInvoiceStatus) changeInvoiceStatus(inv, "sent"); }} onClose={()=>setPrintData(null)}/>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif"}}>Invoicing</div>
          <div style={{fontSize:11,color:T.subtle,marginTop:1}}>{new Set(allShifts.map(l=>l.shiftId)).size} billable shift{new Set(allShifts.map(l=>l.shiftId)).size!==1?"s":""} · {allShifts.length} line{allShifts.length!==1?"s":""}</div>
        </div>
        <button onClick={()=>setShowHistory(h=>!h)} style={{background:showHistory?`${T.teal}1f`:"rgba(255,255,255,0.05)",border:`1px solid ${showHistory?T.teal:T.border}`,borderRadius:10,padding:"8px 12px",color:showHistory?T.teal:T.body,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
          {showHistory?"← New Invoice":"📁 Past Invoices"}
        </button>
      </div>

      {showHistory ? (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input value={histQ} onChange={e=>setHistQ(e.target.value)} placeholder="Search by client or invoice number…"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
          {[...savedInvoices]
            .filter(inv => !histQ.trim() || `${inv.client} ${inv.id}`.toLowerCase().includes(histQ.toLowerCase()))
            .sort((a,b)=> b.date.localeCompare(a.date))
            .map(inv=>{
              const stCol = inv.status==="paid"?T.teal:inv.status==="sent"?T.blue:T.amber;
              return (
                <Card key={inv.id}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:500,fontFamily:"Syne,sans-serif"}}>{inv.client}</div>
                      <div style={{fontSize:12,color:T.subtle,fontFamily:"monospace",marginTop:2}}>{inv.id}</div>
                      <div style={{fontSize:12,color:T.subtle,marginTop:3}}>{fmtDate(inv.from)} → {fmtDate(inv.to)} · {inv.lines} lines</div>
                      <div style={{fontSize:12,color:T.muted,marginTop:1}}>Issued {fmtDate(inv.date)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.teal}}>{fmt$(inv.total)}</div>
                      <div style={{marginTop:6}}><Chip label={inv.status} color={stCol}/></div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:10}}>
                    {["paid","sent","draft"].map(st=>(
                      <button key={st} onClick={()=>changeInvoiceStatus?changeInvoiceStatus(inv,st):setSavedInvoices(prev=>prev.map(x=>x.id===inv.id?{...x,status:st}:x))}
                        style={{flex:1,padding:"6px",borderRadius:8,border:`1px solid ${inv.status===st?stCol:T.border}`,background:inv.status===st?`${stCol}1a`:"transparent",color:inv.status===st?stCol:T.subtle,fontSize:12,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif",textTransform:"capitalize"}}>{st}</button>
                    ))}
                  </div>
                  {inv.lineData && inv.lineData.length>0 && (
                    <button onClick={()=>setPrintData({invoice:inv,lines:inv.lineData,participant:CLIENTS.find(p=>p.id===inv.participantId),filterFrom:inv.from,filterTo:inv.to,invoiceTotal:inv.total})} style={{width:"100%",marginTop:6,padding:"8px",background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:8,color:T.blue,fontSize:11,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                      📄 View / Print / Email PDF
                    </button>
                  )}
                  <button onClick={()=>{
                    if(typeof window!=="undefined" && !window.confirm(`Delete invoice ${inv.id}?\n\nThis is permanent and cannot be undone. The ${(inv.shiftIds||[]).length} shift(s) on this invoice will be reopened so they can be re-invoiced.\n\nAre you sure?`)) return;
                    // reopen the shifts that were on this invoice
                    if(inv.shiftIds && inv.shiftIds.length){
                      setAllShifts(prev=>prev.map(s=>inv.shiftIds.includes(s.id)?{...s,invoiced:false,invoiceId:null}:s));
                    }
                    if(removeInvoice){ removeInvoice(inv); } else { setSavedInvoices(prev=>prev.filter(x=>x.id!==inv.id)); }
                  }} style={{width:"100%",marginTop:6,padding:"7px",background:"rgba(255,92,122,0.08)",border:`1px solid ${T.red}33`,borderRadius:8,color:T.red,fontSize:12,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                    Delete invoice & reopen shifts
                  </button>
                </Card>
              );
            })}
          {savedInvoices.filter(inv => !histQ.trim() || `${inv.client} ${inv.id}`.toLowerCase().includes(histQ.toLowerCase())).length===0 &&
            <div style={{textAlign:"center",padding:"24px 0",color:T.subtle,fontSize:13}}>No invoices found</div>}
        </div>
      ) : (
      <>

      {/* ── Search bar ── */}
      <Card style={{padding:"14px 14px 12px"}}>
        <SLabel>Search Shifts</SLabel>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:3}}>Client name</div>
            <div style={{position:"relative"}}>
              <input value={filterClient} onChange={e=>setFilterClient(e.target.value)}
                placeholder="e.g. Mihali" style={{...inputStyle,paddingLeft:30}}/>
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12}}>🔍</span>
            </div>
            {/* Quick client pills */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
              {PARTICIPANTS.map(p=>(
                <button key={p.id} onClick={()=>setFilterClient(p.name)}
                  style={{padding:"3px 8px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontWeight:500,
                    background:filterClient===p.name?`${T.teal}20`:"rgba(255,255,255,0.04)",
                    border:`1px solid ${filterClient===p.name?T.teal:T.border}`,
                    color:filterClient===p.name?T.teal:T.subtle}}>
                  {p.name}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div>
              <div style={{fontSize:12,color:T.subtle,marginBottom:3}}>From</div>
              <input type="date" value={filterFrom} onChange={e=>setFilterFrom(e.target.value)} style={dateStyle}/>
            </div>
            <div>
              <div style={{fontSize:12,color:T.subtle,marginBottom:3}}>To</div>
              <input type="date" value={filterTo} onChange={e=>setFilterTo(e.target.value)} style={dateStyle}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setSearched(true);setShowAudit(false);setAiResult("");}} style={{flex:1,padding:"10px",background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,color:T.bg,fontWeight:500,fontSize:12,fontFamily:"Syne,sans-serif",cursor:"pointer"}}>
              Search Shifts
            </button>
            <button onClick={()=>{setFilterClient("");setFilterFrom("");setFilterTo("");setSearched(false);setShowAudit(false);setAiResult("");}} style={{padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,color:T.subtle,fontSize:11,cursor:"pointer"}}>
              Clear
            </button>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginTop:2}}>
            <input type="checkbox" checked={showInvoiced} onChange={e=>setShowInvoiced(e.target.checked)}/>
            <span style={{fontSize:11,color:T.subtle}}>Show already-invoiced shifts too (normally hidden)</span>
          </label>
        </div>
      </Card>

      {/* ── Results ── */}
      {searched && (
        <>
          {/* Invoice header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,fontFamily:"Syne,sans-serif"}}>
                {participant ? participant.name : "All Clients"}
              </div>
              <div style={{fontSize:12,color:T.subtle}}>
                {filterFrom||"All dates"} → {filterTo||"today"} · {filtered.length} lines
              </div>
              {participant && <div style={{fontSize:12,color:T.muted,marginTop:1}}>{participant.manager}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:20,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.teal}}>{fmt$(invoiceTotal)}</div>
              <div style={{fontSize:11,color:T.subtle}}>Invoice total</div>
            </div>
          </div>

          {allLines.length === 0 && (
            <div style={{textAlign:"center",padding:"32px 0",color:T.subtle,fontSize:13}}>No shifts match this search</div>
          )}

          {/* Shift lines */}
          {allLines.map((s,idx) => {
            const calc = +(s.qty * s.rate).toFixed(2);
            const mismatch = Math.abs(calc - s.total) > 0.02;
            const p = PARTICIPANTS.find(x=>String(x.id)===String(s.participantId));
            const d = new Date(s.date);
            const dayName = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
            const isWeekend = d.getDay()===0||d.getDay()===6;
            const editing = editingId === s.id;

            return (
              <Card key={s.id} style={{borderColor:mismatch?"rgba(255,176,32,0.4)":editing?T.borderAccent:T.border,padding:"12px"}}>
                {/* Header row */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editing?10:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,fontFamily:"monospace",color:isWeekend?T.amber:T.subtle,fontWeight:400}}>
                      {dayName} {d.toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit"})}
                    </span>
                    {!filterClient && <Chip label={p?.name||""} color={T.blue}/>}
                    {mismatch && <Chip label="Math ⚠️" color={T.amber}/>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    {!editing && (
                      <>
                        {s.unit!=="km" && <button onClick={()=>addKmToShift(s)} style={{background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:8,padding:"4px 9px",color:T.blue,fontSize:12,fontWeight:400,cursor:"pointer"}}>+ km</button>}
                        <button onClick={()=>startEdit(s)} style={{background:"rgba(0,229,180,0.08)",border:`1px solid ${T.borderAccent}`,borderRadius:8,padding:"4px 10px",color:T.teal,fontSize:12,fontWeight:400,cursor:"pointer"}}>Edit</button>
                        <button onClick={()=>{ if(typeof window!=="undefined" && !window.confirm("Remove this shift from the list? This can't be undone.")) return; deleteShift(s.id); }} style={{background:"rgba(255,92,122,0.08)",border:"1px solid rgba(255,92,122,0.3)",borderRadius:8,padding:"4px 10px",color:T.red,fontSize:12,fontWeight:400,cursor:"pointer"}}>✕</button>
                      </>
                    )}
                  </div>
                </div>

                {!editing ? (
                  <>
                    <div style={{fontSize:12,fontWeight:400,marginBottom:2}}>{s.desc}</div>
                    <div style={{fontSize:11,color:T.muted,fontFamily:"monospace",marginBottom:8}}>{s.code}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4}}>
                      {[["Qty",`${s.qty} ${s.unit}`],["Rate",fmt$(s.rate)],["Calc",fmt$(calc)],["Total",fmt$(s.total)]].map(([k,v])=>(
                        <div key={k} style={{background:"rgba(255,255,255,0.03)",borderRadius:7,padding:"6px 4px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:T.subtle,textTransform:"uppercase",letterSpacing:"0.5px"}}>{k}</div>
                          <div style={{fontSize:12,fontWeight:400,marginTop:1,color:k==="Total"&&mismatch?T.amber:T.white}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </>
                ) : (
                  /* EDIT MODE */
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {/* Change to another of this client's line items */}
                    {(()=>{ const cl=CLIENTS.find(c=>c.id===s.participantId); const cat=clientCatalogue(cl); const curIdx=cat.findIndex(c=>c.code===editBuf.code); return cat.length>0 ? (
                      <div>
                        <div style={{fontSize:11,color:T.teal,marginBottom:3}}>{cl?.name||"Client"}'s line items</div>
                        <select value={curIdx>=0?String(curIdx):""} onChange={e=>{ const i=Number(e.target.value); if(!isNaN(i)&&cat[i]) pickClientLine(cat[i]); }} style={{...inputStyle,appearance:"none",borderColor:`${T.teal}55`}}>
                          <option value="" disabled style={{background:T.navy}}>Change to one of {cl?.name?cl.name+"'s":"this client's"} line items…</option>
                          {cat.map((c,i)=><option key={c.id||i} value={i} style={{background:T.navy}}>{(c.desc||c.code)} — ${Number(c.rate||0).toFixed(2)}/{c.unit}</option>)}
                        </select>
                      </div>
                    ) : (
                      <div style={{fontSize:11,color:T.amber,lineHeight:1.5,background:"rgba(255,176,32,0.08)",border:`1px solid ${T.amber}33`,borderRadius:8,padding:"8px 10px"}}>
                        {cl?.name||"This client"} doesn't have any line items set up yet — add their service types & rates in the Clients tab so they show up here. Using the full NDIS list below for now.
                      </div>
                    ); })()}
                    {/* Code picker */}
                    <div>
                      <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Service Type (full NDIS list)</div>
                      <select value={(()=>{ const i=NDIS_CODES.findIndex(c=>c.code===editBuf.code); return i>=0?String(i):""; })()} onChange={e=>pickCode(Number(e.target.value))}
                        style={{...inputStyle,appearance:"none"}}>
                        <option value="" disabled style={{background:T.navy}}>Pick service type…</option>
                        {NDIS_CODES.map((c,i)=><option key={i} value={i} style={{background:T.navy}}>{c.label} — ${c.rate}/{c.unit}</option>)}
                      </select>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div>
                        <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Date</div>
                        <input type="date" value={editBuf.date} onChange={e=>setEditBuf(b=>({...b,date:e.target.value}))} style={dateStyle}/>
                      </div>
                      <div>
                        <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Unit</div>
                        <select value={editBuf.unit} onChange={e=>setEditBuf(b=>({...b,unit:e.target.value}))} style={{...inputStyle,appearance:"none"}}>
                          <option value="hrs">hrs</option><option value="km">km</option><option value="each">each</option>
                        </select>
                      </div>
                    </div>
                    {(editBuf.unit||"hrs")==="hrs" && (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        <div>
                          <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Start time</div>
                          <input type="time" value={editBuf.start||""} onChange={e=>setEditTime("start",e.target.value)} style={dateStyle}/>
                        </div>
                        <div>
                          <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>End time</div>
                          <input type="time" value={editBuf.end||""} onChange={e=>setEditTime("end",e.target.value)} style={dateStyle}/>
                        </div>
                      </div>
                    )}
                    <div>
                      <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Description</div>
                      <input value={editBuf.desc} onChange={e=>setEditBuf(b=>({...b,desc:e.target.value}))} style={inputStyle}/>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>NDIS Code</div>
                      <input value={editBuf.code} onChange={e=>setEditBuf(b=>({...b,code:e.target.value}))} style={{...inputStyle,fontFamily:"monospace"}}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                      <div>
                        <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Qty</div>
                        <input type="number" value={editBuf.qty} onChange={e=>{const v=e.target.value; setEditBuf(b=>({...b,qty:v,total:+(Number(v||0)*Number(b.rate||0)).toFixed(2)}));}} style={inputStyle}/>
                      </div>
                      <div>
                        <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Rate $</div>
                        <input type="number" value={editBuf.rate} onChange={e=>{const v=e.target.value; setEditBuf(b=>({...b,rate:v,total:+(Number(b.qty||0)*Number(v||0)).toFixed(2)}));}} style={inputStyle}/>
                      </div>
                      <div>
                        <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Total $</div>
                        <div style={{display:"flex",gap:3,alignItems:"center"}}>
                          <input type="number" value={editBuf.total} onChange={e=>setEditBuf(b=>({...b,total:e.target.value}))} style={inputStyle}/>
                          <button onClick={recalcTotal} title="Recalc" style={{background:`${T.teal}20`,border:`1px solid ${T.teal}44`,borderRadius:6,padding:"6px 6px",color:T.teal,fontSize:12,cursor:"pointer",flexShrink:0}}>↺</button>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <button onClick={()=>saveEdit(s.id)} style={{padding:"9px",background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,color:T.bg,fontWeight:500,fontSize:11,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>Save</button>
                      <button onClick={()=>setEditingId(null)} style={{padding:"9px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,color:T.subtle,fontSize:11,cursor:"pointer"}}>Cancel</button>
                    </div>
                  </div>
                )}
              </Card>
            );
          })}

          {/* Add line button */}
          {!addingLine ? (
            <button onClick={()=>setAddingLine(true)} style={{width:"100%",padding:"11px",background:"rgba(0,229,180,0.04)",border:`1px dashed ${T.borderAccent}`,borderRadius:12,color:T.teal,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
              ＋ Add Line Item
            </button>
          ) : (
            <Card glow style={{padding:"12px"}}>
              <div style={{fontSize:11,fontWeight:400,fontFamily:"Syne,sans-serif",marginBottom:10,color:T.teal}}>New Line Item</div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {(()=>{ const cat=clientCatalogue(participant); return (
                  <div>
                    <div style={{fontSize:11,color:T.teal,marginBottom:3}}>{participant?.name?`${participant.name}'s line items`:"Line items"}</div>
                    <ShiftLinePicker catalogue={cat} onPick={pickClientLineNew} placeholder={participant?"Search this client's items or NDIS code…":"Filter by a client above, or search NDIS code…"}/>
                  </div>
                ); })()}
                <div>
                  <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Service Type (full NDIS list)</div>
                  <select onChange={e=>pickCodeNew(Number(e.target.value))} defaultValue="" style={{...inputStyle,appearance:"none"}}>
                    <option value="" disabled style={{background:T.navy}}>Pick service type…</option>
                    {NDIS_CODES.map((c,i)=><option key={i} value={i} style={{background:T.navy}}>{c.label} — ${c.rate}/{c.unit}</option>)}
                  </select>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  <div>
                    <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Date</div>
                    <input type="date" value={newLine.date} onChange={e=>setNewLine(b=>({...b,date:e.target.value}))} style={dateStyle}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Unit</div>
                    <select value={newLine.unit} onChange={e=>setNewLine(b=>({...b,unit:e.target.value}))} style={{...inputStyle,appearance:"none"}}>
                      <option value="hrs">hrs</option><option value="km">km</option><option value="each">each</option>
                    </select>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Description</div>
                  <input value={newLine.desc} onChange={e=>setNewLine(b=>({...b,desc:e.target.value}))} placeholder="e.g. Community Social & Rec" style={inputStyle}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>NDIS Code</div>
                  <input value={newLine.code} onChange={e=>setNewLine(b=>({...b,code:e.target.value}))} placeholder="04_I04_0125_6_1" style={{...inputStyle,fontFamily:"monospace"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  <div>
                    <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Qty</div>
                    <input type="number" value={newLine.qty} onChange={e=>{const v=e.target.value;setNewLine(b=>({...b,qty:v,total:+(Number(v)*Number(b.rate)).toFixed(2)}));}} style={inputStyle}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Rate $</div>
                    <input type="number" value={newLine.rate} onChange={e=>{const v=e.target.value;setNewLine(b=>({...b,rate:v,total:+(Number(b.qty)*Number(v)).toFixed(2)}));}} style={inputStyle}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:T.subtle,marginBottom:3}}>Total $</div>
                    <input type="number" value={newLine.total} onChange={e=>setNewLine(b=>({...b,total:e.target.value}))} style={inputStyle}/>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  <button onClick={saveNewLine} style={{padding:"9px",background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,color:T.bg,fontWeight:500,fontSize:11,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>Add</button>
                  <button onClick={()=>setAddingLine(false)} style={{padding:"9px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,color:T.subtle,fontSize:11,cursor:"pointer"}}>Cancel</button>
                </div>
              </div>
            </Card>
          )}

          {/* Totals + actions */}
          {allLines.length > 0 && (
            <>
              <div style={{background:`${T.teal}0d`,border:`1px solid ${T.borderAccent}`,borderRadius:12,padding:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:T.subtle}}>Lines</span>
                  <span style={{fontSize:12,fontWeight:400}}>{allLines.length}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:T.subtle}}>Hours</span>
                  <span style={{fontSize:12,fontWeight:400}}>{allLines.filter(l=>l.unit==="hrs").reduce((s,l)=>s+l.qty,0).toFixed(2)} hrs</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:T.subtle}}>Transport</span>
                  <span style={{fontSize:12,fontWeight:400}}>{allLines.filter(l=>l.unit==="km").reduce((s,l)=>s+l.qty,0)} km</span>
                </div>
                <div style={{height:1,background:T.border,margin:"8px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:14,fontWeight:500,fontFamily:"Syne,sans-serif"}}>Total</span>
                  <span style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.teal}}>{fmt$(invoiceTotal)}</span>
                </div>
              </div>

              <button onClick={handleAudit} disabled={aiLoading} style={{width:"100%",padding:13,background:aiLoading?"rgba(0,229,180,0.08)":`linear-gradient(135deg,${T.teal},${T.blue})`,border:aiLoading?`1px solid ${T.teal}`:"none",borderRadius:12,color:aiLoading?T.teal:T.bg,fontWeight:500,fontSize:12,fontFamily:"Syne,sans-serif",cursor:aiLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {aiLoading?<><span style={{display:"inline-block",width:13,height:13,border:`2px solid ${T.teal}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Auditing…</>:"🔍 Run AI Audit on These Lines"}
              </button>

              {showAudit && aiResult && (
                <Card glow>
                  <SLabel color={T.teal}>Audit Result</SLabel>
                  <div style={{fontSize:12,color:T.body,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{aiResult}</div>
                </Card>
              )}

              {/* ── Invoice number + Payment terms ── */}
              <div style={{background:"rgba(255,176,32,0.05)",border:`1px solid ${T.amber}33`,borderRadius:12,padding:"12px"}}>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.82)",marginBottom:6,letterSpacing:"0.5px",textTransform:"uppercase",fontWeight:500,textShadow:"0 0 10px rgba(255,176,32,0.35)"}}>Invoice Number</div>
                <input value={invoiceNoInput} onChange={e=>setInvoiceNoInput(e.target.value)} placeholder="auto" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"9px 10px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
                <div style={{fontSize:11,color:T.muted,marginBottom:8}}>Auto-numbered as the next for this client — edit if you need to.</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.82)",marginBottom:6,letterSpacing:"0.5px",textTransform:"uppercase",fontWeight:500,textShadow:"0 0 10px rgba(255,176,32,0.35)"}}>Payment Due</div>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  {[7,14,30].map(d=>(
                    <button key={d} onClick={()=>{setDueDays(d);setCustomDue("");}} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${(!customDue&&dueDays===d)?T.amber:T.border}`,background:(!customDue&&dueDays===d)?`${T.amber}1a`:"transparent",color:(!customDue&&dueDays===d)?T.amber:T.subtle,fontSize:11,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{d} days</button>
                  ))}
                </div>
                <div style={{fontSize:11,color:T.muted,marginBottom:3}}>…or pick an exact date</div>
                <input type="date" value={customDue} onChange={e=>setCustomDue(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"9px 10px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
              </div>

              {/* ── Print / PDF ── */}
              <button onClick={()=>{
                if(participant && allLines.length){
                  const invId = invoiceNoInput || `IBSS-${Date.now().toString().slice(-6)}`;
                  const todayIso = new Date().toISOString().split("T")[0];
                  const dueIso = customDue || new Date(Date.now()+dueDays*86400000).toISOString().split("T")[0];
                  const remindDays = Math.max(0, Math.round((new Date(dueIso) - new Date(todayIso)) / 86400000));
                  // which real shift ids are on this invoice (exclude synthesized shared-km lines)
                  const shiftIds = allLines.filter(l=>!l._shared).map(l=>l.id);
                  // NOTE: shifts are NOT locked yet — that happens only when the
                  // invoice is actually downloaded or sent (see markInvoiced).
                  const invObj = {id:invId,client:participant.name,total:invoiceTotal,date:todayIso,from:filterFrom||allLines[0]?.date,to:filterTo||allLines[allLines.length-1]?.date,lines:allLines.length,status:"draft",shiftIds,lineData:allLines,participantId:participant.id,dueDate:dueIso,remindDays,invoicingEmail:participant.invoicingEmail||participant.email||""};
                  if(persistInvoice){
                    persistInvoice(invObj).then(saved=>setPrintData({invoice:saved,lines:allLines,participant,filterFrom,filterTo,invoiceTotal}));
                  } else {
                    setSavedInvoices(prev=>[invObj,...prev]);
                    setPrintData({invoice:invObj,lines:allLines,participant,filterFrom,filterTo,invoiceTotal});
                  }
                } else {
                  setPrintData({lines:allLines,participant,filterFrom,filterTo,invoiceTotal});
                }
              }}
                style={{width:"100%",padding:13,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12,color:T.body,fontWeight:400,fontSize:12,fontFamily:"DM Sans,sans-serif",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                📄 Generate Invoice (preview — not locked until sent/downloaded)
              </button>
            </>
          )}
        </>
      )}
      </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// CREATE GROUP OUTING — multiple participants + workers
// ══════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════
// GROUP OUTING — attaches a shared run sheet to EXISTING shifts
// (matches client + SW already rostered on the date; no new shift)
// ══════════════════════════════════════════════════════════════
function GroupOutingModal({ onClose, clients, shifts, workers, onAttach, defaultDate, editOuting, activities=[] }) {
  const eo = editOuting || null;
  const isEdit = !!eo;
  const [notifyChange, setNotifyChange] = useState(true);
  const CL = (clients && clients.length) ? clients : PARTICIPANTS;
  // Draft autosave for a NEW group outing (text only — uploaded files are not kept in the draft).
  const OUTING_DRAFT_KEY = "kora_outing_draft_v1";
  const oDraft0 = (()=>{ if(isEdit) return null; try{ const r=localStorage.getItem(OUTING_DRAFT_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } })();
  const [oDraftRestored,setODraftRestored]=useState(!!oDraft0);
  const [date,setDate]=useState(eo?.date || oDraft0?.date || defaultDate || new Date().toISOString().split("T")[0]);
  const [title,setTitle]=useState(eo?.title || oDraft0?.title || "");
  const [meetPoint,setMeetPoint]=useState(eo?.meetPoint || oDraft0?.meetPoint || "");
  const [meetPointNotes,setMeetPointNotes]=useState(eo?.meetPointNotes || oDraft0?.meetPointNotes || "");
  const [meetPointTeenNotes,setMeetPointTeenNotes]=useState(eo?.meetPointTeenNotes || oDraft0?.meetPointTeenNotes || "");
  const [notes,setNotes]=useState(eo?.notes || oDraft0?.notes || "");
  const [activityId,setActivityId]=useState(eo?.activityId || oDraft0?.activityId || "");
  const [whatToBring,setWhatToBring]=useState(eo?.whatToBring || oDraft0?.whatToBring || "");
  const [importantNote,setImportantNote]=useState(eo?.importantNote || oDraft0?.importantNote || "");
  const [ratio,setRatio]=useState(eo?.ratio || oDraft0?.ratio || "");
  const [stops,setStops]=useState(eo?.stops ? eo.stops.map(s=>({id:s.id||Date.now()+Math.random(),...s})) : (oDraft0?.stops ? oDraft0.stops.map(s=>({id:s.id||Date.now()+Math.random(),...s,files:[]})) : []));
  const [files,setFiles]=useState(eo?.files || []); // [{name, dataUrl, type}]
  const fileRef = useRef(null);
  const [planNotes,setPlanNotes]=useState(()=>{
    const init={};
    if(eo?.participantPlans){ const findId=(nm)=>{ const w=(workers||[]).find(x=>x.name===nm); return w?String(w.id):""; }; Object.entries(eo.participantPlans).forEach(([pid,pn])=>{ init[pid]={prePickup:pn.prePickup||"",pickupAddr:pn.pickupAddr||"",secondMeetAddr:pn.secondMeetAddr||"",secondMeetTime:pn.secondMeetTime||"",secondMeetNote:pn.secondMeetNote||"",dropNote:pn.dropNote||"",dropAddr:pn.dropAddr||"",pickupSWId:pn.pickupSW?findId(pn.pickupSW):"",dropSWId:pn.dropSW?findId(pn.dropSW):""}; }); }
    else if(oDraft0?.planNotes){ Object.entries(oDraft0.planNotes).forEach(([pid,pn])=>{ init[pid]={prePickup:pn.prePickup||"",pickupAddr:pn.pickupAddr||"",dropNote:pn.dropNote||"",dropAddr:pn.dropAddr||""}; }); }
    return init;
  }); // { [pid]: {prePickup, pickupAddr, dropAddr} }
  const setPN = (pid,k,v)=> setPlanNotes(p=>({...p,[pid]:{...(p[pid]||{}),[k]:v}}));
  const [sel,setSel]=useState(eo?.participantIds ? eo.participantIds.slice() : (oDraft0?.sel ? oDraft0.sel.slice() : []));
  const [shiftPick,setShiftPick]=useState({});  // clientId -> chosen shift id, when a client has >1 shift that day
  // Autosave the in-progress NEW outing (text only — strip uploaded file data).
  useEffect(()=>{
    if(isEdit) return;
    try{ localStorage.setItem(OUTING_DRAFT_KEY, JSON.stringify({ date, title, meetPoint, meetPointNotes, notes, whatToBring, ratio, sel, planNotes, stops: stops.map(({files,...rest})=>rest) })); }catch(e){}
  }, [isEdit, date, title, meetPoint, meetPointNotes, notes, whatToBring, ratio, sel, planNotes, stops]);
  const clearODraft = ()=>{ try{ localStorage.removeItem(OUTING_DRAFT_KEY); }catch(e){}
    setTitle(""); setMeetPoint(""); setMeetPointNotes(""); setNotes(""); setWhatToBring(""); setImportantNote(""); setRatio(""); setStops([]); setSel([]); setPlanNotes({}); setODraftRestored(false); };
  const addStopFiles = (i,fileList)=> Array.from(fileList||[]).forEach(file=>{
    if(file.size>5_000_000){ alert(`${file.name} is over 5MB — too large.`); return; }
    const reader=new FileReader();
    reader.onload=()=> setStops(p=>p.map((x,j)=> j===i ? {...x, files:[...(x.files||[]), {name:file.name,dataUrl:reader.result,type:file.type}]} : x));
    reader.readAsDataURL(file);
  });
  const rmStopFile = (i,fi)=> setStops(p=>p.map((x,j)=> j===i ? {...x, files:(x.files||[]).filter((_,k)=>k!==fi)} : x));
  const [result,setResult]=useState(null);

  const INP={width:"100%",background:"rgba(0,229,180,0.05)",border:"1px solid rgba(0,229,180,0.2)",borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"};
  const INPsm={background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"};

  const wName = (wid)=>{ const w=workers.find(x=>String(x.id)===String(wid)); return w?w.name:"Staff"; };
  const dayShifts = shifts.filter(s=> s.date===date && s.workerId && (!s.isOuting || (isEdit && eo && String(s.title||"")===String(eo.title||""))));
  const matchFor = (pid)=> dayShifts.filter(s=>String(s.participantId)===String(pid));
  const chosenFor = (pid)=>{ const ms=matchFor(pid); if(ms.length<=1) return ms; const one=ms.find(s=>String(s.id)===String(shiftPick[pid])); return one?[one]:[ms[0]]; };
  const rostered = CL.map(c=>({c, ms:matchFor(c.id)})).filter(x=>x.ms.length>0);
  const toggle = (id)=> setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const canSave = title.trim() && sel.length>0;
  const selNames = sel.map(pid=>{const c=CL.find(x=>String(x.id)===String(pid)); return c?c.name:null;}).filter(Boolean);
  const selStaff = Array.from(new Set([].concat(...sel.map(pid=>chosenFor(pid).map(s=>wName(s.workerId)))))).filter(Boolean);

  function attach() {
    const matchedShifts=[];
    sel.forEach(pid=> chosenFor(pid).forEach(s=>matchedShifts.push(s)));
    const allPids = sel.filter(pid=>matchFor(pid).length>0);
    const allWids = Array.from(new Set(matchedShifts.map(s=>s.workerId).filter(Boolean)));
    const plans = {};
    allPids.forEach(pid=>{
      const c=CL.find(x=>String(x.id)===String(pid));
      const ms=chosenFor(pid);
      const allMs=matchFor(pid);
      const swName = ms[0] ? wName(ms[0].workerId) : undefined;
      const pn = planNotes[pid] || {};
      const puId = (pn.pickupSWId!=null&&pn.pickupSWId!=="") ? pn.pickupSWId : (ms[0]||{}).workerId;
      const doId = (pn.dropSWId!=null&&pn.dropSWId!=="") ? pn.dropSWId : (ms[0]||{}).workerId;
      const puShift = allMs.find(x=>String(x.workerId)===String(puId)) || ms[0];
      const doShift = allMs.find(x=>String(x.workerId)===String(doId)) || ms[0];
      plans[pid]={
        name:(c&&c.name)||"Client",
        initials:(c&&c.initials)||"?",
        pickupSW: (pn.pickupSWId!=null&&pn.pickupSWId!=="") ? wName(pn.pickupSWId) : swName,
        pickupSWId: (puId!=null && puId!=="") ? String(puId) : undefined,
        dropSW: (pn.dropSWId!=null&&pn.dropSWId!=="") ? wName(pn.dropSWId) : swName,
        dropSWId: (doId!=null && doId!=="") ? String(doId) : undefined,
        pickupTime: (puShift&&puShift.start) || undefined,
        dropTime: (doShift&&doShift.end) || undefined,
        prePickup: pn.prePickup || undefined,
        pickupAddr: pn.pickupAddr || undefined,
        secondMeetAddr: pn.secondMeetAddr || undefined,
        secondMeetTime: pn.secondMeetTime || undefined,
        secondMeetNote: pn.secondMeetNote || undefined,
        dropNote: pn.dropNote || undefined,
        dropAddr: pn.dropAddr || undefined,
      };
    });
    const updates = matchedShifts.map(s=>({
      ...s,
      title: title.trim(),
      meetPoint: meetPoint||null,
      meetPointNotes: meetPointNotes.trim() ? meetPointNotes.trim() : null,
      meetPointTeenNotes: meetPointTeenNotes.trim() ? meetPointTeenNotes.trim() : null,
      outingNotes: notes.trim() ? notes.trim() : (s.outingNotes||null),
      activityId: activityId || null,
      notes: (eo?.notes && s.notes===eo.notes) ? null : (s.notes||null),
      whatToBring: whatToBring||null,
      importantNote: importantNote||null,
      stops: stops.length?stops:null,
      ratio: ratio||null,
      files: files.length?files:null,
      participantIds: allPids,
      workerIds: allWids,
      participantPlans: plans,
    }));
    // On edit: detach participants removed from the outing — clear shared outing fields on their shifts
    let detached=[];
    if(isEdit && Array.isArray(eo?.participantIds)){
      const removed = eo.participantIds.filter(pid=>!sel.includes(pid));
      removed.forEach(pid=> matchFor(pid).forEach(s=>{
        detached.push({ ...s, title:null, outingNotes:null, meetPoint:null, meetPointNotes:null, meetPointTeenNotes:null, whatToBring:null, importantNote:null, stops:null, ratio:null, files:null, participantIds:null, workerIds:null, participantPlans:null });
      }));
    }
    onAttach([...updates, ...detached]);
    if(!isEdit){ try{ localStorage.removeItem(OUTING_DRAFT_KEY); }catch(e){} }
    // Text each worker on the outing their run-sheet link (fire-and-forget — never blocks the save).
    let texted = 0;
    if (!isEdit || notifyChange) try {
      const seenW = {};
      matchedShifts.forEach(s=>{
        // Text the worker actually rostered on THIS participant's shift, and link them to THIS shift —
        // not whichever participant's shift happens to list them in workerIds.
        const wid = s.workerId;
        if (wid==null || seenW[wid]) return;
        seenW[wid] = true;
        const w = (workers||[]).find(x=>String(x.id)===String(wid));
        if (!w || !w.phone) return;
        const link = isUuid(s.id) ? `${COMPANY.appUrl||"https://korateam.app"}/shift/${s.id}?do=outing` : null;
        const dFmt = s.date ? new Date(s.date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}) : "";
        const msg = isEdit
          ? `Hi ${firstName(w.name)}, there's been a CHANGE to the group outing: ${title.trim()}${dFmt?` on ${dFmt}`:""}. Please jump on KORA to check whether anything affects you. — ${COMPANY.shortName}${link?`\nRun sheet: ${link}`:""}`
          : `Hi ${firstName(w.name)}, GROUP OUTING: ${title.trim()}${dFmt?` on ${dFmt}`:""}. Meet: ${meetPoint||"TBC"}. — ${COMPANY.shortName}${link?`\nRun sheet: ${link}`:""}`;
        texted++;
        sendClickSendSMS("", "", w.phone, msg).catch(()=>{});
      });
    } catch(e) {}
    setResult({ count: updates.length, removed: detached.length, texted, silent: isEdit && !notifyChange });
  }

  return (
    <Modal title={isEdit?"🎟️ Edit group outing":"🎟️ Group outing"} onClose={onClose}>
      {result ? (
        <div style={{display:"flex",flexDirection:"column",gap:14,textAlign:"center",padding:"10px 0"}}>
          <div style={{fontSize:40}}>✅</div>
          <div style={{fontSize:16,fontWeight:600,fontFamily:"Syne,sans-serif"}}>{isEdit?"Outing updated":"Run sheet attached"}</div>
          <div style={{fontSize:13,color:T.body,lineHeight:1.5}}>"{title}" {isEdit?"now applies to":"was added to"} {result.count} shift{result.count!==1?"s":""}.{result.removed?` Removed from ${result.removed} shift${result.removed!==1?"s":""}.`:""} {result.silent?"You chose not to text the team about this change. ":result.texted>0?`Texted ${result.texted} worker${result.texted!==1?"s":""} about the ${isEdit?"change":"outing"}. `:"No worker phone numbers saved, so no texts were sent. "}Each worker also sees the run sheet when they open their shift.</div>
          <BtnPrimary onClick={onClose}>Done</BtnPrimary>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {oDraftRestored && !isEdit && (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:`${T.teal}12`,border:`1px solid ${T.teal}44`,borderRadius:10}}>
              <span style={{fontSize:11,color:T.teal,flex:1}}>↩ Restored your unsaved outing from last time.</span>
              <button onClick={clearODraft} style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:8,color:T.body,fontSize:12,padding:"5px 9px",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Start fresh</button>
            </div>
          )}
          <div style={{fontSize:12,color:T.subtle,lineHeight:1.5,background:`${T.orange}0d`,border:`1px solid ${T.orange}33`,borderRadius:10,padding:"10px 12px"}}>This doesn't create new shifts. It attaches a shared run sheet to the shifts already rostered for the clients you pick on this date.</div>
          {isEdit && (
            <div style={{background:`${T.teal}0d`,border:`1px solid ${T.teal}33`,borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
              <div style={{fontSize:11,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",fontWeight:600}}>Who's on this outing</div>
              <div style={{fontSize:12,color:T.body,lineHeight:1.5}}>🧒 Teens: {selNames.length?selNames.join(", "):"—"}</div>
              <div style={{fontSize:12,color:T.body,lineHeight:1.5}}>🧑‍🤝‍🧑 Staff: {selStaff.length?selStaff.join(", "):"—"}</div>
            </div>
          )}
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Outing name</div>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Beach day at Wellington Point" style={INP}/>
          </div>
          {activities.length>0 && (()=>{ const chosen=activities.find(a=>String(a.id)===String(activityId)); const gc=chosen?(chosen.goalIds||[]).length:0; return (
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>This outing is <span style={{color:T.faint||"#6c80a6"}}>(links goals to the shifts)</span></div>
            <select value={activityId} onChange={e=>setActivityId(e.target.value)} style={{...INP,cursor:"pointer"}}>
              <option value="" style={{background:T.card}}>— no linked activity —</option>
              {activities.map(a=><option key={a.id} value={a.id} style={{background:T.card}}>{a.title||"(activity)"}{a.date?` · ${a.date}`:""}{a.programName?` · ${a.programName}`:""}</option>)}
            </select>
            {chosen && <div style={{fontSize:11.5,color:gc?T.teal:(T.amber),marginTop:6}}>{gc?`\u2713 ${gc} goal${gc===1?"":"s"} will show on this outing`:"This activity has no goals ticked yet \u2014 add them in \ud83d\udcda Programs."}</div>}
          </div>
          ); })()}
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Date</div>
            <input type="date" value={date} onChange={e=>{setDate(e.target.value);setSel([]);}} style={INP}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>Who's coming — clients rostered on this date</div>
            {rostered.length===0 ? (
              <div style={{fontSize:12,color:T.muted,padding:"12px",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,lineHeight:1.5}}>No shifts rostered on this date yet. Create the clients' shifts first, then build the outing.</div>
            ) : rostered.map(({c,ms})=>{
              const on=sel.includes(c.id);
              const multi = ms.length>1;
              const pickedId = String(shiftPick[c.id]||ms[0].id);
              return (
                <div key={c.id} style={{marginBottom:6}}>
                <button onClick={()=>toggle(c.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:on?`${T.teal}14`:"rgba(255,255,255,0.03)",border:`1px solid ${on?T.teal:T.border}`,borderRadius:10,padding:"9px 11px",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:18,height:18,flexShrink:0,borderRadius:5,border:`1px solid ${on?T.teal:T.subtle}`,background:on?T.teal:"transparent",color:T.bg,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{on?"✓":""}</div>
                  <Avatar initials={c.initials||"?"} color={c.avatarColor||T.teal} size={26} photo={c.photo} emoji={c.emoji}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.white}}>{c.name}{multi?<span style={{fontSize:11,color:T.amber,fontWeight:400}}> · {ms.length} shifts</span>:""}</div>
                    <div style={{fontSize:12,color:T.subtle}}>{ms.map(s=>`${wName(s.workerId)} · ${s.start}–${s.end}`).join("  /  ")}</div>
                  </div>
                </button>
                {on && multi && (
                  <div style={{margin:"6px 0 2px 28px",display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{fontSize:11,color:T.amber}}>This client has {ms.length} shifts — pick which one to connect:</div>
                    {ms.map(sh=>{ const picked=pickedId===String(sh.id); return (
                      <button key={sh.id} onClick={()=>setShiftPick(pp=>({...pp,[c.id]:sh.id}))} style={{display:"flex",alignItems:"center",gap:8,background:picked?`${T.teal}14`:"rgba(255,255,255,0.03)",border:`1px solid ${picked?T.teal:T.border}`,borderRadius:8,padding:"7px 10px",cursor:"pointer",textAlign:"left"}}>
                        <div style={{width:14,height:14,flexShrink:0,borderRadius:"50%",border:`1px solid ${picked?T.teal:T.subtle}`,background:picked?T.teal:"transparent"}}/>
                        <span style={{fontSize:12,color:T.body}}>{wName(sh.workerId)} · {sh.start}–{sh.end}</span>
                      </button>
                    );})}
                  </div>
                )}
                </div>
              );
            })}
          </div>
          {sel.length>0 && (
            <div>
              <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>🚗 Pick-up &amp; drop-off notes — per client</div>
              {sel.filter(pid=>matchFor(pid).length>0).map(pid=>{
                const c=CL.find(x=>String(x.id)===String(pid)); const ms=matchFor(pid); const sw=ms[0]?wName(ms[0].workerId):"";
                const pn=planNotes[pid]||{};
                const defWid=(chosenFor(pid)[0]||{}).workerId;
                return (
                  <div key={pid} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${T.border}`,borderRadius:10,padding:10,marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <Avatar initials={(c&&c.initials)||"?"} color={(c&&c.avatarColor)||T.teal} size={24} photo={c&&c.photo} emoji={c&&c.emoji}/>
                      <div style={{fontSize:12.5,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.white}}>{c&&c.name}</div>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10.5,color:T.teal,marginBottom:3,fontWeight:600}}>↑ Pick-up SW</div>
                        <select value={(pn.pickupSWId!=null&&pn.pickupSWId!=="")?String(pn.pickupSWId):(defWid!=null?String(defWid):"")} onChange={e=>setPN(pid,"pickupSWId",e.target.value)} style={{...INPsm,width:"100%",cursor:"pointer",background:T.card,color:"#fff"}}>
                          <option value="" style={{background:T.card,color:"#fff"}}>— choose —</option>
                          {(workers||[]).map(w=><option key={w.id} value={String(w.id)} style={{background:T.card,color:"#fff"}}>{w.name}</option>)}
                        </select>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10.5,color:T.amber,marginBottom:3,fontWeight:600}}>↓ Drop-off SW</div>
                        <select value={(pn.dropSWId!=null&&pn.dropSWId!=="")?String(pn.dropSWId):(defWid!=null?String(defWid):"")} onChange={e=>setPN(pid,"dropSWId",e.target.value)} style={{...INPsm,width:"100%",cursor:"pointer",background:T.card,color:"#fff"}}>
                          <option value="" style={{background:T.card,color:"#fff"}}>— choose —</option>
                          {(workers||[]).map(w=><option key={w.id} value={String(w.id)} style={{background:T.card,color:"#fff"}}>{w.name}</option>)}
                        </select>
                      </div>
                    </div>
                    <div style={{fontSize:10.5,color:T.teal,fontWeight:700,margin:"2px 0 4px"}}>① First · pick-up</div>
                    <textarea value={pn.prePickup||""} onChange={e=>setPN(pid,"prePickup",e.target.value)} placeholder="Pick-up notes — e.g. ring doorbell, ready out front, bring meds" rows={2} style={{width:"100%",...INPsm,resize:"vertical",lineHeight:1.4,marginBottom:6}}/>
                    <input value={pn.pickupAddr||""} onChange={e=>setPN(pid,"pickupAddr",e.target.value)} placeholder="Pick-up address (optional)" style={{width:"100%",...INPsm,marginBottom:8}}/>
                    <div style={{fontSize:10.5,color:T.blue,fontWeight:700,margin:"2px 0 4px"}}>② Then · 2nd meet-up <span style={{color:T.subtle,fontWeight:500}}>— only if they car-pool first (optional)</span></div>
                    <div style={{display:"flex",gap:6,marginBottom:6}}>
                      <input value={pn.secondMeetAddr||""} onChange={e=>setPN(pid,"secondMeetAddr",e.target.value)} placeholder="2nd meet-up address" style={{flex:1,minWidth:0,...INPsm,background:`${T.blue}0e`,border:`1px solid ${T.blue}44`}}/>
                      <input type="time" value={pn.secondMeetTime||""} onChange={e=>setPN(pid,"secondMeetTime",e.target.value)} style={{width:104,...INPsm,cursor:"pointer",background:`${T.blue}0e`,border:`1px solid ${T.blue}44`,colorScheme:"dark"}}/>
                    </div>
                    {<textarea value={pn.secondMeetNote||""} onChange={e=>setPN(pid,"secondMeetNote",e.target.value)} placeholder="2nd meet-up notes — e.g. wait by the toilets, Rangi has the van (optional)" rows={2} style={{width:"100%",...INPsm,resize:"vertical",lineHeight:1.4,marginBottom:8,background:`${T.blue}0e`,border:`1px solid ${T.blue}44`}}/>}
                    <div style={{fontSize:10.5,color:T.amber,fontWeight:700,margin:"2px 0 4px"}}>↓ Drop-off</div>
                    <textarea value={pn.dropNote||""} onChange={e=>setPN(pid,"dropNote",e.target.value)} placeholder="Drop-off notes — e.g. hand over to mum, return house key" rows={2} style={{width:"100%",...INPsm,resize:"vertical",lineHeight:1.4,marginBottom:6}}/>
                    <input value={pn.dropAddr||""} onChange={e=>setPN(pid,"dropAddr",e.target.value)} placeholder="Drop-off address if different (optional)" style={{width:"100%",...INPsm}}/>
                  </div>
                );
              })}
            </div>
          )}
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>📍 Meeting point</div>
            <input value={meetPoint} onChange={e=>setMeetPoint(e.target.value)} placeholder="Where everyone meets" style={INP}/>
            <textarea value={meetPointNotes} onChange={e=>setMeetPointNotes(e.target.value)} placeholder="Meeting point notes — exactly where to wait, parking, who to look for…" rows={2} style={{...INP,marginTop:6,resize:"vertical",lineHeight:1.4}}/>
            <textarea value={meetPointTeenNotes} onChange={e=>setMeetPointTeenNotes(e.target.value)} placeholder="🧑 Teen note for the meet-up — what THEY see (optional)" rows={2} style={{...INP,marginTop:6,resize:"vertical",lineHeight:1.4,background:"rgba(0,229,180,0.06)",border:`1px solid ${T.teal}44`}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>📝 Notes</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Overall notes &amp; plan — bookings, timings, behaviour reminders, backup plan if wet…" rows={3} style={{...INP,resize:"vertical",lineHeight:1.4}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>🎒 What to bring</div>
            <input value={whatToBring} onChange={e=>setWhatToBring(e.target.value)} placeholder="Hat, water, lunch…" style={INP}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.red,marginBottom:4,fontWeight:600}}>⚠️ Important note (shown in red at the top)</div>
            <textarea value={importantNote} onChange={e=>setImportantNote(e.target.value)} rows={2} placeholder="e.g. Teri has a nut allergy — check all food carefully" style={{...INP,resize:"vertical",lineHeight:1.4,background:"rgba(255,92,122,0.07)",border:`1px solid ${T.red}55`}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>👥 Ratio (optional)</div>
            <input value={ratio} onChange={e=>setRatio(e.target.value)} placeholder="e.g. 1:3" style={INP}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>🗺️ Itinerary stops</div>
            {stops.map((st,i)=>(
              <div key={st.id||i} style={{marginBottom:8,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.border}`,borderRadius:10,padding:8}}>
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <input type="time" value={st.time||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,time:e.target.value}:x))} style={{width:108,...INPsm}}/>
                  <input value={st.name||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder={i===0?"First stop / activity":"Stop / activity"} style={{flex:1,...INPsm}}/>
                  <button onClick={()=>setStops(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer"}}>×</button>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                  <input value={st.address||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,address:e.target.value}:x))} placeholder="📍 Address (tap-to-open maps for the SW)" style={{flex:1,...INPsm}}/>
                  {st.address && <button onClick={()=>openInMaps(st.address)} title="Open in maps" style={{flexShrink:0,background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:9,padding:"8px 10px",color:T.blue,fontSize:13,cursor:"pointer"}}>📍</button>}
                </div>
                <textarea value={st.notes||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,notes:e.target.value}:x))} placeholder={i===0?"Notes for this first stop — what to do, bookings, things to watch…":"Notes for this stop…"} rows={2} style={{width:"100%",...INPsm,resize:"vertical",lineHeight:1.4}}/>
                <textarea value={st.teenNotes||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,teenNotes:e.target.value}:x))} placeholder="🧑 Teen note for this stop — what THEY see (optional)" rows={2} style={{width:"100%",...INPsm,resize:"vertical",lineHeight:1.4,marginTop:6,background:"rgba(0,229,180,0.06)",border:`1px solid ${T.teal}44`}}/>
                {(st.files&&st.files.length>0) && (
                  <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:6}}>
                    {st.files.map((f,fi)=>(
                      <div key={fi} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 9px"}}>
                        <span style={{fontSize:13}}>{f.type?.includes("pdf")?"📄":f.type?.includes("image")?"🖼️":f.type?.includes("html")?"🧾":"📎"}</span>
                        <span style={{flex:1,fontSize:11,color:T.body,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                        <button onClick={()=>rmStopFile(i,fi)} style={{background:"none",border:"none",color:T.red,fontSize:15,cursor:"pointer"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6,background:`${T.blue}10`,border:`1px dashed ${T.blue}40`,borderRadius:9,padding:"8px",color:T.blue,fontWeight:400,fontSize:11.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                  📎 Attach to this stop
                  <input type="file" accept="image/*,application/pdf,text/html" multiple style={{display:"none"}} onChange={ev=>{ addStopFiles(i, ev.target.files); ev.target.value=""; }}/>
                </label>
              </div>
            ))}
            <button onClick={()=>setStops(p=>[...p,{id:Date.now()+Math.random(),time:"",name:"",address:"",notes:"",teenNotes:""}])} style={{width:"100%",background:`${T.orange}12`,border:`1px dashed ${T.orange}55`,borderRadius:9,padding:"9px",color:T.orange,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add stop</button>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>📎 Attachments</div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:8}}>Attach bookings, ticket confirmations, maps or PDFs. Workers can view these on their shift.</div>
            {files.length>0 && (
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                {files.map((f,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px"}}>
                    <span style={{fontSize:14}}>{f.type?.includes("pdf")?"📄":f.type?.includes("image")?"🖼️":f.type?.includes("html")?"🧾":"📎"}</span>
                    <span style={{flex:1,fontSize:11,color:T.body,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    <button onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer"}}>×</button>
                  </div>
                ))}
              </div>
            )}
            <input ref={fileRef} type="file" accept="image/*,application/pdf,text/html" multiple style={{display:"none"}}
              onChange={ev=>{
                const fs=Array.from(ev.target.files||[]);
                fs.forEach(file=>{
                  if(file.size>5_000_000){alert(`${file.name} is over 5MB — too large.`);return;}
                  const reader=new FileReader();
                  reader.onload=()=>setFiles(p=>[...p,{name:file.name,dataUrl:reader.result,type:file.type}]);
                  reader.readAsDataURL(file);
                });
                ev.target.value="";
              }}/>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",background:`${T.blue}14`,border:`1px dashed ${T.blue}44`,borderRadius:10,padding:"10px",color:T.blue,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>📎 Attach files (PDF or image)</button>
          </div>
          {isEdit && (
            <label style={{display:"flex",alignItems:"center",gap:9,padding:"11px 12px",marginBottom:10,background:notifyChange?`${T.teal}14`:"rgba(255,255,255,0.03)",border:`1px solid ${notifyChange?T.teal:T.border}`,borderRadius:10,cursor:"pointer"}}>
              <input type="checkbox" checked={notifyChange} onChange={e=>setNotifyChange(e.target.checked)} style={{width:17,height:17,accentColor:T.teal,cursor:"pointer",flexShrink:0}}/>
              <span style={{fontSize:12.5,color:T.body,lineHeight:1.4}}>📣 Text the team a heads-up that this outing changed</span>
            </label>
          )}
          <BtnPrimary disabled={!canSave} onClick={attach}>{!canSave ? "Add a name & pick clients" : isEdit ? `Update outing on ${sel.length} shift${sel.length!==1?"s":""}` : `Attach run sheet to ${sel.length} shift${sel.length!==1?"s":""}`}</BtnPrimary>
          <button onClick={onClose} style={{width:"100%",padding:"12px",background:"transparent",border:`1px solid ${T.subtle}66`,borderRadius:12,color:T.body,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Cancel</button>
        </div>
      )}
    </Modal>
  );
}

function CreateOutingModal({ onClose, onSave, onDelete, onView, csUsername, csApiKey, workers, clients, editOuting }) {
  const e = editOuting;
  const PL = (clients && clients.length) ? clients : (typeof PARTICIPANTS!=="undefined"?PARTICIPANTS:[]);
  const findSvc = () => { if(!e) return 0; const i=SERVICE_TYPES.findIndex(s=>e.code===s.code); return i>=0?i:0; };
  const O1_DRAFT_KEY = "kora_outing1_draft_v1";
  const o1Draft0 = readFormDraft(O1_DRAFT_KEY, !e);
  const [o1DraftRestored, setO1DraftRestored] = useState(!!o1Draft0);
  const [title, setTitle] = useState(e?.title || o1Draft0?.title || "");
  const [date, setDate] = useState(e?.date || o1Draft0?.date || new Date().toISOString().split("T")[0]);
  const [start, setStart] = useState(e?.start || o1Draft0?.start || "09:00");
  const [end, setEnd] = useState(e?.end || o1Draft0?.end || "15:00");
  const [location, setLocation] = useState(e?.location || o1Draft0?.location || "");
  const [stops, setStops] = useState(e?.stops || (o1Draft0?.stops ? o1Draft0.stops.map(st=>({...st,files:[]})) : [])); // [{time,name,address,notes}]
  const [meetPoint, setMeetPoint] = useState(e?.meetPoint || o1Draft0?.meetPoint || "");
  const [files, setFiles] = useState(e?.files || []); // [{name, dataUrl, type}]
  const fileRef = useRef(null);
  const [serviceIdx, setServiceIdx] = useState(e ? findSvc() : (o1Draft0?.serviceIdx ?? 0));
  const [selWorkers, setSelWorkers] = useState(e?.workerIds || o1Draft0?.selWorkers || []);
  const [selParticipants, setSelParticipants] = useState(e?.participantIds || o1Draft0?.selParticipants || []);
  const [pSearch, setPSearch] = useState("");
  const [plans, setPlans] = useState(e?.participantPlans || o1Draft0?.plans || {}); // { [participantId]: {...} }
  const [notes, setNotes] = useState(e?.notes || o1Draft0?.notes || "");
  const [whatToBring, setWhatToBring] = useState(e?.whatToBring || o1Draft0?.whatToBring || "");
  const [cost, setCost] = useState(e?.cost ? String(e.cost) : (o1Draft0?.cost || ""));
  const [sending, setSending] = useState(false);
  const [smsStatus, setSmsStatus] = useState(null);
  const isEdit = !!editOuting;
  useEffect(()=>{
    if(isEdit) return;
    try{ localStorage.setItem(O1_DRAFT_KEY, JSON.stringify({ title, date, start, end, location, meetPoint, serviceIdx, selWorkers, selParticipants, plans, notes, whatToBring, cost, stops: stops.map(({files,...r})=>r) })); }catch(e2){}
  }, [isEdit, title, date, start, end, location, meetPoint, serviceIdx, selWorkers, selParticipants, plans, notes, whatToBring, cost, stops]);
  const clearO1Draft = ()=>{ clearFormDraft(O1_DRAFT_KEY); setTitle(""); setLocation(""); setMeetPoint(""); setStops([]); setSelWorkers([]); setSelParticipants([]); setPlans({}); setNotes(""); setWhatToBring(""); setCost(""); setO1DraftRestored(false); };

  const service = SERVICE_TYPES[serviceIdx];
  const toMin = t => { const [h,m]=(t||"0:0").split(":").map(Number); return (h||0)*60+(m||0); };
  const estHrs = Math.max(0, +(((toMin(end)-toMin(start))/60)).toFixed(1));
  const ratio = selParticipants.length && selWorkers.length ? `1:${(selParticipants.length/selWorkers.length).toFixed(1).replace(/\.0$/,"")}` : "—";
  const canSave = title.trim() && selWorkers.length>0 && selParticipants.length>0;

  const toggle = (arr, set, id) => set(arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);
  const setPlan = (pid, key, val) => setPlans(p => ({...p, [pid]: {...(p[pid]||{}), [key]:val}}));

  // Toggle a participant; when adding, look up their existing shift on this date and pre-fill SW + address
  function toggleParticipant(pid) {
    const isAdding = !selParticipants.includes(pid);
    setSelParticipants(prev => isAdding ? [...prev, pid] : prev.filter(x=>x!==pid));
    if (isAdding) {
      const allS = (typeof window!=="undefined" && window.__koraShifts) || [];
      // find an existing (non-outing) shift for this client on the outing's date
      const existing = allS.find(s => !s.isOuting && s.date===date && (s.participantId===pid || (s.participantIds||[]).includes(pid)));
      const p = PL.find(x=>String(x.id)===String(pid));
      if (existing) {
        const sw = (workers||[]).find(w=>w.id===existing.workerId);
        // add that SW to the outing's worker list if not already there
        if (sw && !selWorkers.includes(sw.id)) setSelWorkers(prev=>[...prev, sw.id]);
        setPlans(p2 => ({...p2, [pid]: {
          ...(p2[pid]||{}),
          pickupSW: p2[pid]?.pickupSW || sw?.name || "",
          pickupSWId: p2[pid]?.pickupSWId || (sw?.id!=null ? String(sw.id) : ""),
          dropSW:   p2[pid]?.dropSW   || sw?.name || "",
          dropSWId: p2[pid]?.dropSWId || (sw?.id!=null ? String(sw.id) : ""),
          pickupTime: p2[pid]?.pickupTime || existing.start || "",
          dropTime:   p2[pid]?.dropTime   || existing.end || "",
          pickupAddr: p2[pid]?.pickupAddr || existing.location || p?.address || "",
          dropAddr:   p2[pid]?.dropAddr   || existing.location || p?.address || "",
          _autofilled: true,
        }}));
      } else if (p) {
        // no existing shift — just pre-fill their home address
        setPlans(p2 => ({...p2, [pid]: {...(p2[pid]||{}), pickupAddr: p2[pid]?.pickupAddr || p.address || "", dropAddr: p2[pid]?.dropAddr || p.address || ""}}));
      }
    }
  }

  async function handleSave() {
    setSending(true);
    const wNames = selWorkers.map(id=>workers.find(w=>w.id===id)?.name).filter(Boolean);
    const pNames = selParticipants.map(id=>PL.find(p=>p.id===id)?.name).filter(Boolean);
    const svc = SERVICE_TYPES[serviceIdx] || SERVICE_TYPES[0];
    const outing = {
      id: editOuting?.id || Date.now(),
      isOuting: true,
      title,
      worker: wNames.join(", "), workerIds: selWorkers, workerId: selWorkers[0],
      participant: pNames.join(", "), participantIds: selParticipants, participantId: selParticipants[0],
      start, end, startMs: editOuting?.startMs ?? null,
      type: `${title} (Group Outing)`, code: svc?.code || "",
      status: editOuting?.status || "upcoming", location, meetPoint, outingNotes: notes||null, whatToBring,
      stops, files,
      cost: cost ? Number(cost) : 0,
      date, ratio,
      participantPlans: plans, // per-participant pickup/dropoff logistics
    };

    // Save FIRST so the SMS link uses the real shift id (a UUID), not a temp one.
    let savedId = outing.id;
    try { const saved = await onSave(outing); if (saved && saved.id) savedId = saved.id; } catch(e) {}
    const viewLink = isUuid(savedId) ? `${COMPANY.appUrl||"https://korateam.app"}/shift/${savedId}?do=outing` : null;

    // SMS each worker with a phone — never let this block saving
    try {
      const dateFmt = new Date(date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
      let anySent=false, anyFail=false;
      for (const id of selWorkers) {
        const w = workers.find(x=>x.id===id);
        if (!w?.phone) continue;
        const msg = `Hi ${firstName(w.name)}, GROUP OUTING: ${title} on ${dateFmt}, ${start}–${end}${location?` at ${location}`:""}. ${pNames.length} participants. Meet: ${meetPoint||"TBC"}.${viewLink?` View run sheet: ${viewLink}`:""} — ${COMPANY.shortName}`;
        try { await sendClickSendSMS(csUsername, csApiKey, w.phone, msg); anySent=true; }
        catch(e){ anyFail=true; }
      }
      setSmsStatus(anyFail?"error":anySent?"sent":"skipped");
    } catch(e) {
      setSmsStatus("skipped");
    }
    if (!isEdit) clearFormDraft(O1_DRAFT_KEY);
    setSending(false);
    if (onClose) onClose();
  }

  if (smsStatus) {
    return (
      <Modal title="Group Outing Created" onClose={onClose}>
        <div style={{display:"flex",flexDirection:"column",gap:14,alignItems:"center",textAlign:"center",padding:"10px 0"}}>
          <div style={{fontSize:48}}>{smsStatus==="sent"?"🎉":smsStatus==="skipped"?"📋":"⚠️"}</div>
          <div style={{fontSize:16,fontWeight:500,fontFamily:"Syne,sans-serif"}}>{title} saved!</div>
          <div style={{fontSize:12,color:T.subtle,lineHeight:1.6}}>
            {smsStatus==="sent" && `${selWorkers.length} worker(s) notified by SMS, ${selParticipants.length} participants on the outing.`}
            {smsStatus==="skipped" && "Outing saved. No worker phone numbers on file to text."}
            {smsStatus==="error" && "Outing saved but some SMS could not be delivered. Check ClickSend credentials."}
          </div>
          <div style={{width:"100%"}}><BtnPrimary onClick={onClose}>Done</BtnPrimary></div>
        </div>
      </Modal>
    );
  }

  const chip = (selected) => ({
    padding:"8px 12px", borderRadius:10, cursor:"pointer", fontSize:12, fontWeight:500,
    border:`1px solid ${selected?T.teal:T.border}`, background:selected?`${T.teal}1f`:"rgba(255,255,255,0.02)",
    color:selected?T.teal:T.body, fontFamily:"DM Sans,sans-serif", display:"flex", alignItems:"center", gap:6,
  });

  return (
    <Modal title={isEdit?"✏️ Edit Group Outing":"🎟️ Create Group Outing"} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {o1DraftRestored && !isEdit && (
