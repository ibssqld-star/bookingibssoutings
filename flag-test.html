// ── Outing group chat ────────────────────────────────────────
// Messages are keyed by outing id in window.__koraOutingChat so the
// manager and all SWs on the outing share one thread (session-level;
// persists to Supabase when hosted).
function OutingChat({ outingId, outingTitle, currentUser, workers, recipients, chatLink }) {
  const key = `o${outingId}`;
  const [msgs, setMsgs] = useState(() => (typeof window!=="undefined" && window.__koraOutingChat?.[key]) || []);
  const [text, setText] = useState("");
  const endRef = useRef(null);
  const me = currentUser?.name || "You";

  async function loadMsgs(){
    try {
      const { data, error } = await db.from("outing_messages").select("*").eq("outing_id", String(outingId)).order("created_at",{ascending:true});
      if (!error && Array.isArray(data)) {
        const mapped = data.map(r=>({ id:r.id, author:r.author, role:r.role, text:r.body, ts:r.created_at?new Date(r.created_at).getTime():Date.now() }));
        setMsgs(mapped);
        if (typeof window!=="undefined"){ window.__koraOutingChat=window.__koraOutingChat||{}; window.__koraOutingChat[key]=mapped; }
      }
    } catch(e){}
  }
  useEffect(()=>{ loadMsgs(); const t=setInterval(loadMsgs, 8000); return ()=>clearInterval(t); }, [outingId]);

  const prevMsgCount = useRef(0);
  useEffect(()=>{
    if(msgs.length > prevMsgCount.current){ endRef.current?.scrollIntoView({behavior:"smooth"}); }
    prevMsgCount.current = msgs.length;
  }, [msgs]);

  async function send() {
    const body = text.trim(); if(!body) return;
    const m = { id:"tmp"+Date.now(), author:me, role:currentUser?.role||"", text:body, ts:Date.now() };
    setMsgs(prev=>[...prev, m]);
    setText("");
    // Save to Supabase so the whole team sees it and it survives reloads.
    try {
      await db.from("outing_messages").insert({ outing_id:String(outingId), author:me, role:currentUser?.role||"", body });
      loadMsgs();
    } catch(e){}
    // Notify the rest of the team by SMS, with a link straight to this chat.
    try {
      const others = (recipients||[]).filter(r=>r&&r.phone&&r.name!==me);
      const snippet = body.length>140 ? body.slice(0,140)+"…" : body;
      const linkLine = chatLink ? `\n\nOpen chat: ${chatLink}` : "";
      const note = `${me} in "${outingTitle||"the outing"}" group chat:\n"${snippet}"${linkLine}`;
      others.forEach(r=>{ try{ sendClickSendSMS("","",r.phone,note).catch(()=>{}); }catch(e){} });
    } catch(e){}
  }
  const fmtTime = ts => new Date(ts).toLocaleTimeString("en-AU",{hour:"numeric",minute:"2-digit"});

  return (
    <div style={{display:"flex",flexDirection:"column",height:340}}>
      <div style={{fontSize:12,color:T.body,fontWeight:600,marginBottom:10,lineHeight:1.45}}>Group chat for everyone on <b style={{color:T.body}}>{outingTitle}</b>. Staff and managers can post updates here on the day.</div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingRight:2}}>
        {msgs.length===0 && (
          <div style={{textAlign:"center",color:T.body,fontWeight:600,fontSize:13,padding:"30px 16px",lineHeight:1.5}}>💬 No messages yet.<br/>Post the first update for the team.</div>
        )}
        {msgs.map(m=>{
          const mine = m.author===me;
          // look up author's avatar from workers (or director)
          const w = (workers&&workers.length?workers:(typeof WORKERS!=="undefined"?WORKERS:[])).find(x=>x.name===m.author);
          const av = w ? {initials:w.initials, color:w.avatarColor||w.color, photo:w.photo, emoji:w.emoji}
                       : {initials:(m.author||"?").slice(0,2).toUpperCase(), color:T.orange};
          return (
            <div key={m.id} style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:7}}>
              <div style={{marginBottom:14,flexShrink:0}}>
                <Avatar initials={av.initials} color={av.color} size={26} photo={av.photo} emoji={av.emoji}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start",maxWidth:"78%"}}>
                {!mine && <div style={{fontSize:11,color:T.subtle,marginBottom:2,marginLeft:4}}>{m.author}{m.role?` · ${m.role}`:""}</div>}
                <div style={{background:mine?`${T.teal}1f`:"rgba(255,255,255,0.05)",border:`1px solid ${mine?T.teal+"44":T.border}`,borderRadius:mine?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"8px 11px"}}>
                  <div style={{fontSize:11.5,color:T.white,lineHeight:1.45,whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>
                <div style={{fontSize:11,color:T.muted,marginTop:2,padding:"0 4px"}}>{fmtTime(m.ts)}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Message the team…" style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}}/>
        <button onClick={send} disabled={!text.trim()} style={{background:text.trim()?`linear-gradient(135deg,${T.teal},${T.blue})`:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,padding:"0 16px",color:text.trim()?T.bg:T.subtle,fontWeight:600,fontSize:12,cursor:text.trim()?"pointer":"default",fontFamily:"Syne,sans-serif"}}>Send</button>
      </div>
    </div>
  );
}

// ── Outing AI assistant ──────────────────────────────────────
// Answers SW questions from the run sheet; escalates to the manager
// (via the kora-ai Edge Function) when it isn't sure.
function OutingAIChat({ outing, currentUser }) {
  const s = outing || {};
  const [msgs, setMsgs] = useState([]); // {role:'user'|'assistant', content, escalated}
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); }, [msgs, loading]);

  const ctx = {
    title: s.title, date: s.date, meetPoint: s.meetPoint, whatToBring: s.whatToBring,
    ratio: s.ratio, activityId: s.activityId || null, notes: s.outingNotes ?? s.notes, stops: s.stops || [],
    participants: (s.participantIds||[]).map(pid=>{
      const pl = (s.participantPlans||{})[pid] || {};
      const pickup = (pl.pickupTime||pl.pickupSW||pl.pickupAddr) ? `pick-up ${[pl.pickupTime,pl.pickupSW&&("by "+pl.pickupSW),pl.pickupAddr].filter(Boolean).join(" ")}` : "";
      const dropoff = pl.sleepover ? "sleepover" : ((pl.dropTime||pl.dropSW||pl.dropAddr) ? `drop-off ${[pl.dropTime,pl.dropSW&&("by "+pl.dropSW),pl.dropAddr].filter(Boolean).join(" ")}` : "");
      return { name: pl.name || pid, pickup, dropoff };
    }),
  };

  async function send() {
    const body = text.trim(); if(!body || loading) return;
    const userMsg = { role:"user", content:body };
    const history = [...msgs, userMsg];
    setMsgs(history); setText(""); setLoading(true);
    try {
      const data = await askKoraAI(history.map(m=>({role:m.role,content:m.content})), ctx, currentUser?.name || "A support worker");
      setMsgs(m=>[...m, { role:"assistant", content:data?.reply || "Sorry, I couldn't answer that.", escalated:!!data?.escalated }]);
    } catch(e) {
      setMsgs(m=>[...m, { role:"assistant", content:"I couldn't reach the assistant. Please text your manager directly.", escalated:false }]);
    }
    setLoading(false);
  }

  const suggestions = ["Where are we meeting?", "What should I bring?", "What's the plan for the day?"];

  return (
    <div style={{display:"flex",flexDirection:"column",height:340}}>
      <div style={{fontSize:11,color:T.subtle,marginBottom:10,lineHeight:1.4}}>🤖 Ask about <b style={{color:T.body}}>{s.title||"this outing"}</b>. I answer from the run sheet — if I'm not sure, I'll check with your manager.</div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingRight:2}}>
        {msgs.length===0 && !loading && (
          <div style={{display:"flex",flexDirection:"column",gap:8,padding:"8px 0"}}>
            {suggestions.map(q=>(
              <button key={q} onClick={()=>{ setText(q); }} style={{textAlign:"left",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 12px",color:T.body,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>💬 {q}</button>
            ))}
          </div>
        )}
        {msgs.map((m,i)=>{
          const mine = m.role==="user";
          return (
            <div key={i} style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:7}}>
              {!mine && <div style={{marginBottom:2,flexShrink:0}}><Avatar initials="AI" color={T.blue} size={26}/></div>}
              <div style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start",maxWidth:"80%"}}>
                <div style={{background:mine?`${T.teal}1f`:"rgba(0,191,255,0.08)",border:`1px solid ${mine?T.teal+"44":T.blue+"33"}`,borderRadius:mine?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"8px 11px"}}>
                  <div style={{fontSize:11.5,color:T.white,lineHeight:1.45,whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
                {m.escalated && <div style={{fontSize:11,color:T.amber,marginTop:3,padding:"0 4px"}}>📨 Sent to your manager</div>}
              </div>
            </div>
          );
        })}
        {loading && (
          <div style={{display:"flex",alignItems:"flex-end",gap:7}}>
            <Avatar initials="AI" color={T.blue} size={26}/>
            <div style={{background:"rgba(0,191,255,0.08)",border:`1px solid ${T.blue}33`,borderRadius:"12px 12px 12px 4px",padding:"8px 12px",fontSize:11.5,color:T.subtle}}>Thinking…</div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Ask about the outing…" style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}}/>
        <button onClick={send} disabled={!text.trim()||loading} style={{background:(text.trim()&&!loading)?`linear-gradient(135deg,${T.blue},${T.teal})`:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,padding:"0 16px",color:(text.trim()&&!loading)?T.bg:T.subtle,fontWeight:600,fontSize:12,cursor:(text.trim()&&!loading)?"pointer":"default",fontFamily:"Syne,sans-serif"}}>Ask</button>
      </div>
    </div>
  );
}

// WORKER APP
// ══════════════════════════════════════════════════════════════
function WorkerMoney({ worker, shifts }) {
  const SUPER_RATE = 0.12;
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const [paySearch,setPaySearch]=useState("");
  const ph = t=>{const[h,m]=String(t||"0").split(":").map(Number);return (h||0)+((m||0)/60);};
  const kmOf = s => { const k=s.kms; if(!k) return 0; if(Array.isArray(k)) return k.reduce((a,x)=>a+(Number(x.total)||0),0); return Number(k.total)||0; };
  const odoOf = s => { const k=s.kms; if(!k||Array.isArray(k)) return {start:null,end:null}; return { start: k.startOdo!=null?Number(k.startOdo):null, end: k.endOdo!=null?Number(k.endOdo):null }; };
  const receiptsOf = s => { const r=s.receipts; return Array.isArray(r) ? r.reduce((a,x)=>a+(Number(x.amt)||0),0) : 0; };
  const rows = (shifts||[])
    .filter(s => s.status!=="unavailable" && s.type!=="Unavailability")
    .slice().sort((a,b)=> String(a.date||"").localeCompare(String(b.date||"")))
    .map(s => {
      const hrs = Math.max(0, ph(s.end)-ph(s.start));
      const rate = swShiftRate(s, worker);
      const wage = rate!=null ? +(hrs*rate).toFixed(2) : null;
      const sup  = wage!=null ? +(wage*SUPER_RATE).toFixed(2) : 0;
      const odo = odoOf(s);
      return { id:s.id, date:s.date||"", activity: s.isOuting ? (s.title||"Group outing") : (s.participant||"Client"), hrs:+hrs.toFixed(2), rate, wage, sup, odoStart:odo.start, odoEnd:odo.end, km:+kmOf(s).toFixed(1), receipts:+receiptsOf(s).toFixed(2), status:s.status, missing: rate==null && hrs>0 };
    });
  const tot = rows.reduce((a,r)=>({ hrs:a.hrs+r.hrs, wage:a.wage+(r.wage||0), sup:a.sup+r.sup, km:a.km+r.km, receipts:a.receipts+r.receipts }), {hrs:0,wage:0,sup:0,km:0,receipts:0});
  const kmRate = Number(worker?.kmRate)||0;
  const kmPay = +(tot.km*kmRate).toFixed(2);
  const anyMissing = rows.some(r=>r.missing);
  const shownRows = rows.slice().reverse().filter(r=>!paySearch.trim()||`${r.activity} ${r.date} ${r.status||""}`.toLowerCase().includes(paySearch.toLowerCase()));

  async function loadScript(src){return new Promise((res,rej)=>{if([...document.scripts].some(x=>x.src===src))return res();const e=document.createElement("script");e.src=src;e.onload=res;e.onerror=rej;document.head.appendChild(e);});}
  async function exportXlsx(){
    setBusy(true);
    try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
      const XLSX = window.XLSX;
      const data = rows.map(r=>({
        "QuickBooks Code": worker.staffId || "(not set)",
        "Support Worker": worker.name || "",
        Date:r.date, Activity:r.activity, Hours:r.hrs,
        "Rate $/hr": r.rate!=null?r.rate:"(not set)",
        "Wage $": r.wage!=null?r.wage:"(rate not set)",
        "Super $": r.sup,
        "Odo Start": r.odoStart!=null?r.odoStart:"",
        "Odo End": r.odoEnd!=null?r.odoEnd:"",
        "KM": r.km,
        "$/km": kmRate>0?kmRate:"(not set)", "KM Pay $": kmRate>0?+(r.km*kmRate).toFixed(2):0,
        "Receipts $": r.receipts,
      }));
      data.push({});
      data.push({ "QuickBooks Code":worker.staffId||"", "Support Worker":worker.name||"", Date:"TOTALS", Hours:+tot.hrs.toFixed(2), "Wage $":+tot.wage.toFixed(2), "Super $":+tot.sup.toFixed(2), "KM":+tot.km.toFixed(1), "KM Pay $":kmPay, "Receipts $":+tot.receipts.toFixed(2) });
      const ws = XLSX.utils.json_to_sheet(data);
      ws["!cols"]=[{wch:15},{wch:20},{wch:11},{wch:22},{wch:6},{wch:9},{wch:13},{wch:9},{wch:10},{wch:10},{wch:7},{wch:7},{wch:8},{wch:10},{wch:11}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "My Pay");
      XLSX.writeFile(wb, `KORA-Pay-${String(worker.name||"me").replace(/[^\w.-]/g,"")}.xlsx`);
      setDone(true); setTimeout(()=>setDone(false),2500);
    }catch(e){ alert("Export failed: "+(e?.message||"")); }
    setBusy(false);
  }

  const tile = (label,val,color,sub)=>(
    <div style={{flex:"1 1 45%",background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:14,padding:"13px 14px"}}>
      <div style={{fontSize:11,color:T.subtle,textTransform:"uppercase",letterSpacing:"1.5px"}}>{label}</div>
      <div style={{fontSize:21,fontWeight:600,fontFamily:"Syne,sans-serif",color,letterSpacing:"-0.5px",marginTop:2}}>{val}</div>
      {sub&&<div style={{fontSize:11,color:T.muted,marginTop:2}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{padding:"4px 0 90px"}}>
      <div style={{fontSize:22,fontWeight:600,fontFamily:"Syne,sans-serif",marginBottom:2}}>My Pay</div>
      <div style={{fontSize:11,color:T.subtle,marginBottom:14}}>Across all your shifts</div>

      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {tile("Earned (wages)", fmt$(tot.wage), T.teal, `${String(Math.round(tot.hrs*100)/100)}h worked`)}
        {tile("Super accrued", fmt$(tot.sup), T.pink, "12% of wages")}
        {tile("Receipts to reimburse", fmt$(tot.receipts), T.amber, "Out-of-pocket")}
        {tile("Kilometres", `${String(Math.round(tot.km*10)/10)} km`, T.blue, kmRate>0?`${fmt$(kmRate)}/km · ${fmt$(kmPay)} total`:"$/km not set by manager")}
      </div>

      {anyMissing && (
        <div style={{fontSize:11,color:T.amber,background:`${T.amber}12`,border:`1px solid ${T.amber}33`,borderRadius:10,padding:"9px 11px",marginBottom:14}}>Some shifts have no pay rate set yet — those wages aren't included. Your manager will confirm your rate.</div>
      )}

      <button onClick={exportXlsx} disabled={busy||rows.length===0} style={{width:"100%",background:busy?"#1a8870":GRAD.tealBlue,border:"none",borderRadius:12,padding:"13px",color:"#06121f",fontSize:13,fontWeight:600,cursor:busy?"wait":"pointer",fontFamily:"Syne,sans-serif",marginBottom:18}}>{busy?"Building spreadsheet…":done?"✓ Downloaded!":"⬇ Download my pay (Excel)"}</button>

      <div style={{fontSize:11,color:T.subtle,textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>Per shift</div>
      <input value={paySearch} onChange={e=>setPaySearch(e.target.value)} placeholder="🔍 Search by client or date (e.g. Tester, 2026-06)" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"9px 12px",color:"#fff",fontSize:11.5,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {rows.length===0 && <div style={{fontSize:11,color:T.subtle}}>No shifts yet.</div>}
        {rows.length>0 && shownRows.length===0 && <div style={{fontSize:11,color:T.subtle}}>No shifts match "{paySearch}".</div>}
        {shownRows.map(r=>(
          <div key={r.id} style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 13px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.activity}</div>
                <div style={{fontSize:11,color:T.subtle,marginTop:1}}>{r.date?new Date(r.date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}):"—"} · {String(Math.round(r.hrs*100)/100)}h{r.rate!=null?` × $${r.rate.toFixed(2)}`:""}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif",color:r.wage!=null?T.teal:T.subtle}}>{r.wage!=null?fmt$(r.wage):"rate?"}</div>
                {r.wage!=null&&<div style={{fontSize:11,color:T.pink}}>+{fmt$(r.sup)} super</div>}
              </div>
            </div>
            {(r.km>0||r.receipts>0)&&(
              <div style={{display:"flex",gap:6,marginTop:8}}>
                {r.km>0&&<Chip label={kmRate>0?`${r.km} km · ${fmt$(r.km*kmRate)}`:`${r.km} km`} color={T.blue}/>}
                {r.receipts>0&&<Chip label={`${fmt$(r.receipts)} receipts`} color={T.amber}/>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  const now = ()=>{ const d=new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
  const [startHHMM,setStartHHMM]=useState(now());
  const pName = (participant && participant.name) || shift.participant || (shift.isOuting?shift.title:"this shift");
  const tStyle = {width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:15,fontFamily:"Syne,sans-serif",outline:"none",boxSizing:"border-box"};
  return (
    <Modal title="Sign on to shift" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>

        <div style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.teal}33`,borderRadius:12,padding:"12px 14px"}}>

// Compute the pay period to default to, from company pay-schedule settings.
// Returns the period whose PAY DAY is the next one on/after today. Null if not configured.
function tsPeriodFor(settings, todayISO){
  const cyc = (settings && (settings.tsCycle || settings.payCycle)) || null;
  const startS = settings && settings.tsPeriodStart;
  const payS = settings && settings.tsPayDay;
  if(!cyc || !startS || !payS) return null;
  const len = cyc==="weekly" ? 7 : 14; // fortnightly for anything else
  const DAY = 86400000;
  const isoOf = d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const start0 = new Date(startS+"T00:00:00");
  const pay0 = new Date(payS+"T00:00:00");
  if(isNaN(start0)||isNaN(pay0)) return null;
  const end0 = new Date(start0.getTime()+(len-1)*DAY);
  const offset = Math.round((pay0 - end0)/DAY); // days from period end to pay day
  const today = new Date((todayISO || isoOf(new Date()))+"T00:00:00");
  const kPay = Math.ceil((today - pay0)/(len*DAY)); // roll to next pay day on/after today
  const payDay = new Date(pay0.getTime() + kPay*len*DAY);
  const end = new Date(payDay.getTime() - offset*DAY);
  const from = new Date(end.getTime() - (len-1)*DAY);
  return { from: isoOf(from), to: isoOf(end), payDay: isoOf(payDay) };
}

// ── WORKER TIMESHEET — each SW reviews & submits their own pay-period shifts ──
function WorkerTimesheet({ worker, shifts, participants, period, onSaveShift, onClose }){
  const ph = t=>{ const [h,m]=String(t||"0:0").split(":").map(Number); return (h||0)+((m||0)/60); };
  const hrsOf = (a,b)=>{ let d=ph(b)-ph(a); if(d<0)d+=24; return Math.max(0,+d.toFixed(2)); };
  const tinyD = ds=>{ try{ return new Date(ds+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"}); }catch(e){ return ds; } };
  const longD = ds=>{ try{ return new Date(ds+"T00:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}); }catch(e){ return ds; } };
  const hhmm = isoT=>{ if(!isoT) return null; try{ const d=new Date(isoT); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }catch(e){ return null; } };
  const from=period.from, to=period.to, payDay=period.payDay;
  const myParticipants = participants||[];

  const periodShifts = (shifts||[]).filter(s=> s.date && s.date>=from && s.date<=to && s.status!=="unavailable" && s.status!=="cancelled" && !s.isOuting);
  const sameDayIds = date => new Set(periodShifts.filter(s=>s.date===date).map(s=>String(s.participantId)));
  const tripDist = t=>{ const a=Number(t.startOdo),b=Number(t.endOdo); return (t.startOdo!==""&&t.startOdo!=null&&t.endOdo!==""&&t.endOdo!=null&&isFinite(a)&&isFinite(b)&&b>=a)? +(b-a).toFixed(1):0; };
  const buildTrips = s=>{ const k=s.kms; if(k&&Array.isArray(k.trips)&&k.trips.length) return k.trips.map((t,i)=>({id:"t"+i,startOdo:t.startOdo??"",endOdo:t.endOdo??"",pax:(t.pax||[]).map(p=>String(p.id||p))})); if(k&&(k.startOdo!=null||k.endOdo!=null)) return [{id:"t0",startOdo:k.startOdo??"",endOdo:k.endOdo??"",pax:[]}]; return [{id:"t0",startOdo:"",endOdo:"",pax:[]}]; };

  const [rows,setRows]=useState(()=> periodShifts.map(s=>({ id:s.id, ref:s, mine:false, signed:!!s.signOffTime, day:s.date, client:s.participant||"", participantId:s.participantId, start:hhmm(s.signOnTime)||s.start||"", end:hhmm(s.signOffTime)||s.end||"", trips:buildTrips(s) })) );
  const [added,setAdded]=useState([]);
  const [openId,setOpenId]=useState(null);
  const [status,setStatus]=useState("idle");
  const [result,setResult]=useState(null);

  const shiftKm = r=> r.trips.reduce((a,t)=>a+tripDist(t),0);
  const all = [...rows,...added];
  const totalH = all.reduce((a,r)=>a+hrsOf(r.start,r.end),0);
  const totalKm = all.reduce((a,r)=>a+shiftKm(r),0);

  const setRow = (id,k,v,isAdded)=> (isAdded?setAdded:setRows)(rs=>rs.map(r=>r.id===id?{...r,[k]:v}:r));
  const setTrips = (id,nt,isAdded)=> setRow(id,"trips",nt,isAdded);
  const addBlank = ()=>{ const p=myParticipants[0]; const nr={ id:"new-"+Date.now(), mine:true, signed:false, day:from, client:(p&&p.name)||"", participantId:(p&&p.id)||null, start:"09:00", end:"15:00", trips:[{id:"t0",startOdo:"",endOdo:"",pax:[]}] }; setAdded(a=>[...a,nr]); setOpenId(nr.id); };
  const rmAdded = id=> setAdded(a=>a.filter(r=>r.id!==id));

  const kmsForRow = r=>{
    const trips=r.trips.filter(t=> tripDist(t)>0 || (t.startOdo!==""&&t.startOdo!=null) || (t.endOdo!==""&&t.endOdo!=null));
    if(!trips.length) return null;
    let total=0,perClient=0,anyPartial=false;
    const detail=trips.map(t=>{ const d=tripDist(t); const people=1+((t.pax&&t.pax.length)||0); const share=people?+(d/people).toFixed(2):d; total+=d; perClient+=share; if(!(d>0)) anyPartial=true; const pax=(t.pax||[]).map(pid=>{ const p=myParticipants.find(x=>String(x.id)===String(pid)); return {id:pid,name:(p&&p.name)||""}; }); return { startOdo:(t.startOdo===""||t.startOdo==null)?null:Number(t.startOdo), endOdo:(t.endOdo===""||t.endOdo==null)?null:Number(t.endOdo), dist:d, people, share, pax }; });
    return { startOdo:detail[0].startOdo, endOdo:detail[detail.length-1].endOdo, total:+total.toFixed(1), perClient:+perClient.toFixed(1), partial:anyPartial, trips:detail };
  };

  const submit = async ()=>{
    setStatus("saving"); let saved=0, failed=0;
    for(const r of rows){ try{ const k=kmsForRow(r); await onSaveShift({ ...r.ref, start:r.start, end:r.end, kms: k!=null?k:(r.ref.kms||null) }); saved++; }catch(e){ failed++; } }
    for(const a of added){ try{ const p=myParticipants.find(x=>String(x.id)===String(a.participantId)); await onSaveShift({ id:Date.now()+Math.floor(Math.random()*1000), workerId:worker.id, worker:worker.name, participantId:(p&&p.id)||a.participantId, participant:(p&&p.name)||a.client, date:a.day, start:a.start, end:a.end, status:"completed", confirmStatus:"pending", confirmed:false, kms:kmsForRow(a), lineItems:[], notes:"[worker-added] new shift submitted on timesheet" }); saved++; }catch(e){ failed++; } }
    try{ const periodLabel=`${tinyD(from)}–${tinyD(to)}`; const addedNote = added.length ? ` ⚠ ${added.length} NEW shift${added.length!==1?"s":""} they added — needs your confirmation.` : ""; const msg=`KORA: ${worker.name} submitted their timesheet for ${periodLabel} — ${all.length} shift${all.length!==1?"s":""}, ${totalH.toFixed(2)}h, ${totalKm} km.${addedNote} — ${COMPANY.shortName}`; if(COMPANY.managerPhone) await sendClickSendSMS("","",COMPANY.managerPhone,msg); }catch(e){}
    setResult({saved,failed}); setStatus("done");
  };

  const TI={ background:"rgba(255,255,255,0.06)", border:`1px solid ${T.border}`, borderRadius:9, padding:"9px 10px", color:"#fff", fontSize:14, fontFamily:"DM Sans,sans-serif", boxSizing:"border-box", outline:"none" };
  const LAB={ fontSize:10, letterSpacing:"1px", textTransform:"none", color:T.subtle, fontWeight:700, marginBottom:4, display:"block" };

  // Plain helper (NOT a component) so inputs keep focus while typing.
  const renderTrips = (trips, mainId, date, onChange)=>{
    const sd=sameDayIds(date);
    const opts=myParticipants.filter(p=>String(p.id)!==String(mainId));
    const ordered=[...opts.filter(p=>sd.has(String(p.id))),...opts.filter(p=>!sd.has(String(p.id)))];
    const setT=(i,k,v)=> onChange(trips.map((t,j)=>j===i?{...t,[k]:v}:t));
    const tog=(i,pid)=>{ const t=trips[i]; const has=t.pax.includes(pid); onChange(trips.map((x,j)=>j===i?{...x,pax:has?x.pax.filter(y=>y!==pid):[...x.pax,pid]}:x)); };
    return (
      <div style={{marginTop:10}}>
        <div style={{fontSize:11,letterSpacing:"0.5px",textTransform:"none",color:T.teal,fontWeight:700,marginBottom:8}}>🚗 Kilometres — speedometer{trips.length>1?` · ${trips.length} trips`:""}</div>
        {trips.map((t,i)=>{ const d=tripDist(t); const people=1+t.pax.length; const each=d?+(d/people).toFixed(1):0; const paxNames=t.pax.map(pid=>{const p=myParticipants.find(x=>String(x.id)===String(pid)); return p?p.name:""; }).filter(Boolean);
          return (
          <div key={t.id} style={{border:`1px solid ${T.border}`,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:11,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:700,fontFamily:"DM Sans,sans-serif",color:"#fff"}}>Trip {i+1}</span>
              {trips.length>1 && <button onClick={()=>onChange(trips.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.pink||"#ff7d7d",fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Remove</button>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={LAB}>Speedo start</label><input type="number" inputMode="numeric" value={t.startOdo} onChange={e=>setT(i,"startOdo",e.target.value)} style={{...TI,width:"100%"}}/></div>
              <div style={{flex:1}}><label style={LAB}>Speedo end</label><input type="number" inputMode="numeric" value={t.endOdo} onChange={e=>setT(i,"endOdo",e.target.value)} style={{...TI,width:"100%"}}/></div>
            </div>
            {ordered.length>0 && (<div>
              <div style={{...LAB,marginTop:10}}>Other teens in the car</div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {ordered.map(p=>{ const on=t.pax.includes(String(p.id)); const today=sd.has(String(p.id)); return (
                  <button key={p.id} onClick={()=>tog(i,String(p.id))} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,padding:"7px 11px",borderRadius:999,cursor:"pointer",fontFamily:"DM Sans,sans-serif",border:`1px solid ${on?T.teal:T.border}`,background:on?`${T.teal}1f`:"rgba(255,255,255,0.04)",color:on?T.teal:T.body}}>
                    {today&&<span style={{width:6,height:6,borderRadius:"50%",background:on?T.teal:T.subtle,display:"inline-block"}}/>}{p.name}
                  </button>
                ); })}
              </div>
            </div>)}
            {d>0 && <div style={{marginTop:9,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 10px",fontSize:12.5,color:T.body}}>
              <b style={{fontFamily:"DM Sans,sans-serif",color:"#fff"}}>{d} km</b> · split {people} {people===1?"way":"ways"} → <span style={{color:T.teal,fontWeight:700}}>{each} km each</span>
              <div style={{color:T.subtle,fontSize:11,marginTop:2}}>{["this client",...paxNames].join(", ")}</div>
            </div>}
          </div>
        ); })}
        <button onClick={()=>onChange([...trips,{id:"t"+Date.now(),startOdo:"",endOdo:"",pax:[]}])} style={{width:"100%",padding:9,borderRadius:10,background:"transparent",border:`1px dashed ${T.blue}`,color:T.blue,fontWeight:700,fontSize:12.5,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>+ Add another trip</button>
      </div>
    );
  };

  const renderRow = (r,isAdded)=>{
    const open=openId===r.id; const hrs=hrsOf(r.start,r.end); const km=shiftKm(r);
    const tagCol = r.mine?T.blue:(r.signed?T.teal:T.amber);
    return (
      <div key={r.id} style={{background:T.card,border:`1px solid ${open?T.teal:tagCol+"66"}`,borderRadius:14,padding:12,marginBottom:9}}>
        <div onClick={()=>setOpenId(open?null:r.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
          <div style={{minWidth:44,textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:800,fontFamily:"DM Sans,sans-serif",color:"#fff",lineHeight:1}}>{(()=>{try{return new Date(r.day+"T00:00:00").getDate();}catch(e){return "?";}})()}</div>
            <div style={{fontSize:9,color:T.subtle,textTransform:"none",letterSpacing:"1px"}}>{(()=>{try{return new Date(r.day+"T00:00:00").toLocaleDateString("en-AU",{month:"short"});}catch(e){return "";}})()}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14.5,fontWeight:600,fontFamily:"DM Sans,sans-serif",color:"#fff"}}>{r.client||"(pick client)"}</div>
            <div style={{fontSize:12,color:T.body,marginTop:2}}>{r.start||"--:--"}–{r.end||"--:--"} · {hrs.toFixed(2)}h{km>0?` · ${km} km`:""}</div>
            {!open && <div style={{fontSize:11,color:T.blue,fontWeight:600,marginTop:3}}>Tap to add times + speedometer ›</div>}
          </div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:999,whiteSpace:"nowrap",border:`1px solid ${tagCol}`,background:tagCol+"22",color:tagCol}}>{r.mine?"added":(r.signed?"signed off":"check")}</span>
        </div>
        {open && (
          <div style={{marginTop:11,paddingTop:11,borderTop:`1px dashed ${T.border}`}}>
            {!r.signed && !r.mine && <div style={{fontSize:12,color:T.amber,marginBottom:10}}>Not signed off — rostered times shown. Fix them and add your speedometer readings.</div>}
            {isAdded && <div style={{display:"flex",gap:8,marginBottom:10}}>
              <div style={{flex:1}}><label style={LAB}>Date</label><input type="date" value={r.day} min={from} max={to} onChange={e=>setRow(r.id,"day",e.target.value,true)} style={{...TI,width:"100%"}}/></div>
              <div style={{flex:1}}><label style={LAB}>Client</label><select value={r.participantId||""} onChange={e=>{ const p=myParticipants.find(x=>String(x.id)===e.target.value); setAdded(a=>a.map(x=>x.id===r.id?{...x,participantId:e.target.value,client:(p&&p.name)||""}:x)); }} style={{...TI,width:"100%",cursor:"pointer"}}><option value="" style={{background:T.card}}>—</option>{myParticipants.map(p=><option key={p.id} value={p.id} style={{background:T.card}}>{p.name}</option>)}</select></div>
            </div>}
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={LAB}>Start</label><input type="time" value={r.start} onChange={e=>setRow(r.id,"start",e.target.value,isAdded)} style={{...TI,width:"100%"}}/></div>
              <div style={{flex:1}}><label style={LAB}>Finish</label><input type="time" value={r.end} onChange={e=>setRow(r.id,"end",e.target.value,isAdded)} style={{...TI,width:"100%"}}/></div>
            </div>
            {renderTrips(r.trips, r.participantId, r.day, nt=>setTrips(r.id,nt,isAdded))}
            {isAdded && <button onClick={()=>rmAdded(r.id)} style={{marginTop:10,background:"none",border:"none",color:T.pink||"#ff7d7d",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Remove this shift</button>}
          </div>
        )}
      </div>
    );
  };

  if(status==="done") return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:30,textAlign:"center",fontFamily:"DM Sans,sans-serif"}}>
      <div style={{fontSize:46}}>✅</div>
      <div style={{fontSize:20,fontWeight:700,fontFamily:"DM Sans,sans-serif",color:"#fff",margin:"10px 0 6px"}}>Timesheet submitted</div>
      <div style={{fontSize:13.5,color:T.body,maxWidth:340,lineHeight:1.5}}>Sent to your manager — {totalH.toFixed(2)}h and {totalKm} km for {tinyD(from)}–{tinyD(to)}.{result&&result.failed?` (${result.failed} couldn't save — let your manager know.)`:""}</div>
      <button onClick={onClose} style={{marginTop:20,background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:12,padding:"13px 26px",color:T.bg,fontWeight:700,fontFamily:"DM Sans,sans-serif",fontSize:15,cursor:"pointer"}}>Done</button>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:T.bg,display:"flex",flexDirection:"column",fontFamily:"DM Sans,sans-serif"}}>
      <div style={{padding:"calc(14px + env(safe-area-inset-top)) 16px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,fontFamily:"DM Sans,sans-serif",color:"#fff"}}>🧾 My timesheet</div>
          <div style={{fontSize:11.5,color:T.subtle,marginTop:1}}>{worker.name}</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${T.border}`,borderRadius:9,width:34,height:34,color:"#fff",fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",gap:8,flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:11,fontWeight:600,padding:"6px 10px",borderRadius:999,border:`1px solid ${T.border}`,color:T.body,background:"rgba(255,255,255,0.04)"}}>Pay week <b style={{color:"#fff"}}>{tinyD(from)}–{tinyD(to)}</b></span>
        <span style={{fontSize:11,fontWeight:600,padding:"6px 10px",borderRadius:999,border:`1px solid ${T.amber}55`,color:T.amber,background:`${T.amber}14`}}>Pay day {longD(payDay)}</span>
      </div>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",gap:10,flexShrink:0}}>
        {[["Hours",totalH.toFixed(2)+" h"],["Km driven",totalKm+" km"],["Shifts",String(all.length)]].map(([k,v])=>(
          <div key={k} style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"9px 11px"}}>
            <div style={{fontSize:9,letterSpacing:"1px",textTransform:"none",color:T.subtle,fontWeight:700}}>{k}</div>
            <div style={{fontSize:19,fontWeight:800,fontFamily:"DM Sans,sans-serif",color:"#fff",marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px 110px"}}>
        {all.length===0 && <div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:30}}>No shifts in this pay week yet. Add one below if you worked.</div>}
        {rows.map(r=>renderRow(r,false))}
        {added.map(r=>renderRow(r,true))}
        <button onClick={addBlank} style={{width:"100%",padding:13,borderRadius:13,background:"rgba(255,255,255,0.04)",border:`1px dashed ${T.blue}`,color:T.blue,fontWeight:700,fontSize:14,fontFamily:"DM Sans,sans-serif",cursor:"pointer",marginTop:4}}>+ Add a shift I did</button>
        <div style={{fontSize:11,color:T.subtle,textAlign:"center",marginTop:8}}>Funding &amp; rates aren't shown here — your manager sets those when billing.</div>
      </div>
      <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${T.border}`,background:T.bg}}>
        <button disabled={status==="saving"} onClick={submit} style={{width:"100%",padding:15,border:"none",borderRadius:14,color:T.bg,fontFamily:"DM Sans,sans-serif",fontWeight:800,fontSize:16,cursor:status==="saving"?"default":"pointer",background:status==="saving"?"rgba(255,255,255,0.15)":`linear-gradient(135deg,${T.teal},${T.blue})`}}>{status==="saving"?"Submitting…":"Submit timesheet"}</button>
      </div>
    </div>
  );
}

function WorkerApp({worker,onSignOut,onLock,shifts,participants,onSaveShift,sched,paySchedule,openShiftId,openAction,onConsumeOpenShift}) {
  // Real data only — these shadow the demo constants so nothing fake shows.
  // Empty until the manager links real shifts/participants to this worker.
  const SHIFTS_TODAY = shifts || [];
  const PARTICIPANTS = participants || [];
  const [tab,setTab]=useState("today");
  const [activeShift,setActiveShift]=useState(null);
  const [pendingModal,setPendingModal]=useState(null); // modal to auto-open when a deep-linked shift loads
  const [peopleQ,setPeopleQ]=useState("");
  const [infoClient,setInfoClient]=useState(null);
  const [showSearch,setShowSearch]=useState(false);
  const [showUnavail,setShowUnavail]=useState(false);
  const [viewingOuting,setViewingOuting]=useState(null);
  const [detailShift,setDetailShift]=useState(null);
  const [signOnPrompt,setSignOnPrompt]=useState(null); // shift pending sign-on (start-time confirm)
  const [signSyncError,setSignSyncError]=useState(null); // {type:'signon'|'signoff', shift, startHHMM, payload} — set when a save couldn't be confirmed, so we can show a visible retry instead of silently pretending it worked
  const [myUnavail,setMyUnavail]=useState([]); // worker-submitted unavailability
  const [confirmedIds,setConfirmedIds]=useState([]); // shift ids this worker has confirmed
  const [deniedIds,setDeniedIds]=useState([]); // shift ids this worker has denied (hidden immediately)
  const [showTimesheet,setShowTimesheet]=useState(false);
  const [tsPeriod,setTsPeriod]=useState(null);
  const baseShifts = SHIFTS_TODAY.filter(s => {
    // Match by the worker's real id first (DB shifts), then fall back to name.
    if (s.workerIds && s.workerIds.length) return s.workerIds.map(String).includes(String(worker.id)) || (worker.name && s.worker ? s.worker.split(",").map(x=>x.trim()).includes(worker.name) : false);
    if (s.workerId != null && worker.id != null && String(s.workerId) === String(worker.id)) return true;
    if (s.worker && s.worker.includes(",")) return s.worker.split(",").map(x=>x.trim()).includes(worker.name);
    return s.worker === worker.name;
  });
  const myShifts = [...baseShifts, ...myUnavail].filter(s => s.confirmStatus!=="denied" && !deniedIds.includes(s.id));
  const currentShift = myShifts.find(s=>s.status==="active")||null;
  const _t = new Date();
  const todayISO = `${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,"0")}-${String(_t.getDate()).padStart(2,"0")}`;
  const todayShifts = myShifts.filter(s => s.date === todayISO && s.status !== "unavailable");
  // ClickSend creds shared via window (set by manager settings); empty until configured
  const csUsername = (typeof window!=="undefined" && window.__koraCS?.username) || "";
  const csApiKey = (typeof window!=="undefined" && window.__koraCS?.apiKey) || "";

  // Deep link from the manager's reminder SMS: ?do=timesheet&from=&to=&pay= opens the timesheet.
  useEffect(()=>{
    try{
      const sp=new URLSearchParams(window.location.search);
      if(sp.get("do")==="timesheet"){
        const f=sp.get("from"), t=sp.get("to"), pay=sp.get("pay");
        setTsPeriod(f&&t?{from:f,to:t,payDay:pay||t}:null);
        setShowTimesheet(true);
        try{ window.history.replaceState({},"","/"); }catch(e){}
      }
    }catch(e){}
  }, []);

  // If a sign-on/off couldn't be confirmed last time (closed app, lost signal
  // mid-save), retry it automatically once on load and again whenever the
  // connection comes back — so a bad moment doesn't require the worker to
  // remember to come back and fix it themselves.
  useEffect(()=>{
    async function retryPending(){
      const pending = readPendingSignSync();
      if (!pending || !onSaveShift) return;
      const result = await saveShiftWithRetry(onSaveShift, pending.payload, 1);
      if (result.ok) { writePendingSignSync(null); setSignSyncError(null); }
    }
    retryPending();
    window.addEventListener("online", retryPending);
    return () => window.removeEventListener("online", retryPending);
  }, []);

  // Deep link from an SMS reminder: open the full shift screen.
  // A "note"/"km" reminder opens the shift workspace with that popup already up.
  useEffect(()=>{
    if(!openShiftId) return;
    let s = baseShifts.find(x=>String(x.id)===String(openShiftId));
    // A worker is also attached to a group outing's OTHER participant shifts (via worker_ids), so a
    // link can resolve to a shift that isn't actually theirs. If so, open THEIR shift for that day instead.
    if(s && worker && s.workerId!=null && String(s.workerId)!==String(worker.id)){
      const mine = baseShifts.find(x=> x.date===s.date && String(x.workerId)===String(worker.id));
      if(mine) s = mine;
    }
    if(s){
      if(openAction==="outing"){
        setPendingModal(null);
        setViewingOuting(s);                        // explicit run-sheet link → the run sheet
      } else if(openAction==="note" || openAction==="km"){
        setPendingModal(openAction);
        setActiveShift(s);                          // works for active or completed (pastMode) shifts
      } else if(s.status==="active"){
        setPendingModal(null);
        setActiveShift(s);                          // active → sign-off screen
      } else {
        setPendingModal(null);
        setDetailShift(s);                          // upcoming → that one shift + a Sign On button
      }
      onConsumeOpenShift && onConsumeOpenShift();
    }
  }, [openShiftId, openAction, shifts]);

  function onSignOn(s) {
    // Open a quick prompt so the worker can confirm / adjust the actual start time.
    setSignOnPrompt(s);
  }
  async function doSignOn(s, startHHMM) {
    // Stamp the chosen start time (defaults to now); this becomes the shift's actual start everywhere.
    const signOnTime = (startHHMM && s.date) ? (isoFromHHMM(s.date, startHHMM) || new Date().toISOString()) : new Date().toISOString();
    const startHM = hhmmFromIso(signOnTime) || s.start;
    const started = { ...s, status:"active", startMs: new Date(signOnTime).getTime(), signOnTime, start: startHM };
    setActiveShift(started); // instant feedback — confirmed/reverted below once we know the save's real outcome
    setSignOnPrompt(null);
    setSignSyncError(null);
    const payload = { ...s, status:"active", signOnTime, start: startHM };
    if (!onSaveShift) return;
    const result = await saveShiftWithRetry(onSaveShift, payload);
    if (result.ok) {
      writePendingSignSync(null);
      const pName = s.participant || (s.isOuting ? s.title : "their shift");
      try { if (COMPANY.managerPhone) sendClickSendSMS(csUsername, csApiKey, COMPANY.managerPhone, `KORA: ${worker.name} signed ON for ${pName} at ${fmtT12(startHM)}. — ${COMPANY.shortName}`).catch(()=>{}); } catch(e){}
    } else {
      // Couldn't confirm it saved after 3 tries — keep the pending attempt so a
      // reconnect or app reopen can retry it automatically, and tell the worker
      // now rather than let them think it's handled when it might not be.
      writePendingSignSync({ type:"signon", payload, ts: Date.now() });
      setSignSyncError({ type:"signon", shift:s, startHHMM, payload, error: result.error });
    }
  }
  function fmtT12(hhmm){ if(!hhmm) return "?"; const [h,m]=hhmm.split(":").map(Number); const ap=h>=12?"pm":"am"; const hh=((h+11)%12)+1; return `${hh}:${String(m).padStart(2,"0")}${ap}`; }

  // Persist any shift change (times, km, notes, receipts, incidents) to the DB and keep activeShift current.
  async function persistShift(updated) {
    setActiveShift(prev => (prev && String(prev.id)===String(updated.id)) ? { ...prev, ...updated } : prev);
    if (typeof window!=="undefined") window.__koraShifts=(window.__koraShifts||[]).map(s=>s.id===updated.id?{...s,...updated}:s);
    if (!onSaveShift) return { ok:true };
    const result = await saveShiftWithRetry(onSaveShift, updated);
    if (result.ok) { writePendingSignSync(null); }
    else { writePendingSignSync({ type:"signoff", payload:updated, ts: Date.now() }); }
    return result;
  }

  async function onSignOffShift(adjustedIso, startIso) {
    if (!activeShift) return;
    try { localStorage.removeItem(`kora_work_draft_${activeShift.id}`); } catch(e) {}
    const now = new Date().toISOString();
    const signOffTime = adjustedIso || activeShift.signOffTime || now;
    const endHHMM = hhmmFromIso(signOffTime) || activeShift.end;
    const signOnTime = startIso || activeShift.signOnTime || null;
    const startHHMM = (startIso && hhmmFromIso(startIso)) || activeShift.start;
    const ph = t=>{const [h,m]=String(t||"0").split(":").map(Number); return (h||0)+((m||0)/60);};
    let durRaw = ph(endHHMM)-ph(startHHMM); if(durRaw<0) durRaw+=24;
    const dur = Math.max(0, +durRaw.toFixed(2));
    let lineItems = activeShift.lineItems;
    // If the shift has a single hourly billing line, update it to the actual duration
    // so total funding charged matches the real hours. (Multiple hourly lines are left
    // for manual review to avoid over-billing.)
    if (Array.isArray(lineItems) && lineItems.length && dur>0) {
      const hrsLines = lineItems.filter(li=>(li.unit||"hrs")==="hrs");
      if (hrsLines.length===1) {
        lineItems = lineItems.map(li=> (li.unit||"hrs")==="hrs"
          ? { ...li, qty: dur, total: +(dur*(Number(li.rate)||0)).toFixed(2) }
          : li);
      }
    }
    const upd = { ...activeShift, status:"completed", signOffTime, signOnTime: signOnTime||activeShift.signOnTime, start: startHHMM, end: endHHMM, lineItems };
    const shiftBeingClosed = activeShift;
    setSignSyncError(null);
    const result = await persistShift(upd);
    if (!result.ok) {
      setSignSyncError({ type:"signoff", shift: shiftBeingClosed, payload: upd, error: result.error });
      return; // keep activeShift so the worker isn't left with no record of the shift they were just on
    }
    setActiveShift(null);
  }

  if(showTimesheet){
    const defP = tsPeriodFor(paySchedule) || (()=>{ const d=new Date(); const add=(5-d.getDay()+7)%7; const fri=new Date(d); fri.setDate(d.getDate()+add); const st=new Date(fri); st.setDate(fri.getDate()-13); const iso=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; return {from:iso(st),to:iso(fri),payDay:iso(fri)}; })();
    return <WorkerTimesheet worker={worker} shifts={shifts} participants={participants} period={tsPeriod||defP} onSaveShift={onSaveShift} onClose={()=>{setShowTimesheet(false);setTsPeriod(null);}}/>;
  }

  if(activeShift) return (
    <>
      {signSyncError && (
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#3d1420",borderBottom:`2px solid ${T.red}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
        <span style={{fontSize:20,flexShrink:0}}>⚠️</span>
        <div style={{flex:1,fontSize:12.5,color:"#ffd6dd",lineHeight:1.4}}>
          Couldn't confirm your {signSyncError.type==="signon"?"sign-on":"sign-off"} saved — check your connection.
        </div>
        <button onClick={async ()=>{
          const r = await saveShiftWithRetry(onSaveShift, signSyncError.payload);
          if (r.ok) { writePendingSignSync(null); setSignSyncError(null); if(signSyncError.type==="signoff") setActiveShift(null); }
        }} style={{background:T.red,border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontWeight:600,fontSize:12,cursor:"pointer",flexShrink:0,fontFamily:"DM Sans,sans-serif"}}>Retry</button>
        </div>
      )}
      <ActiveShiftScreen shift={activeShift} worker={worker} participants={participants} shifts={shifts} workers={worker?[worker]:[]} initialModal={pendingModal} onSignOff={(...a)=>{setPendingModal(null);onSignOffShift(...a);}} onBack={()=>{setPendingModal(null);setActiveShift(null);}} onUpdateShift={persistShift}/>
    </>
  );

  const nav=[{id:"today",icon:"bolt",label:"Today"},{id:"shifts",icon:"shifts",label:"Shifts"},{id:"people",icon:"people",label:"People"},{id:"pay",icon:"money",label:"Pay"},{id:"records",icon:"paper",label:"Records"}];

  return (
    <div style={{background:"#0b1320",minHeight:"100vh",paddingBottom:80,fontFamily:"DM Sans,sans-serif",color:T.white}}>
      <Header subtitle="Support Worker" right={
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowSearch(true)} style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:9,color:T.body,cursor:"pointer",padding:"6px 7px",display:"flex"}}><Icon name="search" size={18} color={T.body}/></button>
          <Avatar initials={worker.initials} color={worker.avatarColor||worker.color} size={30} photo={worker.photo} emoji={worker.emoji}/>
          <button onClick={onSignOut} style={{background:"none",border:"none",color:T.subtle,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Sign out</button>
        </div>
      }/>
      <div style={{padding:"16px 16px 0"}}>
        {tab==="today"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Composed hero (grid now global) */}
            <div style={{position:"relative"}}>
              <div style={{position:"relative",zIndex:1}}>
                <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:T.subtle,marginBottom:5}}>{new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"})}</div>
                <div style={{fontSize:24,fontWeight:600,fontFamily:"Syne,sans-serif",letterSpacing:"-0.4px",marginBottom:16}}>{(()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening";})()}, {worker.name}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[
                    {val:todayShifts.length, label:"Shifts today", accent:T.teal, nav:true},
                    {val:currentShift?1:0, label:currentShift?"On shift now":"Not on shift", accent:T.orange, live:!!currentShift, statusText:currentShift?"Live":"—"},
                  ].map(t=>{
                    const lit = t.nav ? true : t.val>0;
                    const col = lit ? t.accent : T.subtle;
                    return (
                      <div key={t.label} className="kora-card" style={{position:"relative",background:"rgba(24,30,54,0.5)",borderRadius:16,padding:"16px 18px",border:`1px solid ${lit?t.accent+"66":"rgba(140,100,255,0.4)"}`,boxShadow:t.live?"0 0 26px rgba(255,90,40,0.20)":"0 0 20px rgba(120,95,255,0.18)",overflow:"hidden"}}>
                        {t.live&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(92deg,${T.orange},${T.pink})`,animation:"heartbeat 2.4s ease-in-out infinite"}}/>}
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{fontSize:30,fontWeight:600,fontFamily:"Syne,sans-serif",color:lit?T.white:T.body,letterSpacing:"-0.5px",lineHeight:1}}>{t.statusText||t.val}</div>
                          {t.live&&<span style={{width:7,height:7,borderRadius:"50%",background:T.orange,animation:"dotpulse 1.8s ease-out infinite"}}/>}
                        </div>
                        <div style={{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:col,marginTop:8,fontWeight:lit?600:400}}>{t.label}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <button onClick={()=>setShowTimesheet(true)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",background:"rgba(24,30,54,0.5)",border:`1px solid ${T.teal}55`,borderRadius:16,padding:"14px 16px",cursor:"pointer",fontFamily:"DM Sans,sans-serif",boxShadow:"0 0 20px rgba(0,229,180,0.12)"}}>
              <span style={{fontSize:22}}>🧾</span>
              <span style={{flex:1}}>
                <span style={{display:"block",fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif",color:"#fff"}}>My timesheet</span>
                <span style={{display:"block",fontSize:12,color:T.body,marginTop:2}}>Check &amp; submit your shifts and kms before pay day</span>
              </span>
              <span style={{fontSize:18,color:T.teal}}>›</span>
            </button>
            {/* NEXT SHIFT — in-app reminder (works without backend) */}
            {(()=>{
              const now = new Date();
              const toDate = (s)=>{ if(!s.date||!s.start) return null; const [h,m]=s.start.split(":").map(Number); const d=new Date(s.date); d.setHours(h||0,m||0,0,0); return d; };
              const next = baseShifts
                .filter(s=>!s.isOuting && s.status==="upcoming")
                .map(s=>({s, when:toDate(s)}))
                .filter(x=>x.when && x.when>now)
                .sort((a,b)=>a.when-b.when)[0];
              if(!next) return null;
              const {s, when} = next;
              const p = PARTICIPANTS.find(x=>String(x.id)===String(s.participantId))||{};
              const mins = Math.round((when-now)/60000);
              const sameDay=(a,b)=>a.toDateString()===b.toDateString();
              const tmw=new Date(now.getTime()+86400000);
              let rel;
              if(sameDay(when,now)) rel = mins<60?`in ${mins} min`:`in ${Math.round(mins/60)} hr`;
              else if(sameDay(when,tmw)) rel = `Tomorrow · ${s.start}`;
              else rel = `${when.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})} · ${s.start}`;
              const soon = sameDay(when,now) && mins<=120;
              const accent = soon ? T.orange : T.blue;
              return (
                <div className="kora-card" style={{background:"rgba(24,30,54,0.5)",border:`1px solid ${accent}55`,borderLeft:`3px solid ${accent}`,borderRadius:14,padding:"12px 14px",boxShadow:`0 0 18px ${accent}28`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:40,height:40,borderRadius:12,background:`${accent}18`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="shifts" size={21} color={accent} active/></div>
                    <div>
                      <div style={{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:accent,fontWeight:600}}>Next shift</div>
                      <div style={{fontSize:14,fontWeight:600,fontFamily:"Syne,sans-serif",marginTop:2}}>{p.name||s.participant||"Shift"}</div>
                      <div style={{fontSize:12,color:T.subtle,marginTop:1}}>{when.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})} · {s.start}–{s.end}{s.location?` · ${s.location}`:""}</div>
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:600,color:accent,background:`${accent}18`,border:`1px solid ${accent}40`,borderRadius:20,padding:"4px 10px",whiteSpace:"nowrap"}}>{rel}</span>
                </div>
              );
            })()}
            {/* TO DO — completed shifts still missing a progress note or kms */}
            {(()=>{
              const recs = (typeof window!=="undefined" && window.__koraRecords?.[worker.name]) || [];
              const pendingKm = (typeof window!=="undefined" && window.__koraPendingKm) || {};
              const outstanding = baseShifts
                .filter(s=>!s.isOuting && s.status==="completed")
                .map(s=>{
                  const hasNote = !!s.progressNote || recs.some(r=>r.kind==="note" && r.shiftId===s.id);
                  const kmStartedNoEnd = !!pendingKm[`${worker.name}:${s.id}`];
                  const missing = [];
                  if(!hasNote) missing.push("note");
                  if(kmStartedNoEnd) missing.push("km");
                  return missing.length ? {s, missing} : null;
                })
                .filter(Boolean);
              if(!outstanding.length) return null;
              return (
                <div>
                  <SLabel>To Do · {outstanding.length}</SLabel>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {outstanding.map(({s,missing})=>{
                      const p=PARTICIPANTS.find(x=>String(x.id)===String(s.participantId))||{};
                      return (
                        <div key={s.id} className="kora-card" onClick={()=>setActiveShift(s)} style={{cursor:"pointer",background:"rgba(24,30,54,0.5)",border:`1px solid ${T.amber}66`,borderLeft:`3px solid ${T.amber}`,borderRadius:14,padding:"12px 14px",boxShadow:"0 0 18px rgba(255,176,32,0.22)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,fontFamily:"Syne,sans-serif"}}>{p.name||s.participant||"Shift"}</div>
                            <div style={{fontSize:12,color:T.subtle,marginTop:1}}>{s.date?new Date(s.date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}):""} · {s.start}–{s.end}</div>
                            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
                              {missing.map(m=>(
                                <span key={m} style={{fontSize:11,fontWeight:600,color:T.amber,background:`${T.amber}18`,border:`1px solid ${T.amber}44`,borderRadius:7,padding:"2px 8px"}}>{m==="note"?<><IIcon name="paper" size={12} color={T.amber} mr={4}/>Progress note</>:<><IIcon name="car" size={12} color={T.amber} mr={4}/>Finish kms (no end reading)</>}</span>
                              ))}
                            </div>
                          </div>
                          <span style={{fontSize:18,color:T.amber}}>›</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
            {todayShifts.length===0&&<div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:40}}>No shifts today — enjoy your day!</div>}
            {todayShifts.map(s=>{
              const p=PARTICIPANTS.find(x=>String(x.id)===String(s.participantId))||PARTICIPANTS[0];
              const cs=shiftClockState(s);
              const statusColor={active:T.orange,upcoming:T.blue,due:T.amber,missed:T.red,completed:T.subtle}[cs]||T.subtle;

// ── Worker-side search ────────────────────────────────────────
function WorkerSearch({ myShifts, worker, onClose, onOpenShift, onGoPeople, onViewOuting }) {
  const [q, setQ] = useState("");
  const query = q.trim().toLowerCase();
  const myClientIds = worker.clients || [];
  const myParticipants = PARTICIPANTS.filter(p => myClientIds.length ? myClientIds.includes(p.id) : true);

  const pHits = !query ? [] : myParticipants.filter(p =>
    `${p.name} ${(p.goals||[]).join(" ")} ${p.allergies||""} ${p.medical||""}`.toLowerCase().includes(query)
  );

  // Build a searchable haystack per shift: client name, type, location,
  // shift notes, and for outings: title, notes, stop names/notes, pre-pickup text
  const shiftHaystack = (s) => {
    const part = PARTICIPANTS.find(p=>p.id===s.participantId);
    const stopText = (s.stops||[]).map(st=>`${st.name||""} ${st.notes||""} ${st.address||""}`).join(" ");
    const planText = Object.values(s.participantPlans||{}).map(pl=>`${pl.prePickup||""} ${pl.pickupAddr||""} ${pl.dropAddr||""}`).join(" ");
    const partNames = (s.participantIds||[]).map(id=>PARTICIPANTS.find(p=>p.id===id)?.name||"").join(" ");
    return `${s.participant||""} ${part?.name||""} ${partNames} ${s.title||""} ${s.type||""} ${s.location||""} ${s.notes||""} ${s.meetPoint||""} ${s.whatToBring||""} ${stopText} ${planText}`.toLowerCase();
  };
  const sHits = !query ? [] : myShifts.filter(s => shiftHaystack(s).includes(query));
  // figure out where the match was, to show a hint
  const matchHint = (s) => {
    if ((s.notes||"").toLowerCase().includes(query)) return `Note: …${s.notes}`;
    const stop = (s.stops||[]).find(st=>`${st.name||""} ${st.notes||""}`.toLowerCase().includes(query));
    if (stop) return `Stop: ${stop.name}${stop.notes?` — ${stop.notes}`:""}`;
    return null;
  };
  const total = pHits.length + sHits.length;

  return (
    <Modal title="Search" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search clients, shifts, outing & shift notes…"
          style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:14,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
        {query && <div style={{fontSize:11,color:T.subtle}}>{total} result{total!==1?"s":""}</div>}

        {pHits.length>0 && (
          <div>
            <SLabel>Participants</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pHits.map(p=>(
                <button key={p.id} onClick={onGoPeople} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                  <Avatar initials={p.initials} color={p.avatarColor||T.teal} size={32} photo={p.photo} emoji={p.emoji}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{p.name}</div>
                    {p.allergies&&<div style={{fontSize:11,color:T.amber}}><IIcon name="alert" size={12} color={T.amber} mr={4}/>Allergies noted</div>}
                  </div>
                  <span style={{fontSize:11,color:T.teal}}>View</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {sHits.length>0 && (
          <div>
            <SLabel>Shifts &amp; Outings</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {sHits.map(s=>{
                const hint = matchHint(s);
                const title = s.isOuting ? `🎟️ ${s.title}` : s.participant;
                return (
                  <button key={s.id} onClick={()=>{ if(s.isOuting){onViewOuting?.(s);} else {onOpenShift(s);} }} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{title}</div>
                      <div style={{fontSize:12,color:T.subtle}}>{s.date?new Date(s.date).toLocaleDateString("en-AU",{day:"numeric",month:"short"})+" · ":""}{s.start}–{s.end}{s.location?` · ${s.location}`:""}</div>
                      {hint && <div style={{fontSize:11,color:T.amber,marginTop:3,lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{hint}</div>}
                    </div>
                    <span style={{fontSize:11,color:s.isOuting?T.orange:s.status==="active"?T.teal:shiftStateColor(s),whiteSpace:"nowrap"}}>{s.isOuting?"View ›":s.status==="active"?"Open ›":shiftStateLabel(s)}</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {query && total===0 && <div style={{textAlign:"center",padding:"20px 0",color:T.subtle,fontSize:13}}>No results for "{q}"</div>}
        {!query && <div style={{textAlign:"center",padding:"16px 0",color:T.muted,fontSize:12}}>Search clients, your shifts, and keywords inside shift &amp; outing notes</div>}
      </div>
    </Modal>
  );
}

// Build the manager's daily shift digest SMS for a given date (YYYY-MM-DD).
// Kept as a pure function so the backend scheduler can call it each morning too.
function buildDailyDigest(shifts, clients, workers, dateISO) {
  const dateLabel = new Date(dateISO).toLocaleDateString("en-AU", { weekday:"short", day:"numeric", month:"short" });
  const today = (shifts||[]).filter(s => (s.date||"")===dateISO && s.status!=="cancelled");
  if (today.length===0) return `KORA — ${dateLabel}\nNo shifts scheduled today.\n— ${COMPANY.shortName}`;
  const nameFor = id => ((workers||[]).find(w=>w.id===id)||{}).name;
  const sorted = [...today].sort((a,b)=>(a.start||"").localeCompare(b.start||""));
  const lines = sorted.map(s=>{
    const who = s.isOuting ? (s.title||"Group outing")
      : (s.participant || ((clients||[]).find(c=>c.id===s.participantId)||{}).name || "Client");
    const sw = s.worker
      || (s.workerIds||[]).map(nameFor).filter(Boolean).join(", ")
      || nameFor(s.workerId) || "UNASSIGNED";
    const loc = s.location ? ` (${s.location.split(",")[0]})` : "";
    return `• ${s.start||"?"}–${s.end||"?"} ${sw} → ${who}${loc}`;
  });
  const unassigned = today.filter(s => !s.worker && !(s.workerIds&&s.workerIds.length) && !s.workerId).length;
  return `KORA — ${dateLabel} · ${today.length} shift${today.length>1?"s":""}`
    + (unassigned?` (${unassigned} unassigned!)`:"")
    + `\n${lines.join("\n")}\n— ${COMPANY.shortName}`;
}

// Start time of a shift in epoch ms (from its date + start), or null if unknown.
function shiftStartMs(s) {
  if (!s || !s.date || !s.start) return null;
  const t = new Date(`${s.date}T${s.start}:00`).getTime();
  return Number.isNaN(t) ? null : t;
}
// Shifts still awaiting confirmation that HAVEN'T started yet.
// Once a shift's start time has passed, it's dropped — no reminder is sent.
function unconfirmedFutureShifts(shifts, nowMs) {
  return (shifts||[]).filter(s => {
    const confirmed = s.confirmStatus === "confirmed" || s.confirmed === true;
    if (confirmed || s.status === "cancelled") return false;
    const startMs = shiftStartMs(s);
    return startMs != null && startMs > nowMs;   // future only
  });
}
// One reminder SMS per worker, listing their unconfirmed upcoming shifts.
function buildConfirmReminder(workerName, theirShifts) {
  const lines = theirShifts
    .sort((a,b)=>shiftStartMs(a)-shiftStartMs(b))
    .map(s=>{
      const when = new Date(`${s.date}T${s.start}:00`).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
      const who = s.isOuting ? (s.title||"outing") : (s.participant||"client");
      return `• ${when} ${s.start} with ${who}`;
    });
  return `KORA: Hi ${firstName(workerName)||"there"}, please confirm your upcoming shift${theirShifts.length>1?"s":""}:\n${lines.join("\n")}\nConfirm in the app. — ${COMPANY.shortName}`;
}
