          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:`${T.teal}12`,border:`1px solid ${T.teal}44`,borderRadius:10}}>
            <span style={{fontSize:11,color:T.teal,flex:1}}>↩ Restored your unsaved outing from last time.</span>
            <button onClick={clearO1Draft} style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:8,color:T.body,fontSize:12,padding:"5px 9px",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Start fresh</button>
          </div>
        )}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Outing Name</div>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. AdventureFest, Bowling, Beach Day"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Date</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Start</div>
            <input type="time" value={start} onChange={e=>setStart(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>End</div>
            <input type="time" value={end} onChange={e=>setEnd(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
        </div>

        {/* Participants */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>Participants ({selParticipants.length} selected)</div>
          <input value={pSearch} onChange={e=>setPSearch(e.target.value)} placeholder="Search all clients…"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:"1px solid rgba(0,229,180,0.2)",borderRadius:10,padding:"9px 11px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {(()=>{
              const allS = (typeof window!=="undefined" && window.__koraShifts) || [];
              const withShifts = new Set();
              allS.forEach(s=>{ if(s.participantId!=null) withShifts.add(String(s.participantId)); (s.participantIds||[]).forEach(id=>withShifts.add(String(id))); });
              const q = pSearch.trim().toLowerCase();
              const list = q
                ? PL.filter(p=>(p.name||"").toLowerCase().includes(q))
                : PL.filter(p=>withShifts.has(String(p.id)) || selParticipants.includes(p.id));
              if(list.length===0) return <div style={{fontSize:11,color:T.subtle,padding:"4px 2px"}}>{q?"No clients match.":"No clients with shifts yet — search above to add anyone."}</div>;
              return list.map(p=>{const sel=selParticipants.includes(p.id);return(
                <div key={p.id} onClick={()=>toggleParticipant(p.id)} style={chip(sel)}>
                  <Avatar initials={p.initials} color={p.avatarColor||T.teal} size={20} photo={p.photo} emoji={p.emoji}/>{p.name}
                </div>
              );});
            })()}
          </div>
        </div>

        {/* Workers */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>Support Workers ({selWorkers.length} selected)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {workers.map(w=>{const sel=selWorkers.includes(w.id);return(
              <div key={w.id} onClick={()=>toggle(selWorkers,setSelWorkers,w.id)} style={chip(sel)}>
                <Avatar initials={w.initials} color={w.avatarColor||w.color} size={20} photo={w.photo} emoji={w.emoji}/>{w.name}{!w.phone&&<span style={{fontSize:11,color:T.subtle}}>(no ph)</span>}
              </div>
            );})}
          </div>
        </div>

        {/* Per-participant pick-up / drop-off logistics */}
        {selParticipants.length>0 && (
          <div>
            <SLabel>Pick-up & Drop-off Plan</SLabel>
            <div style={{fontSize:12,color:T.subtle,marginBottom:8}}>Set who collects each participant, when and where — and the same for drop-off. This builds the run sheet.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {selParticipants.map(pid=>{
                const p = PL.find(x=>String(x.id)===String(pid)); if(!p) return null;
                const pl = plans[pid]||{};
                const swOpts = selWorkers.map(id=>workers.find(w=>w.id===id)).filter(Boolean);
                return (
                  <div key={pid} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                      <Avatar initials={p.initials} color={p.avatarColor||T.teal} size={26} photo={p.photo} emoji={p.emoji}/>
                      <span style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif"}}>{p.name}</span>
                      {pl._autofilled && <span style={{fontSize:11,color:T.teal,background:`${T.teal}1a`,padding:"2px 7px",borderRadius:8,fontWeight:500}}>↳ SW from existing shift</span>}
                    </div>
                    {/* Pre-pickup / travel instructions for THIS participant */}
                    <div style={{fontSize:11,color:T.amber,fontWeight:400,letterSpacing:"0.5px",marginBottom:5}}>🚗 BEFORE PICK-UP / TRAVEL</div>
                    <textarea value={pl.prePickup||""} onChange={e=>setPlan(pid,"prePickup",e.target.value)} rows={2} placeholder="e.g. Head to Yuna's house first and travel in one car together" style={{width:"100%",background:"rgba(255,176,32,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"none",boxSizing:"border-box",marginBottom:10}}/>
                    {/* Pick-up */}
                    <div style={{fontSize:11,color:T.teal,fontWeight:400,letterSpacing:"0.5px",marginBottom:5}}>PICK-UP</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1.2fr",gap:6,marginBottom:6}}>
                      <input type="time" value={pl.pickupTime||""} onChange={e=>setPlan(pid,"pickupTime",e.target.value)} style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",colorScheme:"dark"}}/>
                      <select value={pl.pickupSW||""} onChange={e=>{ const w=swOpts.find(x=>x.name===e.target.value); setPlan(pid,"pickupSW",e.target.value); setPlan(pid,"pickupSWId", w?String(w.id):""); }} style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",appearance:"none"}}>
                        <option value="" style={{background:T.navy}}>SW collecting…</option>
                        {swOpts.map(w=><option key={w.id} value={w.name} style={{background:T.navy}}>{w.name}</option>)}
                      </select>
                    </div>
                    <input value={pl.pickupAddr||p.address||""} onChange={e=>setPlan(pid,"pickupAddr",e.target.value)} placeholder="Pick-up address" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
                    {/* Drop-off */}
                    <div style={{fontSize:11,color:T.orange,fontWeight:400,letterSpacing:"0.5px",marginBottom:5}}>DROP-OFF</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1.2fr",gap:6,marginBottom:6}}>
                      <input type="time" value={pl.dropTime||""} onChange={e=>setPlan(pid,"dropTime",e.target.value)} style={{background:"rgba(255,122,24,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",colorScheme:"dark"}}/>
                      <select value={pl.dropSW||""} onChange={e=>{ const w=swOpts.find(x=>x.name===e.target.value); setPlan(pid,"dropSW",e.target.value); setPlan(pid,"dropSWId", w?String(w.id):""); }} style={{background:"rgba(255,122,24,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",appearance:"none"}}>
                        <option value="" style={{background:T.navy}}>SW dropping…</option>
                        {swOpts.map(w=><option key={w.id} value={w.name} style={{background:T.navy}}>{w.name}</option>)}
                      </select>
                    </div>
                    <input value={pl.dropAddr||p.address||""} onChange={e=>setPlan(pid,"dropAddr",e.target.value)} placeholder="Drop-off address" style={{width:"100%",background:"rgba(255,122,24,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                    <label style={{display:"flex",alignItems:"center",gap:6,marginTop:8,cursor:"pointer"}}>

          </select>
        </div>

        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Location / Venue</div>
          <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="e.g. Aussie World, Palmview"

        </div>
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>First Meeting Point (where the team gathers to start the day)</div>
          <input value={meetPoint} onChange={e=>setMeetPoint(e.target.value)} placeholder="e.g. Weinam Creek ferry terminal, 8:45am"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
        </div>

        {/* Itinerary — multiple stops */}
        <div>
          <SLabel>Itinerary / Stops</SLabel>
          <div style={{fontSize:12,color:T.subtle,marginBottom:8}}>Add each stop with its address — workers can tap the address to open maps.</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {stops.map((st,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:`${T.orange}22`,border:`1px solid ${T.orange}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:T.orange,flexShrink:0}}>{i+1}</div>
                  <input value={st.time||""} onChange={ev=>setStops(s=>s.map((x,j)=>j===i?{...x,time:ev.target.value}:x))} type="time" style={{width:90,background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",colorScheme:"dark"}}/>
                  <input value={st.name||""} onChange={ev=>setStops(s=>s.map((x,j)=>j===i?{...x,name:ev.target.value}:x))} placeholder="Stop name (e.g. Bowling)" style={{flex:1,background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}}/>
                  <button onClick={()=>setStops(s=>s.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
                </div>
                <input value={st.address||""} onChange={ev=>setStops(s=>s.map((x,j)=>j===i?{...x,address:ev.target.value}:x))} placeholder="Address (tappable in maps)" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",marginBottom:6}}/>
                <textarea value={st.notes||""} onChange={ev=>setStops(s=>s.map((x,j)=>j===i?{...x,notes:ev.target.value}:x))} rows={2} placeholder="Notes for this stop (e.g. lanes booked under IBSS, Max needs the end lane, pay at counter)" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 8px",color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"none",boxSizing:"border-box"}}/>
              </div>
            ))}
            <button onClick={()=>setStops(s=>[...s,{time:"",name:"",address:""}])} style={{background:`${T.orange}14`,border:`1px dashed ${T.orange}44`,borderRadius:10,padding:"10px",color:T.orange,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add Stop</button>
          </div>
        </div>
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>What to Bring</div>
          <textarea value={whatToBring} onChange={e=>setWhatToBring(e.target.value)} rows={2} placeholder="Hat, water bottle, sunscreen, lunch, swimmers, medication…"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Cost per head $</div>
            <input type="number" value={cost} onChange={e=>setCost(e.target.value)} placeholder="0.00"
              style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Outing Notes / Plan</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="Itinerary, risk notes, behaviour support reminders, backup plan if wet…"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"none",boxSizing:"border-box"}}/>
        </div>

        {/* File attachments — bookings, tickets, confirmations */}
        <div>
          <SLabel>Attachments</SLabel>
          <div style={{fontSize:12,color:T.subtle,marginBottom:8}}>Attach bookings, ticket confirmations, maps or PDFs. Workers can view these.</div>
          {files.length>0 && (
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
              {files.map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px"}}>
                  <span style={{fontSize:14}}>{f.type?.includes("pdf")?"📄":f.type?.includes("image")?"🖼️":f.type?.includes("html")?"🧾":"📎"}</span>
                  <span style={{flex:1,fontSize:11,color:T.body,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                  <button onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer"}}>×</button>
                </div>
              ))}
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*,application/pdf,text/html" multiple style={{display:"none"}}
            onChange={ev=>{
              const fs=Array.from(ev.target.files||[]);
              fs.forEach(file=>{
                if(file.size>5_000_000){alert(`${file.name} is over 5MB — too large.`);return;}
                const reader=new FileReader();
                reader.onload=()=>setFiles(p=>[...p,{name:file.name,dataUrl:reader.result,type:file.type}]);
                reader.readAsDataURL(file);
              });
              ev.target.value="";
            }}/>
          <button onClick={()=>fileRef.current?.click()} style={{width:"100%",background:`${T.blue}14`,border:`1px dashed ${T.blue}44`,borderRadius:10,padding:"10px",color:T.blue,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>📎 Attach Files (PDF or image)</button>
        </div>

        <div style={{background:"rgba(0,191,255,0.06)",border:"1px solid rgba(0,191,255,0.2)",borderRadius:10,padding:"10px 12px",fontSize:11,color:T.body,lineHeight:1.5}}>
          📱 All selected workers with a phone get a text with the outing details {isEdit?"(updated)":""} and a link to view the full run sheet in the app.
          
        </div>

        <BtnPrimary disabled={!canSave||sending} onClick={handleSave}>
          {sending?"Saving & texting team…":canSave?(isEdit?"Save Changes & Notify Team":"Create Outing & Notify Team"):"Add name, workers & participants"}
        </BtnPrimary>
        {isEdit && onView && (
          <button onClick={()=>onView(editOuting)} style={{width:"100%",padding:"12px",background:`${T.teal}14`,border:`1px solid ${T.teal}44`,borderRadius:12,color:T.teal,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
            👁️ View Run Sheet &amp; Chat (what staff see)
          </button>
        )}
        {isEdit && (
          <button onClick={()=>{ if(onDelete){ if(typeof window!=="undefined" && !window.confirm("Delete this outing permanently? This can't be undone.")) return; onDelete(editOuting.id); onClose();} }} style={{width:"100%",padding:"12px",background:"rgba(255,92,122,0.1)",border:"1px solid rgba(255,92,122,0.3)",borderRadius:12,color:T.red,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
            Delete Outing
          </button>
        )}
        <button onClick={onClose} style={{width:"100%",padding:"12px",background:"transparent",border:`1px solid ${T.subtle}66`,borderRadius:12,color:T.body,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Cancel</button>
      </div>
    </Modal>
  );
}

// ── NDIS line-item search + autofill ──────────────────────────
function LineItemSearch({ onSelect }) {
  const [q, setQ] = useState("");
  const [open, setOpen] = useState(false);
  const results = q.trim().length < 2 ? [] : NDIS_LINE_ITEMS.filter(li => {
    const hay = `${li.name} ${li.code} ${li.cat} ${li.keywords}`.toLowerCase();
    return q.toLowerCase().split(/\s+/).every(t => hay.includes(t));
  }).slice(0, 8);

  return (
    <div style={{position:"relative"}}>
      <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Search NDIS line items</div>
      <input
        value={q}
        onChange={e=>{setQ(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        placeholder="Type a keyword e.g. community, saturday, transport, personal care…"
        style={{width:"100%",background:"rgba(0,191,255,0.06)",border:`1px solid rgba(0,191,255,0.3)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
      {open && results.length > 0 && (
        <div style={{marginTop:6,background:T.navy,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",maxHeight:260,overflowY:"auto"}}>
          {results.map(li=>(
            <button key={li.code} onClick={()=>{onSelect(li);setQ("");setOpen(false);}} style={{width:"100%",textAlign:"left",background:"none",border:"none",borderBottom:`1px solid ${T.border}`,padding:"10px 12px",cursor:"pointer",display:"flex",flexDirection:"column",gap:3}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,fontWeight:400,color:T.white,fontFamily:"Syne,sans-serif",lineHeight:1.2}}>{li.name}</span>
                <span style={{fontSize:12,fontWeight:500,color:T.teal,whiteSpace:"nowrap"}}>{fmt$(li.rate)}<span style={{fontSize:11,color:T.subtle}}>/{li.unit}</span></span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:T.subtle,fontFamily:"monospace"}}>{li.code}</span>
                <span style={{fontSize:10,color:T.blue,background:`${T.blue}14`,padding:"1px 6px",borderRadius:6}}>{li.cat}</span>
              </div>
              {NDIS_CAT_INFO[li.cat] && <div style={{fontSize:11,color:T.subtle,lineHeight:1.4,marginTop:2}}>ℹ️ {NDIS_CAT_INFO[li.cat]}</div>}
            </button>
          ))}
        </div>
      )}
      {open && q.trim().length >= 2 && results.length === 0 && (
        <div style={{marginTop:6,fontSize:11,color:T.subtle,padding:"8px 4px"}}>No matching line items — try "community", "transport", "saturday", "personal care"…</div>
      )}
    </div>
  );
}

function ClientForm({ initial, onSave, onCancel }) {
  const CLIENT_DRAFT_KEY = "kora_client_draft_v1";
  const cDraft0 = readFormDraft(CLIENT_DRAFT_KEY, !initial);
  const [f, setF] = useState({...BLANK_CLIENT, ...(initial?{}:(cDraft0||{})), ...initial, goals:[...(initial?.goals|| cDraft0?.goals ||[])]});
  const [cDraftRestored, setCDraftRestored] = useState(!!cDraft0);
  const [goalDraft, setGoalDraft] = useState("");
  const set = (k,v) => setF(p => ({...p, [k]:v}));
  const ccFileRef = useRef(null);
  // Autosave a NEW client as it's typed (skip the companion-card image — too big for device storage).
  useEffect(()=>{
    if (initial) return;
    try { const {companionCardImage, ...rest} = f; localStorage.setItem(CLIENT_DRAFT_KEY, JSON.stringify(rest)); } catch(e) {}
  }, [initial, f]);
  const clearCDraft = ()=>{ clearFormDraft(CLIENT_DRAFT_KEY); setF({...BLANK_CLIENT, goals:[]}); setCDraftRestored(false); };

  function onCompanionFile(e) {
    const file = e.target.files?.[0]; if(!file) return;
    if (file.size>5_000_000) { alert("Image is over 5MB — too large."); return; }
    const reader = new FileReader();
    reader.onload = () => set("companionCardImage", reader.result);
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  const labelStyle = {fontSize:12,color:"rgba(255,255,255,0.82)",marginBottom:5,letterSpacing:"0.5px",textTransform:"uppercase",fontWeight:500,fontFamily:"DM Sans,sans-serif",textShadow:"0 0 10px rgba(0,229,180,0.35)"};

function ClientsTab({ clients, persistClient, removeClient, focusClientId, onConsumeFocus }) {
  const [editing, setEditing] = useState(null); // client obj or {} for new
  const [confirmDel, setConfirmDel] = useState(null);
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    if (focusClientId) {
      const c = clients.find(x => x.id === focusClientId);
      if (c) setEditing(c);
      onConsumeFocus && onConsumeFocus();
    }
  }, [focusClientId]);

  async function saveClient(data) {
    setSaving(true);
    try {
      await persistClient(data);
      setEditing(null);
    } catch (e) {
      alert("Couldn't save this client: " + (e.message || e));
    }
    setSaving(false);
  }

  async function doDelete() {
    if (!confirmDel) return;
    setDeleting(true);
    try {
      await removeClient(confirmDel.id);
      setConfirmDel(null);
    } catch (e) {
      alert("Couldn't delete this client: " + (e.message || e));
    }
    setDeleting(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif"}}>Participants</div>
        <button onClick={()=>setEditing({})} style={{background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,padding:"8px 14px",color:T.bg,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>
          ＋ Add Client
        </button>
      </div>

      {clients.map(p=>{
        const pct = p.plan>0 ? p.spent/p.plan : 0;
        const bc = pct>0.85?T.red:pct>0.7?T.amber:T.teal;
        return(
          <Card key={p.id}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <Avatar initials={p.initials} color={p.avatarColor||T.teal} size={44} photo={p.photo} emoji={p.emoji}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:15,fontFamily:"Syne,sans-serif"}}>{p.name}</div>
                <div style={{fontSize:12,color:T.subtle}}>{p.manager||"No plan manager set"}</div>
                {p.email&&<div style={{fontSize:11,color:T.muted,marginTop:1}}>{p.email}</div>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {pct>0.85&&<Chip label="Alert" color={T.red}/>}
                <button onClick={()=>setEditing(p)} style={{background:"rgba(0,229,180,0.08)",border:`1px solid ${T.borderAccent}`,borderRadius:8,padding:"5px 10px",color:T.teal,fontSize:12,fontWeight:400,cursor:"pointer"}}>Edit</button>
                <button onClick={()=>setConfirmDel(p)} style={{background:"rgba(255,92,122,0.08)",border:`1px solid ${T.red}44`,borderRadius:8,padding:"5px 10px",color:T.red,fontSize:12,fontWeight:400,cursor:"pointer"}}>Delete</button>
              </div>
            </div>
            {p.plan>0&&(
              <>
                <div style={{background:"rgba(255,255,255,0.06)",borderRadius:6,height:6,overflow:"hidden",marginBottom:6}}>
                  <div style={{height:"100%",width:`${Math.min(100,pct*100)}%`,background:pct>0.85?T.red:pct>0.7?T.amber:T.teal,borderRadius:6,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"center"}}>
                  <span style={{fontSize:12,color:T.subtle}}>Spent {fmt$(p.spent)}</span>
                  <span style={{fontSize:11,fontWeight:400,color:pct>0.85?T.red:pct>0.7?T.amber:T.teal,letterSpacing:"0.5px",textTransform:"uppercase"}}>{pct>0.85?"At risk":pct>0.7?"Watch":"On track"} · {Math.round(pct*100)}%</span>
                  <span style={{fontSize:12,color:T.subtle}}>Plan {fmt$(p.plan)}</span>
                </div>
              </>
            )}
            {p.goals&&p.goals.length>0&&(
              <>
                <SLabel>Goals</SLabel>
                {p.goals.slice(0,2).map((g,i)=>(
                  <div key={i} style={{fontSize:12,color:T.body,padding:"5px 8px",background:"rgba(0,229,180,0.04)",borderRadius:8,marginBottom:4,borderLeft:`2px solid ${T.teal}33`}}>✦ {g}</div>
                ))}
                {p.goals.length>2&&<div style={{fontSize:11,color:T.subtle,marginTop:2}}>+{p.goals.length-2} more goals</div>}
              </>
            )}
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:T.subtle,background:"rgba(255,255,255,0.04)",padding:"3px 8px",borderRadius:8,fontFamily:"monospace"}}>{p.code}</span>
              <span style={{fontSize:11,color:T.subtle,background:"rgba(255,255,255,0.04)",padding:"3px 8px",borderRadius:8}}>{fmt$(p.rate)}/hr · ${p.transport}/km</span>
              {p.ndis&&<span style={{fontSize:11,color:T.subtle,background:"rgba(255,255,255,0.04)",padding:"3px 8px",borderRadius:8}}>NDIS {p.ndis}</span>}
              {p.companionCard&&<span style={{fontSize:11,color:T.subtle,background:"rgba(255,255,255,0.04)",padding:"3px 8px",borderRadius:8}}><IIcon name="id" size={12} mr={4}/>Companion</span>}
              {p.allergies&&<span style={{fontSize:11,color:T.amber,background:"rgba(255,176,32,0.1)",padding:"3px 8px",borderRadius:8}}><IIcon name="alert" size={12} color={T.amber} mr={4}/>Allergies</span>}
            </div>
            {(p.companionCard||p.companionCardImage)&&(
              <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                <div style={{fontSize:11,color:T.subtle,marginBottom:5}}><IIcon name="id" size={12} mr={4}/>Companion Card{p.companionCard?` · ${p.companionCard}`:""}</div>
                {p.companionCardImage&&<img src={p.companionCardImage} alt="Companion card" style={{maxWidth:"100%",borderRadius:8,border:`1px solid ${T.border}`}}/>}
              </div>
            )}
            {(p.invoicingEmail||p.paymentNotes||p.medical||p.notes)&&(
              <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:4}}>
                {p.invoicingEmail&&<div style={{fontSize:11,color:T.subtle}}><span style={{color:T.muted}}>Invoicing:</span> {p.invoicingEmail}</div>}
                {p.paymentNotes&&<div style={{fontSize:11,color:T.subtle}}><span style={{color:T.muted}}>Payment:</span> {p.paymentNotes}</div>}
                {p.medical&&<div style={{fontSize:11,color:T.subtle}}><span style={{color:T.muted}}>Medical:</span> {p.medical}</div>}
                {p.notes&&<div style={{fontSize:11,color:T.subtle,whiteSpace:"pre-wrap"}}><span style={{color:T.muted}}>Notes:</span> {p.notes}</div>}
              </div>
            )}
          </Card>
        );
      })}

      {editing && (
        <ClientForm
          initial={editing.id?editing:null}
          onSave={saveClient}
          onCancel={()=>setEditing(null)}
        />
      )}

      {confirmDel && (
        <Modal title="Delete client?" onClose={()=>!deleting&&setConfirmDel(null)}>
          <div style={{fontSize:13,color:T.body,lineHeight:1.5,marginBottom:16}}>
            Delete <strong style={{color:"#fff"}}>{confirmDel.name}</strong> permanently? This removes the client record from your database and can't be undone.
          </div>
          <BtnPrimary disabled={deleting} onClick={doDelete}>
            {deleting ? "Deleting…" : `Yes, delete ${confirmDel.name}`}

          <div style={{height:8}}/>
          <button onClick={()=>!deleting&&setConfirmDel(null)} style={{width:"100%",padding:"13px",background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:12,color:"#fff",fontSize:13,fontWeight:500,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>
            Cancel
          </button>
        </Modal>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
function SignaturePad({ label, onChange }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const [hasInk, setHasInk] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    const ctx = canvas.getContext("2d");
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.strokeStyle = "#111";
  }, []);

  function pos(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  function start(e) { e.preventDefault(); drawing.current = true; const ctx = canvasRef.current.getContext("2d"); const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
  function move(e) { if (!drawing.current) return; e.preventDefault(); const ctx = canvasRef.current.getContext("2d"); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); setHasInk(true); }
  function end() { if (!drawing.current) return; drawing.current = false; if (onChange) onChange(canvasRef.current.toDataURL("image/png")); }
  function clear() { const canvas = canvasRef.current; const ctx = canvas.getContext("2d"); ctx.clearRect(0,0,canvas.width,canvas.height); setHasInk(false); if (onChange) onChange(""); }

  return (
    <div>
      <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>{label}</div>
      <div style={{position:"relative",background:"#fff",borderRadius:10,border:`1px solid rgba(0,229,180,0.3)`,overflow:"hidden"}}>
        <canvas ref={canvasRef} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}
          style={{width:"100%",height:120,display:"block",touchAction:"none"}}/>
        {!hasInk && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",color:"#bbb",fontSize:12}}>Sign above</div>}
        <button onClick={clear} style={{position:"absolute",bottom:6,right:6,background:"#f0f0f0",border:"1px solid #ddd",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#333"}}>Clear</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// FORM PDF GENERATOR (shared)
// ══════════════════════════════════════════════════════════════
async function generateFormPDF(title, client, fields, sigs) {
  async function loadScript(src){return new Promise((res,rej)=>{if([...document.scripts].some(s=>s.src===src))return res();const e=document.createElement("script");e.src=src;e.onload=res;e.onerror=rej;document.head.appendChild(e);});}
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const W = 210, M = 14; let y = 0;

  // Header
  doc.setFillColor(5,11,20); doc.rect(0,0,W,26,"F");
  doc.setTextColor(0,229,180); doc.setFont("helvetica","bold"); doc.setFontSize(15);
  doc.text("KORA", M, 12);
  doc.setFontSize(6.5); doc.setTextColor(0,180,148); doc.text("IBSS QLD PTY LTD", M, 17);
  doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont("helvetica","bold");
  doc.text(title, W-M, 13, {align:"right"});
  y = 34;

  // Client banner
  doc.setFillColor(14,28,48); doc.rect(M, y, W-2*M, 14, "F");
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text("CLIENT / PARTICIPANT", M+3, y+5);
  doc.text("DATE OF BIRTH", W/2+10, y+5);
  doc.setFontSize(10); doc.text(client?.name||"—", M+3, y+11);
  doc.text(client?.dob||"—", W/2+10, y+11);
  y += 22;

  // Fields
  doc.setTextColor(17,17,17);
  fields.forEach(([label, value]) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(80,80,90);
    doc.text(label, M, y);
    y += 5;
    doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(17,17,17);
    const lines = doc.splitTextToSize(value || "—", W-2*M);
    doc.text(lines, M, y);
    y += lines.length * 5 + 4;
    doc.setDrawColor(230,232,245); doc.setLineWidth(0.3); doc.line(M, y-2, W-M, y-2);
    if (y > 250) { doc.addPage(); y = 20; }
  });

  // Signatures
  y += 4;
  if (y > 230) { doc.addPage(); y = 20; }
  for (const s of sigs) {
    if (!s.data) continue;
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(80,80,90);
    doc.text(s.label, M, y); y += 3;
    try { doc.addImage(s.data, "PNG", M, y, 60, 24); } catch(e){}
    if (s.name) { doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(17,17,17); doc.text(`${s.name}  —  ${s.date||""}`, M+64, y+14); }
    y += 30;
    if (y > 250) { doc.addPage(); y = 20; }
  }

  // Footer
  doc.setDrawColor(5,11,20); doc.setLineWidth(0.5); doc.line(M, 285, W-M, 285);
  doc.setFontSize(7); doc.setTextColor(120,120,120);
  doc.text(`IBSS QLD PTY LTD  |  Generated by KORA  |  ${new Date().toLocaleDateString("en-AU")}`, M, 290);

  doc.save(`${title.replace(/[^a-z0-9]/gi,"-")}-${client?.name||"form"}.pdf`);
}

function ManagerRecords({ initialType, workers, onClose }) {
  const [type, setType] = useState(initialType || "incident");
  const [q, setQ] = useState("");
  const fmtD = d => d ? new Date(d).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}) : "";
  const fmtMoney = n => `$${Number(n||0).toFixed(2)}`;

  // Flatten all workers' records, stamp the worker name on each
  const allRecords = [];
  if (typeof window!=="undefined" && window.__koraRecords) {
    Object.entries(window.__koraRecords).forEach(([wname, recs])=>{
      (recs||[]).forEach(r=>allRecords.push({...r, worker:wname}));
    });
  }
  allRecords.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const types = [
    {id:"incident", label:"Incidents", icon:"🛡️", color:T.red},
    {id:"note", label:"Notes", icon:"📝", color:T.teal},
    {id:"km", label:"KMs", icon:"🚗", color:T.blue},
    {id:"receipt", label:"Receipts", icon:"🧾", color:T.amber},
  ];
  const counts = Object.fromEntries(types.map(t=>[t.id, allRecords.filter(r=>r.kind===t.id).length]));
  const ql = q.trim().toLowerCase();
  const items = allRecords.filter(r=>r.kind===type).filter(r=>{
    if(!ql) return true;
    return `${r.worker} ${r.participant} ${r.obs||""} ${r.desc||""} ${r.behaviour||""}`.toLowerCase().includes(ql);
  });

  return (
    <Modal title="📁 Records & Review" onClose={onClose}>

              <span style={{fontSize:11,color:T.subtle}}>{counts[t.id]||0}</span>

                  <div>{r.desc}</div>

                    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                      {r.images.map((img,i)=><img key={i} src={img} alt="" style={{width:54,height:54,objectFit:"cover",borderRadius:8,border:`1px solid ${T.border}`}}/>)}

              )}

                  {r.behaviour && <div><span style={{color:T.subtle}}>What happened:</span> {r.behaviour}</div>}
                  {r.duration && <div><span style={{color:T.subtle}}>Duration:</span> {r.duration}</div>}
                  {r.recovery && <div><span style={{color:T.subtle}}>Recovery:</span> {r.recovery}</div>}
                  {r.strategies && <div><span style={{color:T.subtle}}>Strategies:</span> {r.strategies}</div>}
                  {!r.reviewed && (
                    <button onClick={()=>{r.reviewed=true;setQ(q+" ");setQ(q);}} style={{marginTop:6,background:`${T.teal}14`,border:`1px solid ${T.teal}44`,borderRadius:8,padding:"7px",color:T.teal,fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>✓ Mark as reviewed</button>
                  )}
                </div>
              )}
            </Card>
          ))}
        </div>
      </div>
    </Modal>
  );
}

// ══════════════════════════════════════════════════════════════
// ROSTER TAB — month / week / list calendar
// ══════════════════════════════════════════════════════════════
function RosterTab({ shifts, onNewShift, onNewOuting, onNewGroupOuting, onEditShift, onExport, onTimesheet }) {
  const [view, setView] = useState("month"); // month | week | list
  const [cursor, setCursor] = useState(new Date()); // reference date
  const [selectedDay, setSelectedDay] = useState(new Date()); // tapped day in month view
  const [q, setQ] = useState(""); // roster search

  const today = new Date(); today.setHours(0,0,0,0);

  // Give every shift a real Date. Date-less seed shifts spread across this week.
  const dated = shifts.map((s, i) => {
    let d;
    if (s.date) { d = new Date(s.date); }
    else {
      // spread seed shifts: active=today, others +1..+4 days
      d = new Date(today);
      const offset = s.status === "active" ? 0 : (i % 5);
      d.setDate(today.getDate() + offset);
    }
    d.setHours(0,0,0,0);
    return { ...s, _date: d };
  });

  const ymd = d => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  const ql = q.trim().toLowerCase();
  const matchQ = (s) => { if(!ql) return true; const part = PARTICIPANTS.find(p=>p.id===s.participantId); return `${s.worker||""} ${part?.name||""} ${s.participant||""} ${s.title||""} ${s.location||""}`.toLowerCase().includes(ql); };
  const shiftsOn = d => dated.filter(s => ymd(s._date) === ymd(d) && matchQ(s)).sort((a,b)=>a.start.localeCompare(b.start));

  const statusColor = st => ({active:T.teal,upcoming:T.blue,completed:T.subtle}[st] || T.subtle);

  // ── Navigation ──
  function move(dir) {
    const c = new Date(cursor);
    if (view === "month") c.setMonth(c.getMonth() + dir);
    else if (view === "week") c.setDate(c.getDate() + dir*7);
    else c.setDate(c.getDate() + dir);
    setCursor(c);
  }
  const monthName = cursor.toLocaleDateString("en-AU",{month:"long",year:"numeric"});

  // ── Build month grid ──
  function monthGrid() {
    const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const startDay = (first.getDay()+6)%7; // Monday-first
    const daysInMonth = new Date(cursor.getFullYear(), cursor.getMonth()+1, 0).getDate();
    const cells = [];
    for (let i=0;i<startDay;i++) cells.push(null);
    for (let d=1; d<=daysInMonth; d++) cells.push(new Date(cursor.getFullYear(), cursor.getMonth(), d));
    while (cells.length % 7 !== 0) cells.push(null);
    return cells;
  }

  // ── Build week days ──
  function weekDays() {
    const c = new Date(cursor);
    const day = (c.getDay()+6)%7;
    c.setDate(c.getDate()-day);
    return Array.from({length:7},(_,i)=>{const d=new Date(c);d.setDate(c.getDate()+i);return d;});
  }

  const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif"}}>Roster</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={onNewGroupOuting} style={{background:`${T.orange}1a`,border:`1px solid ${T.orange}55`,borderRadius:10,padding:"8px 12px",color:T.orange,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>🎟️ Outing</button>
          <button onClick={onNewShift} style={{background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,padding:"8px 12px",color:T.bg,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>＋ Shift</button>
        </div>
      </div>

      {/* Search */}
      <div style={{position:"relative"}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by client, worker or outing…" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px 10px 32px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13}}>🔍</span>
        {q && <button onClick={()=>setQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.subtle,fontSize:16,cursor:"pointer"}}>×</button>}
      </div>

      {/* View switch + export */}
      {(
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1,display:"flex",gap:4,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:3}}>
          {["month","week","list"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:11,fontWeight:400,letterSpacing:"0.5px",textTransform:"uppercase",background:view===v?`${T.teal}1f`:"transparent",color:view===v?T.teal:T.subtle}}>{v}</button>
          ))}
        </div>
        <button onClick={onTimesheet} style={{background:`${T.violet}14`,border:`1px solid ${T.violet}44`,borderRadius:10,padding:"9px 12px",color:T.violet,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}}>🧾 Timesheet</button>
        <button onClick={onExport} style={{background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:10,padding:"9px 12px",color:T.blue,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}}>⬇ Excel</button>
      </div>
      )}

      {/* FILTER BANNER — the calendar below stays, filtered to the search */}
      {q.trim() && (() => {
        const n = dated.filter(matchQ).length;
        return (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,background:"rgba(0,229,180,0.08)",border:`1px solid rgba(0,229,180,0.25)`,borderRadius:10,padding:"8px 12px"}}>
            <span style={{fontSize:12,color:T.teal}}>Showing {n} shift{n!==1?"s":""} for "{q.trim()}"</span>
            <button onClick={()=>setQ("")} style={{background:"none",border:"none",color:T.subtle,fontSize:12,cursor:"pointer",textDecoration:"underline",fontFamily:"DM Sans,sans-serif"}}>Clear</button>
          </div>
        );
      })()}

      {/* Month/Week nav */}
      {view!=="list" && (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>move(-1)} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:8,width:32,height:32,color:T.body,fontSize:16,cursor:"pointer"}}>‹</button>
          <div style={{fontSize:14,fontWeight:400,fontFamily:"Syne,sans-serif"}}>{view==="month"?monthName:`Week of ${weekDays()[0].toLocaleDateString("en-AU",{day:"numeric",month:"short"})}`}</div>
          <button onClick={()=>move(1)} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:8,width:32,height:32,color:T.body,fontSize:16,cursor:"pointer"}}>›</button>
        </div>
      )}

      {/* ── MONTH VIEW ── */}
      {view==="month" && (
        <Card style={{padding:"12px 10px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
            {DOW.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:400,color:T.subtle,letterSpacing:"0.5px",textTransform:"uppercase"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {monthGrid().map((d,i)=>{
              if(!d) return <div key={i}/>;
              const sh = shiftsOn(d);
              const isToday = ymd(d)===ymd(today);
              const isSelected = ymd(d)===ymd(selectedDay);
              return (
                <div key={i} onClick={()=>setSelectedDay(d)} style={{aspectRatio:"1",borderRadius:8,padding:"3px",cursor:"pointer",background:isSelected?`${T.teal}33`:isToday?`${T.teal}16`:sh.length?"rgba(120,95,255,0.10)":"transparent",border:isSelected?`1.5px solid ${T.teal}`:isToday?`1px solid ${T.teal}66`:`1px solid transparent`,boxShadow:isSelected?`0 0 12px ${T.teal}66`:isToday?`0 0 8px ${T.teal}30`:"none",display:"flex",flexDirection:"column",alignItems:"center",overflow:"hidden",transition:"all 0.12s"}}>
                  <div style={{fontSize:12,fontWeight:(isToday||isSelected)?600:400,color:(isToday||isSelected)?T.teal:T.body}}>{d.getDate()}</div>
                  <div style={{display:"flex",gap:1.5,marginTop:2,flexWrap:"wrap",justifyContent:"center"}}>
                    {sh.slice(0,3).map(s=><div key={s.id} style={{width:5,height:5,borderRadius:"50%",background:shiftStateColor(s)}}/>)}
                  </div>
                  {sh.length>3 && <div style={{fontSize:7,color:T.subtle,marginTop:1}}>+{sh.length-3}</div>}
                </div>
              );
            })}
          </div>
          {/* Selected day shifts under month */}
          <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:12,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",fontWeight:400}}>
                {ymd(selectedDay)===ymd(today)?"Today":selectedDay.toLocaleDateString("en-AU",{weekday:"long"})} · {selectedDay.toLocaleDateString("en-AU",{day:"numeric",month:"short"})}
              </div>
              <button onClick={()=>onNewShift&&onNewShift(selectedDay)} style={{background:`${T.teal}1a`,border:`1px solid ${T.borderAccent}`,borderRadius:8,padding:"4px 10px",color:T.teal,fontSize:12,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add</button>
            </div>
            {shiftsOn(selectedDay).length===0 && <div style={{fontSize:12,color:T.subtle,textAlign:"center",padding:"12px 0"}}>No shifts this day — tap ＋ Add to schedule one</div>}
            {shiftsOn(selectedDay).map(s=><MiniShiftRow key={s.id} s={s} onEdit={onEditShift}/>)}
          </div>
        </Card>
      )}

      {/* ── WEEK VIEW ── */}
      {view==="week" && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {weekDays().map((d,i)=>{
            const sh = shiftsOn(d);
            const isToday = ymd(d)===ymd(today);
            return (
              <Card key={i} style={{padding:"12px 14px",borderColor:isToday?T.borderAccent:T.border}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:sh.length?10:0}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                    <span style={{fontSize:13,fontWeight:500,fontFamily:"Syne,sans-serif",color:isToday?T.teal:T.white}}>{DOW[i]}</span>
                    <span style={{fontSize:11,color:T.subtle}}>{d.toLocaleDateString("en-AU",{day:"numeric",month:"short"})}</span>
                    {isToday && <span style={{fontSize:10,fontWeight:400,color:T.teal,letterSpacing:"1px"}}>TODAY</span>}
                  </div>
                  <span style={{fontSize:12,color:T.subtle}}>{sh.length} shift{sh.length!==1?"s":""}</span>
                </div>
                {sh.map(s=><MiniShiftRow key={s.id} s={s} onEdit={onEditShift}/>)}
              </Card>
            );
          })}
        </div>
      )}

      {/* ── LIST VIEW ── */}
      {view==="list" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {dated.filter(matchQ).sort((a,b)=>a._date-b._date || a.start.localeCompare(b.start)).map(s=>{
            const p=resolveP(s);
            const w=resolveW(s);
            const denied = s.confirmStatus==="denied";
            const unconfirmed = !s.isOuting && s.confirmStatus!=="confirmed" && s.confirmStatus!=="denied" && !s.confirmed;
            const sc=shiftStateColor(s);
            const sl=shiftStateLabel(s);
            const miss=shiftMissing(s);
            return(
              <Card key={s.id} glow={s.status==="active"} onClick={()=>onEditShift&&onEditShift(s)} style={denied?{borderLeft:`3px solid ${T.red}`,border:`1px solid ${T.red}55`}:miss?{borderLeft:`3px solid ${T.amber}`,border:`1px solid ${T.amber}55`}:unconfirmed?{border:`1.5px solid ${T.orange}`,boxShadow:`0 0 0 1px ${T.orange}33`}:undefined}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar initials={w.initials} color={w.color} size={40}/>
                    <div>
                      <div style={{fontWeight:400,fontSize:14,fontFamily:"Syne,sans-serif"}}>{w.name} → {p.name}</div>
                      <div style={{fontSize:12,color:T.subtle,marginTop:1}}>{s._date.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})} · {s.start}–{s.end}</div>
                      <div style={{fontSize:12,color:T.muted,marginTop:1}}>{s.location}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <Chip label={sl} color={sc}/>
                    {s.status==="active"&&<div style={{fontSize:12,color:T.teal,marginTop:4}}><LiveTimer startMs={s.startMs}/></div>}
                    {miss && <div style={{fontSize:11,color:T.amber,marginTop:4,fontWeight:700}}>⚠ {miss}</div>}
                    {denied
                      ? <div style={{fontSize:11,color:T.red,marginTop:4,fontWeight:600}}>Reassign ›</div>
                      : <div style={{fontSize:11,color:T.subtle,marginTop:4}}>Tap to edit ›</div>}
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Compact shift row used in month/week views
function MiniShiftRow({ s, onEdit }) {
  const p=resolveP(s);
  const w=resolveW(s);
  const denied = s.confirmStatus==="denied";
  const unconfirmed = !s.isOuting && s.confirmStatus!=="confirmed" && s.confirmStatus!=="denied" && !s.confirmed;
  const sc=shiftStateColor(s);
  const miss=shiftMissing(s);
  return (
    <div onClick={()=>onEdit&&onEdit(s)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 8px",margin:"3px 0",borderRadius:10,border:unconfirmed?`1.5px solid ${T.orange}`:`1px solid transparent`,borderTop:unconfirmed?`1.5px solid ${T.orange}`:`1px solid ${T.border}`,background:unconfirmed?`${T.orange}0c`:"transparent",cursor:onEdit?"pointer":"default"}}>
      <div style={{width:3,alignSelf:"stretch",borderRadius:3,background:miss?T.amber:sc,minHeight:28}}/>
      <Avatar initials={w.initials} color={w.color} size={28}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:400,fontFamily:"Syne,sans-serif"}}>{s.isOuting ? <><IIcon name="ticket" size={12} color={T.orange}/>{s.title}</> : `${w.name} → ${p.name}`}</div>
        <div style={{fontSize:11,color:T.subtle}}>{s.start}–{s.end} · {s.isOuting ? `${s.participantIds?.length||0} participants · ${s.ratio}` : s.type.split(" ").slice(0,2).join(" ")}</div>
      </div>
      {miss && <span style={{fontSize:9.5,fontWeight:700,color:T.amber,background:`${T.amber}1a`,border:`1px solid ${T.amber}66`,borderRadius:6,padding:"2px 6px",letterSpacing:"0.2px",whiteSpace:"nowrap"}}>⚠ {miss}</span>}
      <span style={{fontSize:10,fontWeight:400,color:unconfirmed?T.orange:sc,letterSpacing:"0.5px",textTransform:"uppercase"}}>{unconfirmed?"Unconfirmed":shiftStateLabel(s)}</span>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// WORKER / SW MANAGEMENT FORM
// ══════════════════════════════════════════════════════════════
const BLANK_WORKER = {
  name:"", initials:"", color:"#00E5B4", status:"off", hours:0, shifts:0, pay:0, payRates:[], kmRate:"",
  phone:"", email:"", password:"", role:"Support Worker", clients:[], certs:[],
  staffId:"", photo:"", emoji:"", avatarColor:"", companyId:"ibss-qld",
};
const ROLES = ["Support Worker", "Senior Support Worker", "Team Leader", "Director", "Admin"];
const SW_RATE_CATEGORIES = ["Weekday","Weekday Evening","Weekday Night","Saturday","Sunday","Public Holiday","Sleepover","Other"];

function WorkerForm({ initial, clients, onSave, onCancel, onDelete, onInvite }) {
  const WORKER_DRAFT_KEY = "kora_worker_draft_v1";
  const wDraft0 = readFormDraft(WORKER_DRAFT_KEY, !initial);
  const [f, setF] = useState({...BLANK_WORKER, ...(initial?{}:(wDraft0||{})), ...initial, clients:[...(initial?.clients|| wDraft0?.clients ||[])], certs:[...(initial?.certs|| wDraft0?.certs ||[])]});
  const [wDraftRestored, setWDraftRestored] = useState(!!wDraft0);
  const [showPw, setShowPw] = useState(false);
  const [clientQ, setClientQ] = useState("");
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  // Autosave a NEW worker as it's typed (skip the photo — too big for device storage).
  useEffect(()=>{
    if (initial) return;
    try { const {photo, ...rest} = f; localStorage.setItem(WORKER_DRAFT_KEY, JSON.stringify(rest)); } catch(e) {}
  }, [initial, f]);
  const clearWDraft = ()=>{ clearFormDraft(WORKER_DRAFT_KEY); setF({...BLANK_WORKER, clients:[], certs:[]}); setWDraftRestored(false); };
  const [invite, setInvite] = useState(null);
  const [inviting, setInviting] = useState(false);
  const [inviteErr, setInviteErr] = useState("");
  const [copied, setCopied] = useState(false);
  const [inviteRes, setInviteRes] = useState(null);
  const isSaved = initial?.id && typeof initial.id === "string" && initial.id.includes("-");
  async function doInvite() {
    if (!onInvite) return;
    setInviting(true); setInviteErr("");
    try {
      const res = await onInvite({ ...f, id: initial.id });
      if (typeof res === "string") { setInvite(res); setInviteRes(null); }
      else { setInvite(res.token); setInviteRes(res); }
    }
    catch (e) { setInviteErr(e.message || String(e)); }
    setInviting(false);
  }

  const inp = (label, key, opts={}) => (
    <div>
      <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>{label}</div>
      <input value={f[key]||""} onChange={e=>set(key,e.target.value)} placeholder={opts.ph} type={opts.type||"text"}
        style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
    </div>
  );

  function save() {
    if (!f.name) return;
    const initials = f.initials || f.name.slice(0,2).toUpperCase();
    onSave({...f, initials, id: initial?.id || Date.now(), avatarColor: f.avatarColor||f.color, companyId: f.companyId||COMPANY.id});
    if (!initial) clearFormDraft(WORKER_DRAFT_KEY);
  }

  return (
    <Modal title={initial?.id?"Edit Support Worker":"Add Support Worker"} onClose={onCancel}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {wDraftRestored && !initial && (

                      style={{background:"transparent",border:"none",color:expired?T.red:soon?T.amber:T.body,fontSize:11,fontFamily:"DM Sans,sans-serif",outline:"none",colorScheme:"dark"}}/>
                    {expired&&<span style={{fontSize:11,color:T.red,fontWeight:400}}>EXPIRED</span>}
                    {soon&&<span style={{fontSize:11,color:T.amber,fontWeight:400}}>EXPIRING SOON</span>}
                  </div>
                </div>
                <button onClick={()=>set("certs",f.certs.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
              </div>
            );
          })}
          <button onClick={()=>set("certs",[...f.certs,BLANK_CERT()])} style={{background:`${T.teal}14`,border:`1px dashed ${T.teal}44`,borderRadius:10,padding:"10px",color:T.teal,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add Certification</button>
        </div>

        <div style={{height:4}}/>
        <BtnPrimary disabled={!f.name} onClick={save}>{f.name?(initial?.id?"Save Changes":"Create Worker"):"Enter a name"}</BtnPrimary>
        <button onClick={onCancel} style={{width:"100%",padding:"13px",background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:12,color:"#fff",fontSize:13,fontWeight:500,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>Cancel</button>

            Delete Worker
          </button>
        )}
      </div>
    </Modal>
  );
}

// GLOBAL SEARCH
// ══════════════════════════════════════════════════════════════
function GlobalSearch({ workers, clients, shifts, onClose, onGoClient, onGoWorker, onEditShift }) {
  const [q, setQ] = useState("");
  const query = q.trim().toLowerCase();

  const clientHits = !query ? [] : clients.filter(c =>
    `${c.name} ${c.manager} ${c.ndis||""} ${c.code||""} ${(c.goals||[]).join(" ")}`.toLowerCase().includes(query)
  );
  const workerHits = !query ? [] : workers.filter(w =>
    `${w.name} ${w.email||""} ${w.role||""} ${w.phone||""} ${(w.certs||[]).map(ct=>ct.name).join(" ")}`.toLowerCase().includes(query)
  );
  const shiftHits = !query ? [] : shifts.filter(s =>
    `${s.worker||""} ${s.participant||""} ${s.type||""} ${s.location||""} ${s.title||""}`.toLowerCase().includes(query)
  );

  const total = clientHits.length + workerHits.length + shiftHits.length;

  return (
    <Modal title="Search" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search clients, workers, shifts, certs, goals…"
          style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:14,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>

        {query && <div style={{fontSize:11,color:T.subtle}}>{total} result{total!==1?"s":""}</div>}

        {clientHits.length>0 && (
          <div>
            <SLabel>Clients</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {clientHits.map(c=>(
                <button key={c.id} onClick={()=>{onGoClient&&onGoClient(c);onClose();}} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                  <Avatar initials={c.initials} color={c.avatarColor||T.teal} size={32} photo={c.photo} emoji={c.emoji}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{c.name}</div>
                    <div style={{fontSize:12,color:T.subtle}}>{c.manager} {c.ndis?`· NDIS ${c.ndis}`:""}</div>
                  </div>
                  <span style={{fontSize:11,color:T.teal}}>Client</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {workerHits.length>0 && (
          <div>
            <SLabel>Support Workers</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {workerHits.map(w=>(
                <button key={w.id} onClick={()=>{onGoWorker&&onGoWorker(w.id);onClose();}} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                  <Avatar initials={w.initials} color={w.avatarColor||w.color} size={32} photo={w.photo} emoji={w.emoji}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{w.name}</div>
                    <div style={{fontSize:12,color:T.subtle}}>{w.role||"Support Worker"} {w.email?`· ${w.email}`:""}</div>
                  </div>
                  <span style={{fontSize:11,color:T.blue}}>Worker</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {shiftHits.length>0 && (
          <div>
            <SLabel>Shifts</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {shiftHits.map(s=>(
                <button key={s.id} onClick={()=>{onEditShift&&onEditShift(s);onClose();}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{s.isOuting?<><IIcon name="ticket" size={12} color={T.orange}/>{s.title}</>:`${s.worker} → ${s.participant}`}</div>
                    <div style={{fontSize:12,color:T.subtle}}>{s.start}–{s.end} · {s.location||s.type}</div>
                  </div>
                  <span style={{fontSize:11,color:T.orange}}>Shift</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {query && total===0 && (
          <div style={{textAlign:"center",padding:"20px 0",color:T.subtle,fontSize:13}}>No results for "{q}"</div>
        )}
        {!query && (
          <div style={{textAlign:"center",padding:"16px 0",color:T.muted,fontSize:12}}>Type to search across clients, workers and shifts</div>
        )}
      </div>
    </Modal>
  );
}
