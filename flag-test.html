  const [name, setName] = useState("");
  const [company, setCompany] = useState("");
  const [phone, setPhone] = useState("");
  const [inviteCode, setInviteCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [showPw, setShowPw] = useState(false);
  const [resetMsg, setResetMsg] = useState("");
  const [err, setErr] = useState("");

  const field = {
    width:"100%", background:"rgba(54,228,255,0.05)", border:`1px solid rgba(140,100,255,0.35)`,
    borderRadius:10, padding:"12px 14px", color:"#fff", fontSize:14,
    fontFamily:"DM Sans,sans-serif", marginBottom:10, outline:"none",
  };

  async function signIn() {
    setBusy(true); setErr("");
    try {
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  }
  async function sendReset() {
    setBusy(true); setErr(""); setResetMsg("");
    try {
      if (!email.trim()) throw new Error("Enter your email address first.");
      const { error } = await db.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin });
      if (error) throw error;
      setResetMsg("If that email has an account, a reset link is on its way — check your inbox.");
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  }
  async function signUp() {
    setBusy(true); setErr("");
    try {
      if (!company.trim()) throw new Error("Please enter your business name.");
      const { data, error } = await db.auth.signUp({ email, password, options:{ data:{ name } } });
      if (error) throw error;
      if (!data.session) {
        const { error: e2 } = await db.auth.signInWithPassword({ email, password });
        if (e2) throw e2;
      }
      const { error: rpcErr } = await db.rpc("setup_new_company",
        { company_name: company, p_manager_phone: phone || null });
      if (rpcErr) throw rpcErr;
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  }
  // Worker joining an existing company with an invite code.
  async function joinWithCode() {
    setBusy(true); setErr("");
    try {
      const code = inviteCode.trim().toUpperCase();
      if (!code) throw new Error("Enter your invite code.");
      if (!email.trim() || !password) throw new Error("Enter your email and a password.");
      // Create the worker's account. If they already have one, sign in instead.
      const { data, error } = await db.auth.signUp({ email, password, options:{ data:{ name } } });
      if (error) {
        const { error: e2 } = await db.auth.signInWithPassword({ email, password });
        if (e2) throw error; // surface the original sign-up error
      } else if (!data.session) {
        const { error: e3 } = await db.auth.signInWithPassword({ email, password });
        if (e3) throw e3;
      }
      // Link this account to the company + worker record from the invite.
      const { error: rpcErr } = await db.rpc("accept_invite", { invite_token: code });
      if (rpcErr) throw rpcErr;
      window.location.reload();
    } catch (e) { setErr(e.message || String(e)); setBusy(false); }
  }

  const tab = (id, label) => (
    <button onClick={()=>{setMode(id);setErr("");}} style={{flex:1,padding:"10px",background:"none",
      border:"none",borderBottom:`2px solid ${mode===id?T.teal:"transparent"}`,
      color:mode===id?"#fff":T.subtle,fontSize:13,fontWeight:500,cursor:"pointer",textShadow:mode===id?`0 0 10px ${T.teal}66`:"none",
      fontFamily:"DM Sans,sans-serif"}}>{label}</button>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0b1320",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",padding:24,position:"relative",fontFamily:"DM Sans,sans-serif"}}>

// ── Quick-unlock PIN (per device, stored locally) ─────────────
const PIN_HASH_KEY="kora_pin_hash", PIN_SALT_KEY="kora_pin_salt", PIN_PROMPT_KEY="kora_pin_prompted";
function pinIsSet(){ try{ return !!localStorage.getItem(PIN_HASH_KEY); }catch(e){ return false; } }
function pinPrompted(){ try{ return !!localStorage.getItem(PIN_PROMPT_KEY); }catch(e){ return true; } }
function markPinPrompted(){ try{ localStorage.setItem(PIN_PROMPT_KEY,"1"); }catch(e){} }
async function hashPin(pin,salt){
  const enc=new TextEncoder().encode(salt+":"+pin);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function savePin(pin){
  const salt=Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b=>b.toString(16).padStart(2,"0")).join("");
  const h=await hashPin(pin,salt);
  try{ localStorage.setItem(PIN_SALT_KEY,salt); localStorage.setItem(PIN_HASH_KEY,h); }catch(e){}
}
async function checkPin(pin){
  try{ const salt=localStorage.getItem(PIN_SALT_KEY)||""; const h=await hashPin(pin,salt); return h===localStorage.getItem(PIN_HASH_KEY); }catch(e){ return false; }
}
function clearPin(){ try{ localStorage.removeItem(PIN_HASH_KEY); localStorage.removeItem(PIN_SALT_KEY); }catch(e){} }

function PinScreen({ mode, onUnlock, onSet, onSkip, onForgot }) {
  const [stage,setStage]=useState(mode==="set"?"enter":"unlock");
  const [first,setFirst]=useState("");
  const [pin,setPinVal]=useState("");
  const [err,setErr]=useState("");
  function press(d){ setErr(""); setPinVal(p=>p.length>=4?p:p+d); }
  function back(){ setErr(""); setPinVal(p=>p.slice(0,-1)); }
  useEffect(()=>{
    if(pin.length!==4) return;
    let cancelled=false;
    (async()=>{
      if(mode==="unlock"){
        const ok=await checkPin(pin);
        if(cancelled) return;
        if(ok) onUnlock(); else { setErr("Wrong PIN — try again."); setPinVal(""); }
      } else {
        if(stage==="enter"){ setFirst(pin); setPinVal(""); setStage("confirm"); }
        else if(pin===first){ await savePin(pin); if(!cancelled) onSet(); }
        else { setErr("PINs didn't match — start again."); setPinVal(""); setFirst(""); setStage("enter"); }
      }
    })();
    return ()=>{cancelled=true;};
  },[pin]);
  const title = mode==="unlock" ? "Enter your PIN" : stage==="enter" ? "Create a 4-digit PIN" : "Re-enter your PIN";
  const sub = mode==="unlock" ? "Quick unlock for KORA on this device." : stage==="enter" ? "You'll use this to unlock KORA quickly next time." : "Type it once more to confirm.";
  const Key = ({d}) => (
    <button onClick={()=>press(String(d))} style={{height:60,borderRadius:14,border:`1px solid ${T.border}`,background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:22,fontWeight:500,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>{d}</button>
  );
  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",fontFamily:"DM Sans,sans-serif"}}>
      <AmbientGlow/>
      <div style={{width:"100%",maxWidth:300,position:"relative",zIndex:1,textAlign:"center"}}>
        <KoruLogo size={40}/>
        <div style={{fontSize:18,fontWeight:600,fontFamily:"Syne,sans-serif",color:"#fff",marginTop:14}}>{title}</div>
        <div style={{fontSize:11.5,color:T.subtle,marginTop:5,marginBottom:18,lineHeight:1.5}}>{sub}</div>

function WorkerHome({ profile, companyName, onSignOut, onLock, openShiftId, openAction, onConsumeOpenShift }) {
  const [worker, setWorker] = useState(null);
  const [shifts, setShifts] = useState([]);
  const [clients, setClients] = useState([]);
  const [paySchedule, setPaySchedule] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const mountedRef = useRef(true);
  useEffect(() => () => { mountedRef.current = false; }, []);
  const loadData = async () => {
    if (!profile) { if (mountedRef.current) setLoaded(true); return; }
    const wid = profile.worker_id;
    let w = null, sh = [], cl = [];
    if (wid) {
      const wr = await db.from("workers").select("*").eq("id", wid).maybeSingle();
      w = wr.data ? workerRowToApp(wr.data) : null;
      // This worker's shifts: assigned individually (worker_id) or part of an outing (worker_ids).
      const [a, b] = await Promise.all([
        db.from("shifts").select("*").eq("worker_id", wid),
        db.from("shifts").select("*").contains("worker_ids", [wid]),
      ]);
      const rows = [...(a.data||[]), ...(b.data||[])];
      const seen = new Set();
      sh = rows.filter(r => seen.has(r.id) ? false : (seen.add(r.id), true)).map(shiftRowToApp);
    }
    const cr = await db.from("clients").select("*");
    cl = (cr.data||[]).map(clientRowToApp);
    const co = (profile && profile.company_id) ? await loadCompany(profile.company_id).catch(()=>null) : null;
    if (!mountedRef.current) return;
    setWorker(prev => w || prev); setShifts(sh); setClients(cl); setPaySchedule((co && co.settings) || null); setLoaded(true);
  };
  useEffect(() => { loadData(); }, [profile && profile.worker_id]);
  // Auto-refresh: re-sync when the app returns to the foreground, and quietly every 60s while open,
  // so workers see roster/shift changes without pulling to refresh.
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === "visible") loadData(); };
    const onFocus = () => loadData();
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("focus", onFocus);
    const iv = setInterval(() => { if (document.visibilityState !== "hidden") loadData(); }, 60000);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("focus", onFocus);
      clearInterval(iv);
    };
  }, [profile && profile.worker_id]);

  if (!loaded) return <Loading/>;
  const w = worker || {
    id: (profile && profile.worker_id) || (profile && profile.id),
    name: (profile && profile.name) || "Support Worker",
    initials: ((profile && profile.name) || "SW").slice(0,2).toUpperCase(),
    color: T.teal, avatarColor: T.teal,
  };
  // Only the participants this worker actually touches (their shifts + assigned clients).
  const relevant = new Set();
  shifts.forEach(s => { if (s.participantId) relevant.add(String(s.participantId)); (s.participantIds||[]).forEach(id=>relevant.add(String(id))); });
  ((worker && worker.clients) || []).forEach(id => relevant.add(String(id)));
  const participants = clients.filter(c => relevant.has(String(c.id)));

  // Persist a worker's shift change (sign-on/off, km, notes, receipts) to the DB.
  async function saveShift(updated) {
    try {
      const saved = await saveShiftToDb(profile.company_id, updated);
      setShifts(prev => prev.map(s => String(s.id)===String(saved.id) ? { ...s, ...saved } : s));
      return saved;
    } catch (e) {
      console.error("saveShift error:", e);
      // Callers that only care about the shift shape (most of the app) keep working
      // unchanged; callers that need to KNOW it failed (sign-on/off) can check these.
      return { ...updated, __saveFailed: true, __saveError: (e && e.message) || String(e) };
    }
  }

  return <WorkerApp worker={w} shifts={shifts} participants={participants} paySchedule={paySchedule} onSaveShift={saveShift} onSignOut={onSignOut} onLock={onLock} openShiftId={openShiftId} openAction={openAction} onConsumeOpenShift={onConsumeOpenShift}/>;
}

function ShiftLinkPage({ shiftId, profile, companyName, onExit, onOpenInApp }){
  const [shift, setShift] = useState(null);
  const [state, setState] = useState("loading"); // loading | ready | notfound | error

  const [workers, setWorkers] = useState([]);

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      if(!isUuid(shiftId)){ setState("notfound"); return; }
      try{
        const { data, error } = await db.from("shifts").select("*").eq("id", shiftId).maybeSingle();
        if(cancelled) return;
        if(error){ setErr(error.message||String(error)); setState("error"); return; }
        if(!data){ setState("notfound"); return; }
        const s = shiftRowToApp(data);
        // PRIVACY GUARD: a worker may only view a shift that is theirs (assigned, or on their outing).
        // Managers/directors in the same company may view any shift. Everyone else is blocked.
        const myWid = profile && profile.worker_id;
        const isStaffMgr = !!(profile && profile.role && profile.role !== "worker");
        const sameCompany = !data.company_id || !(profile && profile.company_id) || String(data.company_id)===String(profile.company_id);
        const mine = myWid!=null && (String(s.workerId)===String(myWid) || (Array.isArray(s.workerIds) && s.workerIds.map(String).includes(String(myWid))));
        if(!sameCompany || (!isStaffMgr && !mine)){ setState("forbidden"); return; }
        setShift(s);
        // Names for the run sheet (best-effort; OutingDetail also falls back to embedded plan data).
        db.from("clients").select("*").then(({data})=>{ if(!cancelled) setClients((data||[]).map(clientRowToApp)); }).catch(()=>{});
        db.from("workers").select("*").then(({data})=>{ if(!cancelled) setWorkers((data||[]).map(workerRowToApp)); }).catch(()=>{});
        setConfirmed(s.confirmStatus==="confirmed" || s.confirmed===true);
        setState("ready");
      }catch(e){ if(!cancelled){ setErr(e.message||String(e)); setState("error"); } }
    })();
    return ()=>{ cancelled=true; };
  }, [shiftId]);

  async function doConfirm(){
    if(!shift || confirming || confirmed) return;
    setConfirming(true); setErr("");
    try{
      const { error } = await db.from("shifts").update({ confirm_status:"confirmed", confirmed:true }).eq("id", shiftId);

      try { if(COMPANY.managerPhone) sendClickSendSMS("","",COMPANY.managerPhone, `KORA: ${who} CONFIRMED their shift ${dateFmt} (${shift.start}–${shift.end}). — ${COMPANY.shortName}`).catch(()=>{}); } catch(e){}

  const wrap = {maxWidth:480,margin:"0 auto",minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",fontFamily:"DM Sans,sans-serif"};
  const header = (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"16px 18px",borderBottom:`1px solid ${T.borderAccent}`,background:T.navyDeep}}>

  );

  if(state==="loading") return <div style={wrap}>{header}<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:T.subtle,fontSize:13}}>Loading shift…</div></div>;
  if(state==="notfound") return <div style={wrap}>{header}<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center",gap:8}}>
      <div style={{fontSize:32}}>🔍</div>

  if(state==="error") return <div style={wrap}>{header}<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center",gap:8}}>
      <div style={{fontSize:32}}>⚠️</div>
      <div style={{fontSize:15,fontWeight:600,fontFamily:"Syne,sans-serif"}}>Couldn't load this shift</div>
      <div style={{fontSize:11,color:T.subtle,lineHeight:1.5,maxWidth:300,wordBreak:"break-word"}}>{err}</div>
      <div style={{width:"100%",maxWidth:320}}>{exitBtn}</div>
    </div></div>;
  if(state==="forbidden") return <div style={wrap}>{header}<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center",gap:10}}>
      <div style={{fontSize:34}}>🔒</div>

      <div style={{width:"100%",maxWidth:320,marginTop:4}}>{exitBtn}</div>
    </div></div>;

  const s = shift;
  // An outing link should open the shared run sheet (same for every participant), not one flat shift page.
  const sIsOuting = !!(s && (s.isOuting || s.title || (s.stops && s.stops.length) || (s.participantIds && s.participantIds.length>1)));
  if (sIsOuting) return <OutingDetail outing={s} participants={clients} workers={workers} currentUser={{name: profile && profile.name, role: profile && profile.role}} onClose={onExit} />;

          {!s.isOuting && row("Client", s.participant)}
          {row("Type", s.type)}
          {row("Location", s.location)}

          </div>

        {exitBtn}
      </div>
    </div>
  );

function SetNewPassword({ onDone }) {
  const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const [show,setShow]=useState(false);
  const field = { width:"100%", background:"rgba(54,228,255,0.05)", border:`1px solid rgba(140,100,255,0.35)`, borderRadius:10, padding:"12px 14px", color:"#fff", fontSize:14, fontFamily:"DM Sans,sans-serif", marginBottom:10, outline:"none" };
  async function save(){
    setBusy(true); setErr("");
    try {
      if (pw.length < 6) throw new Error("Password must be at least 6 characters.");
      if (pw !== pw2) throw new Error("The passwords don't match.");
      const { error } = await db.auth.updateUser({ password: pw });
      if (error) throw error;
      onDone && onDone();
    } catch(e){ setErr(e.message||String(e)); }
    setBusy(false);
  }
  return (
    <div style={{minHeight:"100vh",background:"#0b1320",display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"DM Sans,sans-serif"}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:30,fontWeight:700,fontFamily:"Syne,sans-serif",letterSpacing:"4px",background:"linear-gradient(92deg,#00E5B4,#36E4FF,#B57BFF)",WebkitBackgroundClip:"text",backgroundClip:"text",color:"transparent",filter:"drop-shadow(0 0 14px rgba(54,228,255,0.55))"}}>KORA</div>
        </div>
        <div className="kora-card" style={{background:"rgba(20,28,48,0.55)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"1px solid rgba(140,100,255,0.4)",borderRadius:16,padding:20,boxShadow:"0 0 30px rgba(54,228,255,0.16)"}}>
          <div style={{fontSize:17,fontWeight:600,fontFamily:"Syne,sans-serif",color:"#fff",marginBottom:4}}>Set a new password</div>
          <div style={{fontSize:11,color:T.subtle,marginBottom:14,lineHeight:1.5}}>Choose a new password for your account.</div>
          <input style={field} type={show?"text":"password"} placeholder="New password" value={pw} onChange={e=>setPw(e.target.value)} />
          <input style={field} type={show?"text":"password"} placeholder="Confirm new password" value={pw2} onChange={e=>setPw2(e.target.value)} />
          <button type="button" onClick={()=>setShow(v=>!v)} style={{background:"none",border:"none",color:T.cyan,fontSize:12,fontWeight:600,cursor:"pointer",padding:0,marginBottom:10,fontFamily:"DM Sans,sans-serif"}}>{show?"Hide":"Show"} passwords</button>
          {err && <div style={{color:T.red,fontSize:12,marginBottom:10}}>{err}</div>}
          <button disabled={busy} onClick={save} style={{width:"100%",padding:"13px",border:"none",borderRadius:12,background:busy?"rgba(255,255,255,0.08)":`linear-gradient(135deg,${T.teal},${T.blue})`,color:busy?T.subtle:"#06121f",fontSize:14,fontWeight:600,fontFamily:"Syne,sans-serif",cursor:busy?"default":"pointer"}}>{busy?"Saving…":"Save new password"}</button>
        </div>
      </div>
    </div>
  );
}
function Root() {
  const [session, setSession] = useState(null);
  const [recovery, setRecovery] = useState(false); // came back from a password-reset email
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [profileState, setProfileState] = useState("idle"); // idle | loading | done | error
  const [profileErr, setProfileErr] = useState("");
  // PIN is a manual privacy lock only — it does NOT re-lock on every reload,
  // so workers mid-shift aren't forced to re-enter a code each time they reopen.
  const [locked, setLocked] = useState(false);
  const [offerSetPin, setOfferSetPin] = useState(false);
  // Deep link: /shift/:id opens a dedicated, login-protected shift page.
  const [shiftLinkId, setShiftLinkId] = useState(()=>{ try{ const m=window.location.pathname.match(/^\/shift\/([^\/?#]+)/); if(!m) return null; const raw=decodeURIComponent(m[1]); const u=raw.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i); return u?u[0]:raw; }catch(e){ return null; } });
  const [openShiftId, setOpenShiftId] = useState(null);
  // Optional action from the link (e.g. ?do=note opens the Progress Note popup straight away).
  const [deepAction, setDeepAction] = useState(()=>{ try{ return new URLSearchParams(window.location.search).get("do"); }catch(e){ return null; } });
  const exitShiftLink = ()=>{ setShiftLinkId(null); try{ window.history.replaceState({}, "", "/"); }catch(e){} };
  const openShiftInApp = (id)=>{ setOpenShiftId(id); exitShiftLink(); };
  // A worker who taps a shift link skips the in-between page and lands straight on the shift
  // (upcoming → that shift with one Sign On button; active → the sign-off screen).
  useEffect(()=>{
    if (shiftLinkId && profile && profile.role === "worker") openShiftInApp(shiftLinkId);
  }, [shiftLinkId, profile]);

  useEffect(() => {
    db.auth.getSession().then(({ data }) => { setSession(data.session); setLoading(false); });
    const { data:{ subscription } } = db.auth.onAuthStateChange((_e, s) => {
      if (_e === "PASSWORD_RECOVERY") setRecovery(true);
      // Only react when the actual logged-in user changes (sign in / sign out).
      // Routine token refreshes (e.g. when returning to the tab) keep the same
      // user — ignore them so the app isn't reloaded and you don't lose your place.
      setSession(prev => (prev && s && prev.user?.id === s.user?.id) ? prev : s);
    });
    return () => subscription.unsubscribe();
  }, []);

  function loadProfile(s) {
    if (!s) { setProfile(null); setProfileState("idle"); return; }
    setProfileState("loading"); setProfileErr("");
    db.from("profiles").select("*, companies(*)").eq("id", s.user.id).maybeSingle()
      .then(({ data, error }) => {
        if (error) { setProfileErr(error.message || String(error)); setProfile(null); setProfileState("error"); }
        else if (!data) { setProfileErr("No business profile is linked to this account yet."); setProfile(null); setProfileState("error"); }
        else { setProfile(data); setProfileState("done"); }
      })
      .catch(e => { setProfileErr(e.message || String(e)); setProfile(null); setProfileState("error"); });
  }

  useEffect(() => { loadProfile(session); }, [session]);
  useEffect(() => {
    /* PIN prompt disabled */
  }, [profileState]);

  if (loading) return <Loading/>;
  if (recovery) return <SetNewPassword onDone={()=>setRecovery(false)}/>;
  if (!session) return <AuthScreen/>;
  if (profileState === "loading" || profileState === "idle") return <Loading/>;
  if (profileState === "error" || !profile) {
    return <ProfileError msg={profileErr} onRetry={()=>loadProfile(session)} onSignOut={()=>db.auth.signOut()}/>;
  }
  const companyName = (profile.companies && profile.companies.name) || "KORA";
  // Deep link to a single shift (from SMS). Workers get a "Sign on" button that opens
  // the shift in their app; managers/directors see the read-only confirm page.
  // (Workers are normally auto-routed straight into the app by the effect above; this
  //  page is the reliable fallback and always shows a sign-on button for them.)
  if (shiftLinkId) {
    return (
      <div style={{minHeight:"100vh",background:T.bg}}>
        <ShiftLinkPage shiftId={shiftLinkId} profile={profile} companyName={companyName} onExit={exitShiftLink} onOpenInApp={profile.role === "worker" ? openShiftInApp : null}/>
      </div>
    );
  }
  // Support worker → their own view. Never the director dashboard.
  if (profile.role === "worker") {
    return (
      <div style={{maxWidth:760,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
        <WorkerHome profile={profile} companyName={companyName}
          openShiftId={openShiftId} openAction={deepAction} onConsumeOpenShift={()=>{setOpenShiftId(null);setDeepAction(null);}}
          onSignOut={()=>{ db.auth.signOut(); }} />
      </div>
    );
  }
  // Director / manager → full app.
  return (
    <div style={{maxWidth:760,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
      <ManagerApp companyId={profile.company_id} companyName={companyName} companyEmail={(profile.companies && profile.companies.manager_email) || profile.email} userRole={profile.role} userId={profile.id} userName={profile.name} onSignOut={()=>{ db.auth.signOut(); }} />
    </div>
  );
}

const KORA_BUILD = "v267 · 5 Jul · Invoicing edit-line: both funding dropdowns now pre-select what's already connected (were always blank) · Qty/Rate typed directly now auto-update Total, same as times and funding picks already did";
function VersionBadge(){
  return <div style={{position:"fixed",bottom:4,right:6,zIndex:99999,fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:"monospace",pointerEvents:"none"}}>{KORA_BUILD.split(" · ")[0]}</div>;
}
function UpdateChecker(){
  const [stale,setStale]=useState(false);
  useEffect(()=>{
    let cancelled=false;
    const cur=(KORA_BUILD.split(" · ")[0]||"").trim();
    const check=async()=>{
      try{
        const r=await fetch(location.pathname+"?v="+Date.now(),{cache:"no-store"});
        if(!r.ok) return;
        const t=await r.text();
        const m=t.match(/KORA_BUILD\s*=\s*"([^"]+)"/);
        if(m){ const latest=(m[1].split(" · ")[0]||"").trim(); if(latest && cur && latest!==cur && !cancelled) setStale(true); }
      }catch(e){}
    };
    const onVis=()=>{ if(document.visibilityState==="visible") check(); };
    document.addEventListener("visibilitychange",onVis);
    const id=setInterval(check, 5*60*1000);
    check();
    return ()=>{ cancelled=true; clearInterval(id); document.removeEventListener("visibilitychange",onVis); };
  },[]);
  if(!stale) return null;
  return (
    <div onClick={()=>location.reload()} style={{position:"fixed",left:12,right:12,bottom:14,zIndex:100000,cursor:"pointer",background:"linear-gradient(160deg,rgba(0,229,180,.22),rgba(0,229,180,.08))",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",border:"1px solid rgba(0,229,180,.55)",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:9,boxShadow:"0 12px 34px -12px rgba(0,0,0,.85)",fontFamily:"DM Sans,sans-serif"}}>
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#c8f6e7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      <span style={{fontSize:14,fontWeight:600,color:"#c8f6e7"}}>New version available — tap to refresh</span>
    </div>
  );
}
const SAMSUNG_NOTICE_KEY = "kora_samsung_notice_dismissed_v1";
function SamsungInternetNotice(){
  const [show,setShow]=useState(false);
  useEffect(()=>{
    try{
      const isSamsung = /SamsungBrowser/i.test(navigator.userAgent||"");
      const dismissed = localStorage.getItem(SAMSUNG_NOTICE_KEY);
      if(isSamsung && !dismissed) setShow(true);
    }catch(e){}
  },[]);
  if(!show) return null;
  const dismiss = ()=>{ try{ localStorage.setItem(SAMSUNG_NOTICE_KEY,"1"); }catch(e){} setShow(false); };
  let chromeUrl = null;
  try{ chromeUrl = `intent://${window.location.host}${window.location.pathname}${window.location.search}#Intent;scheme=https;package=com.android.chrome;end`; }catch(e){}
  return (
    <div style={{position:"fixed",inset:0,zIndex:100001,display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"rgba(8,14,24,0.72)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)"}}>
      <div style={{maxWidth:360,width:"100%",background:"#141d2e",borderRadius:18,padding:"22px 20px",boxShadow:"0 20px 60px -20px rgba(0,0,0,.85)",border:"1px solid rgba(255,176,32,.3)",fontFamily:"DM Sans,sans-serif"}}>
        <div style={{width:44,height:44,borderRadius:13,background:"rgba(255,176,32,.14)",border:"1px solid rgba(255,176,32,.4)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14}}>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#f2c988" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>
        </div>
        <div style={{fontFamily:"Syne,sans-serif",fontSize:18,fontWeight:600,color:"#fff",marginBottom:8}}>Using Samsung Internet?</div>
        <div style={{fontSize:14,color:"#c4cede",lineHeight:1.55,marginBottom:18}}>
          Samsung's browser forces its own dark colours on top of KORA's, so some screens can look muddy or hard to read. <b style={{color:"#eef2f8"}}>Chrome doesn't have this problem</b> — for the best experience, open KORA there instead.
        </div>
        {chromeUrl && (
          <a href={chromeUrl} onClick={dismiss} style={{display:"block",textAlign:"center",width:"100%",padding:"13px",borderRadius:12,background:"linear-gradient(160deg,rgba(255,176,32,.22),rgba(255,176,32,.08))",border:"1px solid rgba(255,176,32,.5)",color:"#ffe7bd",fontWeight:600,fontSize:14,textDecoration:"none",marginBottom:10}}>Try opening in Chrome</a>
        )}
        <button onClick={dismiss} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(255,255,255,0.14)",background:"transparent",color:"rgba(255,255,255,0.75)",fontWeight:500,fontSize:14,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>Got it, stay here</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<React.Fragment><AppErrorBoundary><Root/></AppErrorBoundary><VersionBadge/><UpdateChecker/><SamsungInternetNotice/></React.Fragment>);

<script>
  // Register the service worker so KORA can install to the home screen and
  // launch standalone. Paired with the network-first /sw.js, this means the
  // newest deploy is fetched whenever the phone is online — no cache-clearing.
  if ("serviceWorker" in navigator) {
    // A controllerchange fires when a NEW service worker takes over (i.e. a new
    // deploy). If the page was already controlled, reload once so the freshest
    // HTML/design shows automatically. Skip the very first install (no reload).
    var hadController = !!navigator.serviceWorker.controller;
    var swReloading = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (!hadController || swReloading) return;
      swReloading = true;
      location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" }).then(function (reg) {
        reg.update(); // check for a newer SW on every launch
        setInterval(function () { reg.update(); }, 60 * 60 * 1000);
      }).catch(function (e) { console.log("SW registration failed:", e); });
    });
  }
</script>
