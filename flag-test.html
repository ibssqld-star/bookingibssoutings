  @keyframes wordGlow{0%,100%{filter:drop-shadow(0 0 3px rgba(0,255,200,.35));}50%{filter:drop-shadow(0 0 11px rgba(54,228,255,.6));}}
  .kora-card{position:relative;}
  .kora-card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;background:linear-gradient(120deg,rgba(54,228,255,.5),rgba(150,110,255,.42),rgba(255,70,210,.4));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;opacity:.72;}
  .kora-glow::before{background:linear-gradient(120deg,rgba(54,228,255,.95),rgba(150,110,255,.85),rgba(255,70,210,.8),rgba(54,228,255,.95));background-size:200% 100%;opacity:.9;animation:edgeFlow 6s linear infinite;}
  .kora-nav{position:relative;}
  .kora-nav::before{content:"";position:absolute;top:-1px;left:6%;right:6%;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(0,255,200,.95),rgba(54,228,255,.95),transparent);box-shadow:0 0 14px rgba(0,255,200,.6);animation:navPulse 3.2s ease-in-out infinite;}
  .kora-word{animation:wordGlow 3.6s ease-in-out infinite;}
  /* pickup/drop-off run-sheet polish — matches pickup-polished-mockup.html */
  @keyframes koraShimmer{0%{background-position:-160% 0;}100%{background-position:260% 0;}}
  @keyframes koraBtnSheen{0%{left:-60%;}55%{left:130%;}100%{left:130%;}}
  .rsCard{position:relative;background:rgba(20,29,46,.88);border-radius:16px;padding:15px;overflow:hidden;isolation:isolate;box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 8px 28px -16px rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  .rsCard>*{position:relative;z-index:1;}
  .rsCard .orb{position:absolute;border-radius:50%;filter:blur(30px);z-index:0;pointer-events:none;}
  /* glow-orb badge — soft light bloom behind a small icon/number, per the reference mood boards */
  .obadge-wrap{position:relative;flex-shrink:0;}
  .obadge-glow{position:absolute;inset:-9px;border-radius:50%;filter:blur(8px);z-index:0;}
  .obadge{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;color:#fff;width:100%;height:100%;border-radius:8px;}
  /* shimmer step-labels — solid colour declared first so unsupported browsers keep readable text */
  .kShim{position:relative;background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:koraShimmer 3.4s linear infinite;}
  .kShim.t{color:#7fe7cd;background-image:linear-gradient(100deg,#2ea888 0%,#7fe7cd 42%,#eafffb 50%,#7fe7cd 58%,#2ea888 100%);}
  .kShim.b{color:#9ccdf0;background-image:linear-gradient(100deg,#3f86c4 0%,#9ccdf0 42%,#eaf6ff 50%,#9ccdf0 58%,#3f86c4 100%);}
  .kShim.a{color:#f2c988;background-image:linear-gradient(100deg,#c98a2f 0%,#f2c988 42%,#fff3df 50%,#f2c988 58%,#c98a2f 100%);}
  /* gradient-glow names/values — same safe-fallback pattern */
  .kGlowT{color:#7fe7cd;background:linear-gradient(120deg,#eafffb,#7fe7cd 60%,#4ea8e6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .kGlowB{color:#9ccdf0;background:linear-gradient(120deg,#eaf4ff,#9ccdf0 55%,#6fd4ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .kGlowA{color:#f2c988;background:linear-gradient(120deg,#fff2dc,#f2c988 55%,#e8a33d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .kBtn{position:relative;overflow:hidden;isolation:isolate;transition:transform .15s ease;border:2px solid var(--kb2,rgba(255,255,255,.55)) !important;}
  .kBtn>*{position:relative;z-index:2;}
  .kBtn::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 16px -4px var(--kb2,rgba(255,255,255,.45));z-index:1;}
  .kBtn::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.22),transparent);transform:skewX(-18deg);z-index:1;animation:koraBtnSheen 4.5s ease-in-out infinite;}
  .kBtn:hover{transform:translateY(-1px);}
  /* mockup directions buttons — hairline gradient border via background-clip (NOT mask-composite, which Samsung Internet renders unreliably) */
  .kBtn2{position:relative;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:12px;border-radius:13px;padding:12px;font-weight:700;font-size:13.5px;font-family:"DM Sans",sans-serif;cursor:pointer;letter-spacing:.3px;overflow:hidden;isolation:isolate;border:none;transition:transform .15s ease,box-shadow .25s ease;color:#fff;background-image:linear-gradient(120deg,#FF3D7F,#B57BFF 55%,#36E4FF);background-size:220% 100%;animation:kbFlow 6s linear infinite;box-shadow:0 0 28px -4px rgba(255,61,127,.55);}
  .kBtn2.a{color:#2b1c05;background-image:linear-gradient(120deg,#e8a33d,#f2c988 55%,#fff3df);box-shadow:0 0 22px -4px rgba(232,163,61,.5);}
  .kBtn2>*{position:relative;z-index:2;}
  .kBtn2::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);z-index:1;animation:koraBtnSheen 4.5s ease-in-out infinite;pointer-events:none;}
  .kBtn2:hover{transform:translateY(-1px);}

  /* Targeting Reticle — address callout that "locks on" once, then stays still */

  @keyframes lockFlash{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0);}30%{box-shadow:0 0 26px 4px var(--flash);}}
  .reticle-wrap{position:relative;padding:11px;}
  .reticle-corner{position:absolute;width:15px;height:15px;border:2px solid var(--rc);animation:lockIn .5s cubic-bezier(.2,.9,.3,1.1) both;}
  .reticle-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:4px 0 0 0;--dx:-8px;--dy:-8px;}
  .reticle-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 4px 0 0;--dx:8px;--dy:-8px;}
  .reticle-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 4px;--dx:-8px;--dy:8px;}
  .reticle-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 4px 0;--dx:8px;--dy:8px;}
  .reticle-inner{border-radius:8px;padding:10px 12px;animation:lockFlash .9s ease-out .35s both;}
  .reticle-tag{display:flex;align-items:center;gap:6px;font-family:"Syne",sans-serif;font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .reticle-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .reticle-addr{font-size:16.5px;font-weight:700;color:#fff;line-height:1.4;}

  .reticle-wrap.t .reticle-tag{color:#7fe7cd;}

  .reticle-wrap.b .reticle-inner{background:rgba(78,168,230,.08);}
  .reticle-wrap.b .reticle-tag{color:#9ccdf0;}
  .reticle-wrap.b .reticle-dot{background-color:#9ccdf0;box-shadow:0 0 8px #4ea8e6;}
  .reticle-wrap.a{--rc:#f2c988;--flash:rgba(232,163,61,.55);}
  .reticle-wrap.a .reticle-inner{background:rgba(232,163,61,.08);}
  .reticle-wrap.a .reticle-tag{color:#f2c988;}

  .outing-bar::after{content:"";position:absolute;top:0;left:-60%;width:42%;height:100%;pointer-events:none;z-index:1;background:linear-gradient(100deg,transparent,rgba(255,255,255,.16),transparent);transform:skewX(-18deg);animation:koraBtnSheen 5.5s ease-in-out infinite;}

  .outing-bar.is-past{box-shadow:none;background:linear-gradient(180deg,rgba(255,122,24,.35),rgba(255,61,127,.22)) no-repeat 8px center / 3px 60%,linear-gradient(180deg,rgba(20,29,46,.85),rgba(14,22,36,.88));}
  .outing-bar.is-past::before{opacity:.4;background:linear-gradient(120deg,rgba(255,122,24,.55),rgba(255,61,127,.4));}
  .outing-bar.is-past::after{display:none;}
  @media (prefers-reduced-motion: reduce){ .outing-bar::after{display:none;} }
</style>

// Load this company's clients. If the table is empty, import the starter
// list ONCE so the user begins populated instead of blank.
async function loadClientsForCompany(companyId, seed) {
  let { data, error } = await db.from("clients").select("*").order("created_at", { ascending: true });
  if (error) { console.error("loadClients error:", error); return (seed || []).map(s => ({ ...s })); }
  if ((!data || data.length === 0) && seed && seed.length) {
    const rows = seed.map(c => clientAppToRow(companyId, c));
    const ins = await db.from("clients").insert(rows).select("*");
    if (ins.error) { console.error("import clients error:", ins.error); return seed.map(s => ({ ...s })); }
    data = ins.data;
  }
  return (data || []).map(clientRowToApp);
}

// Save a created or edited client. New = insert; existing (uuid id) = update.
async function saveClientToDb(companyId, data) {
  const row = clientAppToRow(companyId, data);
  const isExisting = data.id && typeof data.id === "string" && data.id.includes("-");
  if (isExisting) {
    const { data: upd, error } = await db.from("clients").update(row).eq("id", data.id).select("*").single();
    if (error) throw error;
    return clientRowToApp(upd);
  } else {
    const { data: ins, error } = await db.from("clients").insert(row).select("*").single();
    if (error) throw error;
    return clientRowToApp(ins);
  }
}

async function deleteClientFromDb(id) {
  const { error } = await db.from("clients").delete().eq("id", id);
  if (error) throw error;
}

// Short, unambiguous code (no I/L/O/0/1) the director hands to a worker.
function makeInviteToken() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 7; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
// Create a pending invite tied to THIS worker's record (worker_id) so that when
// they accept, their login is linked to the right team member — and therefore
// to the shifts assigned to them. Returns the token to show the director.
async function createInviteForWorker(companyId, worker) {
  const { data: u } = await db.auth.getUser();
  const token = makeInviteToken();
  const row = {
    company_id: companyId,
    worker_id: worker.id,
    email: worker.email || null,
    name: worker.name || null,
    phone: worker.phone || null,
    role: "worker",
    token,
    status: "pending",
    invited_by: (u && u.user && u.user.id) || null,
  };
  const { data, error } = await db.from("invitations").insert(row).select("token").single();
  if (error) throw error;
  return data.token;
}

// Reusable draft helpers: keep a half-filled NEW form if the popup closes/reloads.
function readFormDraft(key, enabled){ if(!enabled) return null; try{ const r=localStorage.getItem(key); return r?JSON.parse(r):null; }catch(e){ return null; } }
function clearFormDraft(key){ try{ localStorage.removeItem(key); }catch(e){} }
// Sign-on/off save is safety-critical (it's how anyone knows a worker actually
// started/finished) so a failed save is persisted here and retried automatically
// on reconnect or next app load, instead of silently vanishing if the tab closes.
const PENDING_SIGNSYNC_KEY = "kora_pending_signsync";
function readPendingSignSync(){ try{ const r=localStorage.getItem(PENDING_SIGNSYNC_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function writePendingSignSync(v){ try{ v ? localStorage.setItem(PENDING_SIGNSYNC_KEY, JSON.stringify(v)) : localStorage.removeItem(PENDING_SIGNSYNC_KEY); }catch(e){} }
// Attempts a save up to 3 times with a short backoff. saveShift() itself never
// throws (it catches DB errors internally) — it marks failure with __saveFailed
// instead — so we check that flag rather than relying on a rejected promise.
async function saveShiftWithRetry(onSaveShift, payload, attempts=3){
  let lastErr = null;
  for (let i=0;i<attempts;i++){
    try{
      const result = await onSaveShift(payload);
      if (result && result.__saveFailed) { lastErr = result.__saveError || "save failed"; }
      else return { ok:true, saved: result };
    } catch(e){ lastErr = (e&&e.message)||String(e); }
    if (i < attempts-1) await new Promise(r=>setTimeout(r, 1500*(i+1)));
  }
  return { ok:false, error: lastErr };
}

// New shift = numeric id (insert); existing = uuid id (update).
async function saveShiftToDb(companyId, s) {
  const row = shiftAppToRow(companyId, s);
  if (isUuid(s.id)) {
    const { data, error } = await db.from("shifts").update(row).eq("id", s.id).select("*").maybeSingle();
    if (error) throw error;
    if (data) return shiftRowToApp(data);
    // The id wasn't found to update (e.g. an earlier save failed and the row never reached the DB).
    // Insert it, preserving the id so local state stays consistent — no duplicate, no lost edit.
    const { data: ins, error: e2 } = await db.from("shifts").insert({ ...row, id: s.id }).select("*").maybeSingle();
    if (e2) throw e2;
    return shiftRowToApp(ins || { ...row, id: s.id });
  } else {
    const { data, error } = await db.from("shifts").insert(row).select("*").single();
    if (error) throw error;
    return shiftRowToApp(data);
  }
}
async function deleteShiftFromDb(id) {
  const { error } = await db.from("shifts").delete().eq("id", id);
  if (error) throw error;

// Turn real shifts into individual billing lines for the Invoicing tab.
// Each line item inside a shift becomes its own row (one for hours, one for km, etc).
function imageToDataUrl(file, maxPx=1400, quality=0.72){
  // Read a photo and shrink it so even large phone photos attach and stay small enough to store.
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxPx||h>maxPx){ const sc=maxPx/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
        try{
          const c=document.createElement("canvas"); c.width=w; c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          resolve(c.toDataURL("image/jpeg",quality));
        }catch(e){ resolve(reader.result); }
      };
      img.onerror=()=>resolve(reader.result);
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function swShiftRate(s, w){ const r = Number(s?.payRateUsed?.rate) || Number(w?.payRates?.[0]?.rate); return r>0 ? r : null; }
function hhmmFromIso(iso){ try{ const d=new Date(iso); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }catch(e){ return null; } }
function isShiftPast(s){
  if (!s) return false;
  if (s.status==="completed") return true;
  try { const end=new Date(`${s.date}T${(s.end||"23:59")}:00`); return end.getTime() < Date.now(); } catch(e){ return false; }
}
function isoFromHHMM(dateStr, hhmm){ try{ const [h,m]=String(hhmm).split(":").map(Number); const d=dateStr?new Date(dateStr+"T00:00:00"):new Date(); d.setHours(h||0,m||0,0,0); return d.toISOString(); }catch(e){ return null; } }
function shiftBillHours(s) {
  // Prefer the real signed-on → signed-off duration; fall back to scheduled times.
  if (s.signOnTime && s.signOffTime) {
    const h = (Date.parse(s.signOffTime) - Date.parse(s.signOnTime)) / 3600000;
    if (h > 0) return Math.round(h * 100) / 100;
  }
  const a = parseInt(s.start), b = parseInt(s.end);
  return (b > a) ? (b - a) : 0;
}
// A line item can be shared across participants (a group ratio like 1:2). The ratio's
// denominator divides the rate, so each participant is billed their share.
function ratioDiv(r){ const d = Number(String(r||"1:1").split(":")[1]); return d>0?d:1; }
function lineAmount(li){ return ((Number(li.qty)||0)*(Number(li.rate)||0))/ratioDiv(li.ratio); }
function flattenShiftsToLines(shifts, clients) {
  const out = [];
  (shifts||[]).forEach(s => {
    if (s.isOuting) return; // outings invoiced separately
    const lis = (s.lineItems && s.lineItems.length) ? s.lineItems : [];
    if (lis.length) {
      lis.forEach((li, i) => {
        const qty = Number(li.qty)||0, baseRate = Number(li.rate)||0;
        const div = ratioDiv(li.ratio);
        const rate = div!==1 ? +(baseRate/div).toFixed(2) : baseRate;
        out.push({
          id: `${s.id}::${li.id != null ? li.id : i}`,
          shiftId: s.id,
          date: s.date,
          start: s.start, end: s.end,
          participant: s.participant,
          participantId: s.participantId,
          workerId: s.workerId,
          desc: (li.ratio && li.ratio!=="1:1") ? `${li.desc} (ratio ${li.ratio})` : li.desc,
          code: li.code, unit: li.unit || "hrs",
          qty, rate, ratio: li.ratio || "1:1",
          total: (li.total != null) ? Number(li.total) : +(qty*rate).toFixed(2),
          km: (li.unit === "km") ? qty : 0,
          kmRate: (li.unit === "km") ? rate : 0,
          invoiced: !!s.invoiced,
          invoiceId: s.invoiceId || null,
        });
      });
      return;
    }
    // No line items on the shift → build them from the client's rate + the shift hours.
    const client = (clients||[]).find(c => String(c.id) === String(s.participantId));
    const rate = client ? Number(client.rate)||0 : 0;
    const hrs = shiftBillHours(s);
    if (rate && hrs) {
      out.push({
        id: `${s.id}::auto`, shiftId: s.id, date: s.date,
        start: s.start, end: s.end,
        participant: s.participant, participantId: s.participantId, workerId: s.workerId,
        desc: s.type || (client && client.serviceName) || "Support",
        code: s.code || (client && client.code) || "",
        unit: "hrs", qty: hrs, rate, total: +(hrs*rate).toFixed(2),
        km: 0, kmRate: 0,
        invoiced: !!s.invoiced, invoiceId: s.invoiceId || null, _auto: true,
      });
    }
    // Transport from kilometres the worker logged on the shift.
    const km = s.kms ? (Number(s.kms.perClient) || Number(s.kms.total) || 0) : 0;
    const tRate = client ? Number(client.transport)||0 : 0;
    if (km && tRate) {
      out.push({
        id: `${s.id}::auto-km`, shiftId: s.id, date: s.date,
        participant: s.participant, participantId: s.participantId, workerId: s.workerId,
        desc: "Activity Based Transport", code: s.code || (client && client.code) || "",
        unit: "km", qty: km, rate: tRate, total: +(km*tRate).toFixed(2),
        km, kmRate: tRate,
        invoiced: !!s.invoiced, invoiceId: s.invoiceId || null, _auto: true,
      });
    }
  });
  return out;
}

function shiftClockState(s){
  if (!s || s.status!=="upcoming") return s ? s.status : "upcoming";
  if (!s.date || !s.start) return "upcoming";
  const mk=(t)=>{ if(!t) return null; const parts=String(t).split(":"); const d=new Date(s.date+"T00:00:00"); d.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, 0, 0); return d; };
  const now=new Date(), start=mk(s.start), end=mk(s.end);
  if (end && now>end) return "missed";
  if (start && now>=start) return "due";
  return "upcoming";
}

// Build historic roster shifts from the billing ledger so the Money view has real
// history to work with. Each shift is self-contained: its own lineItems (→ income),
// the pay rate chosen on the shift (→ wages), and an invoiced flag.
const HISTORIC_SHIFTS = (() => {
  const groups = {};
  ALL_SHIFTS.forEach(l => {
    const k = `${l.date}|${l.participantId}|${l.workerId}`;
    (groups[k] = groups[k] || []).push(l);
  });
  const pad = n => String(n).padStart(2, "0");
  const addHrs = (start, h) => {
    const [hh, mm] = start.split(":").map(Number);
    const t = hh * 60 + mm + Math.round(h * 60);
    return `${pad(Math.floor(t / 60) % 24)}:${pad(t % 60)}`;
  };
  let id = 900;
  return Object.entries(groups).map(([k, lines]) => {
    const [date, pidStr, widStr] = k.split("|");
    const pid = Number(pidStr), wid = Number(widStr);
    const hoursLine = lines.find(l => l.unit === "hrs") || {};
    const hrs = Number(hoursLine.qty) || 0;
    const w = WORKERS.find(x => x.id === wid);
    const p = PARTICIPANTS.find(x => x.id === pid);
    const isSat = /saturday/i.test(hoursLine.desc || "");
    const start = "09:00";
    return {
      id: id++, date, status: "completed",
      workerId: wid, worker: w?.name || "",
      participantId: pid, participant: p?.name || "",
      start, end: addHrs(start, hrs), startMs: null,
      type: (hoursLine.desc || "Community Social & Rec").replace(/\s*-\s*Saturday$/i, ""),
      code: hoursLine.code,
      // Pay rate chosen on the shift — Saturday loading flows straight into wages.
      payRateUsed: { label: isSat ? "Saturday" : "Weekday", category: isSat ? "Saturday" : "Weekday", rate: isSat ? 42.75 : 28.50 },
      invoiced: date < "2026-06-01",   // May shifts already invoiced; June not yet
      lineItems: lines.map(l => ({ id: l.id, code: l.code, desc: l.desc, unit: l.unit, qty: l.qty, rate: l.rate, total: l.total })),
    };
  });
})();

// ── HUD: Circular Arc Gauge ───────────────────────────────────
const ArcGauge = ({ value, max=100, size=120, label, sublabel, color, gradId="arcg", thickness=9 }) => {
  const pct = Math.max(0, Math.min(1, value/max));
  const r = (size - thickness) / 2;
  const cx = size/2, cy = size/2;
  const circ = 2 * Math.PI * r;
  const sweep = 0.75; // 270° arc
  const dash = circ * sweep;
  const offset = dash * (1 - pct);
  const startAngle = 135;
  return (
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{transform:`rotate(${startAngle}deg)`,filter:`drop-shadow(0 0 6px ${color}66)`}}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#FF7A18"/>
            <stop offset="100%" stopColor={color||"#FF3D7F"}/>
          </linearGradient>
        </defs>
        {/* track */}
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={thickness}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
        {/* value */}
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={`url(#${gradId})`} strokeWidth={thickness}
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"absolute",textAlign:"center"}}>
        <div style={{fontSize:size*0.22,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.white,lineHeight:1}}>{label}</div>
        {sublabel && <div style={{fontSize:size*0.075,color:T.subtle,letterSpacing:"1.5px",textTransform:"uppercase",marginTop:4}}>{sublabel}</div>}
      </div>
    </div>
  );
};

// ── HUD: Chrome corner brackets wrapper ───────────────────────
const ChromeFrame = ({ children, color=T.orange, label, style={} }) => (
  <div style={{position:"relative",...style}}>
    {/* corner brackets */}
    {[[0,0,"top","left"],[0,0,"top","right"],[0,0,"bottom","left"],[0,0,"bottom","right"]].map((c,i)=>(
      <div key={i} style={{
        position:"absolute",width:14,height:14,zIndex:2,
        [c[2]]:-1,[c[3]]:-1,
        [`border${c[2][0].toUpperCase()+c[2].slice(1)}`]:`1.5px solid ${color}`,
        [`border${c[3][0].toUpperCase()+c[3].slice(1)}`]:`1.5px solid ${color}`,
        borderTopLeftRadius: c[2]==="top"&&c[3]==="left"?4:0,
        borderTopRightRadius: c[2]==="top"&&c[3]==="right"?4:0,
        borderBottomLeftRadius: c[2]==="bottom"&&c[3]==="left"?4:0,
        borderBottomRightRadius: c[2]==="bottom"&&c[3]==="right"?4:0,
      }}/>
    ))}
    {label && <div style={{position:"absolute",top:-7,left:14,background:T.bg,padding:"0 6px",fontSize:10,fontWeight:400,letterSpacing:"2px",textTransform:"uppercase",color,zIndex:3,fontFamily:"monospace"}}>{label}</div>}
    {children}
  </div>
);

    <div style={{position:"absolute",bottom:"2%",left:"-18%",width:"55%",height:"32%",background:"radial-gradient(circle, rgba(0,191,255,0.05), transparent 70%)",filter:"blur(48px)"}}/>

);

  <img src={KORU_IMG} alt="KORA" style={{height:size,width:"auto",display:"inline-block",verticalAlign:"middle"}}/>
);

// ── Live Timer ────────────────────────────────────────────────
const LiveTimer = ({startMs}) => {
  const [elapsed,setElapsed]=useState(Date.now()-startMs);
  useEffect(()=>{const i=setInterval(()=>setElapsed(Date.now()-startMs),1000);return()=>clearInterval(i);},[startMs]);
  return <span>{fmtTime(elapsed)}</span>;
};

// ── Header ────────────────────────────────────────────────────
const Header = ({subtitle,subtitleColor=T.teal,right,onBack}) => (
  <div style={{background:T.navyDeep,borderBottom:`1px solid ${T.borderAccent}`,padding:"calc(14px + env(safe-area-inset-top)) 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:T.subtle,fontSize:18,cursor:"pointer",marginRight:2,padding:0}}>←</button>}
      <KoruLogo size={24}/>
      <div>
        <div className="kora-word" style={{fontSize:14,fontWeight:700,fontFamily:"Syne,sans-serif",letterSpacing:"0.5px",background:`linear-gradient(92deg,${T.teal},${T.blue})`,WebkitBackgroundClip:"text",backgroundClip:"text",color:"transparent"}}>KORA</div>
        <div style={{fontSize:11,color:subtitleColor,letterSpacing:"1.5px",textTransform:"uppercase"}}>{subtitle}</div>
      </div>
    </div>
    {right}
  </div>
);

  };

function ActiveShiftScreen({shift,worker,onSignOff,onBack,onUpdateShift,participants,workers,shifts,initialModal}) {
  const participant = (participants||[]).find(p=>String(p.id)===String(shift.participantId))
    || PARTICIPANTS.find(p=>p.id===shift.participantId)
    || { id: shift.participantId, name: shift.participant || "Client", initials: (shift.participant||"C").slice(0,2).toUpperCase(), goals: [], transport: 0.95 };
  const pastMode = shift.status!=="active"; // editable record view: reopened completed OR an un-signed-on shift being recorded
  const [startMs]=useState(shift.startMs || (shift.signOnTime?Date.parse(shift.signOnTime):Date.now()));
  const fmtClock = (iso)=>{ try{ return new Date(iso).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
  const [modal,setModal]=useState(initialModal||null); // null | 'note' | 'km' | 'receipt' | 'incident' | 'signoff'
  const [showClientInfo,setShowClientInfo]=useState(false);
  const [showRunSheet,setShowRunSheet]=useState(false);
  const isGroupOuting = !!(shift.title && ((shift.participantIds&&shift.participantIds.length>0)||(shift.participantPlans&&Object.keys(shift.participantPlans).length>0)));
  const [log,setLog]=useState([]);
  // Clients who have a shift on this date — queried team-wide (so a connected client counts
  // even if a different worker staffs their shift). Falls back to loaded shifts if RLS blocks it.
  const [dayClientIds,setDayClientIds]=useState(null);
  useEffect(()=>{
    let alive=true;
    (async()=>{
      try{
        const { data, error } = await db.from("shifts").select("participant_id,participant_ids").eq("date", shift.date);
        if(error) throw error;
        const ids=[...new Set((data||[]).flatMap(r=>(r.participant_ids&&r.participant_ids.length)?r.participant_ids:[r.participant_id]).filter(Boolean).map(String))];
        if(alive) setDayClientIds(ids);
      }catch(e){ if(alive) setDayClientIds(null); }
    })();
    return ()=>{alive=false;};
  }, [shift.date]);
  // Editable shift times (used in pastMode)
  const [editStart,setEditStart]=useState(shift.start||"09:00");
  const [editEnd,setEditEnd]=useState(shift.end||"13:00");
  const [timesSaved,setTimesSaved]=useState(false);
  const [editingTimes,setEditingTimes]=useState(false); // times are read-only until the worker chooses to edit
  const [timesMsg,setTimesMsg]=useState(""); // funding outcome message after a time edit
  const [showDetails,setShowDetails]=useState(!pastMode); // hide the read-only detail when editing a past shift
  // When a worker records a shift they never signed on/off, finishing marks it completed using the entered/rostered times.
  const markRecorded = ()=>{
    if (shift.status!=="completed") {
      onUpdateShift?.({...shift, status:"completed", start:editStart, end:editEnd,
        signOnTime: shift.signOnTime || isoFromHHMM(shift.date, editStart) || null,
        signOffTime: shift.signOffTime || isoFromHHMM(shift.date, editEnd) || null,
        recordedNoSignOn: !shift.signOnTime && !shift.signOffTime, edited:true});
    }
    onBack && onBack();
  };
  // Editable actual sign-on / sign-off clock times (for late sign-on or sign-off)
  const nowHHMM = ()=>{ const d=new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
  const [signoffHHMM,setSignoffHHMM]=useState(nowHHMM());
  const [signonEdit,setSignonEdit]=useState(shift.signOnTime?hhmmFromIso(shift.signOnTime):(shift.start||"09:00"));
  const [signonSaved,setSignonSaved]=useState(false);
  // Live shift duration from the edited start → end times (updates as the worker corrects them)
  const _phHrs = (t)=>{const [h,m]=String(t||"0").split(":").map(Number); return (h||0)+((m||0)/60);};
  let _editDurH = _phHrs(signoffHHMM)-_phHrs(signonEdit); if(_editDurH<0) _editDurH+=24;
  const editedDurMs = Math.max(0,_editDurH)*3600000;
  // KM state
  // Per-shift draft: keep half-entered km / receipt / progress note if the screen closes or reloads.
  const WORK_DRAFT_KEY = `kora_work_draft_${shift.id}`;
  const workDraft0 = (()=>{ try{ const r=localStorage.getItem(WORK_DRAFT_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } })();
  const [kmStart,setKmStart]=useState(shift.kms&&shift.kms.startOdo!=null?String(shift.kms.startOdo):((workDraft0&&!(shift.kms&&shift.kms.total!=null)&&workDraft0.kmStart)||""));
  const [kmEnd,setKmEnd]=useState(shift.kms&&shift.kms.endOdo!=null?String(shift.kms.endOdo):((workDraft0&&!(shift.kms&&shift.kms.total!=null)&&workDraft0.kmEnd)||""));
  const [passengers,setPassengers]=useState([]); // array of participant ids
  const [kmSaved,setKmSaved]=useState(!!(shift.kms&&shift.kms.total!=null));
  const [kmShared,setKmShared]=useState(null); // {total, perClient, clients:[{id,name,km}]} after save
  const [fromSignoff,setFromSignoff]=useState(false); // track if a sub-modal was opened from sign-off
  // Receipt state
  const [receipts,setReceipts]=useState(shift.receipts||[]);
  // Persisted activity mirrors (saved onto the shift row)
  const [kmSavedData,setKmSavedData]=useState(shift.kms||null);
  const [noteData,setNoteData]=useState(shift.progressNote||null);
  const [incidentsData,setIncidentsData]=useState(shift.incidents||[]);
  const [rptAmt,setRptAmt]=useState((workDraft0&&workDraft0.rptAmt)||"");
  const [rptDesc,setRptDesc]=useState((workDraft0&&workDraft0.rptDesc)||"");
  const [rptImages,setRptImages]=useState([]); // pending images for current receipt
  const rptFileRef = useRef(null);
  // Progress note state
  const [noteGoals,setNoteGoals]=useState([]);
  const [noteSkill,setNoteSkill]=useState("");
  const [noteObs,setNoteObs]=useState("");
  const [noteQuote,setNoteQuote]=useState((shift.progressNote&&shift.progressNote.quote) || (!shift.progressNote&&workDraft0&&workDraft0.noteQuote) || "");
  const [noteSupport,setNoteSupport]=useState([]);
  const [noteIndep,setNoteIndep]=useState(null);
  const [notePlanned,setNotePlanned]=useState("");
  const [noteActual,setNoteActual]=useState("");
  const [noteSaved,setNoteSaved]=useState(!!(shift.progressNote));
  const INDEP_C=[null,T.red,T.orange,T.amber,T.blue,T.teal];
  const blankObs=()=>({ id:Math.random().toString(36).slice(2,9), goal:"", skill:"", what:"", count:"", indep:null, support:[] });
  const [noteObservations,setNoteObservations]=useState(()=> {
    if(shift.progressNote&&Array.isArray(shift.progressNote.observations)&&shift.progressNote.observations.length) return shift.progressNote.observations.map(o=>({...o,id:o.id||Math.random().toString(36).slice(2,9),support:[...(o.support||[])]}));
    if(!shift.progressNote&&workDraft0&&Array.isArray(workDraft0.noteObservations)&&workDraft0.noteObservations.length) return workDraft0.noteObservations.map(o=>({...o,id:o.id||Math.random().toString(36).slice(2,9),support:[...(o.support||[])]}));
    return [blankObs()];
  });
  const [noteIncidentFlag,setNoteIncidentFlag]=useState(()=> shift.progressNote? !!shift.progressNote.incident : !!(workDraft0&&workDraft0.noteIncidentFlag));
  const updateObs=(id,patch)=>setNoteObservations(p=>p.map(o=>o.id===id?{...o,...patch}:o));  const removeObs=(id)=>setNoteObservations(p=>p.length>1?p.filter(o=>o.id!==id):p);
  const addObs=()=>setNoteObservations(p=>[...p,blankObs()]);
  const toggleObsSupport=(id,s)=>setNoteObservations(p=>p.map(o=>o.id===id?{...o,support:(o.support||[]).includes(s)?o.support.filter(x=>x!==s):[...(o.support||[]),s]}:o));
  const obsValid=(o)=>!!(o.goal&&o.what&&o.indep);
  const noteReady=noteObservations.some(obsValid);
  const obsHasContent=(o)=>!!(o.goal||o.what||o.skill||(o.count!=null&&String(o.count).trim()!=="")||(o.support&&o.support.length)||o.indep);
  const noteHasContent=noteObservations.some(obsHasContent)||!!(noteQuote&&noteQuote.trim());
  // Autosave half-entered km / current receipt / progress note for this shift (text only, no images).
  useEffect(()=>{
    try{ localStorage.setItem(WORK_DRAFT_KEY, JSON.stringify({ kmStart, kmEnd, rptAmt, rptDesc, noteObservations, noteQuote, noteIncidentFlag })); }catch(e){}
  }, [kmStart, kmEnd, rptAmt, rptDesc, noteObservations, noteQuote, noteIncidentFlag]);
  // Incident
  const [incAnte,setIncAnte]=useState("");
  const [incBeh,setIncBeh]=useState("");
  const [incDur,setIncDur]=useState("");
  const [incRec,setIncRec]=useState("");
  const [incStrat,setIncStrat]=useState("");
  const [incSaved,setIncSaved]=useState(false);
  const [signoffLoc,setSignoffLoc]=useState(null); // {lat,lng,accuracy,time} | "denied" | "loading"

  const addLog = (type,text,color) => setLog(l=>[{type,text,color,time:nowTime(),id:Date.now()},...l]);

  // Persist a record to the worker's history (window.__koraRecords[workerName])
  const saveRecord = (kind, data) => {
    if (typeof window==="undefined") return;
    window.__koraRecords = window.__koraRecords || {};
    const wname = worker?.name || "Unknown";
    window.__koraRecords[wname] = window.__koraRecords[wname] || [];
    window.__koraRecords[wname].unshift({
      id: Date.now()+Math.random(),
      kind, // 'note' | 'km' | 'receipt' | 'incident'
      date: shift.date || new Date().toISOString().split("T")[0],
      shiftId: shift.id,
      participant: PARTICIPANTS.find(p=>p.id===shift.participantId)?.name || shift.participant || (shift.isOuting?shift.title:""),
      ts: Date.now(),
      ...data,
    });
  };

  // Persist activity onto the shift row (DB) and keep the active shift in sync.
  const persist = (extra={}) => {
    const upd = { ...shift, kms:kmSavedData, receipts, incidents:incidentsData, progressNote:noteData, ...extra };
    onUpdateShift?.(upd);
  };

  const kmDistance = kmStart&&kmEnd ? Math.max(0,Number(kmEnd)-Number(kmStart)) : 0;
  const kmComplete = kmStart && kmEnd && Number(kmEnd) > Number(kmStart);
  const kmCost = kmDistance * (participant.transport||0.95);
  // Even split across this client + selected passengers
  const kmClientCount = passengers.length + 1;
  const kmPerClient = kmComplete ? +(kmDistance / kmClientCount).toFixed(2) : 0;
  const shiftHrs = (Date.now()-startMs)/3600000;
  const estClaim = shiftHrs*participant.rate + kmCost + receipts.reduce((s,r)=>s+r.amt,0);

  // Clients on shift the same day, limited to those connected to this worker (ride-along passengers).
  const allShiftsToday = (shifts && shifts.length) ? shifts : ((typeof window!=="undefined" && window.__koraShifts) || []);
  const loadedDayIds = [...new Set(
    allShiftsToday
      .filter(s => (s.date||"") === (shift.date||"") )
      .flatMap(s => s.participantIds || [s.participantId])
      .filter(Boolean).map(String)
  )];
  const dayIds = (dayClientIds && dayClientIds.length) ? dayClientIds : loadedDayIds;
  const connectedIds = (worker && Array.isArray(worker.clients) ? worker.clients : []).map(String);
  const clientPool = (participants && participants.length) ? participants : PARTICIPANTS;
  let sameDayIds = dayIds.filter(id => String(id) !== String(participant.id));
  if (connectedIds.length) sameDayIds = sameDayIds.filter(id => connectedIds.includes(String(id)));
  const sameDayClients = [...new Set(sameDayIds)]
    .map(id => clientPool.find(p=>p && String(p.id)===String(id)) || PARTICIPANTS.find(p=>String(p.id)===String(id)) || {id, name:"Client", initials:"?"});

  const logColors = {note:T.teal,km:"#a78bfa",receipt:T.amber,incident:T.red};

  return (
    <div style={{background:"#0b1320",minHeight:"100vh",paddingBottom:80,fontFamily:"DM Sans,sans-serif",color:T.white,position:"relative"}}>
      <AmbientGlow warm/>
      <div style={{position:"relative",zIndex:1}}>
      <Header subtitle={pastMode?(shift.status==="completed"?"Edit Past Shift":"Record Shift"):"Active Shift"} onBack={onBack}
        right={pastMode
          ? <button onClick={markRecorded} style={{background:`${T.teal}18`,border:`1px solid ${T.teal}55`,color:T.teal,padding:"7px 14px",borderRadius:10,fontWeight:500,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{shift.status==="completed"?"Done":"Save shift"}</button>
          : <button onClick={()=>setModal('signoff')} style={{background:"rgba(255,92,122,0.12)",border:"1px solid rgba(255,92,122,0.35)",color:T.red,padding:"7px 14px",borderRadius:10,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Sign Off</button>}
      />

      {/* Fire heartbeat rail — pulses while the shift is live */}
      <div style={{height:3,background:pastMode?"rgba(255,255,255,0.05)":`linear-gradient(92deg,${T.orange},${T.pink})`,animation:pastMode?"none":"heartbeat 2.4s ease-in-out infinite"}}/>

      <div style={{padding:"16px 16px 0"}}>
        {/* Timer hero (active) OR editable times (past mode) */}
        {pastMode ? (
          <Card glow style={{padding:"16px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,color:T.teal,letterSpacing:"2px",textTransform:"uppercase",fontWeight:400}}>Shift Times</div>
              {!editingTimes && (
                <button onClick={()=>{setEditingTimes(true);setTimesSaved(false);}} style={{background:`${T.teal}18`,border:`1px solid ${T.teal}55`,color:T.teal,padding:"6px 12px",borderRadius:9,fontWeight:500,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>✏️ Edit</button>
              )}
            </div>

            {!editingTimes ? (
              <div style={{display:"flex",alignItems:"center",gap:12,marginTop:12}}>
                <div style={{fontSize:20,fontFamily:"Syne,sans-serif",color:T.white}}>{editStart}</div>
                <div style={{color:T.subtle}}>→</div>

                  <div key={i} style={{position:"relative"}}>
                    <img src={img} alt="" style={{width:64,height:64,objectFit:"cover",borderRadius:10,border:`1px solid ${T.amber}44`}}/>
                    <button onClick={()=>setRptImages(p=>p.filter((_,x)=>x!==i))} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:T.red,border:"none",color:"#fff",fontSize:12,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>
                ))}
              </div>
            )}
            <input ref={rptFileRef} type="file" accept="image/*" multiple style={{display:"none"}}
              onChange={async e=>{
                const files=Array.from(e.target.files||[]);
                for(const f of files){ try{ const url=await imageToDataUrl(f); setRptImages(p=>[...p,url]); }catch(err){} }
                e.target.value="";
              }}/>
            <div onClick={()=>rptFileRef.current?.click()} style={{background:"rgba(255,255,255,0.03)",border:`1px dashed ${T.amber}44`,borderRadius:12,padding:"16px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:20,marginBottom:4}}>📷</div>
              <div style={{fontSize:12,color:T.amber,fontWeight:500}}>Tap to attach photo{rptImages.length?"s":""}</div>
              <div style={{fontSize:12,color:T.subtle,marginTop:2}}>Add multiple — any phone photo works, auto-resized</div>
            </div>
            <BtnPrimary onClick={()=>{if(rptAmt&&rptDesc){const r={amt:Number(rptAmt),desc:rptDesc,time:nowTime(),images:rptImages};const newReceipts=[...receipts,r];setReceipts(newReceipts);addLog("Receipt Added",`${fmt$(Number(rptAmt))} — ${rptDesc}${rptImages.length?` (${rptImages.length} img)`:""}`,logColors.receipt);saveRecord("receipt",{amt:Number(rptAmt),desc:rptDesc,images:rptImages});persist({receipts:newReceipts});setRptAmt("");setRptDesc("");setRptImages([]);}}} disabled={!rptAmt||!rptDesc}>Add Receipt</BtnPrimary>
            {(receipts.length>0||fromSignoff)&&<BtnOutline onClick={()=>{if(fromSignoff){setFromSignoff(false);setModal("signoff");}else{setModal(null);}}}>{fromSignoff?"Back to Sign Off":"Done"}</BtnOutline>}
          </div>
        </Modal>
      )}

      {/* ── PROGRESS NOTE MODAL (structured observations) ── */}
      {modal==="note"&&(
        <Modal title="📋 Progress Note" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:11.5,color:T.subtle,lineHeight:1.5}}>Add one observation for each goal you worked on. Keep it specific and measurable — that's what makes it count at plan review.</div>

            {noteObservations.map((o,idx)=>(
              <div key={o.id} style={{background:"rgba(22,32,50,0.5)",border:`1px solid ${T.border}`,borderRadius:16,padding:13}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:T.muted}}>Observation {idx+1}</span>
                  {noteObservations.length>1 && <button onClick={()=>removeObs(o.id)} style={{marginLeft:"auto",background:"none",border:"none",color:T.muted,fontSize:17,cursor:"pointer",lineHeight:1}}>×</button>}
                </div>

                <SLabel>Goal {(participant.goals||[]).length===0?"(none on plan yet)":"(from plan)"}</SLabel>
                {(participant.goals||[]).length>0 ? (
                  <select value={o.goal} onChange={e=>updateObs(o.id,{goal:e.target.value})} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${o.goal?T.teal+"66":T.border}`,borderRadius:10,padding:"10px 11px",color:o.goal?"#fff":T.muted,fontSize:12.5,fontFamily:"DM Sans,sans-serif",outline:"none"}}>
                    <option value="" style={{color:"#000"}}>Select a goal…</option>
                    {(participant.goals||[]).map(g=><option key={g} value={g} style={{color:"#000"}}>{g}</option>)}
                  </select>
                ) : (
                  <Input value={o.goal} onChange={v=>updateObs(o.id,{goal:v})} placeholder="Type the goal worked on"/>
                )}

                <div style={{height:8}}/>
                <Input label="Skill / activity" value={o.skill} onChange={v=>updateObs(o.id,{skill:v})} placeholder="e.g. Paying at the counter"/>
                <Textarea label="What happened" value={o.what} onChange={v=>updateObs(o.id,{what:v})} placeholder={`Specific & measurable — e.g. "${participant.name} paid with card, needed one verbal prompt for the PIN"`} rows={3} required/>

                <div style={{display:"flex",gap:10,marginTop:2}}>
                  <div style={{width:92}}>
                    <SLabel>Count</SLabel>
                    <input type="number" inputMode="numeric" value={o.count} onChange={e=>updateObs(o.id,{count:e.target.value})} placeholder="e.g. 2" style={{width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 11px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <SLabel>Independence</SLabel>
                    <div style={{display:"flex",gap:4}}>
                      {[1,2,3,4,5].map(n=>{const on=o.indep===n;const c=INDEP_C[n];return(
                        <button key={n} onClick={()=>updateObs(o.id,{indep:n})} style={{flex:1,padding:"8px 0",borderRadius:8,fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",border:`1px solid ${on?c:T.border}`,background:on?c:"rgba(255,255,255,0.03)",color:on?"#0d0f13":T.muted}}>{n}</button>
                      );})}
                    </div>
                    {o.indep && <div style={{fontSize:12,fontWeight:600,marginTop:5,color:INDEP_C[o.indep]}}>{o.indep} · {INDEPENDENCE.find(l=>l.level===o.indep).label}</div>}
                  </div>
                </div>

                <div style={{marginTop:10}}>
                  <SLabel>Support used</SLabel>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {SUPPORT_TYPES.map(s=>{const on=(o.support||[]).includes(s);return(
                      <button key={s} onClick={()=>toggleObsSupport(o.id,s)} style={{padding:"6px 10px",borderRadius:20,background:on?`${T.amber}22`:"transparent",border:`1px solid ${on?T.amber:T.border}`,color:on?T.amber:T.subtle,fontSize:11,fontWeight:on?600:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{s}</button>
                    );})}
                  </div>
                </div>
              </div>
            ))}

            <button onClick={addObs} style={{width:"100%",border:"1px dashed rgba(255,255,255,0.18)",background:"transparent",borderRadius:14,padding:12,color:T.teal,fontFamily:"DM Sans,sans-serif",fontWeight:600,fontSize:12.5,cursor:"pointer"}}>＋ Add observation</button>

            <Divider/>
            <Input label="Participant quote (optional)" value={noteQuote} onChange={setNoteQuote} placeholder={`Something ${participant.name} said today`}/>

            <button onClick={()=>setNoteIncidentFlag(!noteIncidentFlag)} style={{display:"flex",alignItems:"center",gap:11,background:"rgba(22,32,50,0.5)",border:`1px solid ${noteIncidentFlag?T.red+"66":T.border}`,borderRadius:14,padding:"11px 13px",cursor:"pointer",textAlign:"left"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:600,color:"#fff"}}>Did an incident happen?</div>
                <div style={{fontSize:12,color:T.subtle,marginTop:2}}>If yes, also add an incident report from the shift screen.</div>
              </div>
              <div style={{width:46,height:27,borderRadius:20,background:noteIncidentFlag?T.red:"rgba(255,255,255,0.14)",position:"relative",flexShrink:0,transition:"background .15s"}}>
                <span style={{position:"absolute",top:3,left:noteIncidentFlag?22:3,width:21,height:21,borderRadius:"50%",background:"#fff",transition:"left .15s"}}/>
              </div>
            </button>

            <BtnPrimary disabled={!noteHasContent} onClick={()=>{
              const cleaned=noteObservations.filter(obsHasContent);
              setNoteSaved(true);
              const firstGoal=cleaned[0]?cleaned[0].goal:"";
              addLog("Progress Note",`${cleaned.length} observation${cleaned.length!==1?"s":""}${firstGoal?` · ${firstGoal}`:""}`,logColors.note);
              const noteObj={observations:cleaned,quote:noteQuote,incident:noteIncidentFlag};
              saveRecord("note",noteObj);setNoteData(noteObj);persist({progressNote:noteObj});
              if(fromSignoff){setFromSignoff(false);setModal("signoff");}else{setModal(null);}
            }}>
              {noteHasContent?`Save progress note (${noteObservations.filter(obsHasContent).length})`:"Add a goal, note or observation to save"}
            </BtnPrimary>
          </div>
        </Modal>
      )}

      {/* ── INCIDENT MODAL ── */}
      {modal==="incident"&&(
        <Modal title="🛡️ Incident Report" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"rgba(255,92,122,0.08)",border:"1px solid rgba(255,92,122,0.25)",borderRadius:12,padding:"10px 12px",fontSize:11,color:T.body,lineHeight:1.5}}>
              Record behaviours of concern or incidents that require reporting. This supplements — not replaces — a progress note.
            </div>
            <Textarea label="Antecedent (what happened before)" value={incAnte} onChange={setIncAnte} placeholder="What was happening immediately before the behaviour?" rows={2}/>
            <Textarea label="Behaviour (observable, factual)" value={incBeh} onChange={setIncBeh} placeholder="Describe exactly what happened — no interpretations" rows={3} required/>
            <Input label="Duration" value={incDur} onChange={setIncDur} placeholder="e.g. 4 minutes"/>
            <Textarea label="Recovery / how it resolved" value={incRec} onChange={setIncRec} placeholder="What happened next? How did the person return to baseline?" rows={2}/>
            <Textarea label="Strategies used" value={incStrat} onChange={setIncStrat} placeholder="What strategies did you use? Were they effective?" rows={2}/>
            <BtnPrimary danger disabled={!incBeh} onClick={()=>{setIncSaved(true);addLog("Incident Recorded","Incident report submitted — manager notified",logColors.incident);const incObj={antecedent:incAnte,behaviour:incBeh,duration:incDur,recovery:incRec,strategies:incStrat,time:nowTime()};saveRecord("incident",incObj);const newInc=[...incidentsData,incObj];setIncidentsData(newInc);persist({incidents:newInc});
              // Notify the manager by SMS (incidents are urgent)
              try {
                const cs = (typeof window!=="undefined" && window.__koraCS) || {};
                if (COMPANY.managerPhone) {
                  const who = PARTICIPANTS.find(p=>p.id===shift.participantId)?.name || shift.participant || "a participant";
                  sendClickSendSMS(cs.username, cs.apiKey, COMPANY.managerPhone, `KORA INCIDENT: ${worker?.name||"A worker"} logged an incident for ${who} today. Review in Paperwork → Incident Reports. — ${COMPANY.shortName}`).catch(()=>{});
                }
              } catch(e){}
              setModal(null);}}>
              {incBeh?"Submit Incident Report":"Describe the behaviour to continue"}
            </BtnPrimary>
          </div>
        </Modal>
      )}

      {/* ── SIGN OFF MODAL ── */}
      {modal==="signoff"&&(
        <Modal title="Sign Off Shift" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:12,color:T.body,lineHeight:1.6}}>Review your shift before signing off. Make sure everything is logged.</div>
            <div style={{fontSize:11,color:T.subtle,marginBottom:2}}>Tap any ⚠️ item to complete it now.</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                {label:"Participant",val:participant.name},
                {label:"Shift Duration",val:fmtHrs(editedDurMs)},
                {label:"Progress Note",val:noteSaved?"✅ Completed":"⚠️ Not saved",color:noteSaved?T.teal:T.amber,fix:!noteSaved?"note":null},
                {label:"Kilometres",val:(kmComplete&&kmSaved)?`✅ ${kmDistance} km logged`:(kmStart&&!kmComplete)?"⚠️ Started — end km missing":"— Not logged",color:(kmComplete&&kmSaved)?T.teal:(kmStart&&!kmComplete)?T.amber:T.subtle,fix:!(kmComplete&&kmSaved)?"km":null},
                {label:"Receipts",val:receipts.length>0?`✅ ${receipts.length} attached`:"— None (tap to add)",color:receipts.length?T.teal:T.subtle,fix:receipts.length?null:"receipt"},
                {label:"Incident",val:incSaved?"⚠️ 1 recorded — review required":"None",color:incSaved?T.red:T.subtle,fix:null},
              ].map(r=>(
                <div key={r.label} onClick={r.fix?()=>{setFromSignoff(true);setModal(r.fix);}:undefined} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${T.border}`,cursor:r.fix?"pointer":"default"}}>
                  <span style={{fontSize:12,color:T.subtle}}>{r.label}</span>
                  <span style={{fontSize:12,fontWeight:400,color:r.color||T.white,display:"flex",alignItems:"center",gap:6}}>
                    {r.val}{r.fix&&<span style={{fontSize:12,color:T.teal,fontWeight:500}}>Fix ›</span>}
                  </span>
                </div>
              ))}
            </div>
            {!noteSaved&&<div style={{background:"rgba(255,176,32,0.1)",border:"1px solid rgba(255,176,32,0.3)",borderRadius:10,padding:"10px 12px",fontSize:11,color:T.amber}}>⚠️ Progress note is required. Add one before signing off.</div>}

            {/* Drop-off location capture */}
            <div style={{background:"rgba(0,191,255,0.06)",border:`1px solid ${T.blue}33`,borderRadius:12,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:12,fontWeight:400,color:T.white,fontFamily:"Syne,sans-serif"}}>📍 Drop-off Location</div>
                  <div style={{fontSize:12,color:T.subtle,marginTop:2}}>Confirm you're at the drop-off point</div>
                </div>
                {!signoffLoc && (
                  <button onClick={()=>{
                    setSignoffLoc("loading");
                    if(!navigator.geolocation){setSignoffLoc("denied");return;}
                    navigator.geolocation.getCurrentPosition(
                      pos=>{setSignoffLoc({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy),time:nowTime()});addLog("Location Captured",`Drop-off confirmed (±${Math.round(pos.coords.accuracy)}m)`,T.blue);},
                      ()=>setSignoffLoc("denied"),
                      {enableHighAccuracy:true,timeout:10000}
                    );
                  }} style={{background:`${T.blue}1a`,border:`1px solid ${T.blue}55`,borderRadius:9,padding:"8px 12px",color:T.blue,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}}>Capture</button>
                )}
                {signoffLoc==="loading" && <span style={{fontSize:11,color:T.subtle}}>Locating…</span>}
              </div>
              {signoffLoc && signoffLoc!=="loading" && signoffLoc!=="denied" && (
                <div style={{marginTop:8,fontSize:12,color:T.teal}}>✓ Captured at {signoffLoc.time} · {signoffLoc.lat.toFixed(5)}, {signoffLoc.lng.toFixed(5)} (±{signoffLoc.accuracy}m)</div>
              )}
              {signoffLoc==="denied" && (
                <div style={{marginTop:8,fontSize:12,color:T.amber}}>Location unavailable — you can still sign off. (Enable location access for proof-of-dropoff.)</div>
              )}
            </div>

            <div style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.teal}33`,borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:11,color:T.subtle,marginBottom:6}}>Actual sign-on time (start)</div>
              <input type="time" value={signonEdit} onChange={e=>{setSignonEdit(e.target.value);setSignonSaved(false);}} style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:15,fontFamily:"Syne,sans-serif",outline:"none",boxSizing:"border-box"}}/>
              <div style={{fontSize:11,color:T.muted,marginTop:4}}>When the shift actually started — correct it if needed.</div>
            </div>

            <div style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.teal}33`,borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:11,color:T.subtle,marginBottom:6}}>Actual sign-off time {signoffHHMM!==nowHHMM()?"(adjusted)":"(now)"}</div>
              <input type="time" value={signoffHHMM} onChange={e=>setSignoffHHMM(e.target.value)} style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:15,fontFamily:"Syne,sans-serif",outline:"none",boxSizing:"border-box"}}/>
              <div style={{fontSize:11,color:T.muted,marginTop:4}}>Defaults to now — change it if you're signing off late.</div>
            </div>

            <BtnPrimary danger onClick={()=>{onSignOff(isoFromHHMM(shift.date, signoffHHMM), isoFromHHMM(shift.date, signonEdit));setModal(null);}}>Confirm Sign Off</BtnPrimary>
            <BtnOutline color={T.subtle} onClick={()=>setModal(null)}>Keep Shift Open</BtnOutline>
          </div>
        </Modal>
      )}
      {showRunSheet && <OutingDetail outing={shift} currentUser={worker} participants={participants} workers={workers} onClose={()=>setShowRunSheet(false)}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// WORKER CALENDAR — month / week / list of their own shifts
// ══════════════════════════════════════════════════════════════
function WorkerCalendar({ myShifts, onOpenShift, onAddUnavailability, onViewOuting }) {
  const [view, setView] = useState("list");
  const [cursor, setCursor] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());
  const today = new Date();
  const ymd = d => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const statusColor = s => ({active:T.teal,upcoming:T.blue,completed:T.subtle,unavailable:T.amber}[s]||T.subtle);

  const shiftsOn = (d) => myShifts.filter(s => {
    if (!s.date) return false;
    const sd = new Date(s.date);
    return sd.getFullYear()===d.getFullYear() && sd.getMonth()===d.getMonth() && sd.getDate()===d.getDate();
  });

  function monthGrid() {
    const y=cursor.getFullYear(), m=cursor.getMonth();
    const first=new Date(y,m,1); let startDay=first.getDay(); startDay=(startDay+6)%7; // Monday-first
    const days=new Date(y,m+1,0).getDate();
    const cells=[]; for(let i=0;i<startDay;i++)cells.push(null);
    for(let d=1;d<=days;d++)cells.push(new Date(y,m,d));
    return cells;
  }

  const sorted = [...myShifts].filter(s=>s.date).sort((a,b)=>new Date(a.date)-new Date(b.date));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif"}}>My Shifts</div>
        <button onClick={onAddUnavailability} style={{background:`${T.amber}1a`,border:`1px solid ${T.amber}55`,borderRadius:10,padding:"8px 12px",color:T.amber,fontWeight:400,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>🚫 Unavailable</button>
      </div>

      {/* View switch */}
      <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:3}}>
        {["month","week","list"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:11,fontWeight:400,letterSpacing:"0.5px",textTransform:"uppercase",background:view===v?`${T.teal}1f`:"transparent",color:view===v?T.teal:T.subtle}}>{v}</button>
        ))}
      </div>

      {/* Month/Week nav */}
      {view!=="list" && (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>setCursor(c=>new Date(c.getFullYear(),c.getMonth()-(view==="month"?1:0),c.getDate()-(view==="week"?7:0)))} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,color:T.body,cursor:"pointer",padding:"4px 12px",fontSize:14}}>‹</button>
          <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif"}}>{cursor.toLocaleDateString("en-AU",{month:"long",year:"numeric"})}</div>
          <button onClick={()=>setCursor(c=>new Date(c.getFullYear(),c.getMonth()+(view==="month"?1:0),c.getDate()+(view==="week"?7:0)))} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,color:T.body,cursor:"pointer",padding:"4px 12px",fontSize:14}}>›</button>
        </div>
      )}

      {/* MONTH */}
      {view==="month" && (
        <Card style={{padding:"12px 10px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
            {DOW.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:400,color:T.subtle,letterSpacing:"0.5px",textTransform:"uppercase"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {monthGrid().map((d,i)=>{
              if(!d) return <div key={i}/>;
              const sh=shiftsOn(d); const isToday=ymd(d)===ymd(today); const isSel=ymd(d)===ymd(selectedDay);
              return (
                <div key={i} onClick={()=>setSelectedDay(d)} style={{aspectRatio:"1",borderRadius:8,padding:"3px",cursor:"pointer",background:isSel?`${T.teal}33`:isToday?`${T.teal}16`:sh.length?"rgba(120,95,255,0.10)":"transparent",border:isSel?`1.5px solid ${T.teal}`:isToday?`1px solid ${T.teal}66`:"1px solid transparent",boxShadow:isSel?`0 0 12px ${T.teal}66`:isToday?`0 0 8px ${T.teal}30`:"none",display:"flex",flexDirection:"column",alignItems:"center",overflow:"hidden"}}>
                  <div style={{fontSize:12,fontWeight:(isToday||isSel)?600:400,color:(isToday||isSel)?T.teal:T.body}}>{d.getDate()}</div>
                  <div style={{display:"flex",gap:1.5,marginTop:2,flexWrap:"wrap",justifyContent:"center"}}>
                    {sh.slice(0,3).map(s=><div key={s.id} style={{width:5,height:5,borderRadius:"50%",background:shiftStateColor(s)}}/>)}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
            <div style={{fontSize:12,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",fontWeight:400,marginBottom:8}}>
              {ymd(selectedDay)===ymd(today)?"Today":selectedDay.toLocaleDateString("en-AU",{weekday:"long"})} · {selectedDay.toLocaleDateString("en-AU",{day:"numeric",month:"short"})}
            </div>
            {shiftsOn(selectedDay).length===0 && <div style={{fontSize:12,color:T.subtle,textAlign:"center",padding:"10px 0"}}>No shifts this day</div>}
            {shiftsOn(selectedDay).map(s=><WCRow key={s.id} s={s} onOpen={onOpenShift}/>)}
          </div>
        </Card>
      )}

      {/* WEEK */}
      {view==="week" && (() => {
        const start=new Date(cursor); const dow=(start.getDay()+6)%7; start.setDate(start.getDate()-dow);
        const days=Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
        return (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>

      date, start: allDay?"00:00":start, end: allDay?"23:59":end,

function dataUrlToBlobUrl(dataUrl){
  try{
    const [meta,b64]=String(dataUrl).split(",");
    const mime=(meta.match(/data:(.*?)(;base64)?$/)||[])[1]||"application/octet-stream";
    const bin=atob(b64); const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr],{type:mime}));
  }catch(e){ return dataUrl; }
}

function AttachmentViewer({ file, onClose }){
  const isImg = (file.type||"").includes("image") || /^data:image/.test(file.dataUrl||"");
  const isPdf = (file.type||"").includes("pdf") || /^data:application\/pdf/.test(file.dataUrl||"");
  const isHtml = (file.type||"").includes("html") || /^data:text\/html/.test(file.dataUrl||"");
  const [src,setSrc]=useState(file.dataUrl);
  useEffect(()=>{
    if(isPdf || isHtml){
      const url=dataUrlToBlobUrl(file.dataUrl);
      setSrc(url);
      return ()=>{ try{URL.revokeObjectURL(url);}catch(e){} };
    }
    setSrc(file.dataUrl);
  },[file]);
  const openTab = ()=>{
    let u;
    try { u = dataUrlToBlobUrl(file.dataUrl); } catch(e){ u = file.dataUrl; }
    const a=document.createElement("a");
    a.href=u; a.target="_blank"; a.rel="noopener noreferrer";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ try{a.remove();}catch(e){} }, 0);
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column"}}>
      <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
        <span style={{fontSize:16}}>{isPdf?"📄":isImg?"🖼️":isHtml?"🧾":"📎"}</span>
        <div style={{flex:1,fontSize:13,fontWeight:500,color:"#fff",fontFamily:"Syne,sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</div>
        <button onClick={openTab} style={{background:`${T.blue}1a`,border:`1px solid ${T.blue}55`,borderRadius:9,padding:"7px 11px",color:T.blue,fontSize:11.5,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Open in new tab</button>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${T.border}`,borderRadius:9,width:34,height:34,color:"#fff",fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <div onClick={e=>e.stopPropagation()} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"auto",padding:isImg?12:0}}>
        {isImg ? (
          <img src={file.dataUrl} alt={file.name} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:8}}/>
        ) : isPdf ? (
          <iframe title={file.name} src={src} style={{width:"100%",height:"100%",border:"none",background:"#fff"}}/>
        ) : isHtml ? (
          <iframe title={file.name} src={src} sandbox="allow-scripts" style={{width:"100%",height:"100%",border:"none",background:"#fff"}}/>
        ) : (
          <div style={{textAlign:"center",color:T.body,fontSize:13,padding:24}}>
            Can't preview this file type here.
            <div style={{marginTop:12}}><button onClick={openTab} style={{background:`${T.blue}1a`,border:`1px solid ${T.blue}55`,borderRadius:9,padding:"9px 14px",color:T.blue,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Open in new tab</button></div>
          </div>
        )}
      </div>
    </div>
  );
}

function OutingDetail({ outing, onClose, currentUser, participants, workers, onEdit }) {
  const s = outing;
  const _PL = (participants && participants.length) ? participants : (typeof PARTICIPANTS!=="undefined"?PARTICIPANTS:[]);
  const findP = (id)=> _PL.find(x=>String(x.id)===String(id)) || ((s.participantPlans&&s.participantPlans[id]) ? {id, name:s.participantPlans[id].name, initials:s.participantPlans[id].initials} : undefined);
  const dateLabel = s.date ? new Date(s.date).toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"}) : "";
  const sPids = (s.participantIds && s.participantIds.length) ? s.participantIds : (s.participantId ? [s.participantId] : []);
  const pCount = sPids.length;
  const wCount = (s.workerIds||[]).length;
  const fmtT = t => { if(!t) return ""; const [h,m]=t.split(":").map(Number); const ap=h>=12?"PM":"AM"; const hh=((h+11)%12)+1; return `${hh}:${String(m).padStart(2,"0")} ${ap}`; };
  const meName = currentUser?.name || "";
  const chatRecipients = (workers||[]).filter(w=>(s.workerIds||[]).map(String).includes(String(w.id))).map(w=>({name:w.name, phone:w.phone}));
  const chatLink = (typeof isUuid==="function" && isUuid(s.id)) ? `${(typeof COMPANY!=="undefined"&&COMPANY.appUrl)||"https://korateam.app"}/shift/${s.id}?do=chat` : null;
  const stops = s.stops || [];
  // The first meeting point counts as Stop 1, so the real stops start numbering after it.
  const stopOffset = s.meetPoint ? 1 : 0;
  const stopNo = (i)=> i + 1 + stopOffset;

  // Ordered pickup/drop-off lists with current SW floated to top
  const plans = s.participantPlans || {};
  // Identify "my" pickups/drop-offs by worker ID, not name text (names don't always match exactly)
  const _norm = (x)=>String(x||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
  const _meNorm = _norm(meName);
  const _widOf = (nm)=>{ const w=(workers||[]).find(w=>_norm(w.name)===_norm(nm)); return w?String(w.id):null; };
  const _myWid = (currentUser && currentUser.id!=null) ? String(currentUser.id) : _widOf(meName);
  const swIsMe = (swName)=>{ if(!swName) return false; const a=_norm(swName), b=_meNorm; if(b && a===b) return true; const w=_widOf(swName); if(w && _myWid && w===_myWid) return true; if(a && b){ const at=a.split(" ").filter(Boolean), bt=b.split(" ").filter(Boolean); const short=at.length<=bt.length?at:bt, long=at.length<=bt.length?bt:at; if(short.length && short.every(t=>long.includes(t))) return true; } return false; };
  const pickups = (s.participantIds||[]).map(pid=>({pid, pl:plans[pid]||{}})).filter(x=>x.pl.pickupTime||x.pl.pickupSW||x.pl.pickupAddr||x.pl.prePickup);
  const myPickups = pickups.filter(x=>swIsMe(x.pl.pickupSW));
