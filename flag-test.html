        onChange={e=>{setQ(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),150)}
        placeholder={placeholder||"Search line items to add…"}
        style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
      {open && (catMatches.length>0 || ndisMatches.length>0) && (
        <div style={{position:"absolute",left:0,right:0,zIndex:20,marginTop:6,background:T.navy,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",maxHeight:280,overflowY:"auto",boxShadow:"0 12px 30px rgba(0,0,0,0.4)"}}>
          {catMatches.length>0 && <div style={{fontSize:11,color:T.teal,letterSpacing:"1px",textTransform:"uppercase",padding:"8px 12px 4px"}}>This client's line items</div>}
          {catMatches.map((c,i)=>(
            <button key={`c${c.id||i}`} onMouseDown={e=>e.preventDefault()} onClick={()=>choose(c)} style={{width:"100%",textAlign:"left",background:"none",border:"none",borderBottom:`1px solid ${T.border}`,padding:"10px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div>
                <div style={{fontSize:12,fontWeight:500,color:T.white}}>{c.desc||c.code}</div>
                <div style={{fontSize:11,color:T.subtle,fontFamily:"monospace"}}>{c.code}</div>
              </div>
              <span style={{fontSize:12,fontWeight:500,color:T.teal,whiteSpace:"nowrap"}}>${Number(c.rate||0).toFixed(2)}<span style={{fontSize:11,color:T.subtle}}>/{c.unit}</span></span>
            </button>
          ))}
          {ndisMatches.length>0 && <div style={{fontSize:11,color:T.blue,letterSpacing:"1px",textTransform:"uppercase",padding:"8px 12px 4px"}}>NDIS price guide</div>}
          {ndisMatches.map((c,i)=>(
            <button key={`n${i}`} onMouseDown={e=>e.preventDefault()} onClick={()=>choose(c)} style={{width:"100%",textAlign:"left",background:"none",border:"none",borderBottom:`1px solid ${T.border}`,padding:"10px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div>
                <div style={{fontSize:12,fontWeight:400,color:T.body}}>{c.desc}</div>
                <div style={{fontSize:11,color:T.subtle,fontFamily:"monospace"}}>{c.code}</div>
              </div>
              <span style={{fontSize:12,fontWeight:500,color:T.blue,whiteSpace:"nowrap"}}>${Number(c.rate||0).toFixed(2)}<span style={{fontSize:11,color:T.subtle}}>/{c.unit}</span></span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// CREATE SHIFT MODAL
// ══════════════════════════════════════════════════════════════
const SERVICE_TYPES = [
  { label: "Community Social & Rec", code: "04_I04_0125_6_1" },
  { label: "Personal Daily Activities", code: "01_004_0107_1_1" },
  { label: "Group Activities", code: "04_I04_0125_6_1" },
  { label: "School Leaver Support", code: "07_004_0133_6_1" },
];

function CreateShiftModal({ onClose, onSave, onDelete, csUsername, csApiKey, workers, clients, editShift, defaultDate, onEditGroupOuting }) {
  const CLIENTS = (clients && clients.length) ? clients : PARTICIPANTS;
  const findSvcIdx = () => {
    if (!editShift) return 0;
    const i = SERVICE_TYPES.findIndex(s => s.label === editShift.type);
    return i >= 0 ? i : 0;
  };
  // Draft autosave: keep a half-filled NEW shift so it isn't lost on close. (Not used when editing.)
  const DRAFT_KEY = "kora_shift_draft_v1";
  const LAST_DATE_KEY = "kora_last_shift_date";
  const LAST_START_KEY = "kora_last_shift_start";
  const LAST_END_KEY = "kora_last_shift_end";
  const readDraft = () => { if (editShift) return null; try { const r = localStorage.getItem(DRAFT_KEY); return r ? JSON.parse(r) : null; } catch(e){ return null; } };
  const draft0 = readDraft();
  const [draftRestored, setDraftRestored] = useState(!!draft0);
  const [workerId, setWorkerId] = useState(editShift?.workerId || draft0?.workerId || "");
  const [participantId, setParticipantId] = useState(editShift?.participantId || draft0?.participantId || "");
  const [pSearch, setPSearch] = useState("");
  const [date, setDate] = useState(editShift?.date || draft0?.date || defaultDate || (()=>{ try{ return localStorage.getItem(LAST_DATE_KEY)||""; }catch(e){ return ""; } })() || new Date().toISOString().split("T")[0]);
  const [start, setStart] = useState(editShift?.start || draft0?.start || (()=>{ try{ return localStorage.getItem(LAST_START_KEY)||""; }catch(e){ return ""; } })() || "09:00");
  const [end, setEnd] = useState(editShift?.end || draft0?.end || (()=>{ try{ return localStorage.getItem(LAST_END_KEY)||""; }catch(e){ return ""; } })() || "13:00");
  const [serviceIdx, setServiceIdx] = useState(editShift ? findSvcIdx() : (draft0?.serviceIdx ?? 0));
  const [location, setLocation] = useState(editShift?.location || draft0?.location || "");
  const [dropoffLocation, setDropoffLocation] = useState(editShift?.dropoffLocation || draft0?.dropoffLocation || "");
  const [sameDropoff, setSameDropoff] = useState(editShift ? (!editShift.dropoffLocation || editShift.dropoffLocation===editShift.location) : true);
  const [status, setStatus] = useState(editShift?.status || "upcoming");
  const [confirmed, setConfirmed] = useState(editShift?.confirmed ?? false);
  const [noSignOnOff, setNoSignOnOff] = useState(editShift?.noSignOnOff ?? false);
  const [notes, setNotes] = useState(editShift?.notes || draft0?.notes || "");
  // Optional group-outing run sheet attached to this shift (like receipts/kms)
  const [meetPoint, setMeetPoint] = useState(editShift?.meetPoint || draft0?.meetPoint || "");
  const [meetPointNotes, setMeetPointNotes] = useState(editShift?.meetPointNotes || draft0?.meetPointNotes || "");
  const [meetPointTeenNotes, setMeetPointTeenNotes] = useState(editShift?.meetPointTeenNotes || draft0?.meetPointTeenNotes || "");
  const [whatToBring, setWhatToBring] = useState(editShift?.whatToBring || draft0?.whatToBring || "");
  const [importantNote, setImportantNote] = useState(editShift?.importantNote || draft0?.importantNote || "");
  const [stops, setStops] = useState(editShift?.stops || draft0?.stops || []);
  const [showRunSheet, setShowRunSheet] = useState(!!(editShift && ((editShift.stops&&editShift.stops.length)||editShift.meetPoint||editShift.whatToBring)));
  const inGroupOuting = !!(editShift && editShift.title && ((editShift.participantIds && editShift.participantIds.length>0) || (editShift.participantPlans && Object.keys(editShift.participantPlans).length>0)));
  // Autosave the in-progress NEW shift so closing the popup doesn't lose it.
  useEffect(() => {
    if (editShift) return;
    try { localStorage.setItem(DRAFT_KEY, JSON.stringify({ workerId, participantId, date, start, end, serviceIdx, location, dropoffLocation, sameDropoff, notes, meetPoint, meetPointNotes, whatToBring, stops })); } catch(e) {}
  }, [editShift, workerId, participantId, date, start, end, serviceIdx, location, dropoffLocation, sameDropoff, notes, meetPoint, meetPointNotes, whatToBring, stops]);
  const clearDraft = () => { try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
    setWorkerId(""); setParticipantId(""); setStart("09:00"); setEnd("13:00"); setServiceIdx(0); setLocation(""); setDropoffLocation(""); setNotes(""); setMeetPoint(""); setWhatToBring(""); setImportantNote(""); setStops([]); setDraftRestored(false); };
  const addStopFiles = (i,fileList)=> Array.from(fileList||[]).forEach(file=>{
    if(file.size>5_000_000){ alert(`${file.name} is over 5MB — too large.`); return; }
    const reader=new FileReader();
    reader.onload=()=> setStops(p=>p.map((x,j)=> j===i ? {...x, files:[...(x.files||[]), {name:file.name,dataUrl:reader.result,type:file.type}]} : x));
    reader.readAsDataURL(file);
  });
  const rmStopFile = (i,fi)=> setStops(p=>p.map((x,j)=> j===i ? {...x, files:(x.files||[]).filter((_,k)=>k!==fi)} : x));
  const [lineItems, setLineItems] = useState(editShift?.lineItems || []);
  const [payRateUsed, setPayRateUsed] = useState(editShift?.payRateUsed || null); // {label,rate}
  const [sending, setSending] = useState(false);
  const [smsStatus, setSmsStatus] = useState(null); // null | 'sent' | 'error' | 'skipped' | 'off'
  const [notifyWorker, setNotifyWorker] = useState(true);
  const isEdit = !!editShift;

  const worker = workers.find(w => String(w.id) === String(workerId));
  const participant = CLIENTS.find(p => String(p.id) === String(participantId));
  const service = SERVICE_TYPES[serviceIdx];

  const phHrs = t => { const [h,m]=String(t||"0").split(":").map(Number); return (h||0)+((m||0)/60); };
  const estHrs = Math.max(0, +(phHrs(end)-phHrs(start)).toFixed(2));

  // ── Billing line items — picked from the client's catalogue ──
  const lineTotal = (li) => lineAmount(li);
  const addClientLine = (cat) => {
    const id = Date.now() + Math.random();
    const hrsUsed = lineItems.filter(li=>li.unit==="hrs").reduce((s,li)=>s+(Number(li.qty)||0),0);
    const hasHrsLine = lineItems.some(li=>li.unit==="hrs");
    const rem = Math.max(0, (estHrs||0) - hrsUsed);
    const qty = cat.unit === "hrs" ? (hasHrsLine ? rem : (estHrs || 1)) : cat.unit === "km" ? 0 : 1;
    setLineItems(p => [...p, { id, desc: cat.desc, code: cat.code, unit: cat.unit, qty, rate: Number(cat.rate)||0, ratio: "1:1" }]);
  };
  const updateLine = (id, k, v) => setLineItems(p => p.map(li => li.id === id ? { ...li, [k]: v } : li));
  const removeLine = (id) => setLineItems(p => p.filter(li => li.id !== id));
  const updateLineQty = (li, v) => {
    if (li.unit === "hrs" && estHrs > 0) {
      const otherHrs = lineItems.filter(x=>x.unit==="hrs"&&x.id!==li.id).reduce((s,x)=>s+(Number(x.qty)||0),0);
      const maxForThis = Math.max(0, +((estHrs)-otherHrs).toFixed(2));
      if (v !== "" && Number(v) > maxForThis) v = maxForThis;   // never let the split exceed the shift
    }
    updateLine(li.id, "qty", v);
  };
  const clientCatalogue = (participant?.lineItems && participant.lineItems.length)
    ? participant.lineItems
    : (participant ? [
        { code: participant.code, desc: participant.serviceName || "Service (hourly)", unit: "hrs", rate: participant.rate },
        { code: participant.code, desc: "Activity Based Transport", unit: "km", rate: participant.transport },
      ].filter(x => x.rate) : []);

  const billTotal = lineItems.reduce((s, li) => s + lineTotal(li), 0);
  const billedHrs = lineItems.filter(li=>li.unit==="hrs").reduce((s,li)=>s+(Number(li.qty)||0),0);
  const overHrs = estHrs>0 && billedHrs>estHrs;
  // Worker cost from the picked pay rate
  const rateVal = payRateUsed ? Number(payRateUsed.rate)||0 : 0;
  const workerCost = rateVal ? estHrs * rateVal : 0;
  const margin = billTotal - workerCost;
  const estClaim = billTotal;

  const canSave = workerId && participantId && start && end && estHrs > 0;

  async function handleSave() {
    setSending(true);
    const shiftId = editShift?.id || Date.now();
    const finalLines = lineItems.map(li => ({ ...li, total: (Number(li.qty)||0) * (Number(li.rate)||0) }));
    const shiftData = {
      id: shiftId,
      worker: worker.name, workerId: worker.id,
      participant: participant.name, participantId: participant.id,
      start, end, startMs: editShift?.startMs ?? null,
      type: service.label, code: service.code,
      status, location, date, notes,
      dropoffLocation: sameDropoff ? (location || null) : (dropoffLocation || null),
      meetPoint: meetPoint || null,
      whatToBring: whatToBring || null,
      importantNote: importantNote || null,
      stops: stops.length ? stops : null,
      lineItems: finalLines,
      payRateUsed: payRateUsed || null,
      confirmed,                              // confirmed by SW / manager
      confirmStatus: confirmed ? "confirmed" : "pending",  // pending = awaiting SW confirmation
      noSignOnOff,
      // preserve group-outing linkage so editing a single shift doesn't dissolve the outing
      title: editShift?.title,
      meetPointNotes: meetPointNotes || null,
      meetPointTeenNotes: meetPointTeenNotes || null,
      files: editShift?.files,
      participantIds: editShift?.participantIds,
      workerIds: editShift?.workerIds,
      participantPlans: editShift?.participantPlans,
      ratio: editShift?.ratio,
      isOuting: editShift?.isOuting,
    };

    // Save to the database FIRST so we get the real shift id (a UUID).
    // The SMS link must use that id, or /shift/:id can't find the shift.
    let savedId = shiftId;
    try { const saved = await onSave(shiftData); if (saved && saved.id) savedId = saved.id; } catch (e) {}
    if (!editShift) { try { localStorage.removeItem(DRAFT_KEY); if(date) localStorage.setItem(LAST_DATE_KEY, date); if(start) localStorage.setItem(LAST_START_KEY, start); if(end) localStorage.setItem(LAST_END_KEY, end); } catch(e) {} }

    // Build links with the real saved id.
    const infoLink = `${COMPANY.appUrl||"https://korateam.app"}/shift/${savedId}`;
    const confirmLink = `${COMPANY.appUrl||"https://korateam.app"}/shift/${savedId}?confirm=1`;

    // Only text a link if we have a valid saved id (otherwise it would 404).
    if (!notifyWorker) {
      setSmsStatus("off");
    } else if (worker.phone && isUuid(savedId)) {
      const dateFormatted = new Date(date).toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" });
      let msg;
      if (confirmed) {
        msg = `Hi ${firstName(worker.name)}, your shift is CONFIRMED: ${dateFormatted} with ${participant.name}, ${start}–${end}${location ? ` at ${location}` : ""}. — ${COMPANY.shortName}\nView details: ${infoLink}`;
      } else {
        msg = `Hi ${firstName(worker.name)}, shift REQUEST: ${dateFormatted} with ${participant.name}, ${start}–${end}${location ? ` at ${location}` : ""}. — ${COMPANY.shortName}\nTap to confirm & view: ${confirmLink}`;
      }
      try {
        await sendClickSendSMS(csUsername, csApiKey, worker.phone, msg);
        setSmsStatus("sent");
      } catch (e) {
        setSmsStatus("error");
      }
    } else if (worker.phone) {
      setSmsStatus("error");
    } else {
      setSmsStatus("skipped");
    }

    setSending(false);
    if (onClose) onClose();
  }

  const sel = (val, onChange, opts, placeholder) => (
    <select value={val} onChange={e => onChange(e.target.value)} style={{
      width:"100%", background:"rgba(0,229,180,0.05)", border:`1px solid rgba(0,229,180,0.2)`,
      borderRadius:10, padding:"10px 12px", color: val ? T.white : T.subtle, fontSize:13,
      fontFamily:"DM Sans,sans-serif", outline:"none", appearance:"none", cursor:"pointer",
    }}>
      <option value="" style={{background:T.navy,color:T.subtle}}>{placeholder}</option>
      {opts.map(o => <option key={o.val} value={o.val} style={{background:T.navy,color:T.white}}>{o.label}</option>)}
    </select>
  );

  if (smsStatus) {
    const sent = smsStatus === "sent";
    const off = smsStatus === "off";
    const skipped = smsStatus === "skipped" || off;
    return (
      <Modal title={isEdit ? "Shift Updated" : "Shift Created"} onClose={onClose}>
        <div style={{display:"flex",flexDirection:"column",gap:14,alignItems:"center",textAlign:"center",padding:"10px 0"}}>
          <div style={{fontSize:48}}>{sent ? "✅" : skipped ? "📋" : "⚠️"}</div>
          <div style={{fontSize:16,fontWeight:500,fontFamily:"Syne,sans-serif"}}>
            {sent ? `Shift ${isEdit?"updated":"saved"} & SMS sent!` : skipped ? `Shift ${isEdit?"updated":"saved"}!` : "Shift saved — SMS failed"}
          </div>
          <div style={{fontSize:12,color:T.subtle,lineHeight:1.6}}>
            {sent && `SMS sent to ${worker.name} at ${worker.phone}`}
            {off && "No text sent — you chose not to notify the worker."}
            {skipped && !off && "No phone number on file — SMS not sent."}
            {smsStatus === "error" && "Shift was saved but the SMS could not be delivered. Check your ClickSend credentials."}
          </div>
          <div style={{width:"100%",marginTop:4}}>
            <BtnPrimary onClick={onClose}>Done</BtnPrimary>
          </div>
        </div>
      </Modal>
    );
  }

  return (
    <Modal title={isEdit ? "Edit Shift" : "➕ Create Shift"} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>

        {draftRestored && !isEdit && (
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:`${T.teal}12`,border:`1px solid ${T.teal}44`,borderRadius:10}}>
            <span style={{fontSize:11,color:T.teal,flex:1}}>↩ Restored your unsaved shift from last time.</span>
            <button onClick={clearDraft} style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:8,color:T.body,fontSize:12,padding:"5px 9px",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Start fresh</button>
          </div>
        )}

        {/* Participant FIRST — searchable */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>1. Pick Participant</div>
          {participant ? (
            <div style={{display:"flex",alignItems:"center",gap:10,background:`${T.teal}14`,border:`1px solid ${T.teal}`,borderRadius:10,padding:"10px 12px"}}>
              <Avatar initials={participant.initials||"?"} color={participant.avatarColor||T.teal} size={28} photo={participant.photo} emoji={participant.emoji}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.white}}>{participant.name}</div>
                {participant.manager&&<div style={{fontSize:11,color:T.subtle}}>{participant.manager}</div>}
              </div>
              <button onClick={()=>{setParticipantId("");setPSearch("");}} style={{background:"none",border:`1px solid ${T.teal}55`,borderRadius:8,padding:"5px 10px",color:T.teal,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Change</button>
            </div>
          ) : (
            <div>
              <input value={pSearch} onChange={e=>setPSearch(e.target.value)} placeholder="🔍 Type a client's name…" style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
              <div style={{maxHeight:210,overflowY:"auto",marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
                {CLIENTS.filter(p=>!pSearch.trim()||(p.name||"").toLowerCase().includes(pSearch.toLowerCase())).slice(0,50).map(p=>(
                  <button key={p.id} onClick={()=>{setParticipantId(p.id);setPSearch("");}} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:9,cursor:"pointer",textAlign:"left",border:`1px solid ${T.border}`,background:"rgba(255,255,255,0.02)"}}>
                    <Avatar initials={p.initials||"?"} color={p.avatarColor||T.teal} size={24} photo={p.photo} emoji={p.emoji}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12.5,fontWeight:500,fontFamily:"Syne,sans-serif",color:T.white}}>{p.name}</div>
                      {p.manager&&<div style={{fontSize:11,color:T.subtle}}>{p.manager}</div>}
                    </div>
                  </button>
                ))}
                {CLIENTS.filter(p=>!pSearch.trim()||(p.name||"").toLowerCase().includes(pSearch.toLowerCase())).length===0 && <div style={{fontSize:11,color:T.subtle,padding:"8px"}}>No clients match "{pSearch}".</div>}
              </div>
            </div>
          )}
        </div>

        {/* Worker — filtered to those assigned to this client + free on date */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>2. Assign Worker {participantId ? "(assigned to this client)" : ""}</div>
          {!participantId ? (
            <div style={{fontSize:12,color:T.subtle,padding:"10px 12px",background:"rgba(255,255,255,0.03)",borderRadius:10,textAlign:"center"}}>Pick a participant first to see available workers</div>
          ) : (() => {
            const assigned = workers.filter(w => (w.clients||[]).map(String).includes(String(participantId)));
            const toMin = t => { const [h,m]=String(t||"0").split(":").map(Number); return (h||0)*60+(m||0); };
            const nStart = toMin(start), nEnd = toMin(end);
            const overlaps = (s) => { const a=toMin(s.start), b=toMin(s.end); return (b>a) && nStart < b && a < nEnd; };
            const dayEntries = (window.__koraShifts||[]).filter(s => s.date===date && s.id!==editShift?.id);
            const entriesFor = (wid) => dayEntries.filter(s => s.workerId!=null ? String(s.workerId)===String(wid) : (s.workerIds||[]).map(String).includes(String(wid)));
            const isBusy = (wid) => entriesFor(wid).some(overlaps);
            const clashFor = (wid) => entriesFor(wid).find(overlaps);
            const dayNote = (wid) => {
              const es = entriesFor(wid);
              if(!es.length) return null;
              return es.map(s => { const who = s.isOuting ? (s.title||"outing") : (s.participant||""); return `${s.start}–${s.end}${who?` (${who})`:""}`; }).join(", ");
            };
            const available = assigned.filter(w => !isBusy(w.id));
            const busy = assigned.filter(w => isBusy(w.id));
            if (assigned.length===0) return <div style={{fontSize:12,color:T.amber,padding:"10px 12px",background:"rgba(255,176,32,0.08)",borderRadius:10}}>No workers are assigned to this client yet. Assign them in the worker's profile.</div>;
            return (
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {available.map(w=>{
                  const note = dayNote(w.id);
                  return (
                  <button key={w.id} onClick={()=>setWorkerId(w.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",textAlign:"left",border:`1px solid ${String(workerId)===String(w.id)?T.teal:T.border}`,background:String(workerId)===String(w.id)?`${T.teal}1a`:"rgba(255,255,255,0.02)"}}>
                    <Avatar initials={w.initials} color={w.avatarColor||w.color} size={32} photo={w.photo} emoji={w.emoji}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{w.name}</div>
                      <div style={{fontSize:12,color:T.teal}}>✓ Available{w.phone?"":" · no phone"}</div>
                      {note && <div style={{fontSize:11,color:T.amber,marginTop:2}}>Already working today: {note}</div>}
                    </div>
                    {String(workerId)===String(w.id)&&<span style={{color:T.teal,fontSize:16}}>✓</span>}
                  </button>
                  );
                })}
                {busy.map(w=>{
                  const c = clashFor(w.id);
                  return (
                  <div key={w.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:`1px solid ${T.border}`,opacity:0.45}}>
                    <Avatar initials={w.initials} color={w.color} size={32}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",color:T.white}}>{w.name}</div>
                      <div style={{fontSize:12,color:T.red}}>Busy at this time{c?` · ${c.start}–${c.end}`:""}</div>
                    </div>
                  </div>
                  );
                })}
                {available.length===0 && <div style={{fontSize:11,color:T.amber,textAlign:"center",padding:"6px 0"}}>All assigned workers clash with this time.</div>}
              </div>
            );
          })()}
        </div>

        {/* Status (edit only) */}
        {isEdit && (
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Status</div>
            <div style={{display:"flex",gap:6}}>
              {[["upcoming","Upcoming",T.blue],["active","Active",T.teal],["completed","Completed",T.subtle]].map(([v,lbl,col])=>(
                <button key={v} onClick={()=>setStatus(v)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${status===v?col:T.border}`,background:status===v?`${col}1f`:"transparent",color:status===v?col:T.subtle,fontSize:11,fontWeight:400,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{lbl}</button>
              ))}
            </div>
          </div>
        )}

        {/* Service type picker removed — NDIS billing is set by the line items below.
            `service` still defaults to SERVICE_TYPES[0] so the shift keeps a type/code label. */}

        {/* Date + times */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Date</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{
            width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,
            borderRadius:10,padding:"10px 12px",color:T.white,fontSize:13,
            fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark",
          }}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 0.8fr",gap:10}}>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Start Time</div>
            <input type="time" value={start} onChange={e=>setStart(e.target.value)} style={{
              width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,
              borderRadius:10,padding:"10px 12px",color:T.white,fontSize:13,
              fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark",
            }}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>End Time</div>
            <input type="time" value={end} onChange={e=>setEnd(e.target.value)} style={{
              width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,
              borderRadius:10,padding:"10px 12px",color:T.white,fontSize:13,
              fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",colorScheme:"dark",
            }}/>
          </div>
          <div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Total</div>
            <div style={{width:"100%",background:`${T.teal}14`,border:`1px solid ${T.teal}55`,borderRadius:10,padding:"10px 8px",color: estHrs>0?T.teal:T.subtle,fontSize:14,fontWeight:600,fontFamily:"Syne,sans-serif",boxSizing:"border-box",textAlign:"center"}}>{estHrs>0?`${estHrs}h`:"—"}</div>
          </div>
        </div>

        <div>
          <Input label="Pick-up location" value={location} onChange={v=>{ setLocation(v); if(sameDropoff) setDropoffLocation(v); }} placeholder="e.g. Home — 12 Smith St, Capalaba"/>
          <label style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0 6px",cursor:"pointer",fontSize:12,color:T.body,fontFamily:"DM Sans,sans-serif"}}>
            <input type="checkbox" checked={sameDropoff} onChange={e=>{ const v=e.target.checked; setSameDropoff(v); if(v) setDropoffLocation(location); }} style={{width:16,height:16,accentColor:T.teal}}/>
            Drop-off is the same as pick-up
          </label>
          {!sameDropoff && (
            <Input label="Drop-off location" value={dropoffLocation} onChange={setDropoffLocation} placeholder="e.g. Grandma's — 5 River Rd, Cleveland"/>
          )}
        </div>

        {/* Worker pay rate — pick from this worker's entered rates */}
        {worker && (
          <div style={{border:`1px solid ${T.amber}33`,borderRadius:12,padding:"12px",background:`${T.amber}08`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontSize:12,fontWeight:600,color:T.amber,fontFamily:"Syne,sans-serif"}}>💵 Worker Pay Rate</div>
              {payRateUsed && <div style={{fontSize:11,color:T.amber,fontWeight:600}}>${Number(payRateUsed.rate||0).toFixed(2)}/hr</div>}
            </div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:8,lineHeight:1.4}}>What this support worker earns for this shift — tap a rate to apply it.</div>
            {(worker.payRates&&worker.payRates.length)?(
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {worker.payRates.map((pr,i)=>{const on=payRateUsed&&payRateUsed.category===pr.category&&String(payRateUsed.rate)===String(pr.rate);return(
                  <button key={i} onClick={()=>setPayRateUsed(pr)} style={{padding:"8px 12px",borderRadius:10,cursor:"pointer",border:`1px solid ${on?T.amber:T.border}`,background:on?`${T.amber}1f`:"rgba(255,255,255,0.02)",color:on?T.amber:T.body,fontSize:12,fontWeight:on?600:400,fontFamily:"DM Sans,sans-serif"}}>
                    {pr.category||"Rate"} · ${Number(pr.rate||0).toFixed(2)}/hr{on?" ✓":""}
                  </button>
                );})}
              </div>
            ):(
              <div style={{fontSize:11,color:T.amber,background:`${T.amber}10`,border:`1px solid ${T.amber}33`,borderRadius:10,padding:"9px 12px"}}>No pay rates set for {worker.name}. Add them in the worker's profile to track shift cost.</div>
            )}
          </div>
        )}

        {/* Billing line items — picked from the client's catalogue */}
        {participant && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
              <div style={{fontSize:12,fontWeight:600,color:T.teal,fontFamily:"Syne,sans-serif"}}>💲 Bill These Line Items</div>
              {lineItems.length>0 && <div style={{fontSize:12,color:T.teal,fontWeight:600}}>{fmt$(billTotal)}</div>}
            </div>
            <div style={{fontSize:12,color:T.subtle,marginBottom:8,lineHeight:1.4}}>One line per service. To split a shift, add several and set the hours on each — e.g. 4 hrs Community + 3 hrs Capacity. Each line bills separately on the invoice.</div>
            {estHrs>0 && lineItems.some(li=>li.unit==="hrs") && (()=>{ const allocColor = billedHrs===estHrs ? T.teal : (billedHrs>estHrs ? T.red : T.amber); return (
              <div style={{fontSize:12,fontWeight:600,marginBottom:8,padding:"7px 10px",borderRadius:8,background:`${allocColor}14`, border:`1px solid ${allocColor}44`, color: allocColor}}>
                {billedHrs} of {estHrs} shift hours allocated{billedHrs===estHrs?" ✓":billedHrs>estHrs?` — OVER by ${(billedHrs-estHrs).toFixed(2)}h`:` — ${(estHrs-billedHrs).toFixed(2)}h left`}
              </div>
            );})()}
            {/* added lines */}
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:clientCatalogue.length?8:0}}>
              {lineItems.map(li=>(
                <div key={li.id} style={{background:"rgba(0,229,180,0.05)",border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <div style={{fontSize:12,fontWeight:500,color:T.white}}>{li.desc||"Line"}</div>
                    <button onClick={()=>removeLine(li.id)} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>
                  <div style={{fontSize:11,color:T.subtle,fontFamily:"monospace",marginBottom:8}}>{li.code}</div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <input value={li.qty} onChange={e=>updateLineQty(li,e.target.value)} type="number" style={{width:56,background:"rgba(255,255,255,0.03)",border:`1px solid ${(li.unit==="hrs"&&overHrs)?T.red:T.border}`,borderRadius:8,padding:"5px 6px",color:(li.unit==="hrs"&&overHrs)?T.red:"#fff",fontSize:11,outline:"none",boxSizing:"border-box",textAlign:"right"}}/>
                      <span style={{fontSize:12,color:T.subtle}}>{li.unit}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:11,color:T.subtle}}>ratio</span>
                      <select value={li.ratio||"1:1"} onChange={e=>updateLine(li.id,"ratio",e.target.value)} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${(li.ratio&&li.ratio!=="1:1")?`${T.blue}77`:T.border}`,borderRadius:8,padding:"5px 6px",color:"#fff",fontSize:11,outline:"none",fontFamily:"DM Sans,sans-serif"}}>
                        {["1:1","1:1.5","1:2","1:3","1:4","1:5"].map(r=><option key={r} value={r} style={{background:T.navy}}>{r}</option>)}
                      </select>
                    </div>
                    <span style={{fontSize:12,color:T.subtle}}>× ${Number(li.rate).toFixed(2)}{(li.ratio&&li.ratio!=="1:1")?` ÷ ${li.ratio.split(":")[1]}`:""}</span>
                    <span style={{fontSize:12,color:T.teal,fontWeight:500,marginLeft:"auto",minWidth:64,textAlign:"right"}}>{fmt$(lineTotal(li))}</span>
                  </div>
                </div>
              ))}
            </div>
            {/* pick from client's catalogue via searchable dropdown */}
            <ShiftLinePicker catalogue={clientCatalogue} onPick={addClientLine} placeholder={`Search ${participant.name}'s line items, or NDIS code…`}/>
            {clientCatalogue.length===0 && lineItems.length===0 && (
              <div style={{fontSize:12,color:T.muted,marginTop:6}}>Tip: set this client's line items in their profile so they appear first here. You can also search the NDIS price guide above.</div>
            )}
          </div>
        )}

        {/* Notes */}
        <div>
          <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>Shift Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3}
            placeholder="Plan for the shift, things to remember, what to bring, goals to focus on…"
            style={{width:"100%",background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",resize:"none",boxSizing:"border-box"}}/>
        </div>

        {/* Group outing / run sheet — shift editing and outing editing are kept separate */}
        {inGroupOuting ? (
        <div style={{border:`1px solid ${T.orange}33`,borderRadius:12,padding:"12px",background:`${T.orange}08`,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,fontWeight:600,color:T.orange,fontFamily:"Syne,sans-serif"}}>🚐 Part of group outing</div>
          <div style={{fontSize:12.5,fontWeight:500,color:T.white,fontFamily:"Syne,sans-serif"}}>{editShift.title}</div>
          <div style={{fontSize:12,color:T.subtle,lineHeight:1.5}}>You're editing this one shift. The outing's shared details — who's coming, meeting point, notes and stops — are edited separately so changes apply to everyone.</div>
          {onEditGroupOuting && <button onClick={()=>onEditGroupOuting(editShift)} style={{width:"100%",background:`${T.orange}14`,border:`1px solid ${T.orange}55`,borderRadius:10,padding:"11px",color:T.orange,fontWeight:600,fontSize:12.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Edit group outing details →</button>}
        </div>
        ) : (
        <div style={{border:`1px solid ${T.orange}33`,borderRadius:12,padding:"12px",background:`${T.orange}08`}}>
          <button onClick={()=>setShowRunSheet(v=>!v)} style={{width:"100%",background:"none",border:"none",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",padding:0}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:12,fontWeight:600,color:T.orange,fontFamily:"Syne,sans-serif"}}>🚐 Group outing run sheet</div>
              <div style={{fontSize:12,color:T.subtle,marginTop:1}}>Optional — meeting point, what to bring, itinerary stops</div>
            </div>
            <span style={{fontSize:16,color:T.orange}}>{showRunSheet?"−":"+"}</span>
          </button>
          {showRunSheet && (
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
              <div>
                <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>📍 Meeting point</div>
                <input value={meetPoint} onChange={e=>setMeetPoint(e.target.value)} placeholder="Where to meet, e.g. Capalaba Library car park"
                  style={{width:"100%",background:"rgba(255,176,32,0.06)",border:`1px solid ${T.orange}33`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>📝 Meeting point notes</div>
                <textarea value={meetPointNotes} onChange={e=>setMeetPointNotes(e.target.value)} placeholder="Exactly where to wait, parking, who to look for…" rows={2}
                  style={{width:"100%",background:"rgba(255,176,32,0.06)",border:`1px solid ${T.orange}33`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.4}}/>
                <textarea value={meetPointTeenNotes} onChange={e=>setMeetPointTeenNotes(e.target.value)} placeholder="🧑 Teen note for the meet-up — what THEY see (optional)" rows={2} style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.teal}44`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.4,marginTop:6}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.subtle,marginBottom:4}}>🎒 What to bring</div>
                <input value={whatToBring} onChange={e=>setWhatToBring(e.target.value)} placeholder="Hat, water, lunch, swimmers…"
                  style={{width:"100%",background:"rgba(255,176,32,0.06)",border:`1px solid ${T.orange}33`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.red,marginBottom:4,fontWeight:600}}>⚠️ Important note (shown in red at the top)</div>
                <textarea value={importantNote} onChange={e=>setImportantNote(e.target.value)} rows={2} placeholder="e.g. Teri has a nut allergy — check all food carefully"
                  style={{width:"100%",background:"rgba(255,92,122,0.07)",border:`1px solid ${T.red}55`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.4}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.subtle,marginBottom:6}}>🗺️ Itinerary stops</div>
                {stops.map((st,i)=>(
                  <div key={st.id||i} style={{marginBottom:8,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.border}`,borderRadius:10,padding:8}}>
                    <div style={{display:"flex",gap:6,marginBottom:6,alignItems:"flex-start"}}>
                      <input type="time" value={st.time||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,time:e.target.value}:x))} style={{width:108,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      <input value={st.name||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder={i===0?"First stop / activity":"Stop / activity"} style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      <button onClick={()=>setStops(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer",lineHeight:1,padding:"6px 2px"}}>×</button>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                      <input value={st.address||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,address:e.target.value}:x))} placeholder="📍 Address (tap-to-open maps for the SW)" style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      {st.address && <button onClick={()=>openInMaps(st.address)} title="Open in maps" style={{flexShrink:0,background:`${T.blue}14`,border:`1px solid ${T.blue}44`,borderRadius:9,padding:"8px 10px",color:T.blue,fontSize:13,cursor:"pointer"}}>📍</button>}
                    </div>
                    <textarea value={st.notes||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,notes:e.target.value}:x))} placeholder={i===0?"Notes for this first stop — what to do, bookings, things to watch…":"Notes for this stop…"} rows={2} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.4}}/>
                    <textarea value={st.teenNotes||""} onChange={e=>setStops(p=>p.map((x,j)=>j===i?{...x,teenNotes:e.target.value}:x))} placeholder="🧑 Teen note for this stop — what THEY see (optional)" rows={2} style={{width:"100%",background:"rgba(0,229,180,0.06)",border:`1px solid ${T.teal}44`,borderRadius:9,padding:"8px",color:"#fff",fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.4,marginTop:6}}/>
                    {(st.files&&st.files.length>0) && (
                      <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:6}}>
                        {st.files.map((f,fi)=>(
                          <div key={fi} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 9px"}}>
                            <span style={{fontSize:13}}>{f.type?.includes("pdf")?"📄":f.type?.includes("image")?"🖼️":f.type?.includes("html")?"🧾":"📎"}</span>
                            <span style={{flex:1,fontSize:11,color:T.body,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                            <button onClick={()=>rmStopFile(i,fi)} style={{background:"none",border:"none",color:T.red,fontSize:15,cursor:"pointer"}}>×</button>
                          </div>
                        ))}
                      </div>
                    )}
                    <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6,background:`${T.blue}10`,border:`1px dashed ${T.blue}40`,borderRadius:9,padding:"8px",color:T.blue,fontWeight:400,fontSize:11.5,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                      📎 Attach to this stop
                      <input type="file" accept="image/*,application/pdf,text/html" multiple style={{display:"none"}} onChange={ev=>{ addStopFiles(i, ev.target.files); ev.target.value=""; }}/>
                    </label>
                  </div>
                ))}
                <button onClick={()=>setStops(p=>[...p,{id:Date.now()+Math.random(),time:"",name:"",address:"",notes:"",teenNotes:""}])} style={{width:"100%",background:`${T.orange}12`,border:`1px dashed ${T.orange}55`,borderRadius:9,padding:"9px",color:T.orange,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>＋ Add stop</button>
              </div>
            </div>
          )}
        </div>
        )}

        {/* Confirmed toggle — controls which SMS the worker gets */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setConfirmed(false)} style={{flex:1,padding:"12px 10px",borderRadius:12,border:`1px solid ${!confirmed?T.amber:T.border}`,background:!confirmed?`${T.amber}14`:"transparent",cursor:"pointer",fontFamily:"DM Sans,sans-serif",textAlign:"left"}}>
            <div style={{fontSize:12,fontWeight:600,color:!confirmed?T.amber:T.body}}>📨 Send as Request</div>
            <div style={{fontSize:12,color:T.subtle,marginTop:2,lineHeight:1.3}}>Worker gets a link to confirm</div>
          </button>
          <button onClick={()=>setConfirmed(true)} style={{flex:1,padding:"12px 10px",borderRadius:12,border:`1px solid ${confirmed?T.teal:T.border}`,background:confirmed?`${T.teal}14`:"transparent",cursor:"pointer",fontFamily:"DM Sans,sans-serif",textAlign:"left"}}>
            <div style={{fontSize:12,fontWeight:600,color:confirmed?T.teal:T.body}}>✅ Confirmed</div>
            <div style={{fontSize:12,color:T.subtle,marginTop:2,lineHeight:1.3}}>Worker gets shift info link</div>
          </button>
        </div>

        {/* No sign-on/off required */}
        <button onClick={()=>setNoSignOnOff(v=>!v)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${noSignOnOff?T.blue:T.border}`,background:noSignOnOff?`${T.blue}14`:"transparent",cursor:"pointer",fontFamily:"DM Sans,sans-serif",textAlign:"left"}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:noSignOnOff?T.blue:T.body}}>No sign-on / off needed</div>
            <div style={{fontSize:12,color:T.subtle,marginTop:2,lineHeight:1.3}}>Worker just records the shift (km, receipts, notes) — no signing on or off.</div>
          </div>
          <div style={{width:42,height:24,borderRadius:12,background:noSignOnOff?T.blue:"rgba(255,255,255,0.12)",position:"relative",flexShrink:0,transition:"background .15s"}}>
            <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:3,left:noSignOnOff?21:3,transition:"left .15s"}}/>
          </div>
        </button>

        {/* Estimate */}
        {canSave && (
          <div style={{background:"rgba(0,229,180,0.06)",border:`1px solid ${T.borderAccent}`,borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,color:T.subtle}}>Duration</span>
              <span style={{fontSize:13,fontWeight:400,color:T.white}}>{estHrs}h</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,color:T.subtle}}>Billed to NDIS{lineItems.length?` (${lineItems.length} line${lineItems.length>1?"s":""})`:""}</span>
              <span style={{fontSize:13,fontWeight:500,color:T.teal}}>{fmt$(billTotal)}</span>
            </div>
            {payRateUsed ? (<>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:T.subtle}}>Worker cost ({estHrs}h × ${rateVal.toFixed(2)}{payRateUsed.category?` · ${payRateUsed.category}`:""})</span>
                <span style={{fontSize:13,fontWeight:400,color:T.amber}}>{fmt$(workerCost)}</span>
              </div>
              <div style={{height:1,background:T.border,margin:"6px 0"}}/>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:11,color:T.subtle}}>Margin</span>
                <span style={{fontSize:13,fontWeight:600,color:margin>=0?T.teal:T.red}}>{fmt$(margin)}</span>
              </div>
            </>) : (
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>Pick this worker's pay rate above to see shift cost &amp; margin.</div>
            )}
          </div>
        )}

        {/* SMS note */}
        <div style={{background:"rgba(0,191,255,0.06)",border:"1px solid rgba(0,191,255,0.2)",borderRadius:10,padding:"10px 12px",fontSize:11,color:T.body,lineHeight:1.5}}>
          📱 SMS will be sent to {worker ? `${worker.name} (${worker.phone})` : "the assigned worker"} via ClickSend on save.
          
        </div>

        <button onClick={()=>setNotifyWorker(v=>!v)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${notifyWorker?T.teal:T.border}`,background:notifyWorker?`${T.teal}14`:"transparent",cursor:"pointer",fontFamily:"DM Sans,sans-serif",textAlign:"left",marginBottom:10}}>
          <div><div style={{fontSize:12,fontWeight:600,color:notifyWorker?T.teal:T.body}}>📣 Text the worker</div><div style={{fontSize:10.5,color:T.subtle,marginTop:2}}>{notifyWorker?"They'll get an SMS about this shift":"No SMS will be sent"}</div></div>
          <div style={{width:42,height:24,borderRadius:12,background:notifyWorker?T.teal:"rgba(255,255,255,0.12)",position:"relative",flexShrink:0,transition:"background .15s"}}>
            <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:3,left:notifyWorker?21:3,transition:"left .15s"}}/>
          </div>
        </button>
        <BtnPrimary disabled={!canSave || sending} onClick={handleSave}>
          {sending ? "Saving…" : !canSave ? "Fill in required fields" : !notifyWorker ? (isEdit?"Update shift (no text)":"Save shift (no text)") : confirmed ? "Save & Send Confirmation" : "Save & Send Request"}
        </BtnPrimary>
        {isEdit && (
          <button onClick={()=>{ if(onDelete){ if(typeof window!=="undefined" && !window.confirm("Delete this shift permanently? This can't be undone.")) return; onDelete(editShift.id); onClose();} }} style={{width:"100%",padding:"12px",background:"rgba(255,92,122,0.1)",border:"1px solid rgba(255,92,122,0.3)",borderRadius:12,color:T.red,fontWeight:400,fontSize:12,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
            Delete Shift
          </button>
        )}
      </div>
    </Modal>
  );
}

// PDF — render inline, print main window
// ══════════════════════════════════════════════════════════════
// This is a React component — rendered into the DOM, then window.print() is called
// A <style> tag hides everything except .print-invoice during print

function PrintInvoice({ invoice, lines, participant, fromDate, toDate, total, onUpdateInvoice, fromName, replyTo, company, onInvoiced, onMarkSent, onClose }) {
  const biz = company || {};
  const bizName  = biz.name || "IBSS QLD PTY LTD";
  const bizAbn   = biz.abn || "";
  const bizAddr  = biz.address || "";
  const bizPhone = biz.phone || "";
  const bizEmail = biz.manager_email || "";
  const bankName = biz.account_name || "";
  const bankBsb  = biz.bsb || "";
  const bankAcct = biz.account_number || "";
  const bizNotes = biz.invoice_notes || "";
  const fmtAmt  = n => `$${Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}`;
  const fmtDate = d => d ? new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const invoiceNo = invoice?.id || `IBSS-${Date.now().toString().slice(-6)}`;
  const today = new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"});
  const [dueIso, setDueIso] = useState(invoice?.dueDate || new Date(Date.now()+14*86400000).toISOString().split("T")[0]);
  const dueDate = dueIso ? new Date(dueIso).toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
  const totalHrs = lines.filter(l=>l.unit==="hrs").reduce((s,l)=>s+Number(l.qty),0);
  const totalKm  = lines.filter(l=>l.unit==="km" ).reduce((s,l)=>s+Number(l.qty),0);
  const hrsSub   = lines.filter(l=>l.unit==="hrs").reduce((s,l)=>s+l.qty*l.rate,0);
  const kmSub    = lines.filter(l=>l.unit==="km" ).reduce((s,l)=>s+l.qty*l.rate,0);
  const eachSub  = lines.filter(l=>l.unit==="each").reduce((s,l)=>s+l.qty*l.rate,0);

  const [dlState, setDlState] = useState("idle"); // idle | loading | done
  const [sendState, setSendState] = useState("idle"); // idle | sending | sent | error
  const [alreadySent, setAlreadySent] = useState(invoice?.status === "sent");
  const [composerOpen, setComposerOpen] = useState(!(invoice?.status === "sent"));
  const [emailTo, setEmailTo] = useState(invoice?.invoicingEmail || participant?.invoicingEmail || participant?.email || "");
  const [subject, setSubject] = useState(`IBSS QLD Invoice ${invoiceNo} - ${participant?.name||"Services"}`);
  const [body, setBody] = useState([
    `Hi,`,
    ``,
    `Please find attached invoice ${invoiceNo} for ${participant?.name||"services"}.`,
    ``,
    `Service period: ${fmtDate(fromDate)||"—"} to ${fmtDate(toDate)||"present"}`,
    `Total: ${fmtAmt(total)}`,
    `Due date: ${dueDate}`,
    ``,
    `The PDF is attached. Please let me know if you have any questions.`,
    ``,
    `Kind regards,`,
    `IBSS QLD PTY LTD`,
    `Independence and Beyond Support Services`,
  ].join("\n"));

  function changeDue(v) {
    setDueIso(v);
    if (invoice && onUpdateInvoice) {
      const invDate = invoice.date ? new Date(invoice.date) : new Date();
      const days = Math.max(0, Math.round((new Date(v) - invDate) / 86400000));
      onUpdateInvoice(invoice, { dueDate: v, remindDays: days });
    }
  }

  function emailInvoice() {
    const mailto = `mailto:${encodeURIComponent(emailTo)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
  }

  async function loadScript(src) {
    return new Promise((resolve, reject) => {
      if ([...document.scripts].some(s => s.src === src)) return resolve();
      const el = document.createElement("script");
      el.src = src; el.onload = resolve; el.onerror = reject;
      document.head.appendChild(el);
    });
  }

  async function buildInvoiceDoc() {
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const W = 210, M = 14;

      // Header bar
      doc.setFillColor(5, 11, 20); doc.rect(0, 0, W, 24, "F");
      doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(15);
      doc.text(bizName, M, 13);
      doc.setFontSize(7); doc.setTextColor(150, 200, 200);
      doc.text(bizAbn ? `ABN ${bizAbn}` : "", M, 19);
      doc.setFontSize(20); doc.setTextColor(255, 255, 255);
      doc.text("INVOICE", W - M, 13, { align: "right" });
      doc.setFontSize(8); doc.setTextColor(150, 200, 200);
      doc.text(invoiceNo, W - M, 19, { align: "right" });

      // Meta
      let y = 32;
      doc.setFontSize(8);
      const meta = [
        ["Participant", participant?.fullName || participant?.name || "All Clients"], ["Plan Manager", participant?.manager || "—"],
        ["Invoice Date", today], ["Service Period", `${fmtDate(fromDate) || "All"} - ${fmtDate(toDate) || "Present"}`],
        ["Due Date", dueDate], ["Provider", "IBSS QLD PTY LTD"],
      ];
      meta.forEach((m, i) => {
        const x = M + (i % 2) * ((W - 2*M) / 2);
        const yy = y + Math.floor(i / 2) * 11;
        doc.setTextColor(140, 140, 150); doc.setFont("helvetica", "bold"); doc.setFontSize(6.5);
        doc.text(m[0].toUpperCase(), x, yy);
        doc.setTextColor(17, 17, 17); doc.setFontSize(9);
        doc.text(String(m[1]), x, yy + 4.5);
      });
      y += 38;

      // Table
      const body = lines.map(l => {
        const d = new Date(l.date);
        return [
          `${fmtDate(l.date)}\n${dayNames[d.getDay()]}`,
          `${l.desc}\n${l.code || ""}`,
          String(l.qty), l.unit, fmtAmt(l.rate), fmtAmt(l.total),
        ];
      });
      doc.autoTable({
        startY: y,
        head: [["Date", "Description", "Qty", "Unit", "Rate", "Total"]],
        body,
        theme: "striped",
        headStyles: { fillColor: [5, 11, 20], textColor: [255, 255, 255], fontSize: 8, halign: "left" },
        bodyStyles: { fontSize: 8.5, cellPadding: 2.5, textColor: [17, 17, 17] },
        alternateRowStyles: { fillColor: [249, 250, 255] },
        columnStyles: {
          0: { cellWidth: 26 }, 1: { cellWidth: "auto" },
          2: { halign: "right", cellWidth: 14 }, 3: { halign: "right", cellWidth: 14 },
          4: { halign: "right", cellWidth: 22 }, 5: { halign: "right", cellWidth: 26, fontStyle: "bold" },
        },
        margin: { left: M, right: M },
      });

      let fy = doc.lastAutoTable.finalY + 8;
      // Totals box
      const boxX = W - M - 70;
      doc.setFontSize(9); doc.setTextColor(100, 100, 120); doc.setFont("helvetica", "normal");
      [["Hours", fmtAmt(hrsSub)], ["Transport", fmtAmt(kmSub)], ["Other", fmtAmt(eachSub)]].forEach(r => {
        doc.text(r[0], boxX, fy); doc.text(r[1], W - M, fy, { align: "right" }); fy += 6;
      });
      doc.setFillColor(5, 11, 20); doc.rect(boxX - 2, fy - 1, (W - M) - (boxX - 2) + 2, 10, "F");
      doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(12);
      doc.text("TOTAL", boxX, fy + 6); doc.text(fmtAmt(total), W - M, fy + 6, { align: "right" });
      fy += 18;

      // Payment details box (left side)
      if (bankName || bankBsb || bankAcct) {
        doc.setFillColor(248, 249, 255); doc.rect(M, fy, 92, 26, "F");
        doc.setTextColor(90, 90, 110); doc.setFont("helvetica", "bold"); doc.setFontSize(7);
        doc.text("PAYMENT DETAILS", M + 3, fy + 5);
        doc.setTextColor(17, 17, 17); doc.setFont("helvetica", "normal"); doc.setFontSize(8.5);
        let py = fy + 11;
        if (bankName) { doc.text(`Account: ${bankName}`, M + 3, py); py += 5; }
        if (bankBsb)  { doc.text(`BSB: ${bankBsb}`, M + 3, py); py += 5; }
        if (bankAcct) { doc.text(`Acc: ${bankAcct}`, M + 3, py); py += 5; }
        fy += 30;
      }
      if (bizNotes) {
        doc.setTextColor(90, 90, 110); doc.setFont("helvetica", "italic"); doc.setFontSize(8);
        const nl = doc.splitTextToSize(bizNotes, W - 2*M);
        doc.text(nl, M, fy); fy += nl.length * 4 + 4;
      }

      // Footer
      doc.setDrawColor(5, 11, 20); doc.setLineWidth(0.5); doc.line(M, fy, W - M, fy);
      fy += 5; doc.setTextColor(120, 120, 120); doc.setFont("helvetica", "normal"); doc.setFontSize(7);
      doc.text([bizName, bizAbn?`ABN ${bizAbn}`:"", bizAddr].filter(Boolean).join("  |  "), M, fy);
      doc.text(`${[bizPhone,bizEmail].filter(Boolean).join("  |  ")}  |  ${today}`, M, fy + 4);

      return doc;
  }

  async function downloadPDF() {
    setDlState("loading");
    try {
      const doc = await buildInvoiceDoc();
      doc.save(`IBSS-Invoice-${participant?.name || "All"}-${invoiceNo}.pdf`);
      if (invoice && onInvoiced) onInvoiced(invoice.shiftIds, invoice.id);
      setDlState("done");
      setTimeout(() => setDlState("idle"), 2500);
    } catch (e) {
      setDlState("idle");
      alert("PDF generation failed: " + (e?.message || "unknown"));
    }
  }

  async function sendInvoice() {
    if (!emailTo) return;
    setSendState("sending");
    try {
      const doc = await buildInvoiceDoc();
      const dataUri = doc.output("datauristring");
      const base64 = dataUri.split(",")[1];
      const { data, error } = await db.functions.invoke("send-invoice", {
        body: {
          to: emailTo,
          subject,
          text: body,
          pdfBase64: base64,
          filename: `IBSS-Invoice-${invoiceNo}.pdf`,
          fromName: fromName || "KORA",
          replyTo: replyTo || undefined,
        },
      });
      if (error) throw error;
      if (data && data.ok === false) throw new Error(data.error || "send failed");
      if (invoice && onInvoiced) onInvoiced(invoice.shiftIds, invoice.id);
      if (invoice && onMarkSent) onMarkSent(invoice);
      setAlreadySent(true);
      setComposerOpen(false);
      setSendState("sent");
      setTimeout(() => setSendState("idle"), 3500);
    } catch (e) {
      setSendState("error");
      alert("Couldn't send invoice: " + (e?.message || e) + "\n\nYou can still use 'Open Email' below to send it manually.");
      setTimeout(() => setSendState("idle"), 200);
    }
  }

  const cellStyle = {padding:"7px 8px", borderBottom:"1px solid #eee", fontSize:10, verticalAlign:"top"};
  const headStyle = {padding:"8px 8px", background:"#050b14", color:"#fff", fontSize:8, fontWeight:400, textTransform:"uppercase", letterSpacing:"0.5px"};

  return (
    <div className="print-invoice" style={{background:"#fff",minHeight:"100vh",padding:"20px 16px 60px",fontFamily:"Arial,sans-serif",color:"#111",fontSize:11}}>
      <style>{`
        @media print {
          @page { margin: 10mm; size: A4; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
      `}</style>

      {/* Action buttons */}
      <div style={{position:"sticky",top:0,background:"#fff",paddingBottom:10,marginBottom:16,zIndex:10,borderBottom:"1px solid #eee"}}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <button onClick={downloadPDF} disabled={dlState==="loading"} style={{flex:1,background:dlState==="done"?"#1a8870":"#00E5B4",color:"#050b14",border:"none",borderRadius:10,padding:"12px 16px",cursor:dlState==="loading"?"wait":"pointer",fontSize:14,fontWeight:500,boxShadow:"0 2px 12px rgba(0,229,180,0.4)"}}>
            {dlState==="loading"?"Generating PDF…":dlState==="done"?"✓ Saved!":"⬇ Download PDF"}
          </button>
          <button onClick={onClose} style={{background:"#050b14",color:"#fff",border:"none",borderRadius:10,padding:"12px 18px",cursor:"pointer",fontSize:14,fontWeight:400}}>
            ✕ Close
          </button>
        </div>
        {/* Email composer */}
        {alreadySent && !composerOpen ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,background:"#eaf8f2",border:"1px solid #b8e6d4",borderRadius:12,padding:"12px 14px"}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#0a7a55"}}>✓ Invoice sent</div>
              <div style={{fontSize:10.5,color:"#5a8a76",marginTop:2}}>Emailed to {emailTo || "the saved invoicing addresses"}.</div>
            </div>
            <button onClick={()=>setComposerOpen(true)} style={{background:"#fff",border:"1px solid #b8e6d4",borderRadius:8,padding:"8px 14px",color:"#0a7a55",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
              Resend
            </button>
          </div>
        ) : (
        <div style={{display:"flex",flexDirection:"column",gap:7,background:"#f6f8fb",border:"1px solid #e0e6ee",borderRadius:12,padding:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#050b14",letterSpacing:"0.5px"}}>{alreadySent?"RESEND INVOICE":"EMAIL THIS INVOICE"}</div>
            {alreadySent && <button onClick={()=>setComposerOpen(false)} style={{background:"none",border:"none",color:"#888",fontSize:12,cursor:"pointer"}}>✕</button>}
          </div>
          <div>
            <div style={{fontSize:9,color:"#888",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>To (invoicing emails)</div>
            <input value={emailTo} onChange={e=>setEmailTo(e.target.value)} placeholder="accounts@planmanager.com.au, you@…"
              style={{width:"100%",background:"#fff",border:"1px solid #d0d8e0",borderRadius:8,padding:"9px 10px",color:"#111",fontSize:12,fontFamily:"Arial,sans-serif",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#888",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Subject</div>
            <input value={subject} onChange={e=>setSubject(e.target.value)}
              style={{width:"100%",background:"#fff",border:"1px solid #d0d8e0",borderRadius:8,padding:"9px 10px",color:"#111",fontSize:12,fontFamily:"Arial,sans-serif",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#888",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Message (editable)</div>
            <textarea value={body} onChange={e=>setBody(e.target.value)} rows={6}
              style={{width:"100%",background:"#fff",border:"1px solid #d0d8e0",borderRadius:8,padding:"9px 10px",color:"#111",fontSize:12,fontFamily:"Arial,sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div>
              <div style={{fontSize:9,color:"#888",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Payment due date</div>
              <input type="date" value={dueIso} onChange={e=>changeDue(e.target.value)}
                style={{width:"100%",background:"#fff",border:"1px solid #d0d8e0",borderRadius:8,padding:"8px 10px",color:"#111",fontSize:12,fontFamily:"Arial,sans-serif",outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
            <button onClick={sendInvoice} disabled={!emailTo||sendState==="sending"} style={{flex:1,background:sendState==="sent"?"#1a8870":sendState==="error"?"#c0392b":(emailTo?"#00E5B4":"#ccc"),color:sendState==="sent"||sendState==="error"?"#fff":"#050b14",border:"none",borderRadius:8,padding:"10px 16px",cursor:emailTo&&sendState!=="sending"?"pointer":"not-allowed",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>
              {sendState==="sending"?"Sending…":sendState==="sent"?"✓ Sent!":sendState==="error"?"Failed — retry":"📤 Send Invoice"}
            </button>
            <button onClick={emailInvoice} disabled={!emailTo} style={{flex:1,background:emailTo?"#050b14":"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"10px 14px",cursor:emailTo?"pointer":"not-allowed",fontSize:12,fontWeight:400,whiteSpace:"nowrap"}}>
              ✉ Open Email
            </button>
            </div>
          </div>
          <div style={{fontSize:10,color:"#888",lineHeight:1.4}}>
            <b>Send Invoice</b> emails it straight from KORA with the PDF attached — no leaving the app. (<b>Open Email</b> is a manual fallback: opens your mail app pre-filled to attach the PDF yourself.)
            {invoice && <span style={{display:"block",marginTop:4,color:"#0a7"}}>✓ Saved to your database. You'll be reminded to chase payment around <b>{dueDate}</b> once the reminder service is switched on.</span>}
          </div>
        </div>
        )}
      </div>

      {/* INVOICE CONTENT */}
      <div id="kora-invoice-content">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,paddingBottom:14,borderBottom:"3px solid #050b14"}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#050b14"}}>{bizName}</div>
          {bizAbn&&<div style={{fontSize:9,color:"#888",marginTop:3}}>ABN {bizAbn}</div>}
          {bizAddr&&<div style={{fontSize:9,color:"#888",marginTop:1}}>{bizAddr}</div>}
          {(bizPhone||bizEmail)&&<div style={{fontSize:9,color:"#888",marginTop:1}}>{[bizPhone,bizEmail].filter(Boolean).join("  ·  ")}</div>}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:28,fontWeight:700,color:"#050b14",letterSpacing:2}}>INVOICE</div>
          <div style={{fontSize:10,color:"#888",marginTop:2}}>{invoiceNo}</div>
        </div>
      </div>

      {/* Meta grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0,marginBottom:16,border:"1px solid #e0e2ef",borderRadius:6,overflow:"hidden"}}>
        {[
          ["Participant",   participant?.fullName||participant?.name||"All Clients"],
          ["Plan Manager",  participant?.manager||"—"],
          ["Invoice Date",  today],
          ["Service Period",`${fmtDate(fromDate)||"All"} – ${fmtDate(toDate)||"Present"}`],
          ["Due Date",      dueDate],
          ["Provider",      "IBSS QLD PTY LTD"],
        ].map(([lbl,val],i) => (
          <div key={i} style={{padding:"10px 12px",background:"#f8f9ff",borderRight:i%3===2?"none":"1px solid #e0e2ef",borderTop:i>=3?"1px solid #e0e2ef":"none"}}>
            <div style={{fontSize:7,fontWeight:400,textTransform:"uppercase",letterSpacing:1,color:"#888",marginBottom:3}}>{lbl}</div>
            <div style={{fontSize:11,fontWeight:400}}>{val}</div>
          </div>
        ))}
      </div>

      {/* Summary chips */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {label:"Line Items", val:lines.length, hl:false},
          {label:"Hours",      val:totalHrs.toFixed(2), hl:false},
          {label:"KM",         val:totalKm, hl:false},
          {label:"Total",      val:fmtAmt(total), hl:true},
        ].map((c,i)=>(
          <div key={i} style={{flex:1,border:`1px solid ${c.hl?"#050b14":"#e0e2ef"}`,borderRadius:6,padding:"8px 10px",textAlign:"center",background:c.hl?"#050b14":"#f8f9ff"}}>
            <div style={{fontSize:15,fontWeight:700,color:c.hl?"#00E5B4":"#050b14"}}>{c.val}</div>
            <div style={{fontSize:7,textTransform:"uppercase",letterSpacing:1,color:c.hl?"#aaa":"#888",marginTop:2}}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Table */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14}}>
        <thead>
          <tr>
            <th style={{...headStyle,width:60,textAlign:"left"}}>Date</th>
            <th style={{...headStyle,textAlign:"left"}}>Description</th>
            <th style={{...headStyle,width:30,textAlign:"right"}}>Qty</th>
            <th style={{...headStyle,width:30,textAlign:"right"}}>Unit</th>
            <th style={{...headStyle,width:46,textAlign:"right"}}>Rate</th>
            <th style={{...headStyle,width:54,textAlign:"right"}}>Total</th>
          </tr>
        </thead>
        <tbody>
          {lines.map((l,i)=>{
            const calc = +(l.qty*l.rate).toFixed(2);
            const bad  = Math.abs(calc - Number(l.total)) > 0.02;
            const d    = new Date(l.date);
            const wend = d.getDay()===0||d.getDay()===6;
            return (
              <tr key={l.id} style={{background:bad?"#fff8e6":i%2?"#f9faff":"#fff"}}>
                <td style={cellStyle}>
                  <div style={{fontWeight:400,color:wend?"#d4870a":"#111"}}>{fmtDate(l.date)}</div>
                  <div style={{fontSize:7,color:"#aaa",fontWeight:400,textTransform:"uppercase"}}>{dayNames[d.getDay()]}</div>
                </td>
                <td style={cellStyle}>
                  <div>{l.desc}</div>
                  <div style={{fontSize:7,color:"#999",fontFamily:"monospace",marginTop:1}}>{l.code}</div>
                </td>
                <td style={{...cellStyle,textAlign:"right",fontWeight:500}}>{l.qty}</td>
                <td style={{...cellStyle,textAlign:"right"}}>{l.unit}</td>
                <td style={{...cellStyle,textAlign:"right"}}>{fmtAmt(l.rate)}</td>
                <td style={{...cellStyle,textAlign:"right",fontWeight:400,color:bad?"#c0392b":"#111"}}>
                  {fmtAmt(l.total)}
                  {bad && <div style={{fontSize:7,color:"#c0392b"}}>calc {fmtAmt(calc)}</div>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Totals */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:20}}>
        <div style={{width:220}}>
          {[["Hours",fmtAmt(hrsSub)],["Transport",fmtAmt(kmSub)],["Other",fmtAmt(eachSub)]].map(([lbl,val])=>(
            <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #eee",fontSize:10.5}}>
              <span>{lbl}</span><span>{val}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",marginTop:4,background:"#050b14",borderRadius:4}}>
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>TOTAL</span>
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{fmtAmt(total)}</span>
          </div>
        </div>
      </div>

      {(bankName||bankBsb||bankAcct)&&(
        <div style={{background:"#f8f9ff",border:"1px solid #e0e2ef",borderRadius:6,padding:"10px 12px",marginBottom:14}}>
          <div style={{fontSize:8,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#888",marginBottom:4}}>Payment Details</div>
          <div style={{fontSize:11,color:"#111",lineHeight:1.6}}>
            {bankName&&<div>Account name: <b>{bankName}</b></div>}
            {bankBsb&&<div>BSB: <b>{bankBsb}</b></div>}
            {bankAcct&&<div>Account number: <b>{bankAcct}</b></div>}
          </div>
        </div>
      )}
      {bizNotes&&<div style={{fontSize:10,color:"#666",fontStyle:"italic",marginBottom:12}}>{bizNotes}</div>}

      {/* Footer */}
      <div style={{borderTop:"2px solid #050b14",paddingTop:10,fontSize:8,color:"#888",lineHeight:1.7}}>
        <div>{[bizName, bizAbn?`ABN ${bizAbn}`:"", bizAddr].filter(Boolean).join("  |  ")}</div>
        <div>{[bizPhone, bizEmail].filter(Boolean).join("  |  ")} &nbsp; {today} &nbsp;|&nbsp; {invoiceNo}</div>
      </div>
      </div>{/* end kora-invoice-content */}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// INVOICING TAB COMPONENT
// ══════════════════════════════════════════════════════════════
const NDIS_CODES = [
  {label:"Community Social & Rec (Weekday)",   code:"04_I04_0125_6_1", rate:57,    unit:"hrs"},
  {label:"Community Social & Rec (Saturday)",  code:"04_I04_0125_6_1", rate:79.28, unit:"hrs"},
  {label:"Community Social & Rec (Sunday)",    code:"04_I04_0125_6_1", rate:111.46,unit:"hrs"},
  {label:"Personal Daily Activities",          code:"01_004_0107_1_1", rate:57,    unit:"hrs"},
  {label:"Personal Daily Activities (Sat)",    code:"01_004_0107_1_1", rate:79.28, unit:"hrs"},
  {label:"Assistance w Self-Care Night / Sleepover", code:"01_015_0107_1_1", rate:250,  unit:"each"},
  {label:"Activity Based Transport",           code:"04_I04_0125_6_1", rate:0.95,  unit:"km"},
  {label:"Activity Based Transport (0.85)",    code:"04_I04_0125_6_1", rate:0.85,  unit:"km"},
  {label:"Group Social & Rec 1:2 Ratio",       code:"04_I04_0125_6_1", rate:35,   unit:"hrs"},
];

function InvoicingTab({allShifts, setAllShifts, clients, markShiftsInvoiced, runAudit, aiLoading, aiResult, setAiResult, savedInvoices, setSavedInvoices, persistInvoice, changeInvoiceStatus, removeInvoice, updateInvoiceFields, fromName, replyTo, company}) {
  const CLIENTS = (clients && clients.length) ? clients : [];
  // Use the real client list everywhere in this tab (chips, matching, line headers).
  const PARTICIPANTS = CLIENTS;
  // Persist the in-progress invoice (which client + date range + terms) so it survives leaving the tab.
  const INV_DRAFT_KEY = "kora_invoice_draft";
  const invDraft0 = (()=>{ try{ const r=localStorage.getItem(INV_DRAFT_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } })();
  const fmtDate = d => d ? new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
  // Search/filter state
  const [filterClient, setFilterClient] = useState(invDraft0?.filterClient || "");
  const [filterFrom, setFilterFrom] = useState(invDraft0?.filterFrom || "");
  const [filterTo, setFilterTo] = useState(invDraft0?.filterTo || "");
  const [searched, setSearched] = useState(invDraft0?.searched || false);
  const [showHistory, setShowHistory] = useState(false);
  const [histQ, setHistQ] = useState("");
  const [showInvoiced, setShowInvoiced] = useState(false);
  // Invoice build state
  const [editingId, setEditingId] = useState(null);
  const [editBuf, setEditBuf] = useState({});
  const [addingLine, setAddingLine] = useState(false);
  const [newLine, setNewLine] = useState({date:"",desc:"",code:"",unit:"hrs",qty:"",rate:"",total:""});
  const [showAudit, setShowAudit] = useState(false);
  const [printData, setPrintData] = useState(null);
  const [dueDays, setDueDays] = useState(invDraft0?.dueDays ?? 14);        // payment terms
  const [customDue, setCustomDue] = useState(invDraft0?.customDue || "");     // optional exact date overrides days
  useEffect(()=>{ try{ localStorage.setItem(INV_DRAFT_KEY, JSON.stringify({filterClient,filterFrom,filterTo,searched,dueDays,customDue})); }catch(e){} }, [filterClient,filterFrom,filterTo,searched,dueDays,customDue]);

  // Filter shifts
  const filtered = allShifts.filter(s => {
    const p = PARTICIPANTS.find(x => String(x.id) === String(s.participantId));
    const pname = (p && p.name) || s.participant || "";
    const nameMatch = !filterClient || pname.toLowerCase().includes(filterClient.toLowerCase());
    const fromMatch = !filterFrom || s.date >= filterFrom;
    const toMatch   = !filterTo   || s.date <= filterTo;
    const notInvoiced = showInvoiced ? true : !s.invoiced;  // hide already-invoiced unless toggled
    return nameMatch && fromMatch && toMatch && notInvoiced;
  });

  // Shared km entries (from active shifts) → transport line items for the matched client
  const sharedKmEntries = (typeof window!=="undefined" && window.__koraSharedKm) || [];
  const sharedKmLines = sharedKmEntries
    .filter(e => {
      const p = PARTICIPANTS.find(x => x.id === e.clientId);
      const nameMatch = !filterClient || (p && p.name.toLowerCase().includes(filterClient.toLowerCase()));
      const fromMatch = !filterFrom || e.date >= filterFrom;
      const toMatch   = !filterTo   || e.date <= filterTo;
      return nameMatch && fromMatch && toMatch;
    })
    .map(e => {
      const p = PARTICIPANTS.find(x => x.id === e.clientId);
      const rate = p?.transport || 0.95;
      const shared = e.sharedWith && e.sharedWith.length;
      return {
        id: `km-${e.shiftId}-${e.clientId}`,
        date: e.date,
        participantId: e.clientId,
        desc: shared ? `Activity transport (shared ${e.sharedWith.length+1} ways, ${e.totalTripKm}km total)` : "Activity transport",
        code: "04_590_0125_6_1",
        unit: "km",
        qty: e.km,
        rate,
        total: +(e.km * rate).toFixed(2),
        _shared: true,
      };
    });

  const allLines = [...filtered, ...sharedKmLines];
  const invoiceTotal = allLines.reduce((s,l) => s + Number(l.total), 0);
  const participant  = filterClient ? CLIENTS.find(p => p.name.toLowerCase().includes(filterClient.toLowerCase())) : null;

  // Next invoice number for this client (editable). Looks at saved invoices for this client.
  const [invoiceNoInput, setInvoiceNoInput] = useState("");
  useEffect(() => {
    if (!participant) { setInvoiceNoInput(""); return; }
    const nums = (savedInvoices||[])
      .filter(iv => iv.participantId === participant.id || iv.client === participant.name)
      .map(iv => { const m = String(iv.id||"").match(/(\d+)\s*$/); return m ? parseInt(m[1],10) : 0; });
    const next = (nums.length ? Math.max(...nums) : 0) + 1;
