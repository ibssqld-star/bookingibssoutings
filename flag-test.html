    effective:null, source:"https://www.ndis.gov.au/providers/pricing-and-payments/pricing/pricing-updates" },
];
const SEV = { high:{c:"#FF5C7A",l:"Important"}, watch:{c:"#FFB020",l:"Watch"}, info:{c:"#00BFFF",l:"Info"} };

// Rule-change feed for managers. `compact` = dashboard mode (unacknowledged only). Acknowledgement is per user.
function ComplianceUpdates({ company, saveCompany, userId, compact }){
  const comp = (company && company.compliance) || {};
  const acked = ((comp.acked||{})[userId]) || {};
  const order = { high:0, watch:1, info:2 };
  const items = COMPLIANCE_UPDATES
    .filter(u => compact ? !acked[u.id] : true)
    .sort((a,b)=> (order[a.sev]??9)-(order[b.sev]??9));
  if (compact && !items.length) return null;

  const persist = (mut)=>{ const base=JSON.parse(JSON.stringify(comp)); base.acked=base.acked||{}; base.acked[userId]=base.acked[userId]||{}; mut(base.acked[userId]); saveCompany && saveCompany({ compliance: base }); };
  const ack   = (u)=> persist(a=>{ a[u.id]=true; });
  const unack = (u)=> persist(a=>{ delete a[u.id]; });
  const fmt = (d)=> d ? new Date(d+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}) : null;
  const [open,setOpen]=useState(false);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <button onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,fontFamily:"Syne,sans-serif",letterSpacing:"-0.2px",color:T.white}}>⚡ Recent rule changes</div>
          <div style={{fontSize:12,color:T.subtle,marginTop:2}}>{items.length} update{items.length===1?"":"s"} to read · tap {open?"− to hide":"+ to show"}</div>
        </div>
        <span style={{flexShrink:0,width:28,height:28,borderRadius:"50%",border:`1.5px solid ${T.teal}`,background:`${T.teal}1a`,color:T.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontWeight:300,lineHeight:1}}>{open?"−":"+"}</span>
      </button>
      {open && items.map(u=>{
        const sev = SEV[u.sev]||SEV.info; const isAck = !!acked[u.id];
        return (
          <div key={u.id} style={{background:`${sev.c}12`,border:`1px solid ${sev.c}38`,borderRadius:14,padding:"11px 13px",opacity:(!compact&&isAck)?0.5:1}}>
            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:5}}>
              <span style={{fontSize:12,fontWeight:700,color:sev.c,background:`${sev.c}22`,borderRadius:20,padding:"2px 8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{sev.l}</span>
              <span style={{fontSize:11,fontWeight:600,color:T.subtle,textTransform:"uppercase",letterSpacing:"0.5px"}}>{u.cat}</span>
              {u.effective && <span style={{fontSize:11,color:T.muted}}>· from {fmt(u.effective)}</span>}
            </div>
            <div style={{fontSize:13,fontWeight:600,color:T.white,fontFamily:"Syne,sans-serif",lineHeight:1.3}}>{u.title}</div>
            <div style={{fontSize:11,color:T.body,marginTop:5,lineHeight:1.5}}>{u.summary}</div>
            <div style={{fontSize:12,color:sev.c,marginTop:6,lineHeight:1.5}}><b>Do:</b> {u.action}</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:9}}>
              {!isAck
                ? <button onClick={()=>ack(u)} style={{background:`${T.teal}1c`,border:`1px solid ${T.teal}45`,borderRadius:9,padding:"7px 14px",color:T.teal,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Got it</button>
                : <button onClick={()=>unack(u)} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:9,padding:"7px 14px",color:T.subtle,fontSize:11.5,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>↩ Mark unread</button>}
              {u.source && <a href={u.source} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.blue,textDecoration:"none",fontWeight:600}}>Source ›</a>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ComplianceBanners({ company, saveCompany, onOpen }){
  const now = new Date();
  const comp = (company && company.compliance) || {};
  if (comp.settings && comp.settings.remindersEnabled === false) return null;
  const muted = comp.muted || {};
  const due = computeObligations(company, now)
    .filter(o => !o.setup && !o.done && o.dueIn!=null && o.dueIn<=7 && !muted[o.key])
    .sort((a,b)=>a.dueIn-b.dueIn);
  if (!due.length) return null;

  const persist = (mut)=>{
    const base = JSON.parse(JSON.stringify((company&&company.compliance)||{}));
    base.done = base.done || {}; base.muted = base.muted || {};
    mut(base); saveCompany && saveCompany({ compliance: base });
  };
  const markDone = (o)=> persist(b=>{ b.done[o.key]=true; if(b.muted) delete b.muted[o.key]; });
  const silence  = (o)=> persist(b=>{ b.muted[o.key]=true; });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:T.subtle}}>Tax &amp; super due soon</div>
      {due.map(o=>{
        const st = cStatus(o);
        return (
          <div key={o.key} style={{background:`${st.color}14`,border:`1px solid ${st.color}40`,borderRadius:14,padding:"11px 13px"}}>
            <div onClick={onOpen} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <span style={{fontSize:17}}>{o.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12.5,fontWeight:600,color:T.white,fontFamily:"Syne,sans-serif"}}>{o.title}</div>
                <div style={{fontSize:12,color:st.color,fontWeight:600,marginTop:1}}>{st.label} · {cFmt(o.due).replace(/^[A-Za-z]+, /,"")}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7,marginTop:9}}>
              <button onClick={()=>markDone(o)} style={{flex:1,background:`${T.teal}1c`,border:`1px solid ${T.teal}45`,borderRadius:9,padding:"7px",color:T.teal,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Mark done</button>
              <button onClick={()=>silence(o)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:9,padding:"7px",color:T.subtle,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Silence</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Full Money-section panel: live due dates, mark done/lodged, SMS reminder toggles, settings.
function ComplianceObligations({ company, saveCompany, userId }){
  const now = new Date();
  const comp = (company && company.compliance) || {};
  const settings = comp.settings || {};
  const reminders = comp.reminders || {};
  const obligations = computeObligations(company, now);
  const remindersOn = settings.remindersEnabled !== false;
  const [open, setOpen] = useState(false);

  const persist = (mut)=>{
    const base = JSON.parse(JSON.stringify((company&&company.compliance)||{}));
    base.settings = base.settings || {}; base.done = base.done || {}; base.muted = base.muted || {}; base.reminders = base.reminders || {};
    mut(base); saveCompany && saveCompany({ compliance: base });
  };
  const toggleDone     = (o)=> persist(b=>{ if(b.done[o.key]){ delete b.done[o.key]; } else { b.done[o.key]=true; if(b.muted) delete b.muted[o.key]; } });
  const toggleReminder = (o)=> persist(b=>{ b.reminders[o.id] = (b.reminders[o.id]===false) ? true : false; });
  const setSetting     = (k,v)=> persist(b=>{ b.settings[k]=v; });

  const card = {background:"rgba(22,32,50,0.5)",border:"1px solid rgba(130,95,255,0.3)",borderRadius:16,padding:"13px 15px",boxShadow:"0 0 18px rgba(54,228,255,0.10)"};
  const fieldStyle = {width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 11px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",boxSizing:"border-box"};

    <button onClick={onClick} style={{background:on?`${T.teal}22`:"rgba(255,255,255,0.04)",border:`1px solid ${on?T.teal+"55":T.border}`,borderRadius:9,padding:"7px 11px",color:on?T.teal:T.subtle,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{children}</button>
  );

  const dueCount = obligations.filter(o=>!o.done && !o.setup).length;

      <button onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:600,fontFamily:"Syne,sans-serif",letterSpacing:"-0.3px",color:T.white}}>Tax &amp; Super</div>
          <div style={{fontSize:11,color:T.subtle,marginTop:3,lineHeight:1.5}}>{open ? "Tap − to hide · super, BAS and ATO/QLD deadlines." : `${dueCount} deadline${dueCount===1?"":"s"} to track · tap + to show`}</div>
        </div>
        <span style={{flexShrink:0,width:30,height:30,borderRadius:"50%",border:`1.5px solid ${T.teal}`,background:`${T.teal}1a`,color:T.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:300,lineHeight:1}}>{open?"−":"+"}</span>
      </button>

      {open && <>
      {/* Payday Super heads-up */}
      <div style={{background:`${T.teal}10`,border:`1px solid ${T.teal}33`,borderRadius:14,padding:"11px 13px"}}>
        <div style={{fontSize:12,fontWeight:600,color:T.teal,fontFamily:"Syne,sans-serif",marginBottom:3}}>⚡ Payday Super starts 1 Jul 2026</div>
        <div style={{fontSize:11,color:T.body,lineHeight:1.5}}>Super stops being quarterly. From 1 Jul 2026 it must reach each employee's fund within <b>7 business days</b> of payday (still 12%). Your final quarterly payment (Apr–Jun) is due 28 Jul 2026. Note: the Small Business Super Clearing House closes 1 Jul 2026.</div>
      </div>

      {/* Obligations */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {obligations.map(o=>{
          const st = cStatus(o);
          const remOff = reminders[o.id]===false;
          return (
            <div key={o.key} style={{...card, opacity:o.done?0.7:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:11}}>
                <span style={{fontSize:20,lineHeight:1}}>{o.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:13.5,fontWeight:600,color:T.white,fontFamily:"Syne,sans-serif"}}>{o.title}</span>
                    <span style={{fontSize:12,fontWeight:700,color:st.color,background:`${st.color}1c`,border:`1px solid ${st.color}45`,borderRadius:20,padding:"2px 9px"}}>{st.label}</span>
                  </div>
                  {o.due && <div style={{fontSize:11,color:T.body,marginTop:4,fontWeight:500}}>Due {cFmt(o.due)}</div>}
                  <div style={{fontSize:12,color:T.subtle,marginTop:4,lineHeight:1.5}}>{o.sub}</div>

                  <button onClick={()=>toggleReminder(o)} title="SMS reminder" style={{background:remOff?"rgba(255,255,255,0.04)":`${T.amber}18`,border:`1px solid ${remOff?T.border:T.amber+"45"}`,borderRadius:10,padding:"8px 11px",color:remOff?T.muted:T.amber,fontSize:13,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{remOff?"🔕":"🔔"}</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Settings */}
      <div style={{...card,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:12,fontWeight:700,color:T.teal,fontFamily:"Syne,sans-serif",letterSpacing:"0.3px"}}>⚙ Reminder settings</div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12.5,color:T.white,fontWeight:600}}>SMS &amp; dashboard reminders</div>
            <div style={{fontSize:12,color:T.subtle,marginTop:2}}>Master switch. Off = no warnings anywhere.</div>
          </div>
          <button onClick={()=>setSetting("remindersEnabled", !remindersOn)} style={{width:52,height:30,borderRadius:20,border:"none",cursor:"pointer",background:remindersOn?T.teal:"rgba(255,255,255,0.15)",position:"relative",transition:"background .15s"}}>
            <span style={{position:"absolute",top:3,left:remindersOn?25:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left .15s"}}/>
          </button>
        </div>

        <div>
          <div style={{fontSize:11,color:T.subtle,marginBottom:5}}>Send reminder texts to</div>
          <input value={settings.smsTo||""} onChange={e=>setSetting("smsTo", e.target.value)} placeholder="+61 4xx xxx xxx" style={fieldStyle}/>
          <div style={{fontSize:11,color:T.muted,marginTop:3}}>Texting wires up in the next update — this number is saved ready for it.</div>
        </div>

        <div>
          <div style={{fontSize:11,color:T.subtle,marginBottom:6}}>Pay cycle (for Payday Super due dates)</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {[["weekly","Weekly"],["fortnightly","Fortnightly"],["monthly","Monthly"]].map(([v,l])=>(
              <Pill key={v} on={settings.payCycle===v} onClick={()=>setSetting("payCycle", settings.payCycle===v?"":v)}>{l}</Pill>
            ))}
          </div>
        </div>

        <div>
          <div style={{fontSize:11,color:T.subtle,marginBottom:5}}>Most recent payday</div>
          <input type="date" value={settings.lastPayday||""} onChange={e=>setSetting("lastPayday", e.target.value)} style={fieldStyle}/>
          <div style={{fontSize:11,color:T.muted,marginTop:3}}>Used to work out the next payday and its 7-business-day super deadline.</div>
        </div>
      </div>

      <div style={{fontSize:11,color:T.muted,lineHeight:1.5,padding:"0 2px"}}>Dates shown are standard self-lodged dates and shift to the next business day on weekends/public holidays. Registered agents often get extensions. This isn't financial advice — always confirm with your accountant or BAS/tax agent.</div>
      </>}
    </div>
  );
}

          </div>
        </div>

        <div style={{fontSize:11,letterSpacing:"1px",textTransform:"uppercase",color:T.subtle,fontWeight:700,margin:"18px 2px 8px"}}>Activity days</div>
        {p.activities.length===0 && <div style={{fontSize:12.5,color:T.subtle,marginBottom:8}}>No activity days yet. Add the first below.</div>}
        {p.activities.map((a,i)=>{
          const open = openAct===a.id;
          const teenNames = (a.teens||[]).map(cid=>{ const c=clients.find(x=>String(x.id)===String(cid)); return c?c.name:null; }).filter(Boolean);
          return (
            <div key={a.id} style={{background:T.card,border:`1px solid ${open?T.teal:T.border}`,borderRadius:14,padding:12,marginBottom:9}}>
              <div onClick={()=>setOpenAct(open?null:a.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                <div style={{minWidth:44,textAlign:"center"}}>
                  <div style={{fontSize:17,fontWeight:800,fontFamily:"Syne,sans-serif",color:"#fff",lineHeight:1}}>{a.date?(()=>{try{return new Date(a.date+"T00:00:00").getDate();}catch(e){return "?";}})():"–"}</div>
                  <div style={{fontSize:9,color:T.subtle,textTransform:"uppercase"}}>{a.date?(()=>{try{return new Date(a.date+"T00:00:00").toLocaleDateString("en-AU",{month:"short"});}catch(e){return "";}})():""}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14.5,fontWeight:600,fontFamily:"Syne,sans-serif",color:"#fff"}}>{a.title||"(activity)"}</div>
                  <div style={{fontSize:12,color:T.body,marginTop:2}}>{(a.goalIds||[]).length} goal{(a.goalIds||[]).length===1?"":"s"}{teenNames.length?` · ${teenNames.length} teen${teenNames.length===1?"":"s"}`:""}</div>
                </div>
                <span style={{fontSize:16,color:T.subtle}}>{open?"▾":"▸"}</span>
              </div>
              {open && (
                <div style={{marginTop:12,paddingTop:12,borderTop:`1px dashed ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1}}><label style={LAB}>Date</label><input type="date" value={a.date||""} min={p.startDate||undefined} max={p.endDate||undefined} onChange={e=>setAct(a.id,{date:e.target.value})} style={{...TI,colorScheme:"dark"}}/></div>
                    <div style={{flex:2}}><label style={LAB}>Activity</label><input value={a.title} onChange={e=>setAct(a.id,{title:e.target.value})} placeholder="e.g. Roll Your Own Sushi" style={TI}/></div>
                  </div>
                  <div>
                    <label style={LAB}>Goals worked on this activity</label>
                    {(!library || library.length===0)
                      ? <div style={{fontSize:12,color:T.subtle,marginBottom:8}}>No goals in your library yet. <span onClick={onOpenLibrary} style={{color:T.teal,cursor:"pointer",fontWeight:700}}>Set up your goal library →</span></div>
                      : <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:8}}>
                          {library.map(g=>{ const on=(a.goalIds||[]).map(String).includes(String(g.id)); return (
                            <button key={g.id} onClick={()=>toggleGoal(a.id,g.id)} style={{fontSize:12,fontWeight:600,padding:"7px 11px",borderRadius:999,cursor:"pointer",fontFamily:"DM Sans,sans-serif",border:`1px solid ${on?T.teal:T.border}`,background:on?`${T.teal}1f`:"rgba(255,255,255,0.04)",color:on?T.teal:T.body}}>{on?"\u2713 ":""}{g.name}</button>
                          ); })}
                        </div>}
                    <button onClick={onOpenLibrary} style={{fontSize:11.5,color:T.blue,background:"none",border:"none",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontWeight:700,padding:0}}>+ Manage goal library</button>
                  </div>
                  <div>
                    <label style={LAB}>Teens on this activity</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                      {clients.map(c=>{ const on=(a.teens||[]).map(String).includes(String(c.id)); return (
                        <button key={c.id} onClick={()=>toggleTeen(a.id,c.id)} style={{fontSize:12,fontWeight:600,padding:"7px 11px",borderRadius:999,cursor:"pointer",fontFamily:"DM Sans,sans-serif",border:`1px solid ${on?T.teal:T.border}`,background:on?`${T.teal}1f`:"rgba(255,255,255,0.04)",color:on?T.teal:T.body}}>{c.name}</button>
                      ); })}
                    </div>
                  </div>
                  <div>
                    <label style={LAB}>Note (optional)</label>
                    <textarea value={a.note||""} onChange={e=>setAct(a.id,{note:e.target.value})} rows={2} placeholder="Anything staff should know for this activity" style={{...TI,resize:"vertical"}}/>
                  </div>
                  <button onClick={()=>rmAct(a.id)} style={{background:"none",border:"none",color:T.red,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif",textAlign:"left"}}>Remove this activity day</button>
                </div>
              )}
            </div>
          );
        })}
        <button onClick={addAct} style={{width:"100%",padding:13,borderRadius:13,background:"rgba(255,255,255,0.04)",border:`1px dashed ${T.blue}`,color:T.blue,fontWeight:700,fontSize:14,fontFamily:"DM Sans,sans-serif",cursor:"pointer",marginTop:4}}>+ Add activity day</button>

        {isUuid(p.id) && <button onClick={del} style={{width:"100%",marginTop:16,background:"none",border:"none",color:T.red,fontSize:12.5,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Delete this program</button>}
      </div>
      <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${T.border}`,background:T.bg}}>
        <button disabled={saving||!p.name.trim()} onClick={save} style={{width:"100%",padding:15,border:"none",borderRadius:14,color:T.bg,fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,cursor:(saving||!p.name.trim())?"default":"pointer",background:(saving||!p.name.trim())?"rgba(255,255,255,0.15)":`linear-gradient(135deg,${T.teal},${T.blue})`}}>{saving?"Saving…":"Save program"}</button>
      </div>
    </div>
  );
}

// ── GOAL LIBRARY MANAGER — reusable goals with both faces (warm + NDIS) ──
function GoalLibrary({ goals, onSave, onDelete, onSeed, onClose }){
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const [seeding, setSeeding] = useState(false);
  const blank = ()=>({ id:"new-"+Date.now(), name:"", area:"", ndis:"", hook:"", why:"", prompts:[] });
  const TI = { background:"rgba(255,255,255,0.06)", border:`1px solid ${T.border}`, borderRadius:9, padding:"10px 11px", color:"#fff", fontSize:14, fontFamily:"DM Sans,sans-serif", boxSizing:"border-box", outline:"none", width:"100%" };
  const LAB = { fontSize:10, letterSpacing:"0.5px", color:T.subtle, fontWeight:700, marginBottom:5, display:"block" };
  const shell = { position:"fixed", inset:0, zIndex:210, background:T.bg, display:"flex", flexDirection:"column", fontFamily:"DM Sans,sans-serif" };
  const head = { padding:"calc(14px + env(safe-area-inset-top)) 16px 14px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:10, flexShrink:0 };
  const xBtn = { background:"rgba(255,255,255,0.08)", border:`1px solid ${T.border}`, borderRadius:9, width:34, height:34, color:"#fff", fontSize:16, cursor:"pointer" };

  if(!editing){
    return (
      <div style={shell}>
        <div style={head}>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:700,fontFamily:"Syne,sans-serif",color:"#fff"}}>\ud83c\udfaf Goal library</div>
            <div style={{fontSize:11.5,color:T.subtle,marginTop:1}}>Reusable goals \u2014 warm name + NDIS wording</div>
          </div>
          <button onClick={onClose} style={xBtn}>\u2715</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px calc(20px + env(safe-area-inset-bottom))"}}>
          <button onClick={()=>setEditing(blank())} style={{width:"100%",padding:14,borderRadius:14,background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",color:T.bg,fontWeight:800,fontFamily:"Syne,sans-serif",fontSize:15,cursor:"pointer",marginBottom:12}}>+ New goal</button>
          <button disabled={seeding} onClick={async()=>{ setSeeding(true); try{ await onSeed(); }catch(e){} setSeeding(false); }} style={{width:"100%",padding:12,borderRadius:12,background:"rgba(255,255,255,0.04)",border:`1px dashed ${T.violet||"#a06bff"}`,color:T.violet||"#a06bff",fontWeight:700,fontFamily:"DM Sans,sans-serif",fontSize:13,cursor:"pointer",marginBottom:16}}>{seeding?"Loading\u2026":"\u2b07 Load Term 3 starter goals (adds any you don\u2019t have)"}</button>
          {goals.length===0 && <div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:10}}>No goals yet. Load the starters above, or add your own.</div>}
          {goals.map(g=>(
            <div key={g.id} onClick={()=>setEditing(JSON.parse(JSON.stringify(g)))} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:13,marginBottom:9,cursor:"pointer"}}>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"Syne,sans-serif",color:"#fff"}}>{g.name||"(untitled)"}</div>
              {g.area && <div style={{display:"inline-block",fontSize:10,fontWeight:700,color:T.violet||"#a06bff",border:`1px solid ${(T.violet||"#a06bff")}66`,borderRadius:6,padding:"2px 7px",marginTop:6}}>{g.area}</div>}
              {g.ndis && <div style={{fontSize:12,color:T.body,marginTop:7,lineHeight:1.45}}>{g.ndis}</div>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  const g = editing;
  const setG = (patch)=> setEditing(e=>({ ...e, ...patch }));
  const setPrompt = (i,k,v)=> setEditing(e=>({ ...e, prompts:e.prompts.map((p,j)=>j===i?{...p,[k]:v}:p) }));
  const addPrompt = ()=> setEditing(e=>({ ...e, prompts:[...(e.prompts||[]), {say:"",how:""}] }));
  const rmPrompt = (i)=> setEditing(e=>({ ...e, prompts:e.prompts.filter((_,j)=>j!==i) }));
  const save = async ()=>{ setSaving(true); try{ await onSave(g); setEditing(null); }catch(err){ alert("Couldn\u2019t save goal: "+(err.message||err)); } setSaving(false); };
  const del = async ()=>{ if(typeof window!=="undefined" && !window.confirm("Delete this goal from the library?")) return; setSaving(true); try{ await onDelete(g.id); setEditing(null); }catch(err){ alert("Couldn\u2019t delete: "+(err.message||err)); } setSaving(false); };

  return (
    <div style={shell}>
      <div style={head}>
        <button onClick={()=>setEditing(null)} style={{background:"none",border:"none",color:T.subtle,fontSize:20,cursor:"pointer",padding:0}}>\u2190</button>
        <div style={{flex:1,fontSize:16,fontWeight:700,fontFamily:"Syne,sans-serif",color:"#fff"}}>{g.name||"New goal"}</div>
        <button onClick={onClose} style={xBtn}>\u2715</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px calc(120px + env(safe-area-inset-bottom))",display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={LAB}>Warm name (shows on the card)</label><input value={g.name} onChange={e=>setG({name:e.target.value})} placeholder="e.g. Handling money for myself" style={TI}/></div>
        <div><label style={LAB}>Plan area</label><input value={g.area} onChange={e=>setG({area:e.target.value})} placeholder="e.g. Daily Living / Independence" style={TI}/></div>
        <div><label style={LAB}>NDIS goal wording (for reports)</label><textarea value={g.ndis} onChange={e=>setG({ndis:e.target.value})} rows={2} placeholder="e.g. Develop functional money-handling skills toward independence" style={{...TI,resize:"vertical"}}/></div>
        <div><label style={LAB}>Hook (one line, on the card)</label><input value={g.hook} onChange={e=>setG({hook:e.target.value})} placeholder="e.g. Paying, checking we\u2019ve got enough, getting change." style={TI}/></div>
        <div><label style={LAB}>Why we do this (for SWs)</label><textarea value={g.why} onChange={e=>setG({why:e.target.value})} rows={4} placeholder="The strong why\u2026" style={{...TI,resize:"vertical"}}/></div>
        <div>
          <label style={LAB}>What we say &amp; do</label>
          {(g.prompts||[]).map((p,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:11,padding:10,marginBottom:8}}>
              <input value={p.say} onChange={e=>setPrompt(i,"say",e.target.value)} placeholder="What we say / do" style={{...TI,marginBottom:6}}/>
              <input value={p.how} onChange={e=>setPrompt(i,"how",e.target.value)} placeholder="\u2014 the how (short)" style={TI}/>
              <button onClick={()=>rmPrompt(i)} style={{marginTop:6,background:"none",border:"none",color:T.red||"#ff7d7d",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Remove</button>
            </div>
          ))}
          <button onClick={addPrompt} style={{width:"100%",padding:9,borderRadius:10,background:"transparent",border:`1px dashed ${T.blue}`,color:T.blue,fontWeight:700,fontSize:12.5,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>+ Add a say/do</button>
        </div>
        {isUuid(g.id) && <button onClick={del} style={{marginTop:4,background:"none",border:"none",color:T.red||"#ff7d7d",fontSize:12.5,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Delete this goal</button>}
      </div>
      <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${T.border}`,background:T.bg}}>
        <button disabled={saving||!g.name.trim()} onClick={save} style={{width:"100%",padding:15,border:"none",borderRadius:14,color:T.bg,fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,cursor:(saving||!g.name.trim())?"default":"pointer",background:(saving||!g.name.trim())?"rgba(255,255,255,0.15)":`linear-gradient(135deg,${T.teal},${T.blue})`}}>{saving?"Saving\u2026":"Save goal"}</button>
      </div>
    </div>
  );
}

// ── BOOKINGS IMPORTER — pull parent bookings, match to teens + dates, create shifts, text by status ──
function BookingsImporter({ clients, activities, workers, existingShifts, companyId, onCreate, onClose }){
  const [bookings, setBookings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [overrides, setOverrides] = useState({}); // key -> {clientId, date}
  const [excluded, setExcluded] = useState({});    // key -> true (user unticked)
  const [creating, setCreating] = useState(false);
  const [done, setDone] = useState(0);
  const norm = (s)=>(s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").replace(/\bday\b/g," ").replace(/\s+/g," ").trim();

  useEffect(()=>{ (async()=>{ setLoading(true); const r = await loadBookings(); setErr(r.error); setBookings(r.rows); setLoading(false); })(); }, []);

  const markHandled = async (bookingId)=>{ await markBookingHandled(bookingId); setBookings(prev=>prev.filter(b=>b.id!==bookingId)); };

  // Suggest the SW a teen usually works with, based on their existing shifts
  const suggestWorkerFor = (clientId)=>{
    if(!clientId) return "";
    const theirs = existingShifts.filter(s => String(s.participantId)===String(clientId) || (Array.isArray(s.participantIds)&&s.participantIds.map(String).includes(String(clientId))));
    const tally = {};
    theirs.forEach(s=>{
      let wid = s.workerId || (Array.isArray(s.workerIds)&&s.workerIds[0]) || null;
      if(!wid && s.worker){ const w=workers.find(x=>norm(x.name)===norm(s.worker)); wid=w?w.id:null; }
      if(wid){ tally[wid]=(tally[wid]||0)+1; }
    });
    let best="", bestN=0;
    Object.keys(tally).forEach(id=>{ if(tally[id]>bestN){ best=id; bestN=tally[id]; } });
    return best;
  };

  // Build one prospective shift per (booking × day)
  const rows = bookings.flatMap(b => (b.days||[]).map((dayId,i)=>{
    const key = b.id+"-"+i;
    const title = (b.day_titles && b.day_titles[i]) || dayId;
    const ov = overrides[key] || {};
    const B = norm(b.child_name);
    const matchClient = clients.find(c => { const N=norm(c.name), F=norm(c.fullName); return B && ((N&&(N===B||N.includes(B)||B.includes(N))) || (F&&(F===B||F.includes(B)||B.includes(F)))); });
    const TT = norm(title);
    const matchAct = activities.find(a => { const A=norm(a.title); return A && TT && (A===TT||A.includes(TT)||TT.includes(A)); });
    const clientId = ov.clientId!==undefined ? ov.clientId : (matchClient ? matchClient.id : "");
    const date = ov.date!==undefined ? ov.date : (matchAct ? matchAct.date : "");
    const activityId = ov.activityId!==undefined ? ov.activityId : (matchAct ? matchAct.id : null);
    const workerId = ov.workerId!==undefined ? ov.workerId : suggestWorkerFor(clientId);
    const workerSuggested = ov.workerId===undefined && !!workerId;
    const confirmed = ov.confirmed!==undefined ? ov.confirmed : ((b.status||"pending")==="confirmed");
    const curClient = clients.find(c=>String(c.id)===String(clientId));
    const defFundIdx = Math.max(0, SERVICE_TYPES.findIndex(s=>s.code===(curClient?curClient.code:null)));
    const fundingIdx = ov.fundingIdx!==undefined ? ov.fundingIdx : defFundIdx;
    const already = !!clientId && !!date && existingShifts.some(s => String(s.participantId)===String(clientId) && s.date===date);
    return { key, b, title, clientId, date, activityId, workerId, confirmed, fundingIdx, already, status:b.status||"pending" };
  }));

  const includable = rows.filter(r => r.clientId && r.date && !r.already && !excluded[r.key]);
  const unmatched = rows.filter(r => !r.clientId || !r.date);

  const T_ = { background:"rgba(255,255,255,0.06)", border:`1px solid ${T.border}`, borderRadius:8, padding:"7px 9px", color:"#fff", fontSize:12.5, fontFamily:"DM Sans,sans-serif", boxSizing:"border-box", outline:"none", colorScheme:"dark" };
  const dlId = "kora-acts-dl";
  const shell = { position:"fixed", inset:0, zIndex:210, background:T.bg, display:"flex", flexDirection:"column", fontFamily:"DM Sans,sans-serif" };
  const head = { padding:"calc(14px + env(safe-area-inset-top)) 16px 14px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:10, flexShrink:0 };
  const xBtn = { background:"rgba(255,255,255,0.08)", border:`1px solid ${T.border}`, borderRadius:9, width:34, height:34, color:"#fff", fontSize:16, cursor:"pointer" };

  const create = async ()=>{
    if(!includable.length) return;
    setCreating(true);
    const shiftObjs = includable.map((r,i)=>{
      const w = workers.find(x=>String(x.id)===String(r.workerId));
      return {
        id:"new-"+Date.now()+"-"+i,
        participant: r.b.child_name, participantId: r.clientId,
        worker: w?w.name:null, workerId: r.workerId||null,
        date: r.date, start: r.b.pickup_time||"09:00", end: r.b.dropoff_time||"15:00",
        type: r.title, status:"upcoming",
        confirmed: !!r.confirmed, confirmStatus: r.confirmed?"confirmed":"pending",
        code: (SERVICE_TYPES[r.fundingIdx]||SERVICE_TYPES[0]).code,
        activityId: r.activityId||null,
      };
    });
    try{
      await onCreate(shiftObjs);
      setDone(shiftObjs.length);
      // A booking is fully dealt with when every one of its day-rows is either created now or already added — hide it.
      const perBooking = {};
      rows.forEach(r=>{ (perBooking[r.b.id] = perBooking[r.b.id] || {total:0, handled:0}); perBooking[r.b.id].total++; const isDone = r.already || includable.includes(r); if(isDone) perBooking[r.b.id].handled++; });
      const fully = Object.keys(perBooking).filter(id => perBooking[id].handled>0 && perBooking[id].handled===perBooking[id].total);
      for(const id of fully){ await markHandled(id); }
    }
    catch(e){ alert("Couldn't create shifts: "+(e.message||e)); }
    setCreating(false);
  };

  const textSW = async (r)=>{
    const w = workers.find(x=>String(x.id)===String(r.workerId));
    if(!w || !w.phone){ alert("Pick a support worker (with a phone number) for this shift first."); return; }
    const swFirst = (w.name||"").split(" ")[0] || "there";
    const when = r.date ? new Date(r.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}) : "(date TBC)";
    const times = `${r.b.pickup_time||"09:00"}–${r.b.dropoff_time||"15:00"}`;
    const act = r.title ? `, ${r.title}` : "";
    const msg = r.confirmed
      ? `Hi ${swFirst}, you're CONFIRMED for a shift with ${r.b.child_name} on ${when}${act} (${times}). Thanks! — ${COMPANY.shortName}`
      : `Hi ${swFirst}, could you do a shift with ${r.b.child_name} on ${when}${act} (${times})? Not locked in yet — let me know if you can. — ${COMPANY.shortName}`;
    if(typeof window!=="undefined" && !window.confirm(`Text ${w.name} — ${r.confirmed?"a CONFIRMED":"an UNCONFIRMED"} shift?`)) return;
    try{ await sendClickSendSMS("","",w.phone,msg); alert("Texted "+w.name+"."); }catch(e){ alert("Couldn't text: "+(e.message||e)); }
  };
  const textParents = async (status)=>{
    const list = bookings.filter(b => (b.status||"pending")===status && b.phone);
    if(!list.length){ alert("No "+status+" bookings with a phone number."); return; }
    if(typeof window!=="undefined" && !window.confirm(`Text ${list.length} ${status} parent${list.length===1?"":"s"}?`)) return;
    let ok=0;
    for(const b of list){
      const first = (b.parent_name||"").split(" ")[0] || "there";
      const days = (b.day_titles||[]).join(", ");
      const msg = status==="confirmed"
        ? `Hi ${first}, great news — ${b.child_name} is confirmed for ${days}! We can't wait. — ${COMPANY.shortName}`
        : `Hi ${first}, we've got ${b.child_name}'s booking for ${days} and we're just confirming spots — we'll be in touch very soon. — ${COMPANY.shortName}`;
      try{ await sendClickSendSMS("","",b.phone,msg); ok++; }catch(e){}
    }
    alert(`Texted ${ok} ${status} parent${ok===1?"":"s"}.`);
  };
  const confirmedCount = bookings.filter(b=>(b.status||"pending")==="confirmed" && b.phone).length;
  const pendingCount = bookings.filter(b=>(b.status||"pending")==="pending" && b.phone).length;

  return (
    <div style={shell}>
      <div style={head}>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,fontFamily:"Syne,sans-serif",color:"#fff"}}>📥 Import bookings</div>
          <div style={{fontSize:11.5,color:T.subtle,marginTop:1}}>Match parent bookings to teens &amp; dates, then create shifts</div>
        </div>
        <button onClick={onClose} style={xBtn}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px calc(150px + env(safe-area-inset-bottom))"}}>
        {loading && <div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:24}}>Loading bookings…</div>}
        {err && <div style={{fontSize:12.5,color:T.red||"#ff7d7d",background:"rgba(255,80,80,0.08)",border:`1px solid ${T.red||"#ff7d7d"}55`,borderRadius:10,padding:"10px 12px",lineHeight:1.5}}>Couldn't read bookings: {err}</div>}
        {!loading && !err && rows.length===0 && <div style={{color:T.subtle,fontSize:13,textAlign:"center",paddingTop:24}}>No bookings found yet.</div>}
        {!loading && rows.length>0 && (
          <div style={{fontSize:12,color:T.body,marginBottom:12,lineHeight:1.5}}>
            {rows.length} day-booking{rows.length===1?"":"s"} · <b style={{color:T.teal}}>{includable.length} ready</b>{unmatched.length?` · `:""}{unmatched.length?<b style={{color:T.amber}}>{unmatched.length} need a teen or date</b>:null}
          </div>
        )}
        {activities.length>0 && <datalist id={dlId}>{activities.map(a=><option key={a.id} value={`${a.date} · ${a.title}`}/>)}</datalist>}
        {rows.map(r=>(
          <div key={r.key} style={{background:T.card,border:`1px solid ${r.already?T.border:(r.clientId&&r.date?T.teal+"66":T.amber+"66")}`,borderRadius:13,padding:12,marginBottom:9,opacity:r.already?0.6:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:9,fontWeight:700,padding:"3px 7px",borderRadius:999,border:`1px solid ${r.status==="confirmed"?T.teal:T.amber}`,background:(r.status==="confirmed"?T.teal:T.amber)+"22",color:r.status==="confirmed"?T.teal:T.amber,textTransform:"uppercase",letterSpacing:"0.5px"}}>{r.status}</span>
              <div style={{flex:1,fontSize:14,fontWeight:700,fontFamily:"Syne,sans-serif",color:"#fff"}}>{r.b.child_name}</div>
              {r.already
                ? <span style={{fontSize:10.5,color:T.subtle,fontWeight:600}}>✓ already added</span>
                : (r.clientId && r.date) && <input type="checkbox" checked={!excluded[r.key]} onChange={e=>setExcluded(x=>({...x,[r.key]:!e.target.checked}))} style={{width:17,height:17,accentColor:T.teal}}/>}
            </div>
            <div style={{fontSize:12,color:T.body,marginBottom:8}}>{r.title}</div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9.5,color:T.subtle,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Teen</div>
                <select value={r.clientId||""} onChange={e=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),clientId:e.target.value}}))} style={{...T_,width:"100%",cursor:"pointer",border:`1px solid ${r.clientId?T.border:T.amber}`}}>
                  <option value="" style={{background:T.card}}>— pick teen —</option>
                  {clients.map(c=><option key={c.id} value={c.id} style={{background:T.card}}>{c.name}</option>)}
                </select>
              </div>
              <div style={{width:132}}>
                <div style={{fontSize:9.5,color:T.subtle,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Date</div>
                <input type="date" value={r.date||""} onChange={e=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),date:e.target.value}}))} style={{...T_,width:"100%",border:`1px solid ${r.date?T.border:T.amber}`}}/>
              </div>
            </div>
            {activities.length>0 && (
            <div style={{marginTop:8}}>
              <div style={{fontSize:9.5,color:T.subtle,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Find outing (type to search — sets the date)</div>
              <input list={dlId} placeholder="e.g. Movie World" onChange={e=>{ const a=activities.find(x=>`${x.date} · ${x.title}`===e.target.value); if(a){ setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),date:a.date,activityId:a.id}})); } }} style={{...T_,width:"100%"}}/>
            </div>
            )}
            <div style={{marginTop:8}}>
              <div style={{fontSize:9.5,color:T.subtle,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Support worker</div>
              <select value={r.workerId||""} onChange={e=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),workerId:e.target.value}}))} style={{...T_,width:"100%",cursor:"pointer",border:`1px solid ${r.workerId?T.border:T.amber}`}}>
                <option value="" style={{background:T.card}}>— assign a SW —</option>
                {workers.map(w=><option key={w.id} value={w.id} style={{background:T.card}}>{w.name}</option>)}
              </select>
            </div>
            <div style={{marginTop:8}}>
              <div style={{fontSize:9.5,color:T.subtle,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>Funding</div>
              <select value={r.fundingIdx} onChange={e=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),fundingIdx:Number(e.target.value)}}))} style={{...T_,width:"100%",cursor:"pointer"}}>
                {SERVICE_TYPES.map((s,i)=><option key={i} value={i} style={{background:T.card}}>{s.label} · {s.code}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8,marginTop:9,alignItems:"stretch"}}>
              <div style={{display:"flex",borderRadius:9,overflow:"hidden",border:`1px solid ${T.border}`,flexShrink:0}}>
                <button onClick={()=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),confirmed:true}}))} style={{padding:"7px 11px",fontSize:11.5,fontWeight:700,fontFamily:"DM Sans,sans-serif",cursor:"pointer",border:"none",background:r.confirmed?`${T.teal}22`:"transparent",color:r.confirmed?T.teal:T.subtle}}>Confirmed</button>
                <button onClick={()=>setOverrides(o=>({...o,[r.key]:{...(o[r.key]||{}),confirmed:false}}))} style={{padding:"7px 11px",fontSize:11.5,fontWeight:700,fontFamily:"DM Sans,sans-serif",cursor:"pointer",border:"none",borderLeft:`1px solid ${T.border}`,background:!r.confirmed?`${T.amber}22`:"transparent",color:!r.confirmed?T.amber:T.subtle}}>Pending</button>
              </div>
              <button onClick={()=>textSW(r)} disabled={!r.workerId} style={{flex:1,padding:"7px 10px",borderRadius:9,fontSize:12,fontWeight:700,fontFamily:"DM Sans,sans-serif",cursor:r.workerId?"pointer":"default",border:`1px solid ${r.workerId?T.blue:T.border}`,background:r.workerId?`${T.blue}1a`:"transparent",color:r.workerId?T.blue:T.subtle}}>📲 Text SW ({r.confirmed?"confirmed":"pending"})</button>
            </div>
            {!r.already && <button onClick={()=>{ if(typeof window==="undefined"||window.confirm(`Hide ${r.b.child_name}'s booking? Use this if you've already made these shifts yourself.`)) markHandled(r.b.id); }} style={{marginTop:9,background:"none",border:"none",color:T.subtle,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",textDecoration:"underline",padding:0}}>Already sorted — hide this booking</button>}
          </div>
        ))}
      </div>
      <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${T.border}`,background:T.bg,display:"flex",flexDirection:"column",gap:9}}>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>textParents("confirmed")} style={{flex:1,padding:11,borderRadius:11,border:`1px solid ${T.teal}`,background:`${T.teal}1a`,color:T.teal,fontWeight:700,fontSize:12.5,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>📲 Text confirmed ({confirmedCount})</button>
          <button onClick={()=>textParents("pending")} style={{flex:1,padding:11,borderRadius:11,border:`1px solid ${T.amber}`,background:`${T.amber}1a`,color:T.amber,fontWeight:700,fontSize:12.5,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>📲 Text waiting ({pendingCount})</button>
        </div>
        <button disabled={creating||!includable.length} onClick={create} style={{width:"100%",padding:15,border:"none",borderRadius:14,color:T.bg,fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,cursor:(creating||!includable.length)?"default":"pointer",background:(creating||!includable.length)?"rgba(255,255,255,0.15)":`linear-gradient(135deg,${T.teal},${T.blue})`}}>{creating?"Creating…":done?`✓ Created ${done} — create more?`:`Create ${includable.length} shift${includable.length===1?"":"s"}`}</button>
      </div>
    </div>
  );
}

// ── SHIFT REVIEW — timesheet-style list of existing shifts: set funding, confirm/pending, text SW ──
function ShiftReview({ shifts, workers, clients, onSave, onClose }){
  const today = new Date().toISOString().slice(0,10);
  const [from, setFrom] = useState(today);
  const [to, setTo] = useState("");
  const [busy, setBusy] = useState({});
  const [showConfirmed, setShowConfirmed] = useState(false);

  const isConfirmed = (s)=> (s.confirmStatus==="confirmed")||s.confirmed;
  const isSorted = (s)=> isConfirmed(s) && !!s.swTextedAt;
  const list = (shifts||[])
    .filter(s => s.date && s.participant && (!from || s.date>=from) && (!to || s.date<=to))
    .filter(s => showConfirmed || !isSorted(s))
    .sort((a,b)=> (a.date||"").localeCompare(b.date||"") || (a.participant||"").localeCompare(b.participant||""));

  // group by date
  const byDate = {};
  list.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
  const dates = Object.keys(byDate).sort();

  const save = async (upd)=>{ setBusy(b=>({...b,[upd.id]:true})); try{ await onSave(upd); }catch(e){ alert("Couldn't save: "+(e.message||e)); } setBusy(b=>({...b,[upd.id]:false})); };
  const clientOf = (s)=> (clients||[]).find(c=>String(c.id)===String(s.participantId));
  const clientLines = (s)=>{ const c=clientOf(s); return (c && Array.isArray(c.lineItems)) ? c.lineItems : []; };
  const durHrs = (s)=>{ const p=(t)=>{const a=(t||"").split(":").map(Number);return (a[0]||0)+((a[1]||0)/60);}; let d=p(s.end)-p(s.start); if(d<0)d+=24; return d>0?+d.toFixed(2):0; };
  const setFunding = (s, li)=>{ const unit=li.unit||"hrs"; const qty = unit==="hrs" ? (durHrs(s)||1) : (li.qty||1); const line={ id: li.id||Date.now(), code: li.code, desc: li.desc, unit, qty, rate: li.rate, ratio: li.ratio||"1:1" }; save({...s, code: li.code, lineItems:[line]}); };
  const setConfirmed = (s,val)=> save({...s, confirmed:val, confirmStatus:val?"confirmed":"pending"});

  const textSW = async (s)=>{
    let w = workers.find(x=>String(x.id)===String(s.workerId));
    if(!w && s.worker) w = workers.find(x=>(x.name||"").toLowerCase().trim()===(s.worker||"").toLowerCase().trim());
    if(!w || !w.phone){ alert("No support worker (with a phone) on this shift."); return; }
    const swFirst=(w.name||"").split(" ")[0]||"there";
    const when = s.date ? new Date(s.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}) : "(date TBC)";
    const times = `${s.start||"09:00"}–${s.end||"15:00"}`;
    const act = s.type ? `, ${s.type}` : "";
    const conf = (s.confirmStatus==="confirmed")||s.confirmed;
    const msg = conf
      ? `Hi ${swFirst}, you're CONFIRMED for a shift with ${s.participant} on ${when}${act} (${times}). Thanks! — ${COMPANY.shortName}`
      : `Hi ${swFirst}, could you do a shift with ${s.participant} on ${when}${act} (${times})? Not locked in yet — let me know if you can. — ${COMPANY.shortName}`;
    if(typeof window!=="undefined" && !window.confirm(`Text ${w.name} — ${conf?"a CONFIRMED":"an UNCONFIRMED"} shift?`)) return;
    try{ await sendClickSendSMS("","",w.phone,msg); await save({...s, swTextedAt: new Date().toISOString()}); alert("Texted "+w.name+"."); }catch(e){ alert("Couldn't text: "+(e.message||e)); }
  };

      const prompt=`You are auditing an NDIS invoice for an Australian disability support provider (IBSS QLD). Today is ${today}.\n\nCheck each line for:\n1. Math: qty × rate = total (allow 2 cent tolerance)\n2. Weekend vs weekday rate — if the day is Sat/Sun but the description says weekday, flag it\n3. NDIS code coherence — does the code match the description?\n4. Rate plausibility for NDIS support services\n5. Unusual values (zero qty, very long shifts >10hrs, negative)\n\nBe direct, plain Australian English. Use ✅/⚠️/❌ per finding. End with a 1-sentence verdict.\n\nInvoice total: $${total.toFixed(2)}\n\nLines:\n${summary}`;
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const d=await resp.json();setAiResult(d.content?.[0]?.text||"No response.");
    }catch(e){setAiResult("⚠️ Audit failed. Check connection.");}
    setAiLoading(false);
  }

  return (
    <div style={{background:"#0b1320",minHeight:"100vh",paddingBottom:80,fontFamily:"DM Sans,sans-serif",color:T.white,position:"relative"}}>
      <AmbientGlow warm/>
      <div style={{position:"relative",zIndex:1}}>
      <Header subtitle="Director View" subtitleColor={T.orange} right={
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowSearch(true)} style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:9,color:T.body,cursor:"pointer",padding:"6px 7px",display:"flex"}}><Icon name="search" size={18} color={T.body}/></button>
          <button onClick={()=>setShowShiftReview(true)} title="Shifts — funding & confirm" style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:9,color:T.body,cursor:"pointer",padding:"6px 8px",fontSize:15,display:"flex"}}>🗂️</button>
          <button onClick={()=>setShowBookings(true)} title="Import bookings" style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:9,color:T.body,cursor:"pointer",padding:"6px 8px",fontSize:15,display:"flex"}}>📥</button>
          <button onClick={()=>setShowPrograms(true)} title="Programs & activities" style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${T.border}`,borderRadius:9,color:T.body,cursor:"pointer",padding:"6px 8px",fontSize:15,display:"flex"}}>📚</button>

          <button onClick={onSignOut} style={{background:"none",border:"none",color:T.subtle,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Sign out</button>
        </div>

      {editingShift && !editingShift.isOuting && <CreateShiftModal editShift={editingShift} onClose={()=>setEditingShift(null)} onEditGroupOuting={(s)=>{setEditingShift(null);setEditingGroupOuting(s);}} csUsername={csUsername} csApiKey={csApiKey} workers={workers} clients={clients} onSave={s=>persistShift(s)} onDelete={id=>{removeShift(id);setEditingShift(null);}}/>}
      {editingShift && editingShift.isOuting && <CreateOutingModal editOuting={editingShift} onView={(o)=>{setEditingShift(null);setViewingOuting(o);}} onClose={()=>setEditingShift(null)} csUsername={csUsername} csApiKey={csApiKey} workers={workers} clients={clients} onSave={s=>persistShift(s)} onDelete={id=>{removeShift(id);setEditingShift(null);}}/>}
      {viewingShift && <ShiftView
        shift={shifts.find(x=>x.id===viewingShift.id) || viewingShift}
        workers={workers} clients={clients} shifts={shifts}
        onClose={()=>setViewingShift(null)}
        onSave={s=>setShifts(p=>p.map(x=>x.id===s.id?s:x))}
        onDelete={id=>{removeShift(id);setViewingShift(null);}}
        onEdit={()=>{const s=viewingShift;setViewingShift(null);setEditingShift(s);}}
        onViewRunSheet={(s)=>{setViewingShift(null);setViewingOuting(s);}}
      />}
      {viewingOuting && <OutingDetail outing={viewingOuting} currentUser={{name: userName, role: userRole}} participants={clients} workers={workers} onEdit={()=>{ const o=viewingOuting; setViewingOuting(null); if(o.isOuting){ setEditingShift(o); } else { setEditingGroupOuting(o); } }} onClose={()=>setViewingOuting(null)}/>}
      {showOuting && <CreateOutingModal onClose={()=>setShowOuting(false)} csUsername={csUsername} csApiKey={csApiKey} workers={workers} clients={clients} onSave={s=>persistShift(s)}/>}
      {showGroupOuting && <GroupOutingModal clients={clients} shifts={shifts} workers={workers} activities={programActivities} onClose={()=>setShowGroupOuting(false)} onAttach={(updates)=>{ updates.forEach(u=>persistShift(u)); }}/>}
      {editingGroupOuting && <GroupOutingModal editOuting={editingGroupOuting} clients={clients} shifts={shifts} workers={workers} activities={programActivities} onClose={()=>setEditingGroupOuting(null)} onAttach={(updates)=>{ updates.forEach(u=>persistShift(u)); }}/>}
      {showExport && <TimesheetExport shifts={shifts} workers={workers} clients={clients} onClose={()=>setShowExport(false)}/>}
      {showTimesheet && <TimesheetReview shifts={shifts} workers={workers} clients={clients} company={company} onClose={()=>setShowTimesheet(false)} onEditShift={(s)=>setEditingShift(s)} onAddShift={(d)=>setShowCreate(d?new Date(d+"T12:00:00"):true)} onUpdateShift={s=>persistShift(s)} onExport={()=>setShowExport(true)}/>}

                const s = (company && company.settings) || {};

                const lab = {fontSize:11,color:T.subtle,marginBottom:5};
                return (<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <div style={lab}>Cycle</div>
                    <div style={{display:"flex",gap:7}}>
                      {[["weekly","Weekly"],["fortnightly","Fortnightly"]].map(([v,l])=>(
                        <button key={v} onClick={()=>setS({tsCycle:v})} style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:12.5,fontWeight:600,border:`1px solid ${cyc===v?T.teal:T.border}`,background:cyc===v?`${T.teal}1f`:"rgba(255,255,255,0.03)",color:cyc===v?T.teal:T.body}}>{l}</button>

                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1}}><div style={lab}>Period start</div><input type="date" value={s.tsPeriodStart||""} onChange={e=>setS({tsPeriodStart:e.target.value})} style={dstyle}/></div>

                  </div>
                  {preview
                    ? <div style={{fontSize:12,color:T.teal,background:`${T.teal}10`,border:`1px solid ${T.teal}33`,borderRadius:9,padding:"9px 11px",lineHeight:1.5}}>Current period: <b>{fmt(preview.from)} → {fmt(preview.to)}</b><br/>Pay day: <b>{fmt(preview.payDay)}</b></div>
                    : <div style={{fontSize:11.5,color:T.amber}}>Set the cycle, a period start and its pay day to activate.</div>}
                </div>);
              })()}
            </div>

            <div style={{height:1,background:T.border}}/>
            <div>
              <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",marginBottom:4,color:T.orange}}>Daily shift digest</div>
              <div style={{fontSize:11,color:T.subtle,marginBottom:10,lineHeight:1.5}}>Text {COMPANY.managerPhone} each morning with the day's shifts — who's on, with which client, when and where.</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:T.white}}>Send daily digest</div>
                  <div style={{fontSize:12,color:T.subtle}}>A summary of today's roster to the manager</div>
                </div>
                <button onClick={()=>updateReminders(p=>({...p,dailyDigest:!p.dailyDigest}))} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:reminders.dailyDigest?T.teal:"rgba(255,255,255,0.15)",position:"relative",transition:"all 0.15s"}}>
                  <div style={{position:"absolute",top:2,left:reminders.dailyDigest?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"all 0.15s"}}/>
                </button>
              </div>
              {reminders.dailyDigest && (
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:11,color:T.subtle}}>Send at</span>
                  <input type="time" value={reminders.digestTime} onChange={e=>updateReminders(p=>({...p,digestTime:e.target.value}))} style={{background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",colorScheme:"dark"}}/>
                  <span style={{fontSize:11,color:T.subtle}}>each morning</span>
                </div>
              )}
              <button onClick={sendDigestNow} disabled={digestStatus==="sending"}
                style={{width:"100%",background:digestStatus==="sending"?"rgba(255,255,255,0.05)":`${T.orange}1a`,border:`1px solid ${T.orange}55`,borderRadius:10,padding:"11px",color:T.orange,fontSize:12,fontWeight:600,cursor:digestStatus==="sending"?"default":"pointer",fontFamily:"DM Sans,sans-serif"}}>
                {digestStatus==="sending"?"Sending…":"📲 Send today's digest now"}
              </button>
              {digestStatus==="sent" && <div style={{fontSize:11,color:T.teal,marginTop:7}}>✅ Sent to {COMPANY.managerPhone}.</div>}
              {digestStatus==="nocreds" && <div style={{fontSize:11,color:T.amber,marginTop:7}}>Add your ClickSend credentials above first.</div>}
              {digestStatus==="error" && <div style={{fontSize:11,color:T.red,marginTop:7}}>Couldn't send — check your ClickSend credentials.</div>}
              <div style={{fontSize:12,color:T.muted,marginTop:8,lineHeight:1.5}}>Automatic morning sending runs from the backend scheduler once hosted; this button sends on demand any time.</div>
            </div>

            <div style={{height:1,background:T.border}}/>
            <div>
              <div style={{fontSize:13,fontWeight:400,fontFamily:"Syne,sans-serif",marginBottom:4,color:T.amber}}>Shift Reminders</div>
              <div style={{fontSize:11,color:T.subtle,marginBottom:10,lineHeight:1.5}}>Text workers ahead of an upcoming shift so it's not forgotten.</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[
                  {k:"remindDayBefore",label:"Day-before reminder",desc:"Sent the evening before (around 6 PM)"},
                  {k:"remindHoursBefore",label:"Hours-before reminder",desc:"Sent shortly before the shift starts"},
                  {k:"remindUnconfirmed",label:"Daily unconfirmed-shift reminder",desc:"Texts the worker each day until they confirm — stops once the shift has started"},
                ].map(r=>(
                  <div key={r.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 12px"}}>

                      <div style={{fontSize:12,fontWeight:500,color:T.white}}>{r.label}</div>
                      <div style={{fontSize:12,color:T.subtle}}>{r.desc}</div>
                    </div>
                    <button onClick={()=>updateReminders(p=>({...p,[r.k]:!p[r.k]}))} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:reminders[r.k]?T.teal:"rgba(255,255,255,0.15)",position:"relative",transition:"all 0.15s"}}>
                      <div style={{position:"absolute",top:2,left:reminders[r.k]?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"all 0.15s"}}/>
                    </button>
                  </div>
                ))}
                {reminders.remindHoursBefore && (
                  <div style={{display:"flex",gap:8,alignItems:"center",marginTop:2}}>
                    <span style={{fontSize:11,color:T.subtle}}>Send</span>
                    <input type="number" min="1" value={reminders.hoursBefore} onChange={e=>updateReminders(p=>({...p,hoursBefore:e.target.value}))} style={{width:60,background:"rgba(0,229,180,0.05)",border:`1px solid rgba(0,229,180,0.2)`,borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none"}}/>
                    <span style={{fontSize:11,color:T.subtle}}>hours before the shift starts</span>
                  </div>
                )}
                {reminders.remindUnconfirmed && (()=>{ const pendingCount = unconfirmedFutureShifts(shifts, Date.now()).length; return (
                  <div style={{marginTop:4}}>
                    <button onClick={sendConfirmRemindersNow} disabled={confirmRemStatus==="sending"}
                      style={{width:"100%",background:confirmRemStatus==="sending"?"rgba(255,255,255,0.05)":`${T.amber}1a`,border:`1px solid ${T.amber}55`,borderRadius:10,padding:"11px",color:T.amber,fontSize:12,fontWeight:600,cursor:confirmRemStatus==="sending"?"default":"pointer",fontFamily:"DM Sans,sans-serif"}}>
                      {confirmRemStatus==="sending"?"Sending…":`📲 Send confirm reminders now${pendingCount?` (${pendingCount} unconfirmed)`:""}`}
                    </button>
                    {confirmRemStatus && typeof confirmRemStatus==="object" && <div style={{fontSize:11,color:T.teal,marginTop:7}}>✅ Reminded {confirmRemStatus.sent} worker{confirmRemStatus.sent!==1?"s":""}{confirmRemStatus.skipped?` · ${confirmRemStatus.skipped} skipped (no phone)`:""}.</div>}
                    {confirmRemStatus==="none" && <div style={{fontSize:11,color:T.subtle,marginTop:7}}>Nothing to remind — all upcoming shifts are confirmed.</div>}
                    {confirmRemStatus==="nocreds" && <div style={{fontSize:11,color:T.amber,marginTop:7}}>Add your ClickSend credentials above first.</div>}
                    {confirmRemStatus==="error" && <div style={{fontSize:11,color:T.red,marginTop:7}}>Some texts couldn't be sent — check ClickSend.</div>}
                    <div style={{fontSize:12,color:T.muted,marginTop:8,lineHeight:1.5}}>Past shifts are never reminded. Automatic daily sending runs from the backend scheduler once hosted.</div>
                  </div>
                ); })()}
              </div>
            </div>

            <div style={{height:1,background:T.border}}/>
            <div>

                {[
                  {k:"remindSignOn",label:"Missed sign-on reminder",desc:"If not signed on after shift start"},
                  {k:"remindSignOff",label:"Missed sign-off reminder",desc:"If still on shift after end time"},
                  {k:"remindNotes",label:"Missing progress note",desc:"If shift ended with no note"},
                ].map(r=>(
                  <div key={r.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 12px"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:500,color:T.white}}>{r.label}</div>
                      <div style={{fontSize:12,color:T.subtle}}>{r.desc}</div>
                    </div>
                    <button onClick={()=>updateReminders(p=>({...p,[r.k]:!p[r.k]}))} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:reminders[r.k]?T.teal:"rgba(255,255,255,0.15)",position:"relative",transition:"all 0.15s"}}>
                      <div style={{position:"absolute",top:2,left:reminders[r.k]?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"all 0.15s"}}/>
                    </button>

          </div>
        </Modal>

      <div style={{padding:"16px 16px 0"}}>
        {tab==="overview"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Composed hero (grid now global) */}
            <div style={{position:"relative"}}>
              <div style={{position:"relative",zIndex:1}}>
                <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:T.subtle,marginBottom:5}}>{new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"})}</div>
                <div style={{fontSize:24,fontWeight:600,fontFamily:"Syne,sans-serif",letterSpacing:"-0.4px",marginBottom:16}}>{(()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening";})()}, {firstName(userName)||"there"}</div>

                        {t.live&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(92deg,${T.orange},${T.pink})`,animation:"heartbeat 2.4s ease-in-out infinite"}}/>}
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{fontSize:30,fontWeight:600,fontFamily:"Syne,sans-serif",color:lit?T.white:T.body,letterSpacing:"-0.5px",lineHeight:1}}>{t.val}</div>
                          {t.live&&<span style={{width:7,height:7,borderRadius:"50%",background:T.orange,animation:"dotpulse 1.8s ease-out infinite"}}/>}
                        </div>
                        <div style={{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:col,marginTop:8,fontWeight:lit?600:400}}>{t.label}{t.go?" ›":""}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <ComplianceUpdates company={company} saveCompany={saveCompany} userId={userId} compact/>
            {isDirector && <ComplianceBanners company={company} saveCompany={saveCompany} onOpen={()=>setTab("business")}/>}
            {isDirector && <ComplianceObligations company={company} saveCompany={saveCompany} userId={userId}/>}
            <SLabel>Live Shifts</SLabel>
            {activeShifts.map(s=>{
              const p=resolveP(s);
              const w=resolveW(s);
              return(
                <Card key={s.id} style={{marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:T.orange,boxShadow:`0 0 6px ${T.orange}`}}/>
                      <Avatar initials={w.initials} color={w.color} size={34}/>
                      <div>
                        <div style={{fontWeight:400,fontSize:13,fontFamily:"Syne,sans-serif"}}>{w.name} → {p.name}</div>
                        <div style={{fontSize:12,color:T.subtle}}>{s.type.split(" ").slice(0,3).join(" ")}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:T.teal,fontWeight:400}}><LiveTimer startMs={s.startMs}/></div>
                      <div style={{fontSize:11,color:T.subtle}}>{s.start}–{s.end}</div>
                    </div>
                  </div>
                </Card>
              );
            })}
            <SLabel>Needs Attention</SLabel>
            {attentionItems.length===0 && (
              <div className="kora-card" style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"rgba(24,30,54,0.5)",border:"1px solid rgba(54,228,255,0.35)",boxShadow:"0 0 16px rgba(54,228,255,0.12)",borderRadius:12,marginBottom:6}}>
                <span style={{fontSize:15}}>✅</span><span style={{fontSize:12,color:T.subtle}}>All clear — nothing needs attention right now</span>
              </div>
            )}
            {attentionItems.map((a,i)=>(
              <button key={i} className="kora-card" onClick={a.onClick} style={{width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"rgba(24,30,54,0.5)",backgroundImage:`linear-gradient(${a.color}22,${a.color}14)`,border:`1px solid ${a.color}55`,boxShadow:`0 0 16px ${a.color}28`,borderRadius:12,marginBottom:6,cursor:"pointer"}}>
                <span style={{fontSize:15}}>{a.icon}</span>
                <span style={{fontSize:12,color:T.body,flex:1}}>{a.text}</span>
                <span style={{fontSize:14,color:a.color}}>›</span>
              </button>
            ))}
          </div>
        )}

        {tab==="business"&&(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <BusinessView shifts={shifts} workers={workers} allShifts={allShifts} expenses={expenses} setExpenses={setExpenses}/>
          </div>
        )}

        {tab==="roster"&&(
          <RosterTab shifts={shifts} onNewShift={(d)=>setShowCreate(d||true)} onNewOuting={()=>setShowOuting(true)} onNewGroupOuting={()=>setShowGroupOuting(true)} onEditShift={openShift} onExport={()=>setShowExport(true)} onTimesheet={()=>setShowTimesheet(true)}/>
        )}

        {tab==="team"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:18,fontWeight:500,fontFamily:"Syne,sans-serif"}}>Support Workers</div>
              <button onClick={()=>setEditingWorkerId("new")} style={{background:`linear-gradient(135deg,${T.teal},${T.blue})`,border:"none",borderRadius:10,padding:"8px 14px",color:T.bg,fontWeight:500,fontSize:12,cursor:"pointer",fontFamily:"Syne,sans-serif"}}>＋ Add Worker</button>
            </div>
            {workers.map(w=>{
              const sc={"on-shift":T.teal,"upcoming":T.blue,"off":T.subtle}[w.status];
              const sl={"on-shift":"On Shift","upcoming":"Upcoming","off":"Off"}[w.status];
              const expiredCerts = (w.certs||[]).filter(ct=>ct.expiry && new Date(ct.expiry)<new Date());
              const soonCerts = (w.certs||[]).filter(ct=>ct.expiry && new Date(ct.expiry)>=new Date() && (new Date(ct.expiry)-new Date())/(1000*60*60*24)<60);
              return(
                <Card key={w.id} onClick={()=>setEditingWorkerId(w.id)} style={{cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{position:"relative"}}>
                        <Avatar initials={w.initials} color={w.avatarColor||w.color} size={42} photo={w.photo} emoji={w.emoji}/>
                        {w.status==="on-shift"&&<div style={{position:"absolute",bottom:1,right:1,width:10,height:10,borderRadius:"50%",background:T.teal,border:`2px solid ${T.bg}`,boxShadow:`0 0 6px ${T.teal}`}}/>}
                      </div>
                      <div>
                        <div style={{fontWeight:400,fontSize:14,fontFamily:"Syne,sans-serif"}}>{w.name}</div>
                        <div style={{fontSize:12,color:T.subtle,marginTop:1}}>{w.role||"Support Worker"} · {(w.clients||[]).length} clients</div>
                        <div style={{fontSize:12,marginTop:2,color:w.email?T.body:T.muted}}>{w.email||"No login email set"}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <Chip label={sl} color={sc}/>
                      <div style={{fontSize:12,color:T.subtle,marginTop:5}}>{w.phone?"📱":"📵"} {w.password?"🔑":""}</div>
                    </div>
                  </div>
                  {(expiredCerts.length>0||soonCerts.length>0)&&(
                    <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                      {expiredCerts.map((ct,i)=><span key={i} style={{fontSize:11,color:T.red,background:`${T.red}18`,padding:"3px 8px",borderRadius:8,fontWeight:500}}>⚠ {ct.name} expired</span>)}
                      {soonCerts.map((ct,i)=><span key={i} style={{fontSize:11,color:T.amber,background:`${T.amber}18`,padding:"3px 8px",borderRadius:8,fontWeight:500}}>{ct.name} expiring soon</span>)}
                    </div>
                  )}
                  {(w.certs||[]).length>0 && expiredCerts.length===0 && soonCerts.length===0 && (
                    <div style={{marginTop:8,fontSize:11,color:T.teal}}>✓ {w.certs.length} certification{w.certs.length>1?"s":""} current</div>
                  )}
                </Card>
              );
            })}
          </div>
        )}

        {tab==="clients"&&(
          <ClientsTab clients={clients} persistClient={persistClient} removeClient={removeClient} focusClientId={focusClientId} onConsumeFocus={()=>setFocusClientId(null)}/>
        )}

        {tab==="paperwork"&&(
          <PaperworkTab clients={clients}/>
        )}

        {tab==="invoicing"&&(
          <InvoicingTab allShifts={allShifts} setAllShifts={setAllShifts} clients={clients} markShiftsInvoiced={markShiftsInvoiced} runAudit={runAudit} aiLoading={aiLoading} aiResult={aiResult} setAiResult={setAiResult} savedInvoices={savedInvoices} setSavedInvoices={setSavedInvoices} persistInvoice={persistInvoice} changeInvoiceStatus={changeInvoiceStatus} removeInvoice={removeInvoice} updateInvoiceFields={updateInvoiceFields} fromName={companyName} replyTo={companyEmail} company={company}/>
        )}
      </div>
      <BottomNav tab={tab} setTab={setTab} items={nav}/>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════
function KoraLegacyApp() {
  const [screen,setScreen]=useState("signin");
  const [worker,setWorker]=useState(null);
  return (
    <div style={{maxWidth:760,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#070d16;}
        @keyframes beam{0%,100%{opacity:.4;transform:scaleX(.6);}50%{opacity:1;transform:scaleX(1);}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
        @keyframes breathe{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.012);opacity:.94;}}
        @keyframes heartbeat{0%,100%{opacity:.35;}50%{opacity:1;}}
        @keyframes dotpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,122,24,.6);}70%{box-shadow:0 0 0 7px rgba(255,122,24,0);}}
        @keyframes firedrift{0%{transform:translate(0,0);}50%{transform:translate(6%,-4%);}100%{transform:translate(0,0);}}
  @keyframes neonPulse{0%,100%{box-shadow:0 0 16px rgba(0,255,200,.20),inset 0 0 12px rgba(0,255,200,.05);}50%{box-shadow:0 0 38px rgba(0,255,200,.50),inset 0 0 20px rgba(0,255,200,.13);}}
        @media (prefers-reduced-motion: reduce){*{animation:none !important;}}
        input,textarea{color:#ffffff !important;}
        input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3);}
        input:focus,textarea:focus{box-shadow:0 0 0 2px rgba(0,229,180,0.25) !important;border-color:rgba(0,229,180,0.4) !important;}
   /* Consistent breathing room below form controls app-wide (inline margins still win, so explicit spacing is respected; flex-row controls each get equal spacing so they stay aligned) */
   #root input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),#root select,#root textarea{margin-bottom:8px;}
   .print-invoice input,.print-invoice select,.print-invoice textarea{margin-bottom:0 !important;}
        ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px;}
      `}</style>
      {screen==="signin"&&<SignIn onWorker={w=>{setWorker(w);setScreen("worker");}} onManager={()=>setScreen("manager")}/>}
      {screen==="worker"&&worker&&<WorkerApp worker={worker} onSignOut={()=>{setWorker(null);setScreen("signin");}}/>}
      {screen==="manager"&&<ManagerApp onSignOut={()=>setScreen("signin")}/>}
    </div>
  );
}
